body:
  text: 第八回伊尹空桑說可疑偃王卵育事尤奇書生語怪偏搖首不道東鄰有蛋兒話說慈長老在菜園中埋了小孩子方欲回身只見那孩子分開泥土一個大核桃般的頭兒鑽將出來慈長老慌了手腳急將鋤頭打去用力過了撲地趺上一交把鋤頭柄兒也打脫了爬起來看時那孩子端端正正坐在雞窠裏面對著慈長老笑容可掬慈長老心中不忍便道小廝你可惜討得個人身若投在求男求女的富貴人家夜明珠也賽不過你如何鑽在蛋殼裏去了你自走錯了路頭不干老僧之事今番聽老僧吩咐別投生路休得成精作怪恐嚇老僧便把鋤頭柄兒按倒將雞窠翻上冒著添些泥土堆得高高的又取幾塊亂石壓在上面料是出不得頭方才轉身又想道倘或走個狗子進來爬開石塊怎麼好我且把園門關上幾重這怪物不是悶死也是餓死當下帶轉門兒搭上鐵鈕回到房中取一具留橫的新銅鎖鎖上吩咐衆僧直等我來自開這長老生性有些固執衆僧不知他甚麼意思也不去問他一連過了十來日慈長老心下終是掛缺想道眼見得這孩子不活了我且看他一看終不然鎖斷了門拋荒了這片園地菜也不要吃一根當下取鑰匙去開了鎖曳開園門走到西邊牆角頭看時只見亂石四散拋開雞窠兒也翻在一邊內中不見了小孩子慈長老吃一驚四下尋看只見那小孩子赤條條地坐在一棵楊柳樹下身上並無傷損已變做二尺長了生得清秀只是不能言語見慈長老近前笑嘻嘻的一手扯住他的布衫角兒慈長老沒奈何把他蕩開轉身便跑再也不敢回頭離了菜園心頭還突突的跳暗地想道我恁般埋了他又是甚麼神鬼弄他出來終不然一點點小廝許大力氣自會掙扎便泥裏鑽出來時這些石塊如何運得開去況且十來日裏頭就長了一尺多若過二三十年怕不破天哩恁般怪事古今罕有這禪堂中觀音大士靈籤極準我且問個吉凶若是該留下撫養或者到是個聖僧不是我們滅得他的若不該留時再做商議原來禪堂中供養的是一尊檀香雕就的觀音大士案前設個籤筒有人來求籤吉凶有驗慈長老那時也是無計可施只得取了籤筒在大士臺前磕頭祝告道弟子出家多年小心持戒不合潭邊汲水把個蛋兒攜帶送與鄰家老母雞誰知抱出個小無賴埋之不死餓之還在忽然一尺二尺恁般易長易大來歷甚奇蹤跡可怪不是妖魔定是冤債若還天遣為僧留下並無災害乞賜靈籤上吉使我不疑不駭特地祈求誠心再拜口疏已畢將籤筒向上搖了一回撲地跳出一根籤來拾起看時是個第十五籤果然注個上吉二字那籤訣上寫道風波門外少人知留得螟蛉只暫時來處來時去處去因緣前定不須疑慈長老詳看籤中之語道螟蛉乃是養子我僧家徒弟便是子孫這籤中明明許我收留料也沒事當下就喚老道劉狗兒來到禪堂吩咐道不知村裏什麼人家養多了兒子撇下一個在我家菜園裏方才我到那邊看見他在楊柳樹下倒好個小廝可惜他一條性命我們僧家不便收養你可領他在身邊撫育倘或成人長大便剃髮為僧你老人家也有個依靠原來這劉狗兒是本處一個莊戶家中也有得過活因年老無子老婆又死了別著一口氣到賠幾兩銀子進入本寺做個香火因自己沒兒平日間見了人家小孩子便是他的性命聽得慈長老這話一腳跑到菜園楊柳樹下看時果然好個清秀孩子連忙抱在懷中把布衫角兒兜著剛轉身到門口只見慈長老也走將來了慈長老見老道抱著孩子心下倒也歡喜對他道你抱進自己房裏去我就來老道忙忙的去了慈長老拽轉園門取下這副銅鎖帶回屋中便向床邊衣架上揀一件舊布衫一條裙子拿到老道臥房裏來把與他包裹孩子老道道舊衣舊裳倒也有幾件在這罷了還存得幾尺藍布恰好與與他縫個衫兒穿著只是沒討乳食處怕餓壞了慈長老道乳食那裏便當早晚只泡些糕湯餵他若是他該做你兒子自然有命活得倘然沒命也沒奈何強如撇他在菜園活活的餓死舉心動念天地皆知你老人家肯收養他時也是一點陰騭神明也必然護佑我先前在觀音大士前求下一籤是個上吉明日長成喚他叫做吉兒罷老道道卻喜這小廝歡喜相只會笑不會哭從菜園裏抱進來直到如今也不見則聲慈長老道是不哭的孩子好養兩個正在講話只見走進個小沙彌來看見了小廝便去報與師父師兄知道三四個和尚都跑將來把老道半間臥房得滿滿的衆僧問道這小廝那裏來的慈長老道不知是張家兒李家子撇在我園裏頭我見他好個小廝又可惜他一命因此教老劉收養做個兒子只這幾個和尚中也有好善的也有惡的那好善的便道阿彌陀佛養得活時也是我寺中陰騭那惡的便道誰家肯把自養的孩兒撇卻一定是沒丈夫的婦女做下些不明不白的事生下這小廝怕人知道暗暗地拋棄了我們惹什麼是非卻去收他好善的又道莫說這般罪過的話知他是那家生的多有年命刑剋爹娘不肯留下或是婢妾所生大娘子妒忌將來拋卻也不見得那小廝額上又沒有姓張姓李字樣有甚是非那惡的又道撫養他也罷只是寺院裏房頭哭出小孩兒聲響外人聞得不當雅相老道道這小廝只有這件好處再不哭一哭兒衆僧便不言語慈長老道我出去讓你們在床鋪上坐坐莫要擠倒了這間房子說罷走出房去了衆僧見慈長老有不悅之意也各自散訖有詩為證收養嬰兒未足奇半言好事半言非信心直道行將去衆口從來不可齊再說老道自收了這小廝愛如己子早晚調些糕湯餵他因不便當就把些粥飯放他口裏這小廝也咽下了又沒病痛自此老道每日的省粥省飯養這孩子過了三五個月外人都知道寺裏老和尚在菜園裏拾個小孩兒交與劉狗兒養著把做個新聞傳說東鄰的朱大伯聞著這句話暗想道菜園裏那有什麼孩子拾得莫不是鵝蛋中抱出來的這個怪物老和尚沒有安排殺他撫養在那裏當時因壞了我一窠雞兒曾許下賠我幾斗麥不見把來與我我如今只說少了麥種與他借些麥子做種只當提醒他一般料他也難回我順便就去看那孩子是什麼模樣是那怪物也不是當下朱大伯取個叉袋子拿著走進寺來正遇見慈長老在廊下門檻上坐著手中拈個針兒在那裏縫補那破褊衫朱大伯道老師太多時不見了慈長老一見了朱大伯便想起舊話來慌忙放下褊衫起身問訊道老僧許你的麥子還不曾相送朱大伯道怎說這話老漢不是來與老師太討債的自家藏下些做種的舊麥子被一起親眷到我家住下了幾日都吃去了少了麥種只得與老師太借些去待來年種出麥來做饝饝送老師太吃慈長老道我許下了少不得送你的那論你有麥種沒有麥種你且回去一時間我叫人送來朱大伯道不消送得老漢帶來有叉袋在這裏若方便時老漢自家背去罷說罷便把叉袋子提起與慈長老看慈長老接得在手便道既如此你且在這廊下暫住等老僧進去取來與你朱大伯道老漢還要尋劉狗兒說句閒話慈長老恐怕這老兒進去看見了小孩兒口嘴不好講出什麼是非來便道狗兒在園上鋤地哩待老僧喚他出來罷慈長老左手拿著叉袋右手去檻上檢起這件補不完的破褊衫也放在左臂上對裏頭便走朱大伯劈腳也跟隨進來慈長老著了急連忙閉門已被老兒踹進一隻腳來了慈長老焦廊燥道這裏禪堂僧院你俗人家沒事也進來做甚祇不過要幾斗麥子我又不是不捨得與你教你廊下等一時兒你卻不依我說朱大伯扯開了口笑嘻嘻的道老漢聞得劉狗兒領下個小廝要去認一認看他是胎生卵生慈長老聽得卵生二字說著了筋節面皮通紅發作道你這老兒也好笑胎生卵生干你屁事他自在路上拾來一個小廝初時便有二尺多長了難道卵生是大鵬裏頭抱出來的你瞧他怎的終不然看中了意認做你家的孫兒去罷便把叉袋子撇在地下又道你既要認你孫兒我也沒氣力與你擔麥子朱大伯見慈長老發怒便道不要我看這小廝便罷了直得恁地變臉只怕這野種子做不成你徒子徒孫哩拾起叉袋子抖一抖抱著轉身便走慈長老道不要麥子也由得你難道教老僧央你帶去不成冷笑一聲把門閉了朱大伯走出寺門口裏喃喃的道再沒見這樣個出家人許多年紀火性兀自不退便問得這句胎生卵生也只當取笑你便著了忙發出許多說話好不扯淡衆鄰舍見朱大伯氣憤憤的從寺中出來便問道大伯你討什麼東西不肯直得如此著惱朱大伯道告訴你也話長哩去年冬下這慈長老拿個鵝蛋說到我家來趁我母雞抱卵也放做一窠兒抱著誰知蛋裏抱出一個六七寸長的小孩子鄰舍道有這等事朱大伯道便是說也不信抱出小孩子還不打緊把這母雞也死了這一窠雞卵也都沒用了我去叫那長老來看長老道不要說起是我連纍著你明年麥熟時把些麥子賠你罷他便把這小怪物連窠兒掇去我想道不是拋在水裏便是埋在土裏後來聽得劉狗兒撫養著一個小廝我疑心是那話兒今日拿個叉袋去寺裏借些麥種順便瞧一瞧那小廝是什麼模樣便不與我瞧也罷了恁般發惡道干你屁事又道認做你家孫兒去罷常言道樹高千丈葉落歸根這小廝怕養不大若還長大了少不得尋根問蒂怕不認我做外公麼衆鄰舍道到底是你老人家口穩有恁樣異事再不見你提起既是這老和尚做張做智你只看出家人分上耐了些罷老人家著什麼急事討這樣閒氣再過幾日我們與這老和尚說討些麥子還你你莫著惱大家三言兩語勸那朱大伯回家去了有詩為證別家閒事切休提提起之時惹是非麥子不還翻鬥氣何如莫問小孩兒再說慈長老因朱大伯這番嘔氣吩咐老道再莫抱小廝出來到了周歲便替他在佛前祝髮從此廢了吉兒的小名合寺都喚他做小和尚只因朱大伯與這些鄰舍說了鵝蛋中抱出來的三三兩兩傳揚開去本寺徒弟們都知道了慈長老也瞞不過了因此又都喚他做蛋子和尚俗語說得好只愁不養不愁不長光陰似箭這蛋子和尚看看長成一十五歲怎生模樣有西江月為證鮮眼濃眉降準肥軀八尺多長生成異相貌堂堂吐語洪鐘響亮葷素一齊不忌勇力賽過金剛天教降下蛋中王不比尋常和尚又且資性聰明諸般經典雖不肯專心誦習若是教他一遍流水背誦出來有人不識起倒與他賭記閒時乾自把東道折了老道將他愛惜自不必說只這慈長老一條心也未免偏在他身上看官你道為甚的一來愛他聰明二來可憐他沒有俗家看覷三來又一件這蛋子和尚從幼不忌葷酒好的是使槍輪棍雖則寺中沒有這家伙時常把大門槓子舞上一回若教他鋤田種地做一日工抵別人兩日還多只是性氣不好觸著他便要廝罵廝打且喜聽人說話或是老道和這慈長老隔壁喝一聲時便氣也不敢呵了又這幾件上得了住持之心吃的穿的每加倍的照顧他那起徒弟徒孫漸有不平之意時常合計商量要撚他出去只是沒個事頭便有些無禮之處老道又一口埋怨下情賠禮那慈長老又說他是個孤身異種勸衆僧讓他一分所以衆僧只得耐他下去這蛋子和尚聽得人說是蛋殼裏頭出來的自家也道怪異必不是個凡人要在世上尋件驚天動地的事做一做衆僧背地裏都叫他是畜生種又叫他是野和尚雞兒抱的狗兒養的心中不美常想走出寺門雲遊天下只為慈長老看待得好又老道又有父子之恩所以割捨不下忽一日老道得了一個危症在床數日蛋子和尚衣不解帶看湯看藥的伏侍不痊嗚呼哀哉死了蛋子和尚哭了一場少不得棺木盛殮又與慈長老討菜園旁邊一塊空地埋葬慈長老允了衆僧都有些不像意唧唧噥噥的說道老師太越沒志氣了一個香火道人也把塊葬地與他若是死了個和尚必須造個大冢傳下兩三代休想剩半畝菜園終不然把這寺基廢了都做墳墓罷慈長老只做耳聾由他們自言自語只不則聲不一日擇吉入土衆僧們也有推傷風的也有推肚痛的都不肯來幫助只一個老和尚把鐃鈸響著送葬當晚慈長老就收拾蛋子和尚到自房裏去安歇到第三日蛋子和尚要做老道的羹飯念老老道是奉齊的特地買一塊豆腐把碗盛著放在廚下又去買些紙錢轉來取豆腐時不知那一個移在燒火的矮凳上被狗子吃去了蛋子和尚明知是衆僧們故意如此又惱又苦對著灶下哀哀的啼哭衆僧出來攬事道這廚房須不是劉氏門中祠堂孝堂只管哭甚鳥早知這塊豆腐恁地值錢時老師太也該替你看守好才是如今也不消啼哭左右不是張狗兒吃也是李狗兒吃與你親爺差不多蛋子和尚被衆僧一人一句數落一場也不回言撇卻紙錢一徑走出寺前向水潭邊一塊搗衣石上氣忿忿的坐著想道這夥禿驢欺得我也夠了我如今死了養爹更沒個親人老和尚雖好許多年紀也是風中之燭朝不保暮到底是個不好開交不如半夜三更放把火燒死了這夥禿驢方出得這口氣只長老這條命要留下他的怎的哄得他出寺門便好千思百量心頭火按納不下提起拳頭向那搗衣石上只一下把一邊角兒打個粉碎此時東鄰的朱大伯也故了有個兒子叫做丑漢大伯死後老和尚念其前情把五斗麥子去助他喪事又領著蛋子和尚到他靈前磕頭所以蛋子和尚與丑漢一向相識來往這日丑漢正在潭邊低著頭洗菜只聽得石頭碎響抬起頭來看時認得蛋子和尚問道蛋師為甚在這裏試力蛋子和尚坐著只不做聲丑漢道你與誰鬥寡氣來出家人戒的是酒色財氣四件酒是沒要緊雖說色財二字那裏便有什麼婆娘與你偷錢鈔兒與你撇只這氣是日日有的第一要戒的是他蛋子和尚聽了這話十分氣已降下三分了便道老哥好話我別無他事只受這一班禿驢欺侮不過丑漢道我父親在日常說你是不落血盆的好人怎的與他們一般見識自古道欺一壓二他先進寺門一日大你又是單身除非別處去不住這寺中罷了若要同鍋吃飯後日慈長老去世還要在他們手裏討針線哩思前算後總不如耐氣為上說罷提著一把菜向東去了蛋子和尚因這一席話把放火燒寺的念頭撇開決意出外遊方想著慈長老待我甚好不對他說一句如何使得又想道若對他說一定不放我去不如硬著心腸就今日撇開罷了依先入寺到廚下去看時紙錢還在碗匱上取來就焚在灶前走到慈長老房中魆地裏將隨身衣服被單打個包裹放著等天晚溜出寺門趁著月光拽開腳步便走有詩為證不分南北與西東大步行來去似風未必前途都稱意且離此地是非中不說蛋子和尚去後且說慈長老當晚不見蛋子和尚進房問著衆僧都推不知過了一夜明日看他的衣服被單都沒有了心下疑慮對衆僧道你們那一個與小和尚鬥口來他衣服被單都收拾去了也不對我說聲定是賭氣去的衆僧那個肯認都說我等並無口角他立心要遊方久了只牽掛著劉狗兒昨日燒些紙錢是打算出門的意思長老不信吩咐衆僧四下裏尋訪他回來衆僧口裏答應那個去尋只在寺前寺後閒蕩了個把時辰來回覆道沒處尋想他去得遠了吃了早飯慈長老又催促衆僧分頭再去自家拄個竹杖也去村中走了一回轉到寺前見這些徒弟徒孫們在水潭邊一行兒擺著檢些瓦片兒賭打水鼓耍子慈長老發個喉急道我老人家也自家去奔走一遍虧你後生們看得過在這寺裏相處幾時全沒些情分就不去訪他個下落衆僧見慈長老認真越發不在意一個道不消尋得他他想著老師太恁地牽掛決不去遠的只兩日三日自然來看你又一個道老師太你便牽掛他他到不牽掛你若是他心地好時不走去了就去也得對你說一聲又一個道他將來是一寺之主我們都沒用的怎教老師太不掛牽又一個道他又沒有俗家原是個淌來僧老師太有處尋他來沒處尋他去又不是我們作中過繼到寺內的認得他何州何縣向海底下撈針去老師太你必定曉得些蹤跡對我們說知待我們寫個長帖請書請他到來便了慈長老被衆僧七嘴八舌氣得開口不得回到房中落了幾點眼淚以後也不教衆僧去尋了每日鎖了房門自家各處捱問每遍回來衆僧背後做手勢裝鬼臉慈長老只做不知過了月餘毫無音耗慈長老又在觀音大士前求了好幾遍籤都是不吉話兒想著起初求的籤訣上說道螟蛉只暫時又道來處來時去處去一定是尋不著了那籤是第十五籤剛剛撫養到一十五歲想是天數已定無可奈何嘆口氣也只得罷了正是世上萬般哀苦事無非死別與生離天下無有不散的筵席這段話繳過不提再說蛋子和尚出了寺門立心要遊各處名山訪個異人傳個驚天動地的道法一路化緣前去到全州湘山光孝寺中拜了無量壽佛的真身又往衡州朝見南嶽衡山把七十二峰十洞十五岩三十八泉二十五溪都遊個遍逢山看山逢水看水遇個遊僧道便跟他半月十日看他沒甚意思又拋撇了如此非一忽一日同幾個僧家來這沔陽雲夢山下經過到個所在終無人煙都是亂山貪著僻靜只顧走只見白霧漫漫前途不辨心中正在驚疑內一僧在後面把手招道快轉來走錯路了蛋子和尚隨著僧伴轉去問道這是什麼所在那僧一頭走一頭說道聞得這裏有個白雲洞乃白猿神所完因有天書法術在內怕人偷去故興此大霧以隔終之一年之內只有五月五日午時那一個時辰猿神上天霧氣暫時收斂過了這個時辰猿神便回霧氣重遮內有白玉香爐一座只香爐中煙起此乃猿神將歸之驗曾有個方上道人趁著這個時辰進去將到洞口看見一條石橋甚是危險情知走不過只得罷了這霧氣不知許多里數若誤走進去被霧迷了四面皆無出路就是走得出時受了這霧氣在肚裏不是死也病個夠這雲夢山共有九百里大本地還有不曉得白雲洞的蛋子和尚聽了心下想道原來真有這個法術在此我若沒緣時便與那個有緣過了幾日撇卻了同行僧伴獨自徑到雲夢山舊路來旁著近霧之處折些枯木摘些松枝低低的搭起一個草棚日裏出外投齊化飯夜間只在棚中歇息專等端午日要到白雲洞中盜取白猿神的天書道法若是一偷就偷看著了那一個不去走一遭兒也不見得天書妙處正是受得苦中苦方為人上人畢竟蛋子和尚怎麼樣去盜法且聽下回分解
