body:
  text: 第三十回為人本分守清貧非義之財不可親命裏有時當自至不然好處反遭迍話説溫殿直帶著一行做公的搶入麵店裏來只見和尚下樓來溫殿直把鐵鞭一指教做公的捉這和尚那和尚見衆人來捉用手一指可煞作怪匱上主人攛掇的小博士並店裏吃麵的許多人都變做和尚溫殿直與做公的也是和尚若干人你看我我看你都呆了做公的看了不知捉那個是得麵店裏鬧了一場吃麵者都自散了溫殿直看那主人家並衆人依舊面貌一般看那店裏不見了和尚溫殿直即時教做公的分投去趕發報子到各門上去如有和尚出門便叫捉住當時溫殿直回府正值太尹晚衙升廳打斷公事溫殿直當廳唱喏龍圖太尹道我要你捉拿妖僧事體若何溫殿直稟覆道使臣領相公臺旨緝捕彈子和尚適來大相國寺前見一個行法的叫做杜七聖一刀剁下了孩兒的頭對門麵店樓上有個和尚把那孩兒的魂魄來收了叫他接不上頭杜七聖不勝焦燥在地上種出一個葫蘆兒來把葫蘆兒一刀剁下半個那麵店樓上吃麵的和尚便滾下頭來那和尚去樓板上摸那頭來接上了下面孩兒頭也接上了使臣見這般作怪教人去捉只見那和尚把手一指店裏人都變做和尚連使臣并手下做公的也變做和尚教使臣沒做道理處告相公這等妖人實難捕捉望相公臺旨主裁龍圖太尹道我乃開封一府之主似此妖人在城之內恐生別事致朝廷見罪於我即時吩咐該吏寫押榜文各門張挂一應諸處庵堂寺院人等若有拿獲彈子和尚者官給賞錢一千貫如有容留來歷不明僧入及窩藏隱匿不首發者鄰右一體連坐因此京城內外説得沸沸的卻説東京市心裏有一個賣青果的李二哥夫妻二口兒在客店裏住方才害病了起來沒本錢做買賣出來求見相識們要借二三百文錢做盤纏當日出去借不得歸家悶悶不已渾家道二哥你今日出去借錢如何李二道好教你得知今日出去借不得錢街上人鬧哄哄地經紀人都做不得買賣説昨日一個和尚在麵店樓上吃麵只因他的頭骨碌碌滾落地來把手去摸著了頭雙手捉住耳朵安在腔子上依舊接好了做公的見他作怪一齊去捉他被那和尚用手一指滿店裏人都變做了和尚一般模樣如今開封府出一千貫錢賞要捉這和尚原來這和尚三五日前曾騙了善王太尉三千貫銅錢叫做彈子和尚渾家道二哥真個有這話麼李二道我方才看了榜來如何在你處説謊渾家道二哥我如今和你沒飲食吃若有來時捉得這個和尚請得一一千貫錢來把我們做買賣卻不是好李二道胡説官府得知不是耍處渾家我包你請得一千貫錢便了李二道你怎的教我請得一千貫錢渾家道二哥好教你得知這和尚不在別處遠便十萬八千里近只在目前李二哥道在那裏渾家道在隔壁房裏李二道你見他什麼破綻來渾家道間壁這個和尚來這裏住有三個月了不曾見他出去抄化也不曾見他與人看經每日睡到吃飯前後才起來出去未到黃昏後吃得醉醮醮地歸來我半月前因吃了些冷物事脾胃不好肚痛了要去後面房裏窄狹有臭氣只得去店後面去上坑卻打從他房門前過那時有巳牌時候只見他房裏放出些燈光來我道這早晚兀自有燈望破壁裏張一張時只見那和尚坐在床上渾身迸出火來和尚把頭抬一望離床直頂著屋梁嚇得我不敢廁上去便歸房裏來了這和尚必然就是妖僧李二哥道這是實麼渾家道我與你説什麼脫空李二哥道你且低聲不要走漏了消息吩咐了渾家出門一地裏徑到使臣房來卻又不敢入去只在門前走來走去做公的看見喝聲道李二你有甚事不住在此走來走去李二道告上下男女有些機密事特來見觀察做公的應道你在門首伺候待我稟過方可入去適值溫殿直正在廳上做公的稟道告觀察賣果子的李二在門走來走去我問他他道有機密事要見觀察溫殿直道叫他進來做公的出來引李二到廳上唱了喏溫殿直見了不敢驚他吟吟笑問道李二哥有甚事來見我李二道告觀察男女近日因得了病不曾做得道理早晚出來幹些間事只見張挂榜文男女也識幾個字見寫下出一千貫錢捉妖僧歸去和渾家説了渾家道隔壁歇的和尚是妖僧溫殿直不敢大驚小怪笑著道李二哥這件事卻要仔細你夫妻兩個見他什麼破綻來李二把渾家的言語説了一遍溫殿直道這事卻要實落你去補一紙首狀來李二應了出來央做公的草了稿兒討一張紙親筆謄了直入來當廳遞了溫殿直道這如今這和尚在店裏麼李二道每日早飯後出外到黃昏便歸溫殿直道你且在這裏坐下待我叫人去買些酒來與你吃不多時買將酒來教李二吃了溫殿直即同做公的來教李二做眼帶一行人離了溫殿直家竟來客店左側一個茶坊的鋪裏坐了叫做公的外面去看那和尚當日未有黃昏時候只見那和尚吃得醉醺醺地踉踉蹌蹌撞將來李二慌忙入茶坊裏見溫殿直道告觀察和尚來了卻好和尚走到茶坊門前溫殿直指著一行做公的道捉這妖僧衆人發聲喊正是皂雕追紫燕猛虎啖羊羔一發都上把那和尚橫拖倒拽把條麻索綁縛了衆人前後簇擁押著徑奔甘泉坊使臣房裏來有詩為證世間誤事無如酒一醉能令萬事忘試看神通蛋和尚何曾醉裏脫災殃溫殿直道慚愧幹辦得這場公事且叫龍圖相公安心衆人把那和尚捆縛做餛飩兒一般那和尚醉了不醒齁齁的睡著溫殿直即時進府申覆太尹道妖僧已捉下了本合押赴廳前因這和尚大醉不省人事現在使臣房裏稟相公臺旨龍圖太尹見説教且好牢固看守待來日早衙解來溫殿直出府到使臣房裏看那和尚酒還未醒吩咐衆做公的小心看守卻説那和尚到半夜酒醒覺得好不自在開眼看燈燭照耀如同白日兩邊坐著都是做公的和尚問道這是那裏做公的道這是使臣房裏又問做公的貧僧犯什麼罪過將我來縛在這裏衆做公的情知這個和尚是個妖僧不敢惡他內中有個年紀老成的做公的道和尚你不要錯怪了我們這是我們的職事我們家中各有老小不去惹空頭煩惱因你客店裏隔壁賣果子的李二哥説你住了三個月不曾與人看經又不出去抄化每日吃得醉醺醺的説你來歷不明因此我們來捉了你和尚道我自有官員府院宅第齋我這也不干他事做公的道和尚沒奈何等到天明你自去太尹面前和李二分辨將來五更溫殿直叫做公的簇擁著和尚入開封府的廊下伺候太尹升廳四司六局立在廳前只見太尹出來公座甚是次第一對水晶龍燈卻如照天蠟燭皂隸喝低聲溫殿直押那和尚到廳下唱了喏太尹看看李二的首狀看看和尚焦燥道叵耐你出家為僧不守本份輒敢惑騙人錢財教獄卒取面長枷來把和尚枷了叫兩個有氣力的獄卒過來與我把和尚先打一百棍卻再審問他獄卒唱了喏將和尚腿上打不得兩三棍衆人發聲喊門子喝低聲喊他們且住太尹看時枷窟裏不見了和尚卻縛著一把掃帚太尹道怎有這般妖人方才把那和尚枷在這裏卻如何是把掃帚正説之間只聽得府衙門外有人發喊太尹驚問有甚事把門的來報道告相公有一僧人在門外拍手大笑道好個包龍圖無奈貧僧何包太尹聽得説大怒道這廝敢如此無禮即時叫人下手去捉這番捉著妖僧依例賞錢一千貫當時做公的奔出府門徑來捉這妖僧和尚見人來捉他連忙走到街市上不慌不忙擺著褊衫袖子去了做公的見了緊趕他緊走慢趕他慢走不趕他不走做公的趕得沒氣力了立住了腳只差得十數步只是趕他不著衆人將趕到相國寺前那和尚在延安橋上望見衆人趕來和尚連忙走入相國寺山門去了溫殿直道這和尚走了死路好歹被我們捉了吩咐一半做公的圍住前後寺門一半向佛殿兩廊分投趕捉只見本寺長老出來與溫殿直相見了道告觀察本寺是朝廷香火院觀察為甚事將著一行人手執器械來寺中大驚小怪溫殿直道我奉太尹相公臺旨趕捉一個妖僧到你寺中你莫隱藏了會事的即便縛將出來長老道敝寺有百十衆僧都是有度牒的有挂搭僧到寺中有知客不曾敢收留過夜若是觀察趕至寺中必然認得此僧何不便捉了卻來這裏討人溫殿直道這妖僧騙了善王太尉三千貫錢蒿惱得一府人不得安逸若不送出來就稟過太尹教你寺中受纍嚇得長老慌了道告觀察本寺僧都是明白的不是妖僧若不信時都叫出來叫觀察一一點過溫殿直道最好長老即時鳴鐘聚集本寺百十僧衆叫溫殿直點視溫殿直同做公看時都叫不是溫殿直道長老我親自趕入你寺中來如何便不見了須是叫我們搜一搜看長老道貧僧引路任從觀察搜看便了從僧房裏到廚下淨頭庫堂都搜不見轉身到佛殿上見塑著一尊六神佛三個頭一似三座青山六隻臂膊一似六條峻嶺托著六件法寶溫殿直道寺內不塑佛像卻為何塑哪吒太子長老道哪吒太子是不動尊王佛以善惡化人溫殿直與衆人見殿上空蕩蕩地只見哪吒一行人正在殿門只聽得佛殿上有人叫道溫殿直包太尹教你來捉貧僧見了貧僧如何不捉溫殿直與衆人回頭看時卻是哪吒太子則聲衆人看那哪吒太子是個五綵粧成約有一丈五六尺來高六隻臂膊拿六樣物三顆頭中間這顆頭張開口血潑潑地露出四個長牙叫道溫殿直你來捉我去嚇得長老和衆人大驚道作怪作怪衆人要來捉哪吒卻又是泥塑的如何捉得他去哪吒又叫道怎的不叫人來捉我去衆人商議道莫不是泥塑的哪吒成了器出來惱人麼如今去稟覆太尹須把哪吒來打壞了便不出外惱人長老道觀察這卻使不得那有泥神會説話無非是妖物憑借作怪不干法身之事粧塑的工本大將他壞了日後難得成就溫殿直道既那妖物憑借作怪合該毀除了免成後患衆僧中一個有德行的和尚合掌向佛前道龍天三寶可以護法逐遣妖物出來否則恐壞了神像祝禱已畢只聽得外面有人拍著手呵呵大笑道觀察我在這裏何勞你費力一行做公的見了正是和尚發聲喊都來捉妖僧只爭得十來步遠只是趕不上那和尚引著一行人出來相國寺徑奔出大街經紀人都做不得買賣推翻了架子撞倒了檯床看的人越多了走來走去直趕出了城過了義官廳將到市梢頭和尚説道你衆人不要來趕了我貧僧自歸去了罷看著汴河裏將身一跳只聽得騰地一聲響和尚攛入水裏去了那做公的道今番好了得他自死在水裏也省了許多氣力那汴河水滴溜溜也似緊的衆人都道他的尸首不知流到那裏做住溫殿直只得回去稟覆太尹正值太尹在廳上打斷公事溫殿直唱了喏把捉妖僧的事從頭説了一遍包太尹聽了道叵耐這廝惱得我也沒奈他何得自跳在水裏死了也罷説猶未了只聽得階下有婦人聲叫屈太尹問道為甚事叫屈婦人道告相公丈夫李二為首告妖僧已經捉獲到官反將我丈夫拘禁婦人也不願支賞錢只要放丈夫回家趁口度日望相公臺旨太尹道李二首告得實合給賞錢與他如何把他監禁溫殿直道不曾監禁他朝夕款待酒飯留在使臣房裏伺候相公臺旨太尹叫他出來溫殿直即時到使臣房內叫李二到廳下太尹道既出榜文在實合給賞錢一千貫與他當時東京一貫錢值銀一兩李二是個窮經紀人平白得了一千貫錢非細的好了李二夫妻兩個當廳領了賞錢那時夫妻二人謝了太尹急刻出府門來回到店裏有詩為證誰近龍圖手內錢平時李二賴妻賢妖僧不怕千金子受用浮財得幾年古往今來説話的總是一般沒錢便罷休有了錢便有沈待詔來攛掇張博士來相幫李二去相國寺前典了一所屋子門前開一個大子鋪夫妻二人衣豐足食時遇冬天當日有晌午前後生著一爐栗炭火安排了幾杯酒夫妻二人正向火吃酒之間只見一個人走入來叫聲李二郎有細子買些個夫妻二人卻認得是和尚驚得大呆了和尚道李二郎你不因貧僧如何得有今日快活我特來問你求一齋他夫妻兩個有一個會事的就出來拜謝了這和尚便齋他一齋打什麼緊終不成便真個要你的齋吃他來試探你也未見得或者把幾句好言語指斷他求他離了我家便了李二夫妻卻沒有這般見識千不合萬不合起個念頭道你這妖僧説你被做公的趕捉跳在汴河水裏死了你卻因何又來我家引惹是非你若會事快快走去若少遲延我這裏叫一聲當地巡軍來捉你去吃官司不要怨我和尚道若奈何得我時捉了我多日了你首告我吃官司我卻周全你請了一千貫賞錢叫你夫妻二人快活受用我來見你你合當謝我倒發惡頭要叫做公的捉我你這漢子甚不近理且教你受些疼痛用手一指喝聲疾只見那李二向的火盆飛起來望李二臉上只一掀李二大叫一聲忽然倒地渾家慌忙來救扶起看時栗炭火燒得燎漿泡也似看那和尚又不見了李二被炭火燒得疼痛不可當沒錢時也只得自受休了因有了這貫錢便請醫救治敷上藥越疼得緊就叫了三日三夜煩惱得渾家沒措置處只見門前一個道人青巾黃袍走到匱邊叫聲抄化李二嫂道我家沒事時便與你兩三個錢打什麼緊這裏人命交加卻沒工夫與你先生道娘子你家中有甚事李二嫂道好叫先生得知被一個妖僧把我丈夫潑了一臉火燒起許多燎漿泡敷上藥越痛叫了三日三夜只怕要死先生道娘子貧道收得些湯火藥敷上便不痛瘡厭肉便脫落屢試屢驗救了許多人李二嫂道休言便好只止得疼痛時自當重重相謝先生道你去請他出來就取些水來李二嫂入去扶出李二來把水遞與先生先生把一個藥包兒抖些藥放在水裏用鵝毛蘸了敷在瘡上李二喜歡道好妙藥就是鋪水散雪的便不疼了先生道這個不為奇妙即時下落瘡厭肉叫你無事你意下如何李二道若得恁地感謝先生先生道此乃熱毒之氣你可出外面風涼處吹著瘡厭肉即便脫落李二依先生言出街上來先生叫李二坐在凳上看著他道你叫三聲瘡厭肉落這瘡厭肉便落下來李二聽得歡喜盡性命叫了三聲只見那李二坐的凳子望空便起去到那相國寺十丈長的幡竿頂上不歪不偏端端正正擱一個住街上人見了發起喊來李二嫂出來看見吃了一驚道苦也苦也我丈夫如何得下來先生道不要慌我叫他下來教你認得我則個那先生脫了黃袍除下青巾李二嫂仔細看了一看嚇得叫聲苦不知高低原來卻是妖僧那和尚道你丈夫不近道理一心只要害我卻盡害我不得我且叫他在幡竿上受些驚恐街上人鬧鬧哄哄都來看內中有做公的看見道見今官司明張榜文堆垛賞錢要捉妖人這和尚又在這裏逞妖作怪須要帶纍我們做公事的與當坊里甲一齊來捉這和尚那和尚望人叢裏一躲便不見了衆人道自不曾見這蹊蹺作怪的事那李二緊緊的坐在幡竿頂上下又下來不得衆人商議救他又沒有這般長的梯子烘動了滿城軍民都道這和尚卻也利害這個人如何下來卻説當坊巡軍飛也似來報包太尹包太尹即時坐轎來到相國寺裏下轎排開交椅坐在殿前抬起頭來看時見李二坐在幡竿頂上凳子上高聲叫救人包太尹尋思沒個道理救他下來教叫他妻子來問他李二嫂向前拜了包太尹問道你丈夫為何緣故得在上頭可對我實説李二嫂把和尚投齋潑火的事道人敷藥的話一一説了包太尹道叵耐妖僧這般無理若今次捉住斷然不與干休話猶未了佛殿上一壁廂走出一個和尚來到太尹面前唱個喏包太尹睜開眼問道和尚你有甚事來見我和尚道貧僧有個道理叫李二下來包太尹道吾師若救得李二下來當以齋供相謝只見這和尚輕輕地溜上幡竿雙手抱著李二高聲道包龍圖你是清正的官我貧僧不敢來惱你我自向善王太尉化得三千貫錢干你甚事你卻要來捉我我無可報答你還你一個李二從空中把李二直攛下來衆人發聲喊看那李二時正是身如五鼓銜山月命似三更油盡燈畢竟李二性命如何且聽下回分解
