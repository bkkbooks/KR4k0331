body:
  text: 第四回若欲養生兼積德虛心問取半仙堂話說益州有個名醫姓嚴名本仁乃嚴君平之後裔他看脈與人不同用三個指頭略點著便知病源所投之藥無有不愈故此傳出一個諢名叫做嚴三點他原是太醫院的御醫因景德年間蒙召李宸妃之疾他伸著三指只一點便走宸妃只道他不肯精細用心訴與真宗皇帝知道真宗要治他不敬之罪賴得眾官保救道他得個異人傳授非常醫可比雖然饒他的計較畢竟不用他方藥逐回原籍以此他就在益州行醫每月初五十五二十五這三日施藥不取分文就是平日取藥的有藥錢也不拒無藥錢也不爭所以其門如市更有一件奇處別人看脈只看得本身的病患就是精通得太素脈理也只看得本身的貴賤壽夭偏他三指一點合家爺兒娘兒妻兒女兒但係至親有災無災盡能懸斷便算命先生排著十二宮星辰細細推詳也沒這樣有准只是他怕洩了天機不十分肯輕易說一日州守相公傷了些風寒接他去切脈他點著了脈便道尊官所患不須服藥只消濃煎六安茶一碗乘熱服下到三更出汗自然沒事且喜令正夫人目下當有生男之慶但令長子婦秋間有產厄州守相公大笑想道我夫人果是懷胎或者衙內人露了個消息他就撮文一句奉承個男喜也不見得只是我兒婦在襄州家中三千餘里之外有孕無孕連我也不知況且媳婦的禍福如何在公公脈息內看出萬無是理當夜知州只一熱茶病便好了後來夫人果生一男知州也還道是偶中十月內接到一封家書是他大公子親筆說他媳婦八月二十七日小產身亡知州從此敬之如神呼為半仙以此外人又稱他嚴半仙其名天下聞知有一篇詞名臨江仙單道嚴半仙的好處世人切脈皆三指輸他一點仙機合家休咎盡皆知回生須勺飲續命只刀圭問切望聞俱不用隔垣見腑非奇從來二豎避良醫若教人種杏花滿錦江西卻說老狐扮做有病的老丐婦晝夜行走到得益州城內已知嚴半仙住在海棠樓相近這日正是九月十五輪該施藥之期恰好是知州生日半仙備几個盒子往州裏賀壽去了紛紛的看脈求藥之人何止百數都四散等候也有在海棠樓上去遊玩帶看州前動靜的這座樓在州衙之西乃唐時節度使李回所建為僚佐燕遊之所四圍遍植海棠至今茂盛每次新官到任葺理一番極是整齊那婆子也無心觀看一逕走到半仙門首只見門面是一帶木柵柵內有一座假山四五株古桂裏面三間小小堂屋匾上寫半仙堂三字這匾乃是知州所送兩旁掛板對一聯云切脈憑三點驅病只一劑婆子眼快都看在眼裏他拄著一根竹杖只在對門簷下站著午刻時分只聽得人說道來了來了走到街上一望只見半仙騎個白馬家僮捧著一套大衣服和幾個空盒子從東而回因知州留他早飯所以回得遲了眾人等得不耐煩三停裏頭已散了一停又有一多子在州前伺候隨著馬尾來的半仙到柵欄門首下馬也不進宅逕在堂中站著眾人捱三頂四簇擁將來一個個伸出手來求太醫看脈也有傳說家中病源的半仙捱次流水般看去一面口中說方一面家僮取藥也有煎劑也有丸散也有內科外科十來個家僮分頭打發不的兩個時辰都已散完那半仙早已切脈憑三點若依著平常醫者調起息來糖餅般撞起日子也看不了許多脈又早是用藥只一劑依著時醫動了藥箱便是兩三袋十來劑還未收攻隨你茅柴一般堆起藥料千人包萬人配也發付不開這起病人半仙平日施藥只以午時為限過午便不發藥了因今日出去遲特地忙到申時方畢有詩為證神隱無如西蜀嚴仙醫仙卜一家兼只因乞藥門如市也學君平早下簾婆子見眾人捱捱擠擠明知自己有些蹺而蹊之古而怪之不敢搶前且暫在假山下打盹比及眾人散了急跑上前半仙已進宅去了那婆子還望他出來呆呆地靠著柵門口死等看看到晚只見老管家手中拿一巨鎖出來關柵門婆子著了忙迎上前來深深道個萬福老管家道你抄化也須趕早如今關門閉戶的時候誰家這等便當拿著錢來在門口等你布施婆子聽說雙眼弔淚道老媳婦不是抄化的是求藥的老管家道就是求藥也有個時候俺老爺忙了一日才得半個時辰清閒終不然為你一個老乞婆壞了俺家的規矩俺就是進去稟話也乾討老爺嗔責婆子道老身安德州地方居住來路甚遠趕遲了些兒只因有個奇症求太醫救療望老公公方便則個救人一命勝造七級浮屠醫家有割股之心老公公若肯稟知太醫一聲或者太醫可憐見肯出堂來也不見得說罷一手撐著竹竿一手扯住老管家的衣袂屈著一隻腿跪將下去老管家焦燥起來發作道你這老乞婆好不曉事這般與你講明了還要歪纏你便有奇症料今晚也不會死就是皇帝老官兒敕旨宣召好歹也等明日動身說罷便把手扯起那婆子要扌雙他出去那婆子雙腳跳地叫起屈來驚動了裏面嚴半仙教個書僮傳話出來問道何人喧嚷婆子正待上前分訴被老管家一手拉開向書僮說道這老乞婆人不像人鬼不像鬼這般時候卻來問老爺取藥教他捱過一夜也不肯好意勸他出去到叫起屈來書僮道那裏走來這老婆子直恁不達道理你又不是三次兩次的好主顧作成俺門進過錢的又不是什麼夫人小姐便死了只當少了一隻老母狗州守相公是一州之主他取藥也須按著時候不敢敲門打戶你卻如此撒潑放刁快快出去便休惹惱我家老爺寫個三寸闊的帖兒送你到州守相公處只怕病到病不死打到要打死一頭說一頭幫著老管家將手劈胸扌雙那婆子那婆子發賴起來大叫一聲把枴杖拋在一邊驀然倒地面皮漸黃四肢不舉正是身似三秋敗葉命如五鼓殘燈縱然未必便死目下少吉多凶老管家見勢頭不好倒埋怨書僮起來道我老人家攻說了他一番你來收科便好也來助興罵他一場又去推推搙搙這病怯怯的婆子如何當得你自去稟復老爺不干我老人家事書僮也慌了只得去報與半仙如此如此半仙正在書房內靜坐聽說大驚慌忙走出前堂到假山邊看時那婆子已被老管家喚醒睜著雙眼呆看只不動彈半仙叫老管家扯起他右手用三個通靈入妙的指頭向他寸關尺三支脈上一點又教扯起他左手一般點過叫聲怪哉此脈不比尋常便回身到後面公事廳裏坐下叫書僮去喚嬤嬤那扶那婆子進來我自有話說老嬤嬤出去對婆子說道老爺道你脈氣有些古怪喚你進後堂來有話和你細講那婆子起先還直僵僵的躺在地下得了這個消息分明似木做的跳虎撥動了機括一跳跳將起來就地下拾起枴杖也不用人扶持把三步併做兩步鬧鬆鬆的走進後堂去了連老嬤嬤倒趕他腳跟不上落後了幾步老管家看著笑道這乞婆原來會詐死嚇壞了人也卻說嚴半仙在後廳明晃晃點著一枝蠟燭坐著看見婆子進來慌忙屏去眾人喚他近前問道你那裏居住婆子道老媳婦德安州人氏半仙道你休要瞞我我看你人之形獸之脈其中必有緣故婆子暗暗想道好個先生料是瞞他不過見四下無人慌忙跪下道實不相瞞身是雁門山下老狐因慕半仙大名特求診脈半仙道你的脈我已知道了你不害別病只害些救兒女的病慌得婆子連磕幾個頭方爬起來道太醫是真仙何止半也老媳婦親生止存下一男一女今兒子被人射傷左腿只要死不要活便將黜兒箭瘡利害備細說了一遍半仙道瘡卻不妨事只是筋骨有傷便好起來這左腿已比不得右腿只怕要做個瘸子婆子道若得了性命便損卻一隻腿也是小事待兒瘡口合時老媳婦還要率領他來到恩官宅上拜謝半仙道這個斷不消得我還有句話說據你脈氣你女兒也有災厄那婆子心頭又像被棒槌搥了一下他見半仙以前語語靈驗又說出這句話來如何不慌便連忙道我女兒災厄當在何時有煩恩官做個大方便索性救取他則個老媳婦生死不忘半仙道你女兒的災厄卻有奇奇怪怪連我也推詳不出也只在這一年半載上便見大抵你們將獸假人哄弄愚民上無超形度世之學下無驚天動地之術一旦數窮命盡鷹犬皆為勁敵矣比如你兒子早是射了左腿若中著要害之處雖盧醫扁鵲也只好道個可憐兩字似此卻不枉送了一死我看你右手尺脈命根牢固左手寸脈心竅靈通大有道緣況你等生於山谷入世不深七情六慾牽累尚少何不趁此精力未衰求師訪道一家兒脫落皮毛永離苦厄豈不美哉只這一席話說得婆子淚下如雨又磕下頭去道多謝恩官指教半仙喚一個掌外科藥的家童出來吩咐取一丸九靈續命丹又取兩個膏藥各將紙來裹好把與婆子道此丸用好酒調服自然沒事只是箭既入骨只怕箭鏃還在裏面若不取出一生在裏面作痛可將溫水洗淨瘡口將此拔毒膏貼上待他紫血流盡淌出新血來然後換過神仙接骨膏百日之外便可行動又道我方才囑咐之言都是好話你須記取便喚老嬤嬤送他出去那婆子接了藥謝了又謝隨著老嬤嬤走過前堂撞見老管家還在那裏守門婆子又對他道個萬福起動莫怪出了柵門歡天喜地的去了這裏半仙心中也自駭然更不向人說知有詩為證回生起死未為奇獸脈人形那得知心話一番終不洩始知醫術即仙機卻說那婆子連夜踰城而出路上買了一大瓶無灰的好酒直到德安州雁門山下這裏黜兒呻吟不絕媚兒寸步不離的伴他哥妹兩個懸懸而望一見婆子鑽進土洞欣喜無量婆子將瓶酒燒得滾熱把這九靈續命丹用酒薄薄的調在磁甌裏面扶起黜兒將藥灌下去又把些酒與他過口如法將拔毒膏貼上患處只見黜兒對著土床裏面一覺睡去足足有三個時辰不醒婆子和媚兒守著看他都道他有好幾日不曾合眼這一番睡著想是不疼痛了這就見得藥力看他腿彎裏流下一堆膿血膏藥已自浮下怕驚他睡不敢動彈少停黜兒醒來叫道瘡上好生奇癢難過婆子揭開膏藥看時膿血裏面隱隱露出一件東西婆子將細草展淨齷齪把指爪去撥時一個鏟頭箭鏃隨手而出原來趙壹用的是個鏟頭箭起初只拔出得箭幹那箭鏃刺入骨中未曾出得當時心忙意亂不及細看到此方知半仙識見之高亦見拔毒膏之妙處婆子煎些解毒的草頭湯輕輕的與他洗淨只見骨損筋傷肉開皮爛淋淋的流出鮮血來慘不可言忙將神仙接骨膏烘開貼上用些布絹之類緩緩扎縛過了一夜明日又解開收拾一遍如此七日膿水俱盡從此不去動他調養到四五十日裏面長出新肉來筋絡也就和順勉強掙扎得起半眠半坐不敢出土洞之外到百日滿足去了膏藥全然不覺只曾經膏藥貼處赤光光的精肉半根毛也不生出來行動之時左腿比右腿已自短了二寸婆子兀自歡喜道嚴半仙說只怕不免做個瘸子今果然矣可改姓名為左瘸兒以識半仙之功自此喚做左瘸亦名左黜去了胡姓不用一日左瘸兒出了土洞閒走一回走到林子裏面正是舊時中箭之處想道此仇如何不報跑回與母狐商議那婆子正倚個土案坐著聞此語忽然弔淚你道為何這便是母狐道緣深處正是富貴場中反招陰陽之患災殃受處翻開道德之緣畢竟婆子說出什麼話來這瘸子的仇還報得成報不成且聽下回分解
