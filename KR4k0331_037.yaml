body:
  text: 第三十七回人生本是三更夢世事渾如一局棋但願心田存得正平時亂世總相宜話説文招討夢見這美婦人對他説三日之內主有大厄吃了一驚醒將轉來恍惚還見這婦人的身影冉冉而去聽軍中更鼓正打三更文招討一夜不睡到天明吩咐軍校在營中查訪烈婦趙無瑕的葬處不多時軍校來報有軍士李十八適間掘地埋鍋因土鬆掘將下去獲一婦人尸首外邊稻草包裹那婦人顏色如生頸上緊緊繫著白帕子像個新縊死的文招討便叫軍中用棺盛殮備下三牲祭禮親到靈前奠酒離城十里外擇個高阜處安葬親題貝州趙烈女之墓七個字於石上令石工鐫石立於墓土以記之這趙氏冤抑三年虧得文招討為他改葬立碑表他是烈婦分明受了一道封號把這烈婦的精靈洗發來有詩為證北邙山下冢纍纍誰似清陽一土堆記得潞公題石處年年只有子規啼文招討想那烈婦所言大厄之事只怕有刺客姦人潛入營中便吩咐小心巡警攻城將士暫時休息待三日之後再議攻取話分兩頭卻説貝州城中一班妖人驅神役鬼不論日子作弄妖法妖氣直透天庭驚動了玉皇上帝遣太白星李長庚去查看李星君把王則等一班妖人反叛始末奏聞玉帝玉帝道天書祕册在白雲洞中有白猿神看守今被人盜法生事害民合當一體治罪李星君奏道臣聞妖不自作皆由人興只因趙宋真宗聽信姦臣王欽若引誘三遍偽造天書矯誣上天欺詐百姓以此民間競尚妖巫釀成妖釁那時宮幃中便有妖狐之異必主妖狐作亂天下不得太平司天監失於推算恰遇白雲洞天書出現妖法流傳延至今日狐黨猖獗正應其禍此乃天數非關白猿神之咎也況盜天書乃是蛋子和尚其人曾設大誓合有道法因緣白猿神原無私授之罪玉帝道蛋子和尚何人也李星君奏道昔年有優婆女十二歲出家修行三十餘年不曾破戒偶於蓮花塘中見鵝鴨交感忽動欲心從此懷孕一十三個月不産一日在迎暉山下經過腹中作癢産下一蛋棄之水潭而去有迎暉僧拾得此蛋送雞巢中菢出一小兒來從幼披剃為僧是名蛋子和尚長成勇猛精進一心好道聞白雲洞有天書祕法三年辛苦剛摹得地煞變化七十二條央老牝狐精聖姑姑辨識其字因而同他母子修鍊只因狐女胡永兒與王則有夙世姻緣所以狐黨輔助為亂蛋子和尚見機而作並不與事玉帝點頭便命老金星於福祿壽三司查取王則命數向善惡司查勘王則行過罪惡詳議來奏説話的你又作謊了普天下人如恆河沙數若是一個個的命數天上都像算命先生流年般細細的開載在那簿上得幾間屋裝這簿籍每日生生死死開除添造幾千萬個書手也忙不來福祿壽三位星官好不忙哩就是人生一日間百善百惡善惡司那裏記得許多看官有所不知假如平民百姓無祿無位亦無大善惡此輩萬千相等他的窮通壽夭隨著世治世亂年豐年歉大小劫數內總來總去不計其數了若是低低裏一個前程小小的一個財主上界便都有個注緣有善則升有惡則降又民間極善極惡之人也是上天間氣所鍾其姓名亦須入善惡簿內況且草頭天子他的命數修短大則關係天下小則關係一方天庭如何沒有個記録間話休題原來王則原是個趣修羅中多欲魔王轉劫五百年一出世或男或女妖淫好殺應人間魔運而起遇著昏君無道攪亂乾坤若撞了治世明主其魔亦不能呈也因是真宗皇帝偽造天書裝神説鬼醞釀齋醮妖氣深重所以生下王則湊著魔運幸是赤腳大仙治世文曲武曲諸星皆為輔助不成其大害前劫武則天娘娘福壽忒過分了這一劫雖轉男身事事減損命中合居王位一十三年遇天壽星而絶享年四十那天壽星是誰就是招討使文彥博了他在唐朝姓張名柬之一生抱文武全才年近八旬不得際遇虧了梁國公狄仁傑薦為丞相領羽林軍勦滅了武氏建立了李家後因中宗皇帝不明枉受貶死上帝哀憐使配天壽星之位世享富貴遐齡在五代為馮瀛王在今日為文彥博都是位極人臣壽將百歲當初則天之亂是他平定了今日王則之亂仍要做他的功勞天數注定非偶然也據説王則有十三年王位之分方今五年有餘還該一半因他五年內殺害生靈十萬又強占有夫婦女多人逼死烈女一名作孽太重善惡司議將王則兩年折做一年只今三個月內仍受國刑誅死以警萬衆李星君同天曹各司覆奏玉帝玉帝道王則處分極當只是一般妖人恐文彥博不能料理李星君奏道從來妖法易破但此乃天書祕册七十二變化無窮既從白猿神白雲洞中盜出臣願領帝旨仍責成白猿神令收伏妖黨以贖漏法之罪玉帝準奏當下李星君領了玉旨出了天門撥開雲頭望白玉爐中香煙而下卻説袁公正在洞中修真養性忽見太白老金星下降吃了一驚慌忙跪接問道星君降臨凡洞不知何諭李星君雙手扶起便道我在上帝前保奏把一件大大功績與你幹去袁公道諒小臣幹得甚麼功績李星君便敘起貝州之事道這一班妖人舞弄幻術邪法都是白雲洞壁傳出去的玉帝要問你個監守不嚴是老夫保奏下來要你平妖贖罪袁公慌得手足無措道小神粗知劍術曾無伏妖蕩魔力量恐誤大事李星君道我與你一個門路除非去求九天玄女娘娘便有個裁處袁公叩首謝教送了金星起身便把師門信香焚起望空參拜連呼師父九天玄女娘娘三聲只見旌幢焜耀干羽繽紛那娘娘聖駕在半空中駐扎原來娘娘是九天道法之祖但是徒弟都有信香分授倘有急難焚起香時即來救護當下袁公叩見了娘娘將李長庚傳來帝旨告訴了一遍拜求師父聖力裁處娘娘笑道原來如此文招討與我平日有恩我合當助他成功但此事是蛋子和尚開端叨起要他來出力目今他在大名府紫金山結庵我今同你到彼你可引他來見我説罷乘雲而起袁公隨著雲車徑到紫金山高峰之上這紫金山是上古玉女修真之處滿山都是翠石絶無撮土蛋師愛他秀麗自離了甘泉寺便在此山結庵而住正是山古仙留迹庵幽石作鄰一聲天際籟不惹世間塵蛋師正在庵前間玩抬頭忽見一老者認得是舊時指引他到白雲洞去的慌忙問訊道向日多蒙老翁指教無門叩謝今日幸得再遇請到小庵攀話則個老者道老漢非別只白猿神便是我奉玉帝命我看守白雲洞天書石壁不敢輕傳向年因見吾師三遍哀求真心設誓為指點吾師到洞摹法誰知老狐精倚賴吾師以成其變化卻去幫扶王則造反稱王殺人十萬今妖氣騰天玉帝查出盜法之由欲將吾師與老漢一同治罪天譴難逃為之奈何蛋子和尚終是本分早已心慌便道動問老翁如今有何解救老翁道老漢請得九天玄女娘娘聖駕到此吾師若同去求他此事可解和尚變憂作喜拱手道全賴老翁引見當下兩個上了高峰蛋師見了娘娘慌忙拜倒自陳貧僧雖叨法緣獲遇白雲洞左壁天書並不曾欺天背誓生事害民今聞得上天震怒望娘娘解救則個娘娘便叫袁公扶起對他説道白雲洞中右壁乃天罡正法左壁乃地煞邪法今妖狐仗此邪法生事害民推究這法從何來豈能無罪日今文招討大兵征討若能助正除邪將功掩罪此萬全之福也蛋子和尚道貧僧與他們本事也只相等如何勝得他娘娘道我把天罡破邪法傳授與你他的邪法自不能施雖如此然那狐精多年老魅況有左道變化無窮急切收他不得必須請天庭照妖鏡照破原形方才了手蛋子和尚當即拜九天玄女娘娘為師傳授了天罡破邪法娘娘吩咐道你先在貝州居住城內城外和尚道弟子見王則不仁便在城外甘泉寺中著腳從不入城娘娘道你今仍到甘泉寺中住下我自指文招討來相會以成三遂之事蛋子和尚不知三遂是何語也不敢問領了法旨辭別出山再望貝州而去路上想道我當初住在甘泉寺時一寺中僧衆都知我名號那個不説我是妖人一黨今番又去好沒嘴臉又想一想道我有計了寺中有個老和尚姓諸葛名遂智出外朝山十五年不回杳無音訊衆僧疑他已死替他排下靈位我曾見他挂的小像又知他生年該七十一歲何不變他形貌也好棲身少不得仍把地煞七十二變中的換形法來使口中念咒將臉一抹就變做諸葛老僧才進得甘泉寺僧衆接見認得是本寺師父又驚又喜將靈位悄地撤去大大小小盡來敘寒溫問起居蛋子和尚因話答話大盼盼的看他們掃舍安床供茶敬飯受他們叫師父師公全不在意看官牢記話頭蛋子和尚自在甘泉中且做老僧諸葛遂智住著再説九天玄女娘娘引白猿神往天庭見玉帝謝罪遂請得照妖鏡同袁公到河北界內來雲居霧宿專等時候到來平妖定亂話分兩頭再説貝州城中見官軍連打三日城雲梯炮石天橋火箭逼近城下雖然攻打不破好生慌迫陶必顯與手下幾個心腹商議城破之日性命難保謀欲南門贖罪寫下密書縛在箭頭上等明日官軍打城緊急時捉空射去不期第四日文招討收兵回營不曾射得有同謀軍士只道官軍退了要在王則面前獻功偷了密書出首王則大怒即將陶必顯並同謀諸人一齊捆來城上梟首示衆出首軍士賞了千戶之職後人有詩云從王從賊兩無成反覆偷生竟不生何似茹剛同死節甘陵城下表雙貞又有詩單道軍士先見事急同謀後因兵退出首真小人也詩云獻門救死本同謀兵退旋為媚賊圖世上勢交皆若此幾人心腹可無虞王則見人心變了心內越慌急請左黜和老婆胡永兒到點軍教場一起商議胡永兒道大王且不必憂慮奴有一計只教文招討在城外死於非命他十萬軍馬沒了主將不戰而散好麼王則道賢后有甚妙術安排得他死散得他十萬人馬解吾貝州之圍永兒向左黜耳邊説道如此如此好麼左黜拍手大笑道要得官軍解散除非此計便吩咐手下人去磨坊裏取一塊大磨盤來不多時只見十來個人扛一塊大磨盤來到廳下胡永兒走下廳來將硃砂筆書一道符在磨盤上右手仗一口劍左手持一鉢盂水口水念念有詞噙一口水看著磨盤上只一噴喝聲道疾只見磨盤在地上左旋右旋忽地漾漾的望空便起如風吹紙鳶兒相似徑往城外飛將去了王則和衆人見了無不喝采想著這塊大磨盤邊傍擦過也須去一層厚皮若是看得在打將下去料不是個小小胳莫説近八十歲一個老文招討就是精壯後生一連擺他十來個在那裏怕他不都做個肉餅兒這一番必然了事正是急將妖法使呆等好音來不在話下卻説文招討正升帳請副招討曹偉總管王信先鋒孫輔等到帳下議論攻城之策只見狂風驟起望空中落下一塊磨盤來望著文招討頂門上便落一聲震天動地價響衆人驚得面如土色只道打死文招討卻説文招討正坐在交椅上忽被一人攔腰抱過一邊離交椅有五七步路那磨盤下來打不著文招討卻把交椅打得粉碎地上打一二尺一個深坑衆將見文招討無事俱各大喜文招討吃那一驚不小別取交椅坐定問道適來抱我者何人説猶未了只見一個人到面前唱喏其人生得身材長大面貌醜陋衆人看時都不認得又不是親隨人又不是帳前士卒文招討問道你是何人來救我一命乞道其詳自當重報那個人説某不是軍中人今貝州王則使法將磨盤來壓死相公某特來救相公之命報相公向日一飯之恩方便之德文招討見説大喜道感謝你來救我不知我文彥博施恩在於何處願求姓名那人説出姓名來真個百家小説未見其名草一史中從無此事正是神聖有靈扶正直妖邪無術害公卿畢竟説出甚姓名來且聽下回分解
