body:
  text: 第十二回千般算計心如渴不是姻緣總迂闊無心栽柳柳成蔭著意栽花花不活話説蛋子和尚與聖姑姑認做前世的骨肉何等荒唐老嬤嬤與女陪堂偏認做真事回去報與楊春夫妻知道他夫婦也只説奇異而已並不疑其妄也向來聖姑姑在淨室中原是一個獨住因這幾日啓建道場楊奶奶撥幾個丫鬟養娘到彼答應蛋子和尚見左右有人不敢細談只問那梵字金經是甚樣體製聖姑如何識得婆子自誇曾遇異人受過一十六樣天書龍章鳳篆無有不識那梵書出自天竺是佛門中之一體當先大藏真經都是梵書陳玄奘與鳩摩羅什等譯過換了唐字唐音方有今本至今名山古剎還有梵本留傳得在蛋子和尚道劣弟也遇個異人傳與二十四紙異樣文書把與人看一字不識今帶得一紙在此請聖姑姑看是甚樣説話婆子道願借一觀蛋子和尚預先抽出一幅另放著當下在包裹中取出展開放在桌上婆子一見了大驚假説道這又是海外異國字體我也不識一眼矁著蛋子和尚和尚會意連忙收摺依舊包過晚齋後只見園公引著院子到來氈包內取出新布直裰一件新布夾被一條道老爺聞得菩薩遇了前世的兄弟也是奇緣這兩件粗物送與長老權表薄意明早自來相見婆子與和尚同聲稱謝院子又吩咐園公教打掃前堂耳房內與這長老做臥房和尚將所送直裰夾被和包裹上一手抱著取了棍棒也隨著院子出來就在耳房中安歇心下想道那婆子矁我一眼必有緣故欲待等個更深再闖入淨室去問他又恐被服侍的人看見不是個理左思右想懷疑不決看看黃昏以後聽得遠遠石磬三聲料是淨室中安置的常規了步出耳房悄悄的直到佛堂之中只見冷冷清清一盞琉璃燈火半明不滅佛堂後一帶就是淨室兩扇門兒緊緊閉著側耳聽時裏面並沒聲響放心不下徘徊了半個時辰才轉步出來只見佛堂中燈火暗而復明聖姑姑倒在外面走動叫聲賢弟那裏去來蛋子和尚吃了一驚想著這婆子果非常人拱手答應道正來尋聖姑姑請教婆子道方才所言二十四紙都借一觀蛋子和尚不敢隱瞞其實都在此婆子道此乃九天祕法雷文雲篆賢弟從那裏得來蛋子和尚見他説著了便將白雲洞三番求道之事及夢中神語的事敘過婆子又將夢會則天皇后一段説話述了合掌曰謝天謝地遇蛋而明今日方得明白也此書非賢弟不能取非我不能識彼此各無隱蔽同修至道以應奇徵當時取下琉璃燈火放在地上蛋子和尚在耳房中抱進包裹就蒲團上打開取出天書二十四紙遞與婆子兩個席地而坐婆子從頭至尾揭了一遍道此書名如意寶册乃七十二地煞變法還有三十六天罡變如何不取將來蛋子和尚道兩壁都曾摹過只左壁一十三張紙半字全無婆子嘆道緣也命也蛋子和尚道天罡與地煞有何分別婆子道天陽地陰天虛地實天尊地卑天簡地煩地煞法成但能役使一切有情有形之物只儘著人世間的變化終未免為天數所囿若天罡法成神遊天府名壓仙班雖上帝亦不得而制之矣蛋子和尚道一般能驅神役鬼麼婆子道神鬼亦有情之物如何不能蛋子和尚道天罡想亦只如此聖姑既未經目何以知其勝於地煞也婆子道天能包地地不能包天據今第十六條為壺天法壺中之天非天上之天此不過遁甲縮地之意第七十二條為地仙法不曰天仙而曰地仙以此度之其不如天罡明矣雖如此説神通亦非小可你我今日得遇乃非常之福蛋子和尚道地煞變化這二十四紙已完全否婆子道完全了蛋子和尚道後面尚有一段字未曾摹得又不知何法婆子道正語已完餘亦不必問之矣蛋子和尚道前面有許多大字何也婆子道此乃七十二法作用之符非字也蛋子和尚道符前先有數十行字又不在七十二條數內何也婆子道凡修鍊此法必先立壇召將此乃總要之語蛋子和尚自來做夢到此方才大醒不覺下跪磕頭道劣弟若不遇聖姑指教枉費三番辛苦如璞不知雕蚌不知剖何所用之哉今日千萬挈帶同行修鍊則個婆子雙手扶起道此自然之理何用叮嚀但修鍊之事説時只一句做時不容易第一要擇地地須極寬敞又極幽僻雞犬不聞人迹罕到方能祕密使神鬼往來而無礙第二要聚財如修鍊之時經年纍月供給須是完備這還是小可其合用東西如五金百貨諸品藥料各項家伙必須無物不備臨時便於取用也費得若干錢物非千金不可第三要齊心假如兩人同去學道其心不齊一人中道而廢那一人也做不得事了蛋子和尚聽説流淚起來道我千般辛苦弄得天書到手萬分僥幸求得聖姑見面不指望做天仙便做一日地仙死也晦目據聖姑説起第三件齊心不難第一件擇地或入深山窮谷還有幽僻之所則這第二件聚財不做官不做盜這千金從何而來多管又是個畫餅充飢望梅止渴了婆子道且莫慌俗語云一客不煩二主等這裏做過圓滿功德少不得這個東道仍要在楊巡檢身上設處蛋子和尚合掌禮道全仗聖姑提挈直起腰來早已不見了那婆子蛋子和尚把眼睛一擦四圍價看道莫不做夢麼又到淨室門首看時寂然如故想起許多説話一句句有條有理方省得婆子原有術法他要攝去這二十四張天書獨擅其美亦有何難明明收放我處所以安我之心聖姑真異人不可及也當下將天書收拾依舊包好仍入包裹就把琉璃燈就扯起高挂提了包裹復身往耳房內安歇去訖有詩為證琉璃一盞光不滅蒲團細論神仙訣千金仍欲費東家法成不把東家挈到天明楊巡檢親到西園請蛋子和尚相見問其來歷稱讚了幾句便同他到淨室中見了聖姑姑謝他七日説法念佛之勞因説各處齋僧總來尚不滿四千之數不知何日圓滿婆子道老檀越發心之頃便是圓滿只將萬僧齋貝親之費派在各庵院去便了卻老檀越的心願明日修齋吉日這裏只管做回向功德楊巡檢道如此甚好一應齋醮文疏已曾吩咐觀音庵中預備令弟長老必然道行清高就相煩主行則個蛋子和尚道小僧年幼只可隨班效勞而已婆子道貧道受貴府之恩無可報答到明日還要請普賢祖師降臨道場與老檀越夫婦祈福卻説楊巡檢自初見聖姑姑時聞得奶奶説了普賢菩薩出現便想慕一見也曾幾次對聖姑姑説只是口中答應不能如意今番聽説降臨賜福喜自天來便道我楊春若得瞻禮菩薩寶相足滿平生矣當時忙差隨身的家人到西門外觀音庵中吩咐來日回向只請六衆長老楊巡檢起身去後當晚觀音庵裏將辦下文疏樂器家伙預先教道人送至其佛像園中自有不消請得聖姑姑只説要室中清淨方好屈菩薩來會將幾個服侍的丫鬟養娘都打發回去了來日黎明時分觀音庵中請到六衆長老與蛋子和尚相見共是七衆一齊擊鼓鳴鐃誦經宣號一依功德常規不必細説楊巡檢也早到穿起大衣服拜佛楊奶奶病體新愈聞説菩薩降臨也要瞻禮勉強乘個小轎親到園中來拈香看見淨室緊閉已知就裏不去纏擾楊巡檢便叫老嬤嬤等送奶奶往書房中靜坐自己往來觀看眼巴巴的只等普賢菩薩下降便請奶奶一同瞻禮衆僧們共行了三次香赴過兩遍齋看看日光西墜燭燼香灰並不見一毫消息瞧那淨室卻緊緊的閉著雙門聽裏面時絶無動靜楊奶奶等得不耐煩只雖是好佛捱了一日自覺身上困倦只得先回楊春吩咐添香換燭重復穿著了幞頭圓領向佛前再三叩首通陳哀懇衆僧見主家如此一個也無敢懈怠直亂到三更連楊巡檢也道是不能夠了便教將文疏紙札燒化打點辭佛散場衆人正在庭中化紙只見一陳風來將火來將紙帶火捲入空中楊巡檢和衆人抬頭觀看火光散去化為五色祥雲雲上現出一位菩薩金珠纓絡寶相莊嚴端坐在一個白象身上楊巡檢倒吃了一驚一字也通陳不出忙忙的倒身下拜蛋子和尚也認做真了隨著衆僧磕頭不已其餘走使答應之人無一個敢不跪拜的那菩薩也不開口冉冉而行徑到淨室中墜下而去此時是八月十九日月光尚盛看見分明楊巡檢想道菩薩今夜必然與聖姑姑敘話我等凡人決不敢亂入淨室中求見只這雲端出現也是非常之喜衆僧都道全是老爺貴府平昔好善所以感動了世尊挈帶小僧們也得瞻仰一番實乃三生有幸楊巡檢謙遜一回又在佛前叩首作謝別衆人上馬先回衆僧到前堂吃齋方散了香火便收拾家伙回庵去訖蛋子和尚依舊在耳房安歇第二日侵早蛋子和尚答拜楊巡檢楊巡檢留坐吃茶稱謝昨日有勞就提起菩薩現身之事道下官回家與拙荊説了拙荊自恨無緣身子不健不能久待蛋子和尚道今早蒙聖姑吩咐要得煩奶奶到園中一會有話商議楊巡檢道下官正要來見聖姑問其夜來菩薩相會之事既如此下官不去了長老到在寒舍素齋等拙荊去聖姑處領教卻不好且屈長老東廳寬坐一時下官就來相陪説罷起身入內對奶奶説知了奶奶欣然收拾丫鬟伏侍上轎而去蛋子和尚本不戒葷酒因見連日楊巡檢一門奉齋只得假説吃素這日在東廳楊巡檢陪著素飯不在話下且説楊奶奶來到西園徑入淨室算來與聖姑姑有兩個月不曾會面了這番相見加倍歡喜寒溫也敘了好多時楊奶奶道夜來蒙聖姑請到菩薩真身弟子無緣不得參謁深為懊悔婆子道普賢祖師説奶奶已曾會過了一次楊奶奶道是去年五月中未曾會聖姑的時節婆子道祖師説你夫妻兩口原是金童玉女降生只因佛會上兩個把幡幢相擊戲耍謫下塵寰配合為夫婦因是好處出身所以今生好道若功行完滿仍得超升貧道欲就本處建個普賢佛院鑄成金身供養貧道常住看經念佛保佑你夫妻拔宅飛升不知意下如何楊奶奶道多感聖姑美意寒舍東莊倒有塊空間山地約有四五十畝舊時原有尼庵多年廢了只是興工鑄像要費許多錢糧寒家就竭力布施恐不夠用聖姑姑道不費貴府一分錢鈔貧道有個兒子叫做左黜現在劍門山關王廟中出家做道士他從幼傳得丹法善能點白為黃只不曾遇著個有福之人所以不敢輕試這個福不是尋常之福乃是仙福假如點就黃金上等者將來打做飲食的器用令人顏色不老百病消除頭頂上有靈光發現久之便能升舉下等者將來倒換與人還有利十倍貴府只出些本錢待貧道母子點化黃金來用興造贏餘還要添些利錢納還若多點得些把來布施貧人也好昨貧道已將此事過問祖師祖師連稱善哉善哉無量功德你若無此仙福祖師亦必不輕許但此事全祕密倘或泄漏事既難成反為不美楊奶奶道容弟子與拙夫商議奉復楊奶奶歸家對丈夫説了楊巡檢五臟六腑向來已被聖姑姑攪渾見了這假菩薩一發死心塌地便要他割下頭來哄他説不痛的他也就割一刀了況且點化乃仙家常事豈有不信當時出廳在蛋子和尚面前應承過了教他先去回話自己乘馬到東莊去看了一回徑往西園見聖姑姑問其點金建院之事婆子道別的不難只要一所淨房在曠野去處雞犬不聞人迹罕至的在內作用方妙楊巡檢道弟子適到敝莊看了地面儘寬足可啓建道院如今緊要一所淨室除非就在敝莊住下這莊房去處相傳原是唐朝郭令公的別業還存得有幾根古柏房子也有三十四間儘著聖姑揀中意的幾間關斷了就是莊僕們自在外邊一帶與裏頭絶不相干吩咐了他自然不放人來混擾婆子道待等小兒左黜到日同往擇便而用就是楊巡檢道令郎在何處星夜差人接取婆子道我兒子一隻腿有病諱名叫瘸兒在劍門山離此頗遠他行走不便須要個腳力還有一件那關王廟中全靠小兒一個有些道術撑持房頭若聽説貴府接他到此衆道士決意不肯放的只老身親筆寫個字去吩咐管家如此如此小兒脫身方快楊巡檢大喜道有煩聖姑姑快寫書信只明早便差人送去一路腳力不打緊有錢可以雇得兩下別了聖姑姑慌忙寫書封固叫蛋子和尚送到楊巡檢處楊巡檢喚個慣打差的楊興到來將聖姑姑這封家書細細吩咐了他的説話限他明日便要起身與他二十多兩銀子作盤纏叫他一路雇馬與左法師乘坐小心服侍早去早回楊興領了家主之命連夜收拾老婆見了一大包銀子抵死纏住要他做件新布衫買支翠花楊興被纏不過只得拈一二塊與他約有五六錢重到明早往解庫中贖取自己衣服被窩等件人都知道他匆匆遠行又聞得盤纏付得有餘有些零星欠帳都來取付也只得還他又去了幾兩銀子只恐使用不來路上咬薑呷醋件件省縮一去一回還想落得些兒拐在腰裏做私房這也是人之常情不在話下有詩為證燒丹情願費資財只等功成脫九陔遙望天涯左瘸子不知何日拐將來話説關王廟道士賈清風自從去年二月中與媚兒分別之後眠思夢想如醉如呆每日向瘸子討信問道幾時轉回瘸子只有應他道進過香便回以後只管多問一日常兩三度瘸子也不耐煩了發個喉急道師父你也好笑我與你同在這裏那個是順風耳千里眼曉得他方外郡的事兩隻腳生在他們肚子底下要緊要慢由得他終不然我把個細麻繩兒牽得他來的道他是乾娘乾妹偏我嫡親的心上不牽挂就是你朝暮問他他那裏也不知道可不枉了賈道士心緒不樂又被他數落一場又沒得回答他念他是媚兒的瓜葛又不敢十分衝撞只得忍耐過了幾日三不知又問起來瘸子竟不答應好生沒趣看看半年十個月毫無音信賈道士心中委決不下待説來時去了許多時也該轉了待説不來他一親兒在此難道老婆子的肚裏也全不挂念私下各處去問卜打卦也有説來的也有説不來的也有説行人遲慢的也有説得快約時約日的説得賈道士心上喜一回愁一回望一回想一回猜一回恨一回有一班輕薄子弟聞得這樁故事製就幾篇小詞兒唱得有趣去年瞥見多嬌面勾去魂靈呀勾去魂靈覷定花容不轉睛喜殺人愛殺人忙獻殷勤呀忙獻殷勤新樓不許凡人寓特借多情呀特借多情朝暮饔咱管承放寬心慢登程且待天睛呀且待天睛乾娘認了為兄妹添分親情呀添分親情日漸相知事可成他有心咱有心不用冰人呀不用冰人瘸兒使去監工了一半功程呀一半功程只惱虔婆礙眼睛眼中釘厭殺人不肯開身呀不肯開身油緑梭布縫衣服聊表微誠呀聊表微誠只怕裁縫不稱心哄娘親自監臨私下偷情呀私下偷情忙來樓上把多嬌抱一刻千金呀一刻千金肯作成時快作成且稍停到黃昏捉空應承呀捉空應承隔牆有耳機關破拆散張鶯呀拆散張鶯明日多嬌又遠行送出門痛難禁珠淚偷零呀珠淚偷零燒香約定重來至專盼回程呀專盼回程等待來時續舊盟感恩情叫一聲救苦天尊呀救苦天尊清明別去重陽到辜負光陰呀辜負光陰燒香願了應轉程小妖精為何因全沒風聲呀全沒風聲此情難與別人道只自酸辛呀只自酸辛索性回咱個決絶音罵一聲放開心也倒歡欣呀也倒歡欣關王不管私情事也去通陳呀也去通陳暮想朝思為此人説無憑話無憑全仗神靈呀全仗神靈道人害了相思病天下奇聞呀天下奇聞妄想癡心欠婦人沒正經老腳根難見天尊呀難見天尊大凡不上手的私情有二等一等郎才女貌你貪我愛傳書遞柬千期萬約中間有人隔礙不能成就花前互想月下同憐這謂之相思一等或男欠著女那一邊全不挂在心上或女欠著男這一邊男全不放在肚裏一般情牽意亂短歎長吁卻是乾折了便宜這謂之單思今日媚兒的精靈不知那裏去了賈清風還眼盼盼的指望他來重訂鴛鴦之約滿詣雲雨之歡卻不是個單思這癡道士自犯了單思的病百事無心坐如睡眠如醉也不誦經也不打醮連每月初一十五關帝前香燭都不去看了家中食用到只憑乜道胡亂扯拽乜道支持了幾日做起喬家公來與瘸子漸漸有些口面不和這癡道士也管不得了一年之外漸覺身痛骨熱肌瘦面黃弄成一個勞怯症候原來這種症候不痛不癢不死不生最難過日子的涪江渡口有個淨真庵那老尼是賈道士的親姑娘聞知姪兒有病特地來廟中看他帶一個極醜的女香童來服侍賈道士欲心如熾又與他調戲不幾日就括上了姑娘知道大怒罵了姪兒一頓臨去時説誓再不到廟中來了莫説癡道士害病單表瘸子初時道士奉承他好酒好食吃得歡喜以後漸漸懶散了到得道士害了癆怯一發沒人照應他有些飲食時先儘乜道背地裏受用便有得到口也是殘盤剩水著實不敷況且少一缺二連瘸子的衣服也把幾件解了錢米那個取贖瘸子見光景不好也未免想起娘來道娘阿三口兒出門只為我腳腿不便權留在此説過一有安身之處便寄信來喚我如今一年半了不成你還在中途飄蕩我這裏茶不茶飯不飯沒人疼痛你那知道我若是手腳便當的跑出廟門做個雲遊道士也度了這張嘴怎見得不上不下進退兩難正是人無千日好花無百日紅又道人心若比初相識到底終無怨恨心莫説瘸子抱怨再説楊興奉了主命在路打扮做個官差下書的承局夜宿曉行不一日來到劍門山取路竟投關王廟來只推口渴問廟裏討湯水吃乜道先看見是個公差怠慢不得的賈道士又病倒了慌忙舀了一碗米湯將托盤盛了叫小鬎鬁捧著唆瘸子出去陪侍世間只有瘸子最好記認楊興一見便曉得了瘸子作過揖便問尊官何來楊興道是華州奉差來的瘸子將米湯送上道荒山乏茶怕不中吃楊興道救渴可矣小鬎鬁取碗進去楊興便起身瘸子送出廟門楊興道法師可姓左麼瘸子道正是楊興道借一步説話瘸子跟他立了廟門約有百步之遠楊興道小人是華州華陰縣楊巡檢老爺家差來有令堂聖姑姑家書在此叫法師星夜與小人同行不可遲滯瘸子接書拆開看時原來又有四句詩詩曰我在華陰楊府住主人賢達真難遇要汝同修大道丹火速登程莫回顧瘸子認得婆子筆迹喜出望外卻待轉身收拾包裹楊興道不消得少甚東西只問小人就是就是便路上不甚整齊到家中自有瘸子道華州許多路我行走不便趕你不上如何是好楊興道捱到劍門山一路自有騾馬雇得不煩尊步那瘸子想起廟中乜道可惡賈清風又病倒了也沒甚情意牽挂若論初相會時母子三人受他恩惠今日母親書到合該説知只是一紙空書又不曾寄得一物謝他怎好提起到不如不見為高就有幾件冬夏衣服只揀好的又在解庫中去了那漢子口稱小人一定家主吩咐他來應承我去我又遲慢怎的歎了口氣便道既是母親教我火速登程只今便走恐家師們知道時卻又誤當下楊興扶著瘸子飛奔劍門山一路或騾或馬雇來與瘸子乘坐楊興是慣走路的急行急隨緩行緩隨望華州道路而進話分兩頭再説乜道這一日不見瘸子進來吃飯心裏怪異等到晚間也不見歸來只得報與賈道士知道賈道士問道幾時去的乜道道早間有簡尺的到來討湯水吃他送出門就不曾見他回轉來賈道士道那承局是那裏來的小鬎鬁在旁答應道是我將盤托子送米湯出來聽得説一句像是華州來的賈道士聽得華州二字癡心復起便道華陰正是西嶽華山所在乾娘和妹子正在那裏進香如何不對我説問個信兒乜道笑道華州是大州大府須不是三家村獨腳鎮兩個婦人去朝山進香那承局那裏便睬他來賈道士病中容易焦躁便罵道狗弟子孩兒你曉得什麼常言道兩葉浮萍歸大海人生何處不相逢他母女現在華陰縣進香你道承局不能會面這瘸子在劍門山僻去處如何卻與承局相會了現今這瘸子跟著承局一路去必是有甚信音到來或是他母子在這裏近去喚他或是另在一所反來接那瘸子去都不見得你自不用心盤問到説這沒氣力的話卻不是放屁慌得小鬎鬁先跑出房去了乜道見他發惡故意道師父説的是待明日去尋那承局質問他便知賈道士道上門時閉著鳥嘴不問如今去了又那裏尋他乜道道師父説的人生何處不相逢賈道士見他還話氣得面皮紫漲在床上豎起頭來要扯乜道來打忽然發個頭暈依舊跌倒乜道口中唧唧嘈嘈的走了出去倒在外邊罵小鬎鬁多嘴饒舌打了他幾個栗暴小鬎鬁勞勞叨叨哭一個不住賈道士聽得十分惱怒只恨頭昏體弱爬走不動到黃昏時燈火也不點來了其時九月十八日月起得快賈道士含著一口氣吟清清的躺在床上看見月上窗櫺萬種思量千般傷感不知此一時媚兒妹子在于何處只有這輪明月照見他亮亮的在那裏怎的嫦娥方便寄我個信兒正在胡思亂想忽見小鬎鬁跑來報道瘸師回來了和乾娘三口兒在門外賈道士聽得這句把勃勃的氣變作一天歡喜忙教請進自己要掙扎下床終覺頭重腳輕又復睡下只聽得叿叿的説話響三口兒走進房來婆子問起了病起的緣由安慰了幾句言語忙忙的出外道待老身收拾行李停當再來敘話瘸子也跑出去了只留胡媚兒笑嘻嘻的坐在床沿上來説道哥哥別來多時不道有此貴恙賈道士見四下無人訴出衷腸道這病是因賢妹而起今得見賢妹死亦無恨便把手去勾那媚兒的頸媚兒低頭下去做了個嘴賈道士已醒原來是個夢張開眼看寂寂空房惟有半窗月魄涼氣襲人賈道士滿目凄涼嘆了一口氣不覺淚如雨下正是尋常一樣窗前月偏照愁人愁轉添不知賈道士性命如何且聽下回分解
