body:
  text: 第三十八回一飯千金信有之鬼神亦自報恩私試看多目銀盆事陰德從來應不疑話説文招討若不是一代福人險些兒被磨盤壓死虧得那人救了性命問其姓名那人道口説恐相公失忘了可借銀盆筆硯來手下人取銀盆筆硯排列桌上那人道乞退左右文招討喝退了左右那人提起筆來寫罷將銀盆覆在地上大跨步走出帳外去了文招討即時使人追趕便不見了文招討道卻又作怪教人揭起銀盆來看時中間寫著多目神三個大字衆人皆不曉得其意文招討沈吟了半日方才想得起來原來文招討幼年未及第時曾在九天玄女娘娘廟中祈夢夢見娘娘贈他十個字道是人間名宰相天上老人星彥博從此央個高手畫工畫成娘娘聖像裱軸供養每月朔親自展開焚香拜禱又一日出路到一館驛中借宿驛使告道此處有鬼魅在此房宿者常多損人此時文彥博不信此言乃明點燈燭置酒驛房中獨酌夜至三更忽然起了一陳狂風風過處見一人披髮至案前叩頭呼彥博為相公求其酒食文彥博問道你是人是鬼實説當賜你一醉那人道相公不聞九天玄女娘娘部下有順風耳千里眼二神乎千里眼即某是也娘娘差委瞭望一事因貪酒醉擔誤觸了玄女娘娘之怒貶到此地忍餓三月限期未滿今見相公貴人特來相求文彥博道你何以知吾為貴人也那人道凡大貴人所至地方神道必先時替他驅逐野鬼妖魅之屬是以知之某係娘娘屬吏故容留居此耳文彥博道你既被罰在此如何敢損害居人那人道某因生來面醜受罰之時又被娘娘法旨將神刀在臉上一刺刺成多目益增凶怪人見某乞食便自驚死亦係薄命非某之罪也文彥博道你將面貌我看那人道恐怕驚嚇了貴人文彥博必要相認那人分開頭髮只見青臉上霍霍眨眨有八隻凶睛閃爍可畏文彥博見了也自駭然遂把酒飯儘他飲啖文彥博又問道我平日敬奉玄女娘娘聖像明早替你拜求方便何如那人道若得相公一言某罪即脫異日相公有難某必來相救言訖隱然而去次日文彥博備下香燭在神軸前拜告求寬千里眼之罰是夜又夢那人來謝道承相公方便已銷了罰限矣相公福壽非常記他時換眼相見文彥博從此深自抱負後來身榮及第出將入相益信玄女娘娘之靈月朔禮拜到老恭敬不衰雖在軍中未嘗間斷因當初館驛中見的蓬頭垢面臉上四對凶睛今日雖然醜陋卻衣冠整飾只有一雙光眼所以文招討一時想不起來見了多目神三字轉記他時換眼相見之語方知此人即娘娘部下千里眼之神也文招討把這些事迹對衆將説了衆將一齊拱手稱賀心中並皆駭然都去看那銀盆時只見旁邊有六個小字寫道逢三遂妖魔退文招討仔細看了問衆人時都不解其意曹偉道主帥福分齊天神靈護佑據曹某看來此賊不日可平矣文招討道何以見之曹偉道神名多目又八個凶睛乃貝字之義今日換眼相見八睛俱滅此示貝州亡滅之徵也因主帥敬事玄女娘娘所以遣神預報徵兆三遂雖然不明後必有驗只顧進兵便了文招討道夢中趙烈婦所言大厄此可應矣既有令休兵三日待日滿進兵未遲諸公且去細想三遂之意衆將應諾而退各歸本寨細想不在話下卻説貝州一班妖人滿望磨盤成功置酒作賀一面差人打聽官軍寨中動靜來報只見探子來報説道文招討軍容嚴肅隊伍整齊依然無事王則與衆人説道若那邊沒了主將就整齊無心戀戰今日文彥博陳上沒一些動靜不知磨盤曾害得他也不左黜道這家法術百發百中沒人解得必然壓死了王則道若是要知虛實可叫人去下戰書差一個的當的軍士直至文招討帳前去下文招討見説是下戰書的叫喚至帳下左右接了書安在桌上文招討展開看了便解王則之意思忖道他只道使妖法把磨盤壓死了我誰知我安然無事見我這裏沒些動靜故以下戰書為由來探虛實當下文招討當面批過來日交戰與下書人回來王則看了批回問下書人道你曾到文招討帳下麼下書人道告大王文招討並無疑忌直喚小人到帳下親自寫了批回打發小人回來王則聽得文招討無事心下憂慌連夜請左黜到偽府中與胡永兒商議對敵之策左黜和胡永兒見説磨盤壓文招討不死心下也有三分著忙正在躊躇忽報聖姑姑到此衆人慌忙迎接上坐王則告訴文招討血筒破法及磨盤壓他至今刻期交戰之事聖姑姑對左黜道何不行白馬迷軍之法左黜道男女們兩次用法皆是上等利害的都被他解了只恐行之無驗反折軍馬所以躊躇未決聖姑姑道我這家法術千變萬化但不可輕試豈有試而不驗之理只因行法之人貪酒戀色七情六欲耗散精神所以存想不定取氣不的自己力量不能相配靈氣既薄自然易解譬如向空吹毛或五六尺而墜或一二尺而墜皆神氣有足有不足之故明日上陳看老拙做作他們破得破不得左黜和永兒低頭無語王則道全仗聖母娘娘神力當時計議已定次日天曉王則整點一萬大開城門放下吊橋排成陳勢良久兩陳對鬥文招討依舊帶了唧筒手並豬羊二血使人高叫王則打話王則陳裏並無一人出來卻説左瘸師裸體跣足不穿衣甲領了張琪吳旺一班人擁著聖姑姑看他作法聖姑姑披髮仗劍牽一匹白馬在陳中叩齒作法腳下步魁罡口中念念有詞喝聲道疾把劍尖刺著白馬的頭刺出血來噙口血水出到陳前一噴不噴時天清日朗噴了時只見烏雲猛雨霹靂交加飛沙走石那陳風吹得黑魆魆地對面不相見伸手不見掌這班血筒手和弓箭手不知東南西北黑暗裏如何施展衆軍士們被沙石亂打人人喪膽個個銷魂棄甲拋戈各自去尋生路文招討在亂軍中左一撞右一撞不知高低幾乎跌下馬來忽見馬前又起一陳旋風風去處吹開一道亮光淡如寒月文招討趁著這點光兒落陳逃走回頭看時並沒有一個人跟隨獨自騎著匹馬好生慌張愁悶正似鳳落荒坡脫盡渾身錦羽龍居淺水失卻頜下明珠蜀王春恨啼紅宋玉悲愁怨緑呂虔亡腰下之刀雷煥失匣中之劍孤客夜行燈又息破舟風蕩雨還來當日文招討正行之間只見前面是山林樹木不知是那裏去處勒馬轉過山嘴天氣漸明朗了見一條幡竿又聽得鐘聲響駐馬看時是一座寺院文招討道到此無奈只得到寺院裏尋人問條歸寨的路又作區處來到寺前下馬入寺裏來見一個行者文招討對行者説要見長老行者道老將軍可姓文麼文招討道你那裏便曉我姓文的行者道老師父説今日有個姓文的將軍到此吩咐我伺候迎接文招討口雖不語心下想道他師父預知我到此必非等間人也便對行者説正要見你師父行者牽了馬前行引導那老和尚早在方丈門前相迎慌忙請入問訊了分賓主而坐長老道將軍必然飢渴了忙叫徒弟們吩咐廚下備齋將這馬牽在院後喂草先叫行者討茶來吃茶罷長老問老將軍可是曾入中書拜相見今領十萬大軍來討王則的文招討麼文招討道吾師何以知之長老道昨夜伽藍神夢中見報所以知之聞名久矣今日山門多幸得招討到此如何無隨從之人文招討道今早與賊對陳不意大敗單騎逃難到此長老見説大驚道莫説招討大才就是十萬大兵對付不易貝州乃一窪之地能有多少人馬如何卻輸與他文招討道若論對陳必不能取勝於我今王則一班賊黨皆會妖法但交戰之時他陳內便放出神頭鬼臉猛獸怪物來軍馬見了俱各驚走副招討曹偉獻計用豬羊二血馬尿大蒜唧筒勝得他一陳賊兵數日不敢出城日前下官升帳與諸將議攻城之策不期妖人使邪法將磨盤從空壓將下來幸得多目神救了性命早間與賊兵對陳不提防王則陳裏起一陳惡風忽然天昏地暗疾雷驟雨飛沙走石打得陳勢散亂下官獨自迷路至此望乞吾師指引歸途到寨卻當重謝長老聽説罷離座拍手大怒道當今乃堯舜之世君聖臣賢此等妖人輒敢擾亂朝廷請招討免憂待老僧與招討出力破其邪法掃除逆黨文招討聞言大喜道不敢拜問吾師高姓長老道老僧復姓諸葛名遂智文招討聽了歡喜道多目神曾寫六個字道逢三遂妖魔退衆人曉夜參詳全然不解其意今日天教遇著吾師若吾師肯去破得貝州下官奏聞朝廷官賞功勞不小長老道老僧是空門中人豈貪富貴爵賞但今清平世界不可容此妖人老僧當效犬馬微勞助招討蕩平妖逆今晚招討在寺中權宿一宿明早五更同往大寨招討卸了衣甲吃了晚齋和長老講論了半夜睡到五更起來洗漱罷吃些飯食長老叫行者寺中有馬牽一匹來我同招討去破賊衆僧們一齊都叫起師公師父説道你老人家出外十五年方才回家還沒有數日間常日裏只是打瞌睡你幾曾曉得那廝殺事情卻跟這位老將軍去好沒來由那長老嘻嘻的笑道你們不須見阻我自有破賊之法替朝廷幹場功勞也與寺中增光待事畢還歸寺中與你們相聚衆僧只得備馬文招討與長老都騎上馬帶三個行者明點火把離寺迤邐來到寨前衆將與士卒見了文招討不勝歡喜迎接至中軍曹招討等都來動問道主帥一夜不回衆將皆憂慌無措不知落陳走到那裏緣何同這個老師父回來文招討道昨日被王則一陳使邪法惡風吹得我迷蹤失路到一寺中偶遇此聖僧説能破邪法我想正應多目神之言乃去曹招討耳邊低低説這個和尚叫做諸葛遂智曹招討大喜屏退左右問長老道吾師有何神術能破妖邪諸葛遂智道老僧遊方一十五年曾遇異人傳授五雷天心正法凡遇金剛禪左道一應邪術老僧見了念動真言即能反邪從正招討如不信明日對陳便知分曉當日文招討留長老與行者在中軍即修戰書一封教軍士去貝州投下約在來日交戰一面從傅家疃老營內挑選生兵一萬來補中軍損折人數及替中傷軍士退回後寨將息且説王則見了批回戰書打發軍士自回乃對衆妖人商議道前日一陳被我殺得大敗而走今日尚敢又來勒戰必須求聖母娘娘再用前日之法直殺到界分教他十萬人馬不留一個話休煩絮兩邊各自整點人馬只等來日廝殺次日王則領兵馬出貝州城排成一個陳勢兩陳對衝旗鼓相望門旗影裏又見衆妖人簇擁著聖姑姑披髮仗劍牽著白馬在前口中念念有詞把劍尖刺著白馬噙口血水只一噴只見王則陳上惡風急起沙石雨雹看看來到文招討陳前諸葛遂智在軍中見了搖動鈴杵口念真言把鈴杵一指可霎作怪那陳惡風沙石雨雹轉風望王則陳裏打將下來王則剛叫聲哎呀看那一班妖人都不見了情知風勢不好連忙招軍馬急急轉身文招討鞭梢一指大小三軍一齊掩殺過去賊軍人亡馬倒折其大半趕落城濠死者不計其數王則急急收拾些少敗殘人馬奔入貝州拽起吊橋關上城門緊守不出卻説文招討三軍殺到城下割人頭耳朵搶金鼓旗幡文招討令鳴金收軍離貝州城不遠下寨文招討請諸葛遂智上座躬身謝道這一陳皆吾師之力也若如此賊兵指日可破諸葛遂智道老僧以正破邪無往不利若是有老僧在軍中何懼王則一行妖法之人文招討聞言甚喜道王則今日輸了一陳越守得城池緊了傳令叫軍士併力攻城只見貝州一股青黑之氣罩定城頭內中或時見烈火萬團或時見洪水一派種種鬼怪無計布擺文招討教三路人馬團團圍了貝州城周圍如鐵桶相似擂鼓發喊只等城中軍馬出來這裏諸葛遂智以正破邪乘勢就殺將進去不期王則仗著妖法死守只不出來文招討只得叫軍士離了貝州城下寨依先提鈴喝號遞箭傳更與曹招討計議道下官同招討領十萬人馬一日費了朝廷許多錢糧到此將近有兩個月尚破不得貝州如何是好曹招討道主帥且請寬心容曹偉再想良策當日曹招討別了文招討自歸本寨文招討在帳中憂慮不覺天色夜深但見銀河耿耿玉漏迢迢穿營斜月映寒光透帳涼風吹夜氣雁聲嘹喨孤眠才子夢魂驚蛩韻淒涼獨宿佳人情緒苦軍中戰鼓一更未盡二更敲遠處寒砧百搗將殘千搗起畫簷間叮噹鐵馬敲碎士女情懷旗幡上閃爍青燈偏照征人長歎妖邪賊侶心如鷁忠義英雄氣似虹當夜文招討在帳中翻來覆去睡不著至三更前後聽寨外時靜悄悄地文招討起來離了寨房聽時正打三更見一個軍士打著梆子來交更口裏低低唱隻曲兒只因這隻曲兒有分教司更小卒同為討賊之人仗鉞元戎早定平妖之策真是個兵在精而不在多將在謀而不在勇畢竟唱甚曲兒生出甚事端且聽下回分解
