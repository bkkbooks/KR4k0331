body:
  text: 第四十回神器從來不可干僭王稱制誰能安潞公當日擒王則留與妖邪作樣看話説王則怪李魚羹直言傷觸吊他在炮梢上打出城去可煞作怪不前不後恰好打落在城濠邊河裏有攻城的軍士們見城上炮打出一個人來即時去看將撓鉤搭上岸來還是活的隨即解下索子押到文招討帳下文招討問道你這漢子是什麼樣人姓甚名誰為甚事打出城來李魚羹道告招討小人是貝州樂人名喚做李魚羹一時不合勸諫王則歸順招討王則大怒把小人做炮梢打出城來要跌小人做骨醬肉泥天幸不死得見招討文招討道你是個樂人如何的勸諫王則李魚羹道王則被一個馬遂一拳打落了當門兩個牙齒綻了嘴脣念不得咒語叫小人解悶小人乘著躁心勸他歸順不然時旦夕之間必被招討捉了豈知他竟不悟反怪小人文招討見説喜不自勝道你雖然是個樂人卻識進退教左右賞他酒飯李魚羹吃了酒飯文招討又問道你既是個樂人必然在貝州久了定知城內虛實李魚羹道告招討賊首王則被打綻了嘴脣念不得咒語已無用了先前有國師彈子和尚丞相張鸞大將軍卜吉都有本事的因見王則不仁前後都去了只有瘸腳軍師喚做左黜善使妖術還有王則的渾家胡永兒也會興妖作法胡永兒母親叫聖姑姑更是利害王則全靠這幾個妖人其餘多不足道近日被官軍破了妖法連敗幾陳也都著忙了聖姑姑今往天柱山去取什麼神刀只怕他是脫身之計文招討道城中兵糧還有多少李魚羹道他們靠的是豆人紙馬若軍士在先也不過萬餘連次損折大半今皆百姓頂補都是烏合不諳戰陳的錢糧府庫中原少全是左黜等妖法攝取來費用所以時時不缺文招討又問城中有多少百姓坊巷河道衙門怎地模樣李魚羹一一都説了文招討道天使此人漏泄虛實王則可斬矣文招討正説之間只見帳下走出一員將官來道告招討小將能生擒王則來見招討文招討見這個人出來甚喜道正應多目神之言逢三遂可破貝州原來這個將官姓李名遂先前諸葛遂智曾破法殺了一陳次後馬遂打綻了王則嘴脣念不得咒語行不得妖法今又逢李遂卻好三遂因此文招討喜歡文招討問李遂道你有何計策可擒王則李遂道小將手下見管五百名掘子軍今得李魚羹説破城裏虛實城裏坊巷一應去處圖畫闊狹容小將再一一仔細問他端的對圖本度量地面遠近相同只須帶五百名掘子手在城北打一個地洞直入貝州城內到王則帳前捉了一行妖人然後開城門放大軍入城有何不可文招討大喜賞李魚羹李遂各人衣服一套就僉補李魚羹為帳前虞候教李魚羹細説城內衙門地面坊巷虛實即令浮寨官相度畫了個圖本把與李遂李遂看了計算遠近虛實闊狹方向稟覆文招討道這事須密切亦不是一時一霎之事望招討整頓軍旅時刻打通就好接應就要帶李魚羹去做眼文招討道你可仔細用心如拿得王則克復貝州奏聞朝廷你的功勞不小隨喚五百掘子軍都賞賜發放了李遂正要起身只見諸葛遂智向前道告招討李將軍須打得地洞入城恐不能擒捉王則文招討道吾師何以知之諸葛遂智道貝州城中王則的左右一班俱是妖人李將軍掘地洞入去那裏知覺了行起妖法非但不能擒捉王則李將軍反為他所害文招討道若如此何時能滅此賊諸葛遂智道不必招討憂心老僧當同去以正破邪教他作不得妖法盡皆擒捉便了文招討大喜道若吾師肯去大事濟矣諸葛遂智先辭出帳去見九天玄女娘娘告知其事求他空中佑助好歹這番要擒王則玄女娘娘已知王則數盡教他放心前去這邊李遂領了將令吩咐五百筒子手教備下豬羊二血馬尿大蒜之類即同李魚羹看了圖本只有城北地面上寬濠淺算計了地利和諸葛遂智指揮掘子手穿地洞打入貝州來有詩為證平妖一事十分難喜得今朝有孔鑽縱使瞞天妖術狠管叫立地欠平安話分兩頭再説聖姑姑到天柱山頂石匣內取了神刀回來早有千里眼看見報知玄女娘娘娘娘則變做處女模樣中途迎住問道婆婆何來幸少住請教聖姑姑道老拙有些政務不得伴話處女道婆婆有何政務聖姑姑道兒女們有急難要去救他則箇處女道有甚本事去救得他聖姑姑道老拙粗知道術處女道我最好的是道術幸教一二聖姑姑道小娘子好的是那一家道術處女道我好的是天罡三十六變化之法略曉些本領未曾煉就聖姑姑暗暗的吃驚道他學的更勝似我便道老拙會的是七十二地煞變化處女道這地煞法乃是左道學之無益又問婆婆手中抱的是什麼刀聖姑姑此乃神刀有詩為證金精自煉號神刀仗此能令神鬼號時刻自鳴還自躍等間斬將不須勞處女道此刀如何鳴躍乞試一觀聖姑姑將手向刀鞘上拍三拍只聽得喊聲大振慘如冤鬼哀號猛似凶神叱喝撲的一聲響忽然躍起空中有一丈之高剎時仍落鞘內處女道我亦有神劍把與婆婆一看袖中摸出一個鉛彈丸兒在手掌中旋了兩轉一拋拋起約有二丈高化成雪霜也似白的寶劍光芒四射如長虹而下直至於地重復躍起墜於手掌中仍是個彈丸兒處女道我這劍能飛行千里斬人之頭還自飛回又且能舒能卷變化無窮比婆婆的刀不勝麼聖姑姑暗想道若得此劍斬文招討之頭有何難哉便道老拙欲將神刀與小娘子換取神劍不知肯否處女道但憑尊命處女接得鬼頭刀在手拔出來看了一看暗暗念了伏魔咒攝去了他的神光其刀便不能鳴躍處女道你的神刀神氣已傷全無用處我不換了聖姑姑道那有此理接過神刀來把刀鞘左一拍右一拍全不動彈聖姑姑道這神刀也是服善的他見神劍威力勝他害羞不敢出頭了聖姑姑就起不良之意撇了神刀拿了神劍便走處女道婆婆要換便換了罷只是還有訣兒一發傳你聖姑姑不信暗暗的道我且自家試看把彈丸兒拋向空中這裏處女手掌中托出一顆彈丸兒那空中的彈丸兒如長虹而下撲地跳起徑到處女手掌中去了原來兩個彈丸正是雌雄二劍留了雌的這雄的自來就他聖姑姑自不覺著只道拋向地下看時又不見抬起頭來連處女也不見了聖姑姑不得神劍又失了神刀好沒巴鼻起身在雲端瞭望要尋那處女只見前邊一個白鬚老叟坐於山巖之上手中正弄著兩個鉛彈丸兒聖姑姑走到山前向老叟稽首道我翁手中弄的何物老叟道此乃神劍有詩為證雌雄二劍合陰陽不用鋒芒只用光飛去飛來隨意便千軍萬馬不能當聖姑姑道這分明兩個彈丸兒如何作用老叟道老漢舞一回你看便把兩個丸兒拋起須臾之間左一跳右一跳如兩條金蛇纏繞盤旋不離這婆子左右一往一來迸出萬道寒光凜冽刺骨耳中如聞千刀萬刃舉刺之聲驚得這婆子戰戰兢兢捏著避兵訣口念避兵咒牢牢站定在魁罡位上老叟看見害不得這婆子收了劍術暗叫師父九天玄女娘娘只見處女又在面前聖姑姑一見了大怒搖身一變變做普賢菩薩聖像身騎白象望空來蹴踏處女處女便把天庭照妖寶鏡扯出錦囊一道金光射去那紙剪的白象空中墮下聖姑姑倒跌下來把衣袖蒙頭緊閉雙眼只是磕頭告饒原來萬物精靈都聚在兩個瞳神裏面隨你千變萬化瞳神不改這天鏡照住瞳神原形便現聖姑姑多年修煉已到了天狐地位素聞得天鏡的利害見處女取出天孫機杼上織就的無縫錦囊情知是那件法物只恐現了本相所以雙眸緊閉束手受縛玄女娘娘收過了寶鏡叫猿公將老狐精解上天庭以贖漏法之罪猿公進了天門剛跪在凌霄殿下啓奏其事早有天宮十萬八千聽差的天狐齊來殿下叩頭都替聖姑姑認罪求饒聖姑姑聞得衆天狐聲息才敢開眼見了玉帝喘做一團哀求不已玉帝降旨許他不死權且發下天獄等妖族盡平之日玄女娘娘來時發落衆天狐俱散了猿公仍下天門跟隨玄女娘娘話分兩頭卻説貝州城被文招討圍困住了三月有餘初時城中糧草都是左黜四處攝來支費如今被玄女娘娘下了天羅地網一切妖邪符咒都行開去不得六丁六甲城隍土地諸神都來聽娘娘法旨不被妖邪驅遣了糧草也都竭了只好刮下城內百姓的東西來用其時百姓的苦楚自不必説左黜胡永兒恃一變萬化到底自己一身不得吃虧且自及時行樂專等聖姑姑取神刀來看是如何那邊老狐精已在天獄中坐這邊那裏得知呆呆靠這一著全不在意再説李遂和諸葛遂智李魚羹引著五百掘子軍掘了多時到一個去處約莫是王則偽府左側李遂教掘子手從這裏掘出去掘子手打通了問李魚羹道這是那裏李魚羹看時正是偽府中後堂此時有四更時分李魚羹前面引路李遂和衆人發一聲喊徑奔入王則養病的臥房裏面來卻説王則因齒痛未痊睡在床上閉著眼見烈婦趙無瑕領著萬千鬼魂前來索命王則正夜不寐心中害怕只教多點蠟燭教姬妾輩做個肉團屏兒圍著又心下煩燥不許他們説話靜悄悄地守著個活尸靈兒忽聽得喊聲大起軍士蜂擁而入驚得衆姬妾們先走散了單剩王則一個躺在床上因打綻了嘴脣落了當門兩齒念不得咒語只學得一個禁人法一個隱身法也都靠不著了李遂上前叫軍士一條麻繩索兒綁縛個四馬攢蹄就打入胡永兒偽宮中來只見一派汪洋大水並無門路衆人都慌了諸葛遂智搖動鈴杵念那破邪神咒登時不見了水李遂只聽得腳頭下踢著鐺的一聲拾起來原來是一股銀叉此是胡永兒邪法卻説胡永兒正與小王子王俊在床上快活行雲雨之事衆軍士猝然打進胡永兒不知高低剛扯得一件小衣服穿了還不曾下得床來衆軍士那管三七念一把豬羊二血馬尿大蒜俱望床上亂潑諸葛遂智又念動咒語胡永兒沒做手腳處和王俊一齊綁了李遂使群刀簇擁著王則胡永兒王俊軍士就偽宮放起火來因是諸葛遂智施了道術外面人全然不覺吳旺見火起只道失火引著守府親軍拿著撓鉤水桶入來撲救正遇著李魚羹指點與李遂看了并心腹石慶等一齊擒拿綁縛不管會妖法不會妖法但是拿到的都用豬羊二血馬尿大蒜劈頭澆過文招討大軍在外準備接應看見城中火起已知掘子軍於中發作一齊併力來攻也有從地洞入城來的衆軍將守城軍亂砍大開了貝州城放下吊橋文招討即時入城向偽府中偏廳坐定一面教人救滅了火李遂解王則胡永兒一班人到面前文招討教上了囚車并老寨中先擒的賊犯任遷一同監候吩咐先鋒孫輔牢固看守再説諸葛遂智領著衆兵將圍住軍師府要拿左黜搜到中堂一個軍士喊道在這裏了衆軍撲入看時分明見瘸子靠在壁下眨眼之間走入壁裏去了衆軍一齊把壁推倒並無蹤影正在壁下搜尋只見總管王信處差人來報道有人看見左黜走入一家碓坊裏去了特請諸葛老師父去尋拿則箇原來左黜立心要走爭奈天羅地網密密布置脫不得身偶然躲在碓坊裏去了卻被人看見了諸葛遂智當同衆人徑奔入碓房人家總管王信親自引軍到來教軍士把前後門圍了入去搜捉這個人家吃了一驚問道我家有什麼事如此大驚小怪衆人道有妖人左黜走入你家會事的放出來免得遭纍這主人家道告將軍不曾有人入來躲在我家王信叫軍士屋裏細細搜尋諸葛遂智就入碓房周圍看了指著一個碓嘴叫主人家問道這個可是你家物也不是主人家看了道我家不曾有這個間碓嘴諸葛遂智道這個正是左黜他兩個瞳神分明在碓嘴上不是老僧無人認得快取穢物來澆説猶未了已不見了碓嘴重復搜尋並無蹤迹忽聽得青天上一連數聲霹靂一如山崩地裂衆軍士發起喊來王信親去看時卻是一個瘸腳雄狐震死在地原來左黜變了碓嘴指望瞞過衆人卻被和尚識破又復隱身而去要變做諸葛遂智模樣去害文招討卻被玄女娘娘將照妖寶鏡空中懸起照破原形使他變化不能就著雷部登時震死以全白猿神石壁之誓可憐左黜多年作了有法的瘸妖一朝作了無靈之孤鬼正是會使天上無窮計難免酆都永劫災不在話下再説諸葛遂智看了死狐認得是左黜已知玄女娘娘神力歡喜不勝便教軍士抬到偽府門前文招討和衆將看驗過了文招大喜道若非吾師以正破邪妖人一黨如何平靜諸葛遂智向文招討耳邊道此乃朝廷有道去姦用賢感動天庭有九天玄女娘娘空中佑助非老僧之功也正説間有先鋒孫輔差人稟話方知妖犯胡永兒適才亦被天雷震死益信生事害民天誅難免非虛誓也文招討見兩個魔頭都死方才放心即忙出榜安民凡貝州軍士不會妖法者俱係脅從一概免究王則左黜採取民間美婦有夫者還給原夫無夫者聽憑父母領回擇配其富戶之家被賊搜刮受害就將餘下的軍餉計戶分給以贍窮民合城歡呼載道文招討一面在府堂上置酒慶賀並請明鎬赴席大小三軍扎營城外俱有犒賞一面具表申奏朝廷敘明功次并一行妖賊或解京或本州發落專候聖旨定奪功勞簿上諸葛遂智第一諸葛遂智道老僧出世之人要敘功勞何用乞分派與勞將士名下只還老僧原來馬匹到甘泉寺去回覆徒弟們以全老僧之信吾願畢矣文招討再三勸留不從贈以金帛無所取受帶著三個小行者別了衆將騎馬出城而去文招討潛地差人隨去打探他下落卻説甘泉寺中老和尚叫做諸葛遂智的出外一十五年恰好這幾日回了衆徒弟徒孫們只道他征戰回來乃問起他文招討事情全然不知衆僧也委決不下這一日只見遠遠的三個行者控馬而回馬上坐的又是一個諸葛遂智與寺中全然無異衆和尚大驚商量道我們不須費嘴竟去請裏面的老和尚出來待他兩個自辨真假卻説外面的長老下了馬一徑走入佛堂中去裏面的長老出來一見了便罵道什麼怪物假冒老僧的面貌氣忿忿的正要發作衆僧都兩旁站著冷看只見外邊的長老聽得個假字連忙搖手道老菩薩莫要開口貧僧已悟了還你個明白去也取筆硯就經桌上寫下一偈云假你本非真真我亦是假撇卻假你我自有真爹媽咦虧你今朝肯認真笑我十年空作耍又寫四句道貝州城下霹靂吼白雲洞裏翻筋斗萬法皆空歸去來蛋子如今不出醜寫完投筆盤膝坐下瞑目而逝衆僧上前看時已換了形像只見濃眉隆準闊口方頤分明是蛋子和尚模樣了方知蛋子和尚是個聖僧各各驚訝不已卻説那文招討差人來看下落的知道此事慌忙回報文招討大驚即同曹招討王信三匹馬領了隨身軍士親到甘泉寺來衆僧正待商量盛殮之時聽道文招討到了嚇得他顛之倒之連老僧諸葛遂智也出來迎接見了文招討一齊下跪文招討還在疑信之間慌忙扶住道吾師何行此禮衆和尚稟道這是本寺住持前隨招討去的乃是蛋師假托今坐化在佛堂之內已復原形文招討方才信了衆僧引至佛堂中文招討看了聖體見他威容凜凜儼然如生對曹招討説道包待制曾説此僧利害教老夫仔細防備如今反助我成功乃知此僧非凡人也衆僧將二偈呈與文招討看了贊嘆不已同衆將一齊拈香下拜拜畢吩咐訪取高手匠人就將他肉身漆好造龕供奉又於軍中支收千兩銀子以為此衆僧修蓋香火之費至今蛋子和尚真身還在甘泉寺中做了本寺伽藍上人稱為彈子菩薩或稱蛋頭菩薩香火不絶後人有詩題甘泉寺壁云三遍盜書都是假一朝破假即成真若從得意中間破便是竿頭進步人文招討再修一道表章奏上朝廷單奏九天玄女娘娘及蛋子和尚靈迹卻説樞密院將兩次表章進呈御覽仁宗皇帝龍顏大喜即時聖旨行下貝州妖賊王則即於本州市曹凌銼碎剮從賊任遷吳旺王俊石慶等盡行處斬胡永兒雖已受天誅仍行梟首俱傳首京師告廟後遞送各府州縣號令左黜狐尸燒灰風化貝州百姓遭王則暴虐準留兵餉若干計戶給散以贍窮民其王則所造違禁偽府即改作九天玄女娘娘廟贈號聖佑本州廳治另行相地起建蛋子和尚棄邪歸正平妖有功追贈護國禪師之號馬遂茹剛忠節可嘉俱從厚贈蔭烈婦趙無瑕準立貞烈牌坊貝州知州久缺就著文彥博於附近官僚量才推補河北各州縣官多有先行被賊脅從以後歸正者都著分別事情輕重便宜處分其征討有功偏正將佐俱俟還朝之日論功升賞文招討與各官接了聖旨一一奉行次日早起監中取出一行妖人寫了犯由牌打開囚車推上木驢文招討判了剮字斬字推出市曹王則和任遷吳旺等都是眼中流淚面面相覷做聲不得貝州看的人挨肩背也有唾罵的也有嗟嘆的但見兩聲破鼓響一棒碎鑼鳴皂纛旗招展如雲柳葉槍交加似雪犯由牌高貼人言此去幾時回白紙花雙插都道這番難再活長休飯喉裏難吞永別酒口中怎咽高頭馬上監斬官勝以活閻羅刀劍林中劊子手猶如追命鬼請看今日凌遲者盡是興妖叛逆人劊子手所起惡殺都來恰好午時三刻將王則等押到十字路口讀罷犯由盡行如法凌遲處死可憐王則剛剛反了五年零六個月今日受了極刑絶了王大戶的後代當時第五胎生的背上刺五個福字小名五福兒此五年之讖也監斬官正坐在蘆席柵內面看劊子手行刑只見人叢中一個人扶著個老婆婆捱擠上來跪在案桌前擺著八錠金銀放聲大哭問其緣故那人正是關疑這老婆婆是他母親妻房就是趙烈婦了因被王則逼娶不從自縊而死他母子逃在東京今日聞王則已擒聖旨就在貝州發落兩母子復回故鄉這金銀便是王則聘財情願將來納官分用買王則幾塊肉去祭奠