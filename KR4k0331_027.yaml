body:
  text: 第二十七回君起早時臣起早趕入朝門天未曉多少山中高臥人不聽朝鐘直到老且說鄭州官吏具表上奏仁宗皇帝仁宗皇帝就將表文在御案上展開看了遂問兩班文武道鄭州知州被妖人殺害卿等當去勦捕袪除道猶未了忽見太史院官出班奏道夜來妖星出現正照雙魚宮下臨魏地主有妖人作亂乞我皇上聖鑒早為准備仁宗皇帝曰鄭州新有此事太史又奏妖星出現事屬利害卿等當預為區處眾官共奏道目今南衙開封府缺知府須得揀選清廉明正之人任之庶可表率四方袪除妖佞仁宗皇帝問誰人可去任開封府眾官共奏道龍圖閣待制包拯字希仁盧州合肥人也為人剛正無私不輕一笑有人見他笑的如見黃河清一般必須此人方可任此職仁宗准奏教宣至殿前起居畢命即日到任包拯謝了恩出來開封府祗候人等迎至本府免不得交割牌印即日陞廳行文書下東京並所屬州縣令百姓五家為一甲五五二十五家為一保不許安歇游手好閒之人在家宿歇如有外方之人須要詢問籍貫來歷各處客店不許容留單身客人東京大小有二十八座門各門張掛榜文明白曉諭百姓們都燒香頂禮道好個龍圖包相公治得開封府一郡軍民人等無不歡喜真個是兩行吏立春冰上三郡民居寶鏡中鬼魅潛形愁洞照皇親斂手避威風那行人讓路鼓腹謳歌路不拾遺夜不閉戶肅靜了一個東京不在話下卻說那後水巷裏有一個經紀人姓任名遷排行第一人都叫他做小大一哥乃是五熟行裏人何謂五熟行賣麵的喚做湯熟賣燒餅的喚做火熟賣鮓的喚做醃熟賣炊餅的喚做氣熟賣飠骨飠出的喚做油熟這小大一哥是個好經紀人去在行販中爭強奪勝在家裏做了一日賣的行貨都裝在架子上把炊餅燒餅饅頭餕餡糕裝停當了那小大一哥挑著擔子出到馬行街十字路口歇下擔子把門鋪了和一般的經紀人廝叫了去架子後取一條三腳凳子方纔坐得只聽得廝郎郎地響一聲一個人逕奔到架子邊來卻不是買燒餅的看那廝郎郎響的此物喚做隨速殿家又喚做法環是那解厭法師搖著做招牌的那法師搖著法環走來任遷架子邊看著任遷道招財來利市來和合來把錢來任遷忍不住笑看那解厭法師時身材矮小又瘸了一隻腿一步高一步低頭巾沒額頂上破了露出頭髮來一似亂草披領破布衫穿著舊布褲一似獅子腳穿破行纏斷耳麻鞋腰裏繫一條無鬚皂任遷道厭師仔細照管地下不要踏了老鼠尾巴巳牌前後來解厭好不知早晚瘸師道我也說出來得早了只討得三文錢任遷道何不晚些出來瘸師道哥哥莫怪我娘兒兩個在破裏住此時兀自沒早飯得吃胡亂與我一文錢湊糴些米娘兒們煮粥充飢任遷見他說得苦了要與他一文錢去腰裏摸一摸看卻不曾帶得出來看著瘸師道我有錢也不爭這一文今日未曾發市瘸師見他說沒錢便問哥哥炊餅怎樣賣任遷道大炊餅兩文錢一個小的一文錢一個瘸師便去懷中取出三文錢來攤在盤中道哥哥賣個炊餅與我娘吃任遷收了兩文錢把一文錢還了瘸師道我也只當發市將這一文捨施你瘸師得了一文錢藏在懷裏任遷去蒸籠內取出一個大一個小遞與瘸師瘸師伸手來接任遷看他手腌腌臢臢黑魆魆地道不知他幾日不曾洗的瘸師接那炊餅在手裏看一看捻一捻看著任遷道哥哥我娘八十歲如何吃得這般硬餅換個饅頭與我罷任遷道弄得腌腌臢臢別人看見須不要了安在前頭差兒裏再去蒸籠內捉一個饅頭與他瘸師接得在手裏又捻一捻問任遷道哥哥裏面有什的任遷道一包精肉在裏面瘸師道哥哥我娘吃長素如何吃得換一個砂餡與我任遷道未曾發市撞著這個男女待不換與他只見架子邊又許多人熱鬧只得忍氣吞聲又換一個砂餡與他瘸師又按在手裏捻一捻道如何吃得他飽只換炊餅與我罷任遷看了焦燥起來可知叫你忍飢受餓只賣得你兩文錢到壞了三個行貨這番不換了瘸師道哥哥休要焦燥兩個炊餅如何吃得我娘兒兩個飽不如只糴米煮粥吃罷去架子上捉了銅錢看著架子上吹口氣便走任遷道叵耐這廝壞了我三個行貨你待走那裏去便來打那瘸師忽然立住了腳尋思道這等一個模樣吃得幾拳腳尖若是有些一差二誤倒打人命官司只好饒他罷休回過身來到架子邊定睛打一看時任遷只叫得苦一架子饅頭炊餅都變做浮炭也似黑的有詩為證炊餅饅頭隨意換弄得腌臢不好看鄉下老兒也憎嫌要買除非是瞎漢任遷大怒道這廝蒿惱了我半日又壞了一架子行貨這一日道路罷了正是和他性命相博吩咐一般經紀人看著架子揎拳拽步向前來趕瘸師後生家心性趕了半日不見欲待回來只聽得前頭廝郎郎響聲任遷道莫非便是那廝麼望前頭直趕來看又不見翻來覆去直趕到安上大門樓下見一夥人圍著一個肉案子門前看任遷道這是我相識張屠家裏不知做什的有這許多人立住了腳去了人叢裏望一望只見一個婆婆倒在地上一個後生扶著口裏不住叫娘叫了半個時辰醒來婆婆緊緊地閉著眼不肯開後生道娘你放鬆爽些開了眼婆婆道快扶我歸去後生道你開開眼婆婆道我怕了開不得後生扶了婆婆自去了任遷道不知這婆婆因什倒在這裏只見張屠道眾人散開沒什好看任遷認得本人姓張名琪排行第一任遷道一郎多時不見張屠道任大哥那裏去來任遷道幹些閒事張屠道任大哥入來我告訴你任遷入去問張屠道門首做什麼這等熱鬧張屠道不曾見這般蹊蹺作怪的事方才一個瘸腳的道人上裹破頭巾身穿破布衫手裏拿著法環口裏道招財來利市來和合來把錢來我道瘸師你好不知早晚想是你家沒有天窗瘸師聽了道沒錢便罷卻休取笑我怎的不想看口掛在案子的頭摸一摸口裏動動地不知說些什的搖著法環自去了我也不把他為事側首院子裏做花兒的翟二郎定下這個頭卻叫他娘來取我除下頭與他這頭扎眉扎眼張開口把婆婆一口咬住驚死那婆婆在地我慌忙教小博士叫他兒子來想是救得他活若有些山高水低倒要吃他一場官事他兒子提起這頭看時又沒一些動靜翟二郎道老人家自眼花了何曾見死的豬頭扎眉扎眼方纔扶了他娘去任遷聽了把適間瘸師買炊餅的事從頭至尾對張屠說了一遍張屠道作怪作怪說猶未了只聽得法環響任遷道這廝兀自在前面張屠道壞了你炊餅不打緊也不甚厲害險些兒教我與婆婆償命不須你動手待我捉這廝打一頓好的任遷道我和你同去趕那廝兩個拽開腳步來趕瘸師趕了半日不見張屠看著任遷道如何是好若還趕斷無干休如今趕他不上回去了罷卻待要回又聽法環響又趕了五六里出安上大門約有十餘里路了聽得法環響只是趕不著兩個卻待要回只見市梢頭一個素麵店門前一個人拿著一條棒棍打一個漢子張屠卻認得是賣素麵的吳三郎住了手道一店人要麵吃了趕路教他快燒火橫也燒不著豎也燒不著半日不能得鍋裏熱人都走了去似恁般做生意時不如折了店面罷定叫他皮開肉綻張屠道看我面罷休吳三郎道你今日不是日分出來閒走張屠遂把適纔瘸師的事一一說了一遍吳三郎聽罷呆了道恁地我便錯打了他你兩個聽我說我當著上只見一個瘸師搖法環到我門前叫道招財來利市來和合來把錢來我手裏正忙我道你也沒早晚日中出來解厭晚些出來怕鬼捉了你去我沒零碎錢且空過這一遭只見他看著我鍋中吹一口氣兒便走了去他轉得背我叫小博士去燒火卻如何燒得著有兩頓飯只燒不著許多吃麵的人等不得都走散了我因此上打他若不是你們說時我那裏知道叵耐這廝卻是毒害壞了我一日買賣正說之間只聽得法環響吳三郎望一望見那廝在前面一路搖著來吳三郎任遷張屠三人一齊道我們去趕那廝瘸師見三個人趕急急便走只因他三個來趕瘸師有分教到一個冷靜佛門見一件蹊蹺作怪的事正是開天闢地不曾聞從古至今希罕見畢竟三人趕瘸師到何處見什事來且聽下回分解
