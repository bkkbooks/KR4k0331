body:
  text: 第二十三回駿馬慣馱村漢走巧妻專伴拙夫眠姻緣都是前生債莫向東風怨老天話說胡永兒夢見聖姑姑騎鶴而至叫聲我兒聞得你嫁了新郎特來看你永兒便把心中苦楚告訴了一遍聖姑姑道你終身結果自在貝州這裏原非你安身之所永兒道奴家只今日便跟了娘娘去罷聖姑姑道宿債未畢還不是脫身的時候永兒道奴家與那瘋子有甚宿債聖姑姑道你前生做我的女兒時節我同你到劍門山關王廟中避雪有個年少的道士名喚賈清風與你眉來眼去雖則未曾成就你卻也不曾決終得他那道士為思憶你一病而亡只為他情癡忒重所以今生投胎變成癡子但他的情根卻也種得深了少不得今世要開花結果今日與你做一場夫妻也是還債到緣分了時自有個散場你也須索忍耐休得搬弄神通惹人猜忌若有急難可到鄭州來尋我說罷依舊乘鶴風去了永兒醒來一句句都記得在心裏曉得前緣宿業倒也心定了張院君回家到第二日一心只牽挂女兒不知這一夜女兒如何過了眼兒也一定哭得紅腫了差兩個養娘去看回來說道歡歡喜喜在那裏媽媽不信連看了幾次回報都是一般話兒媽媽嘆口氣也放下了心從此不和員外爭嚷那焦員外夫妻兩口兒也只怕新婦心中不樂見他兩個孝順十分歡喜自不必說焦員外又自到胡親家處來稱謝從此兩家無話再說永兒與憨哥雖為夫婦實則同床千里憨哥從來不省人事不來纏老婆永兒也落得推開閒常倒懷個可憐之意冷冷熱熱常照顧他恰像添了個奶子一般有時節閉上房門演弄法術兒頑耍憨哥獃獃的看著只不則聲所以一向相安無事荏苒光陰不覺過了三載時遇六月間這一年天氣倍加炎熱永兒到晚來堂前叫了安置與憨哥來天井內乘涼永兒道憨哥我們好熱麼憨哥道我們好熱麼永兒道我和你往一處乘涼你不要怕憨哥道我和你一處乘涼你不要怕永兒見憨哥七顛八倒心中好悶當夜永兒和憨哥合坐著一條凳子永兒念念有詞那凳子變做一隻吊睛白額大蟲背上載著永兒和憨哥從空便起直到一座城樓上這座城樓叫做安上大門樓永兒喝聲住大蟲在屋脊上便住了永兒與憨哥道這裏好涼麼憨哥道這裏好涼麼兩個乘涼到四更永兒道我們歸去休憨哥道我們歸去休永兒念念有詞只見大蟲從空而起直到家中天井裏落下依舊變做子永兒道憨哥我們去睡休憨哥道我們去睡休自此夜為始永兒和憨哥兩個夜夜騎虎直到安上大門樓屋脊上乘涼到四更便歸有詩為證白雲洞法大神通木凳能令變大蟲不信試從吳地看西山跳虎是遺蹤忽一日永兒道我們好去乘涼也憨哥道我們好去乘涼也永兒念念有詞凳子變做大蟲從空便起直到安上大門樓乘涼當夜卻沒有風永兒道今日好熱拿著一把月樣白紙扇兒在手裏不住的搖此時月亮卻有些朦朧有兩個上宿軍人出來巡城少不得是張千李萬兩個巡了一遍回到城門樓下張千猛抬起頭來看月吃了一驚道李萬你見麼門樓屋脊上坐著兩個人李萬道若是人如何上得去張千定睛一看道真是兩個人李萬道據我看時只是兩個老鴉當夜兩個在屋脊上不住手的把扇搖李萬道若不是老鴉如何在高處展翅張千眼快道據我看一個像男子一個像婦人如今我也不管他是人是鴉教他吃我一箭去那袋內拈弓取箭搭上箭拽滿弓看清只一箭射去不偏不歪不歪不正射著憨哥大腿憨哥大叫一聲從屋脊上骨碌碌滾將下來跌得就似爛冬一般張千李萬上前看時卻是個漢子幸得不曾跌死將他縛了再看上面時不見了那一個至次日早間解到開封府來知府陞廳張千李萬押著憨哥跪下稟道小人兩個是夜巡軍人昨夜三更時分巡到安上大門猛地抬起頭來見兩個人坐在城樓屋脊上搖著白紙扇子彼時月色不甚明亮約莫一個像男子一個像婦人小人等計算這等高樓又不見有梯子如何上得去必是飛簷走壁的歹人隨即取弓箭射得這個男子下來再抬頭看時那個婦人的卻不見了今解這個男子在臺下請相公臺旨知府聽罷對著憨哥問道你是什麼樣人憨哥也道你是什麼樣人知府道你從實說來免得吃苦憨哥也道你從實說來免得吃苦知府大怒罵道這廝可惡敢是假與我撒瘋憨哥也瞪著眼道這廝可惡敢是假與我撒瘋滿堂簇擁的人都忍不住笑知府無可奈何叫眾人都來廝認看是那裏地方的人眾人齊上認了一會都道小人們並不曾認得這個人知府存想道安上大門城樓壁斗樣高這兩個人如何上得去就是上得去那個像婦人的如何不見下來卻暗暗地走了一定那個像婦人的是個妖精鬼怪迷著這個男子到那樓屋上不提防這廝們射了下來他自一逕去了如今看這個人胡言胡語兀自未醒但不知這個人姓名家鄉如何就罷了這頭公事尋思了一會喝道且把這個人枷號在通衢十字路口看著張千李萬道就著你兩個看守如有人來與他廝問的即便拿來見我不多時獄卒取面枷將憨哥枷了張千李萬攙扶到十字街口時鬨動了大街小巷的人捱肩背爭著來看卻說那焦員外家嬭子和丫頭侵晨送洗臉湯進房裏去不見憨哥永兒吃了一驚慌忙報與員外媽媽知道員外媽媽都驚獃了道門不開戶不開走那裏去了焦員外走出走入沒做理會處忽聽得街上的人三三兩兩說道昨夜安上大門城樓屋脊上有兩個人坐在上面被巡軍射了一個下來一個走了又有的說道如今不見枷在十字路口焦員外聽得說卻似有人推他出門一般逕走到十字路口分開眾人挨上前來看時卻是自家兒子便放聲大哭起來問道你怎的走城樓上去你的娘子在那裏張千李萬見焦員外來問不由分說將他橫拖倒扯捉進府門知府問道你姓甚名誰那枷的是你什麼人如何直上禁城樓上坐地意欲幹何歹事與那逃走婦人有甚緣故你實實說來我便恕你焦員外躬身跪著道小人姓焦名玉本府人氏這個枷的是小人的兒子枉自活了二十多年紀一毫人事也不曉得便是穿衣吃飯動輒要人人若問他說話時便依人言語回答因此取個小名叫做憨哥小人只是叫他小時伏侍的嬭子看管雖中門外一步也不敢放他出來三年前偶有媒人來與他議親小人欲待娶妻與他恐誤了人家女兒欲待不娶與他小人只生得這個兒子沒人接續香火感承本處有個胡浩不嫌小人兒子獃蠢把一個女兒叫做胡永兒嫁他且是生得美貌伶俐不料昨晚吃了晚飯雙雙進房去睡今早門不開戶不開小人的兒子並媳婦都不見了不知怎地得出門到城樓高處又不知媳婦如何不見下來便走得去知府喝道休得胡說既是你的兒子媳婦如何不開門啟戶走得出來媳婦一定是你藏在家中了快叫他來見我焦員外小人安分愚民怎敢說謊便拷打小人至死端的屈殺小人知府聽他言語真實更兼憨哥依人說話的模樣又是真的再差兩個人去拿胡永兒父親來審問便見下落公差領了鈞牌飛也似趕到胡員外家裏來卻說胡員外聽得街坊上喧傳這件事早已知是自家女兒做出來的勾當害了憨哥與媽媽正在家暗暗地叫苦只見兩個差人跑將入來叫聲員外有麼員外驚得魂不附體只得出來相見問道有何見諭公差道奉知府相公嚴命呼喚請即那步胡員外道在下並不曾管閒為非不知有甚事相煩二位喚我公差道知府相公立等去則便知分曉員外就在鋪內取銀十兩送與二位權當酒飯沒事回來再當酬謝兩個公差接了銀子不容轉動推扯出門逕到府裏知府正等得心焦見拿到了胡員外便把城樓上射下憨哥次後焦員外說出永兒並憨哥對答不明要永兒出來審問的情由說了一遍胡員外只推不知知府道我聞你女兒極是聰明伶俐女婿這般獃蠢必定別有奸夫做甚不公不法的事你怕我難為他說出真情一意藏在家中反來遮掩焦員外跪在那邊插口道若在你家快把他出來救我兒子性命胡員外道世上只有男子拐帶女人做事分明是你把我女兒不知怎的緣故斷送那裏去了故意買囑巡軍只說同在城樓屋脊上射了一個走了一個相公在上城樓在半天中一般又無梯子難道這兩人插翅飛上去的若果同在上面時怎的瓦也不響這般逃走得快女人家須是鞋弓襪小巡軍如何趕他不著眼睜睜的放他到小人家中來躲了知府聽他言語句句說得有理喝把憨哥的父親與張千李萬俱夾起來指著焦員外道這事多是你家謀死了他的女兒卻同張千李萬設出這般計策把這瘋癲的兒子做個出門入戶不打如何肯招喝將三人重重拷打兩邊公人一齊動手打得皮開肉綻鮮血淋漓焦員外受苦不過哀告道望相公青天作主原不曾謀死胡永兒容小人圖畫永兒面容情願出三千貫賞錢只要相公出個海捕文書關行各府州縣懸掛面貌信賞若永兒端的無消息時小人情願抵罪知府見他三個苦死不招先自心軟況兼胡員外也淡淡的不口緊要人便道這也說得是一邊把三個人放了一邊取憨哥進府開了枷併一干人俱討保暫且寧家伺候又著令焦家圖畫永兒面貌出了海捕文書各處張掛有詩為證自古公堂冤業多無如訟口惑人何上官比及回心轉一頓嚴刑已受過這四句詩說聽訟之難假如兩邊說來都是有理少不得要看那一邊理勝一分的聽他及至有恁般理的未必有恁般事即如胡員外當堂一番說辨何等可聽知府為此將焦玉和巡軍一同提打誰知都是冤枉所以坐公堂的切不可自恃聰察輕易用刑閒話休題且說那胡永兒見憨哥中箭跌下去了便口中念念有詞從空便起獨自個回到家中想道失了憨哥住在這裏不成了爹爹媽媽家中也不好去得如何是好想起成親之夜夢見聖姑姑與我說道此非你安身之處若有急難可來鄭州尋找現今無處著身不若去鄭州投奔聖姑姑看是如何當下穿了幾件隨身衣服帶了隨法物依舊跨了凳子從空而出直到野地無人處漸漸下來撇下凳子獨立一個取路而行此時天色方明恰好遇見舊時從他讀書的陳學究先生陳善從鄉裏趕早入城有些事幹認得是女學生胡永兒吃了一驚問道賢弟為何獨行至此爹爹媽媽何在永兒道了萬福答道奴家為夫家遭難隻身逃出不及對爹媽說知了身邊取出一個白土做就光光滑滑的小方枕兒遞與陳學究道有煩師父將此枕兒寄與我家爹媽聊表掛念此乃九天遊仙枕悅人魂夢枕之百病俱除師父是必寄去陳學究接了在手問道賢弟如今往那裏去胡永兒指著前面有個親眷在前面等我同到他家去陳學究抬向前面望時永兒使個隱身法忽然不見了陳善把眼睛一抹噀了一口唾叫聲見鬼莫非永兒已死方才精魂出現麼這泥做的枕兒分明不是陽間用的欲待拋棄了又想道他特地寄與爹媽再三叮嚀難道是鬼話我也莫管他真假便掯去問個信兒怕他怎的便將衣袖裹枕兒忙忙的走入城來忽然又想道我今日自家還有緊要事件不得工夫況且平安街不是順路帶著枕兒行走好不方便看看走到費將仕門首經過一個小廝叫道陳師父那裏去原來陳善也曾在費家教授過來這小廝正是舊時學童陳學究便把枕兒遞與他道這東西權寄你處今日忙些個明日來取就順便來看將仕說罷自去了學童看著這土做的枕兒也不在意帶進宅裏就撇在耳房中自家睡的鋪上早飯後費將仕出去拜客書童沒些事到舖上去睡覺見枕兒方便就用著他也是這小廝夙世有緣好個九天遊仙枕多少王侯貴戚目不曾見耳不曾聞倒是他試法受用正是黃梁猶未熟一夢到華胥學童正在熟睡之際有與他一般樣的兩個小廝來尋學童同打陞官圖耍子尋到耳房裏見他齁齁的睡著一個便去抓腳心一個去撚個紙條兒弄進他鼻孔底去只見學童一連幾個噴嚏似風邪般舞將起來亂嚷道好快活好快活兩個小廝每人撏了一隻耳朵喚他醒了問道什末快活學童道我才去睡忽見枕牆上兩扇門開異香撲鼻一班女樂吹彈而出個個有月貌花容迎我去仙界遊玩轉步之間果然仙山仙水仙花仙鳥景致非常一個仙女執壺又一個把盞連勸我仙酒三杯第三杯還不曾吃乾被你們囉唣醒了一個道我不信我不信一個便去搶那枕兒在手看時只見一邊枕牆上泥金塗寫九天遊仙枕五字那一邊畫成兩扇門兒上面橫個牌額寫仙界二字看看仔細方知所夢乃此枕之故一個道不知你是真是假今夜把這枕兒我拿去也睡一夜看有夢也沒有那一個道不要偏枯了大家受用受用上半夜是你下半夜是我費將仕拜客方回在耳房邊過去聽得說要分上下半夜受用只道商量什麼歹事一腳踢開門來三個小廝叢著一個白土做就光滑滑的小方枕兒在那裏胡言亂道費將仕一時怒雙手搶那枕兒在手眼也不去瞧高高的望空一撲在青石板上打個粉碎可憐無價遊仙枕化作階前一片塵難道這枕只與尋常枕頭一般隨手而破別無一些靈跡顯示麼要知端的且聽下回分解
