body:
  text: 第二十四回遊仙枕上遊仙夢絕勝華胥太古天此枕有誰相贈我一生情願只酣眠話說費將仕不由分說將枕兒望空撲下學童剛叫得一聲啊呀那枕兒跌在青石階前打得粉碎就那枕兒碎破之時喤的一聲只見一陣東西又不是蜂兒又不是蝶兒有影無形的飛起屋簷上去了費將仕走下階頭看時原來是三寸多長一班的仙女手中執著樂器笙簫絃索無所不具也有執壺執盞執扇執如意的共二十餘人如一棚木偶人兒相似一個個豔質濃粧美麗無比那一班仙女一字兒站在簷頭向著費將仕齊齊的道個萬福啟鶯聲開燕語說道妾等原係前朝內班近侍宮人被九天玄女娘娘符令拘禁在此今叨恩庇釋放逍遙實乃萬分之幸也說罷把樂器一齊動起聲調和諧淒婉可聽徐徐從屋脊上行去向北方即漸沒了費將仕從來未見此異獃獃的看了半日再把破枕片兒細細檢起看時裏面滑滑淨淨的都畫著細山細水亭榭樹木這枕兒是一塊白土捻就的外面又無絲縫不知裏面畫工如何動手豈不是個仙枕費將仕才把三個小廝喝來跪下問這枕兒的來歷那兩個小廝指著學童道是他說陳學究先生寄與他處約明日來取的小的們並不知情只聽得他說枕著睡去時便有許多快活受用看的是仙境吭的是仙樂吃的是仙酒小的們見枕牆上寫著九天遊仙枕五個金字心下疑惑正在此商量議論不期老爹回來再問學童果是如此費將仕只是不信將三個小廝鎖禁一間空房裏頭且待來朝陳學究來時問明是實方纔饒恕再說陳善到次日身上空閒了要去平安街胡員外家走遭先來看費將仕就便討枕頭兒去費將仕一聽得陳學究來忙請進內書房相見坐下費將仕先問道教授曾有個枕兒寄在小童來陳善道不曾教對將仕公說將仕公何以知之費將仕道此枕有些怪異之處教授實說從那裏來的下官亦有言告訴陳善道小弟舊時曾在平安街胡大洪家住館那女學生叫做永兒年長嫁人已經三載昨早忽然在城外相逢說夫家遇難故此潛逃將此託兄寄與他家爹媽收下聊表情念小弟因昨日有些事忙也不曾細看得不知有何怪異費將仕道如此說又是教授不曾替他寄得到好便把學童夢見這般這般這般及自己撲碎了枕兒又是如此如此恁樣怪異現今官府行文出三千貫賞錢要拿妖人胡永兒教授若將這枕頭去時剛好做個表證須有分吃官司早是下官撲碎了妖物泯於無跡倒好陳善嚇得魂不附體謝道小弟因僻居鄉村與城中吊遠並不知官府事情若非將仕公說明小弟險為所誤只不知官府怎見得胡永兒是妖人將仕公必知其詳費將仕又把張千李萬在安上大門城樓屋脊上射下憨哥並焦胡兩家見官對證始末述了一遍說得陳善毛骨悚然當下費將仕留了酒飯陳善再三作謝而別竟自回去也不到胡員外家去了費將仕開了鎖放出三個小廝出來吩咐從今以後再不許提起枕兒一節若有外人聞風時節我把你三個狗奴當妖人解官三個小廝連聲不敢自此無人提起遊仙枕之事語分兩頭再說胡永兒離了陳學究獨自行了一日天色已晚到一個涼棚下見個點茶的婆婆永兒入那茶坊裏坐下歇腳那婆婆點盞茶來與永兒吃了永兒問婆婆道此是何處前面是那裏去婆婆道前面是板橋八角鎮過去便是鄭州大路小娘子無事獨自個往那裏去永兒道爹爹媽媽在那裏要去探望則個婆婆道天色晚了小娘子只可在八角鎮上客店裏歇一夜卻行早是有這歇處獨自一個夜晚不便行走永兒變十數文錢還了茶錢謝了婆婆又行了二里路見一個後生六尺以下身材二十二三年紀三牙掩口細髯七分腰細膀闊戴一頂木瓜心攢頂頭巾穿一領銀絲似白紗衫子繫一條蜘蛛斑紅綠壓腰著一對土黃色多耳皮鞋背著行李挑著柄雨傘那後生正行之間見永兒不戴花冠綰著個角兒插兩支金釵隨身衣服生得有些顏色向前與永兒唱個喏道小娘子那裏去來永兒道哥哥奴去鄭州投奔親戚則個那廝卻是個浮浪人家子弟便道我也往鄭州那條路去尚且獨自一個難行你是女人家如何獨自一個行得我與小娘子一處行一面把些恐嚇的言語驚他到一個林子前那廝道小娘子這個林子最惡時常有大蟲出來若兩個行便行便不妨得你若獨自一個走大蟲出來便馱了你去永兒道哥哥若如此時須得你的氣力拖帶我則個那廝一路上逢著酒店便買點心來兩個吃了他便還錢又走歇又坐歇看看天色晚來永兒道哥哥天晚了前面有客店歇麼那廝道小娘子好教你得知一個月前這裏捉了韃子國兩個細作官府行文書下來客店裏不許容單身的人我和你都討不得房兒永兒道若討不到房兒時今夜那裏去歇宿那廝道若依得我口便討得房兒永兒道只依哥哥口便了那廝道小娘子如今不真個只假說我們兩個是夫妻便討得房兒永兒口中不言心下思量這廝與我從無一面萍水相逢並沒句好言語只把鬼語嚇我要硬討人便宜我胡永兒可是怕事的麼永兒道哥哥拖帶睡得一夜也好那廝道如此卻好來到八角鎮上有幾個好客店都過了卻到市梢頭一個客店那廝入那客店門叫道店主人有空房也沒我夫妻二人討間房歇店小二道大郎莫怪沒房了那廝道苦也我上上落落只在你家投歇何以今日沒了房兒店小二道都歇滿了只有一間房鋪著兩張床方才做皮鞋的鬍子歇下怕你夫妻二人不穩便那廝道且引我去看一看店小二在前那廝同永兒隨後店小二推開房門與那廝看了那廝道怕甚麼事他自在那邊我夫妻二人在對床店小二道恁地時你兩個自入房裏去店小二交了房兒永兒自道叵耐這廝我又不認得你卻教我做他老婆來討房兒我只教他認一認老婆手段有詩為證堪笑浮華輕薄兒偶逢女子認為妻黃金紅粉高樓酒誰謂三般事不迷豈不聞古人云他妻莫愛他馬莫騎怎的路途中遇見個有顏色的婦人便生起邪心來那廝看著店小二道討些腳湯洗腳店小二道有有看看待詔說道他夫妻兩個自東京來的店中房都歇滿了只有這房裏還有一張床沒奈何教他兩個歇一夜待詔道我只睡得一張床有人來歇教他自穩便永兒進房來叫了待詔萬福待詔還了禮那廝看著鬍子道蒿惱則個待詔道請自便待詔肚內自思量兩個言語不似東京人恁地個孤調調的行兩個不像是夫妻事不一心有些腳叉樣子干我甚事由他便了鬍子道你們自穩便那廝和永兒床上坐了店小二掇腳湯來那廝洗了腳討一盞油點起燈來鬍子不做夜作喚了安置朝著裏床自睡了那廝道姐姐路上貪趕路不曾打得火我出去買些酒食來吃轉身出房去了永兒道卻叵不耐這廝無禮他買酒去了我且作弄他耍子則個口中不知道些什麼舒氣向鬍子床上只一吹又把自己臉上摸一摸永兒就變做個鬍子帶些紫膛色正像做皮鞋的待詔待詔卻變做了永兒假待詔也倒在床上假睡著卻說那廝沽了酒買些下飯拿入店中來肚裏尋思道我今朝造化好遇著這等一個好婦人客店裏都知道我是他的丈夫了今晚且快活睡他一夜那廝推開房門放酒瓶在桌上剔起燈來看那床上時卻是做皮鞋的待詔疑惑道卻是什麼意故如何換過來我床上睡看那對面床上時卻睡著婦人那廝道想是日裏走得辛苦倒頭就睡著在這裏向前雙手搖那婦人叫道姐姐我買酒來了你走起來走起來只見那做皮鞋的待詔跳將起來劈頭掀番來便打那廝叫道做什麼便打老公鬍子喝道誰是你的老婆那廝定睛看時卻是做皮鞋的待詔慌忙叫道是我錯了莫怪莫怪店小二聽得大驚小怪入房來問道做什麼待詔道可奈這廝走將來搖我叫我做姐姐小二道你又不瞎眼你的床自在這邊店小二勸開了待詔依舊上床睡了那廝吃了幾拳道我的晦氣眼睜睜是個婦人原來卻是待詔看這邊床上女娘睡著叫道小娘子起來吃酒定睛只一看時卻是朱紅頭髮碧綠眼睛青獠牙的叫聲有鬼驀然倒地店小二正在門前吃飯只聽得房裏叫有鬼入來看時見那廝跌倒在地上連忙扶起驚得做皮鞋的待詔也起來店裏歇的人都起來救他也有噀噀吐的也有咬中拇指的那廝吃剝消了一夜三魂再至七魄重生那廝醒來道好怕人有鬼有鬼被店小二揪住劈臉兩個噀吐道我這裏是清淨去處客店裏有甚鬼是甚人叫你來壞我的衣食將燈過來道鬼在那裏那廝道床上那婦人是鬼店小二道這廝卻不弄人這是你的渾家如何卻道是鬼那廝道不是我渾家我在路上撞見他穩議同到此討房兒做假夫妻的方才我出去買酒來到房裏看他卻是鬍子我卻錯叫了待詔吃他一頓拳頭再去看他時卻是朱紅頭髮碧綠眼睛青臉獠牙原來是鬼眾人吃了一驚燈光之下看那婦人時如花似玉一個好婦人都道你眼花了這等一個好婦人你如何說他是鬼永兒道眾位在此可奈這廝沒道理我自要去鄭州投奔爹爹媽媽這廝路上撞見了到和我同行一路上只把恐嚇的言語來驚我又說捉了幾個細作底內不容單身人歇強要我做假夫妻來討房兒及至到了這裏又只叫我是鬼一晚胡言亂語不知這廝懷著什麼意故眾人和店小二都罵道可奈這廝情理難容著他好生離了我店門若不去時眾人一發上打教你碎骨碎身把這廝一時熱趕出去把店門關了那廝出到門外黑洞洞不敢行又怕巡軍捉了吃官司只得在門外僻淨處人家門前蹭了一夜到天曉那廝道我自去休離了店門走了六七里路了卻待要走過一林子去只見林子裏走出胡永兒來看著那廝道哥哥昨夜罪過你帶挈我客店裏歇了一夜你卻如何道我是鬼今番青天白日裏看奴家是鬼不是鬼那廝看了永兒如花似玉生得好肚裏與決不下道莫不昨晚我真個眼花了那廝道姐姐待要和你同行昨夜兩次被你嚇得我怕了想你不是好人你只自去休永兒道昨夜你要我做假夫妻也是你如今卻又怕我我有些怕冷靜要哥哥同行則個那廝道白日裏怕怎的永兒道哥哥昨日說有大蟲出來傷人那廝道說便是這等說那裏真個有大蟲永兒用手一指道這不是大蟲來了說聲未絕只見林子內跳出一隻吊睛白額大蟲來看著那廝只一撲那廝大叫一聲撲地便倒那廝閉著眼肚裏道我性命今番休了多時沒見動靜慢慢地閃開眼來看時大蟲也不見了婦人也不見了那廝道我從來愛取笑人昨日不合撩撥這婦人吃鬍子一頓拳頭又吃他驚了叫我魂不附體今朝他又叫大蟲出來我道性命休了原來是驚要我這婦人不知是妖是鬼若是前面又撞見他卻了不得我自不如回東京去休那廝依先轉身去了後人有古風一篇為證美人顏色嬌如花獨行踽踽時興嗟路旁忽逢年少子殷勤借問向誰家答言鄭州訪爹媽客店不留鰥與寡假為夫婦望成真誰道歡娛翻受耍交床對面神難察迷目奚色眼真羞殺豈是美人曾變鬼美人原是生羅剎老拳毒手橫遭楚明日林中驚復何曾美人幻虎來美人原是胭脂虎少年貪色不自量乍逢思結野鴛鴦英雄難脫美人手何況無知年少郎且說胡永兒變大蟲出來驚了他他再不敢由這路來了我自向鄭州去一路上好慢慢地行此時天氣炎熱且行且住將近已牌時分看見一根大樹下好歇暫坐一回正坐之間聽得車子碌碌剌剌的響只見一個客人頭戴范陽氈笠身上穿著領打路布衫手巾縛腰行纏爪著胯子腳穿八搭麻鞋推那車子到樹下卻待要歇只見永兒立起身來道客長萬福客人還了禮問道小娘子那裏去永兒道要去鄭州投奔爹爹媽媽去腳痛了走不得歇在這裏客長販甚寶貨推車子那裏去客人道我是鄭州人氏販皂角去東京賣了回來永兒道客長若從鄭州過時車廂裏帶得奴家去送你五百錢買酒吃客人思量道我貨物又賣了鄭州又是順路落得趁他五百文錢客人道恁地不妨叫永兒上車廂裏坐那客人盡平生氣力推那車子也不與永兒說話也不打眼來看他低著頭只顧推那車子而行永兒自思道這客人是個樸實頭的人難得難得想昨夜那廝一路上把言語撩撥我被我略用些小神通雖不害他性命卻也驚得他好看一似這等客人正好度他日後也有用處那客人推那車子直到鄭州東門外問永兒道你爹爹媽媽家在那裏住永兒道客長奴家不識地名到那裏奴家自認得客人推著車子入東門來到十字路口永兒道這裏是我家了客人放下車子見一所空屋子鎖著客人道小娘子這是鎖著的一所空屋子如何說是你家永兒跳下車子喝一聲鐵鎖便落下來了用手推開一扇門走入去了客人卻在門外等了一個多時不見有人出來天色將晚只管舒著頭向裏面望不提防背後一個人說道你只望著宅門做什麼這宅門誰人打開的嚇得客人回頭不迭見一個老人慌忙唱喏道好教公公知道適間城外十字里路見個小娘子說腳痛了走不得許我五百文錢催我載到這裏入去了不出來叫我等了半日老兒道此宅是刁通判廨宇我是看守的原係封鎖在此此是誰人開了客人道恁的時相煩公公去宅裏說一聲取些銀子還我則個老兒道我問你誰打開的宅門客人道是你小娘子自家開的老兒道鎖的空宅子並無一人居住那有什麼小娘子你卻說恁般鬼話莫非誑我麼客人道好沒道理我載你家小娘子來家許我五百文錢又不還我倒說鬼話兒你叫我入去若是小娘子不在時我情願下情陪禮老兒道你說了這話不見時不要走了老兒大開了門叫客人入去到前堂及迥廊直至後廳遠遠的見永兒坐在廳上客人指著道這不是小娘子麼老院子心中正在疑慮這婦人那裏來的只見客人走上前叫道小娘子如何不出來還我銀子是何道理永兒見客人來忙站起身望後便走客人即踏步到後廳永兒見他趕得緊廳後不好躲閃一直走到井邊看著井裏便跳下去了客人見了嚇得連叫苦也苦也卻待要走被老院子一把捉住道這婦女你又不認得你自同他來卻又逼他下井去清平世界蕩蕩乾坤逼死人命你卻要脫身倘或這婦人家屬知道到此索命那時那裏尋你說話今番罷休不得緊似抱著叫起街坊人等將客人一條索子縛了直解到鄭州來只因這番有分教老實客長卻打著沒影官司無墨州官轉弄出欺心手段直教匹夫跌足壯士捶心畢竟後來如何且聽下回分解
