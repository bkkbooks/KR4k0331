body:
  text: 第十八回五行生剋本窅然一氣靈通萬法圓噴水成江瓢可渡更於何處覓神仙話說蛋子和尚噴水成江瘸師將柳瓢擲下化成一葉扁舟要請縣令同登縣令看這船時從頭至尾沒八九尺長如何容得多人再三推辭不肯蛋子和尚讓張鸞先下坐在中間蛋子和尚在船頭瘸子在船尾三人向縣令拱手稱謝張鸞豎起殼扇如風帆一般長嘯一聲如飛而去眨眼之間船與水都不見了依舊堂下階前甬道塞門光景驚得縣令目瞪口呆恰似做了一個怪夢雖然求了一壇甘雨救濟萬民自卻擔下無限的小心驚恐不知是仙術還是妖術好難判斷怕他們又來纏擾便吩咐將五龍壇廢了三日之後各縣傳聞博平縣有個遊方道士立刻致雨他們也都在亢旱之際都紛紛的備禮來迎濮州知州也有文書下縣縣令淳于厚瞞不過了只得含糊將不識姓名僧道三人前後祈雨鬥法及登舟而去許多奇異事跡備細申文回復知州見請不來甚不歡喜各縣自去求雨不應見博平縣雨足都懷忌又來知州面前大家亂嚷道據文書所說分明一夥妖人縣官不該與他接洽誠恐情熟生變有纍地方知州聽了反將博平縣嚴飭著他體訪妖人姓名窟宅一面將事情申報樞密院去樞密院奏過朝廷東京地方廣闊恐有妖黨潛住為禍出榜曉諭遇有蹤跡詭異者即便報官不許隱蔽從此東京傳遍遊方僧道不敢入城後人有詩歎淳于厚之枉詩云陰謀忌嫉起同寮祈雨無功反坐妖只為畏途公道少高人直欲老漁樵話分兩頭再說張鸞三人乘坐著小船御風而行霎時到岸蛋子和尚引著張鸞先走瘸師後隨不多步到了一個所在茂林修竹鶴鹿成群中間閃出一座精緻茅庵來張鸞問道此是蛋師習禪之所蛋子和尚道平生不習禪亦無常所閒雲去住偶然而已張鸞歎服蛋子和尚向瘸師道張先生在此何不請聖姑姑相會瘸子仰面對月連叫三聲聖姑姑只見月中飛出一道金光忽地墜下變成一個老婆子那婆子生得蒼形古貌雪鬢龐眉頭戴星冠身穿鶴氅真個有飄然絶塵之姿張鸞已知是聖姑姑便上前道名稽首聖姑姑口稱先生慌忙答禮兩下各敘相慕之意聖姑姑看那張鸞身長八尺偉幹修髯面如噴血目若朗星丰神與凡人不同暗暗稱奇當夜月白如晝四人都進庵坐定上邊聖姑姑居首張鸞居次瘸子旁坐蛋子和尚在下相陪聖姑姑問道小女媚兒何處與先生相會張鸞便把十三年前淑景園中風吹媚兒下來直到胡員外投胎養育備細敘了一遍聖姑姑稱謝道若非先生始終用情吾女永絶人身矣又對瘸兒道可記得嚴三點之言乎真神醫也張鸞道莫非益州嚴半仙麼聖姑姑道先生也曾會來張鸞道貧道曾在東京一個宦家竊得一丸催生藥送與胡員外家媽媽度其産厄曉得是半仙堂嚴太醫家來的但聞其名實未會面瘸師道你們丟了正務不說卻講閒話張鸞方才問起貝州之事聖姑姑也把夢中遇見了武則天娘娘一段說話敘過又道此乃天數不可強也張鸞又提起胡家女兒王家后之語道今在胡員外家託生上半句已應了只不知王家后是如何聖姑姑道他日到貝州自有分曉張鸞道此事何時起手聖姑姑屈指道從此去一十五年真人方出先生乃第一起手之人幫助的尚該有幾位且看緣分如何大家去用心招引以成其功說話良久蛋子和尚喚小沙彌看茶裏面走出一個清瘦小沙彌捧朱紅托子托出杏子一盤比梨還大比橘還黃蛋子和尚道此臨淄所出金杏漢武帝最愛之至今士人稱為漢帝果聊當一茶之敬恰好是八枚金杏四人各取二枚食之只見小沙彌在旁看見衆人吃杏口內流涎把朱紅托子失手墮地打得粉碎蛋子和尚大怒一手提起小沙彌步出中庭拋向半天裏去在空中打滾張鸞方欲上前勸解只見那小沙彌從空中墜下一聲響亮直挺挺的跌在地下不動張鸞看時卻是一根齊眉短棒再看那朱紅托子乃是石榴花一簇聖姑姑喝道大匠面前何須弄斧這句話分明是說張鸞同是法師不可相戲張鸞道蛋師神通廣大非某所及也此時月色西沉東方將亮聖姑姑起身道老拙今往東京看女了不時相喚便得聚會說罷騰空而去張鸞等三人也一時俱散不知所之有詩為證茅庵夜月清如水偏稱幽人促滕談自去自來真自在如斯妙法幾人探再說東京胡員外請個學究先生在家教永兒讀書這永兒聰明敏慧勝於男子讀過的便會講過的便知看看長成一十三歲生得一貌如花又且寫算皆通伶俐無比多少一般樣的員外人家慕他才貌央人說合欲聘他為媳婦胡員外愛惜過了揀來揀去只是不就正是婚姻前注定遲早不由人不在話下且說聖姑姑自到東京在胡員外家前前後後串了好幾遍因是來無跡去無蹤他家那裏知道已自看見永兒長大聰明心中歡喜意把法術教導他想他處這般富貴好道了深閨繡閣如何相見便相見時他如何肯信心學不如使個神通把他家萬貫家財攝去弄得流離顛沛那女兒到十分窮困苦之際然後設法誘之無有不從不提聖姑姑再說胡員外家每年八月中秋整備酒席請陳學究玩月飲酒其年因永兒年長陳學究辭去了沒有外客吩咐備酒在後花園中八角亭子上至親三口兒賞玩那一夜天色晴明東方月色如一個玉盤堆起但見桂華離海嶠雲葉散天衢彩霞照萬里如銀玉兔映千山似水一輪皎潔能分宇宙澄清四海團圓解使乾坤明白影搖曠野驚獨宿之棲鴉光射幽窗照孤眠之怨女冰輪碾破三千界玉魄橫吞萬里秋胡員外早早打發解庫掌事的及主管各人回家賞中秋吩咐院子俱各牢拴門戶仔細火燭自己同媽媽永兒到後花園中八角亭上來坐下飲酒只用嬭子侍婢伏事並無三尺之童看看坐到一更天氣只見門公慌慌忙忙來報道員外禍事員外道禍從何來事在那裏門公道外面中間這個解庫裏火起員外和媽媽永兒吃那一驚不小都立下亭子來看時果然好大火怎見得這火大初如螢火次若燈光千條蠟燭勢難當萬個水盆敵不住驪山頂上料應褒姒逞英雄揚子江頭不若周郎施妙計氤氳紫霧騰天起閃爍紅霞貫地來樓房好似破燈籠土庫渾如鐵炮杖這火從解庫中起延入中堂內室若有一層層次第燒將入來還好做准備這火是聖姑姑使神通降來的天火能穿牆透壁倒柱崩梁就是炮杖上的藥線也沒這樣傳遞得快更兼刮起大風風隨火勢火趁風威必必剝剝只顧燒著員外跌腳叫苦呼神道喚祖宗一面教嬭子侍婢開了後門喚院子傳話云願出重償倩人救火一面教家中男女到內室裏面搶些細軟家私緊要箱籠那夥地方鄰里初時也有許多人掮撓鉤擔水桶似蟻螞一般緣梯上屋那裏救得滅一時間火頭透起如天摧地裂之聲衆人發聲喊都走了前後一周圍房子頃刻之間變做個煙團火塊男女們一個也進步不得媽媽和永兒抱頭而哭員外見他母子悲切倒去安慰道你兩個且不要慌便燒盡了也窮我們下半世不得那時只見火焰騰騰越冒越熾整整的燒了一夜三口兒只得在八角亭子上權歇等天曉起來叫人去爬火地盤衆人去爬開看開了口合不得睜了眼閉不得常言道人雖有千算天只有一算天若容人算世上無窮漢胡員外不想被這場天火燒得寸草皆無前廳後樓通路當房側屋都燒盡了只指望金銀器皿銅錫動用什物雖然燒煬了也還在地下收拾攏來還有個小小家私教人爬看時不料都被聖姑姑攝去上半世有福受用如今福退了滿地盤爬看並沒尋一絲兒處真個是百萬豪家一焰窮胡員外三口兒就在亭子上住下那夥掌事主管都辭去了家中男女們沒屋住沒飯吃只得都打發出去存幾個丫頭養娘不免轉賣與人因媽媽平昔吃醋撚酸使用的都是些下等花面丫頭就賣與人家也不值大錢況且財主的性兒還在受不得十分清淡除了煤炭之外其餘那一樣不要買的不多時手中用得罄盡了看看早晚三餐都不接濟親鄰朋友好意的送了一兩遍也索罷休又不免去借些米柴也只好一遭兩次一日三三日九半年周歲口內吃的身上穿的件件皆無央人作中情願將空地賤價賣與左右兩鄰卻又道天火燒過地十年沒生氣地經天火燒十年害枯焦有這些俗忌那個要他看看窮得襤褸走去求告舊時相識在家裏的只說不在平常裏認得的只做不認得街上撞著他把扇兒遮臉只當不看見自古道貧居鬧市無人問富在深山有遠親又道是行得春風便有夏雨胡員外平日問得一盤十得十盤百原是刻苦做家的人說起窮似他的一輩子不曾受過他一分恩惠若與他一般樣的財主常時你知我忌到今日還有喜談樂道的誰肯道個可憐二字就是說舊時相識總為他有錢有鈔才相扳來往的那裏有個管鮑心腹之交所以有行止的窮漢反有人持扶他起來沒下梢的富家往往一敗塗地那胡員外住在亭子上四下又無牆壁遇著晴天還好倘然風雨雪落怎地安身不免搬去不廝求院裏住就似如今孤老院一般時逢仲冬彤雲密布朔風凜冽紛紛洋洋下天好大雪怎見得這雪大但見紛紛柳絮片片鵝毛空中白鷺群飛江上素鷗翻覆千山玉砌能令樵子迷蹤萬戶銀裝多少行人腸斷畏寒貧士祝天公少下三分玩景王孫願滕六平添幾尺正是盡道豐年瑞豐年瑞若何長安有貧者宜瑞不宜多愛雪的是高樓公子嫌雪的是陋巷貧民在東京城都這個才落魄的胡員外原是大財主只因天火燒得落難蕩盡了家私搬在不廝求院裏住正逢冬天雪下三口兒廝守著火爐子坐地日中兀自沒早飯得吃媽媽將指頭向員外頭上指一指胡員外抬起頭來看見道媽媽沒甚事媽媽道大雪下屋裏沒有飯米我共你曾豐衣足食享用過來便今日忍飢受餓也是合當指著永兒他今年只得一十四歲曾見什麼風光來叫我兒吃恁般苦楚做爹媽的又於心何忍胡員外道沒奈何教我怎生是好媽媽道你是養家的人外面卻才雪下若一朝半日凍住了急切出去不得終不成我三口兒直等餓死你趁如今出去見一兩個相識告得三四百文錢歸來也過得幾日員外道近來世情你可也知道的今番我出去見兀誰是得媽媽道雖然如此一日不識羞三日吃飽飯你不出去終不成我出去胡員外吃媽媽逼不過起身道且把腰繫緊些個不知是一日半日的事即今的世界只有錦上添花那肯雪中送炭卻不是徒手擒虎易開口告人難你們且耐心著莫要看得十分便易說罷含著一包眼淚開了門出來走得兩步倒退了三步口裏說道好冷劈面寒風似箭侵人冷氣如刀被西北風吹得倒退幾步欲待回身轉來媽媽早把門來關上了沒計奈何只得蕩風冒雪而行走出不廝求院來告人不在話下有詩為證彤雲密布雪紛紛滿地瓊瑤路不分欲乞青蚨贍妻子眼前誰是孟嘗君胡員外要尋相識顧不得羞只得在舊宅左近街坊串走這市上人多有認得的見他來時點點搠搠道這便是財主的下場頭了也有那輕薄的卻低低唱道胡員外天降災好日去了惡日來又有曾在解庫內吃過虧的便道出戥輕入戥重假紋出真紋入世間只有開典當的欺心只願一個個像胡家老兒現世受報員外低著頭只顧走劈面撞著一個人手裏拿柄小傘叫一聲員外這雪天那裏去員外看時卻是舊時請在家內教永兒經書的陳學究先生陳善胡員外滿面羞慚作了個揖道不瞞學究家中實是艱難只得出來尋個相識則個陳善既道既是窘乏時如何不去投奔四牌坊下那一個人來胡員外問道是那個學究向他耳邊說了幾句話胡員外大喜拱手道全仗學究扶持攛掇陳善道當得當得就把胡員外扯向小傘底下一同遮蓋了胡員外趁著傘復身從舊路轉南向四牌坊門樓下投那個人原來那人姓糜名必達東京人氏原是個閒漢出身得了樞密院一個官員的心就扶持他做個提轄三年前要謀升遷缺少些使用因陳善是他的故友曉得他在胡員外家教書託他去借了三百兩銀子湊辦衙門管幹得升冀州都監之職做了二年有餘因與同寮不睦改調青州赴任順路帶家小上任看看回家才得兩日當初借契上曾有保人陳學究花押今日胡員外雖然燒沒了文契且喜保人見在況且是恩債萬無不還之理今日陳學究正去拜望有他引進卻不兩便所以胡員外欣然而去到得門首多少官身私身一出一入好不熱鬧也有管門的門公一見員外衣衫襤褸分明像個乞丐模樣咄喝起來誰肯放他進去陳教授分說也不作准只得把小傘與他教他權且站在街頭等我進去見了都監必然相請衆人又道街頭上站立一個叫化模樣的人壞他官府體面直趕得他在對門簷頭下去了卻說陳學究進廳去和糜都監相見敘了寒溫賀喜的話頭茶罷糜都監請陳學究到書房中寬坐陳善道還有個朋友在外面特來奉拜糜都監道是甚人陳善道原與都監有往來的叫做胡大洪糜都監道莫不是平安街上開解庫的胡員外麼陳善道然也糜都監道快教請進家童即忙傳話出去請胡員外進來相見門公道從不見有什麼胡員外到來胡員外在對門簷頭下聽得了便走過來說道只我便是胡員外衆人笑道走盡了四百軍州也沒見你這個員外你這副嘴臉也叫員外時像我們都該叫尚書了門公把他攔住不放進去胡員外便高聲叫起陳學究來只見宅裏走出一個老漢姓留名義是糜家的老蒼頭為人老實忠厚向來跟在任上近日方回當初糜必達在胡員外家借銀是他經手擔回也往來了好幾遍今日員外雖然改樣面龐兀自認得他便喝住門公上前迎住員外胡員外便將遇難的大略並今日來意對他說了留義道家主相請必有好情便引著員外到廳上來陳學究望見慌忙起身那糜都監看見是個襤褸窮漢便有欺他之意竟自坐定胡員外走近椅子邊恭恭敬敬的作揖道尊官久違了糜都監在椅上把手淺淺的一兜又依舊坐下問陳學究道此位何人陳善道便是胡大洪員外糜必達故意斜著眼睛覷了一覷便道一別三年竟不相認了也不另作個揖叫聲請坐又不看椅倒是陳學究半主半賓的拖把椅子在上面同坐了胡員外見糜都監不言不語只得先開口道在下有句不識進退的話奉告糜必達只做不知問道有何見教胡員外道當初三年之前在下還開解庫家事頗裕尊官曾立個券約與在下取銀三百兩契上加二起利尊官榮任冀州時在下並不敢啓齒近因在下命運窮困招了一場天火燒得罄盡寸草不留食缺衣單實難度日幸遇尊官高轉回府特來叩謁利錢已不敢計較只望見賜本銀與在下為營生之資恰似尊官見惠一般糜必達道下官初任提轄時曾借過百金使用也沒借許多到冀州一年本利都寄還了那裏又缺什麼銀兩胡員外道貴人多忘事實是三百金並不曾見還糜都監道既是未還必有借券取出來看便知員外道借券也被火燒了指陳學究道見有保人在此為證陳善道是學生經手的果係未還想都監錯記了糜必達變了臉道閒說常言道有文便不鬥口既無原券有何憑據你兩人口裏說三百就是三百若說三千就是三千麼陳善還只道他偶然忘記了便道都監休要執意天理良心有則有無則無請自慢慢思量胡員外陪著笑說道如今在下也不敢說三百二百但憑尊官齊發些便了糜必達大怒立起身來說道你兩個一吹一唱同謀同夥硬要人的錢鈔好沒來由你若有原契時三千兩也還你沒有原契休想半文破錢到手說罷一直走進內宅去了老家人留義先前見家主口氣不好只恐問他一句時有無難好答應預先躲過倒是有些良心的卻在大門口相等只見胡員外和陳學究氣忿忿的走將出來留義道員外休要著急容小人從容向家主再稟定有處置來了這半日想飢餓了若不嫌小人下賤請到店上吃三杯便屈教授同去一遭何如陳善一肚子氣那裏要吃留義的東西見胡員外面有飢色只恐自己辭了連纍他也沒得吃只得倒扯胡員外勸他同走留義便引著胡員外陳學究到左近處一個僻靜酒店內來胡員外這番真個是絶處逢生死中得救正是飽食三餐非足貴飢時一口果然難畢竟胡員外怎地回家去了且聽下回分解
