body:
  text: 第二十一回五雷正法少人知左道流傳世亦奇不作欺心負天地神通遊戲機仙根話説胡永兒耍著員外坐在板凳上凳便飛起直頂屋梁那時員外好慌看著女兒道這個是什麼法兒且教我下來永兒道告爹爹知道變錢米法兒都忘了只記得這個法兒救不得飢又濟不得急員外道好怕人嚇且放我下來則個永兒口中念念有詞喝聲道疾凳子便下來了員外道好險幾乎跌下來便不死也少不得青腫了幾處哩永兒道爹爹你真個要錢也否員外道我兒你説癡話爹媽兩三日沒有飽飯吃了不要錢也罷難道不要性命的永兒道既是爹爹要錢時去尋兩條索子來且變一兩貫錢使用員外口雖不語心下想道有心央女兒不著一客不煩兩主趁他心肯時節多尋些索子要他變幾百貫錢教我快活則個事發到官卻又理會到床頭處看時只剩得三條索子員外心上嫌少一徑走出巷來到大街相識的鄒大郎離貨鋪內問道大郎細麻索要大些一捆鄒大郎道什麼用的員外是老實人便道穿錢用的鄒大郎笑道員外又發財了有許多錢穿哩索子儘有數錢來便了員外道在下身邊不帶錢便將身上舊布氅衣脫下權時為當鄒大郎想道他買索子的錢也沒有那裏有錢要穿眼見是虛話他恁般貧困口食不周知道將麻索子去做什麼把戲明日弄出一場是非連纍著我便道小店本少利微現錢便賣這衣服休要脫下員外道寄下一時少停便來取贖鄒大郎那裏肯依員外只得下了階頭想著相熟的如此別家定然也是不肯的足見我命薄且把三條索兒先變三貫錢再處急急跑回院子裏來鑽進房裏在床頭忙忙檢看不見了索子媽媽和永兒看了忍不住笑媽媽道老無知你忙著什麼員外道我檢出三條索子在此如何不見了媽媽道我把與女兒變得三貫錢在此你又跑到那裏去來員外道我想著有心央女兒一遭多尋百十條索兒變些錢來長遠受用叵耐開離貨鋪的鄒大郎定要現錢才賣我脫這氅衣與他為當他再三不肯媽媽道你莫要利心忒重每日不脫一二貫錢在家也夠你下半世不求人了員外問錢在那裏媽媽道在被裏頭蓋著員外不勝歡喜便取赤狸果買柴明日又同媽媽去求永兒變錢自從這日為始永兒不時變些錢來缸裏米也常常有員外自己身邊也常有錢買酒食吃衣服逐件置辦身上也比前光鮮了一日員外出去買東西歸來永兒道爹爹我教你看件東西去袖子裏摸出一錠銀子來員外接在手裏顛一顛看約有二十四五兩重員外道這錠銀子那裏來的永兒道早起門前看見賣香紙老兒過車兒上有紙糊的金銀錠被我把一文錢買他一錠將來變成真的員外道變成百十貫錢值得什麼若還變得金銀時我三口兒依然富貴走到紙首鋪裏買了三弔金銀錠歸來看著女兒道若還變得一錠半錠也不濟事索性變得三二十錠也快活下半世永兒接那金銀錠安在地上腰裏解下裙子來蓋了口中念念有詞噴上一口水喝聲道疾揭開裙子看時只見一堆金一堆銀在地上胡員外看見歡喜自不必説了都是得女兒的氣力變得許多金銀員外看著媽媽和永兒商議道如今有了金銀富貴了終不成只在不廝求院裏住我意思想在熱鬧處去尋間房屋來開個綵帛鋪你們道是何如媽媽道我們一冬沒飯得吃終日裏去求人如今猛可地去開個綵帛鋪只怕被人猜疑員外道不妨有一般一輩的相識們我去和他們説道近日有個官人照顧我借得些本錢來問牙人買一半賒一半便不猜疑了媽媽道也説得是當日胡員外打扮得身上乾淨出去見幾個相識説道我如今承一官人照顧借得些本錢要開個小鋪兒你們衆位相識的肯扶助我麼只是要賒一半買一半望作成小子則個衆人道不妨不妨都在我們身上衆相識一時説了便去那當坊市井賃得一所屋子置些櫥匱傢伙物件揀個吉日開張鋪面雖説賒一半買一半其實只做個媒兒能收得許多貨物都虧得永兒在鋪中聽了要長要短便到裏面去變將出來因不費本錢所以但是一貫貨物只賣別人九百文加一相饒人都是要討便宜的見買得賤貨物又比別家的好人便都來買鋪裏貨物件件賣得員外不勝歡喜家緣漸漸的長鋪裏用一個主管兩個當值兩個養娘沒二三年一個家計甚是富足次第把平安街火發場空地依先造起屋來雖比不得舊時齊整一般有廳堂房室後園種植些花草正是頓開新氣象重整舊門風那時東鄰西舍都來作賀幾年斷絶來往的人家到此仍舊送盤送盒做相識來往胡員外住在八角亭上和那不廝求院裏將及二年賃房子開鋪又是三年共是五年還歸故里依然是個胡員外這才是黃河尚有澄清日豈可人無得意時有詩為證貧富升沈總運該家資攝去又還來憑誰寄語糜都監財主於今復有財別家店裏見他有人來買便疑道蹺蹊作怪一應貨物主人都從裏面取出來主管們又疑道貨物如何不安在匱裏卻去裏面取出來胡員外便理會得他們疑忌的意兒自忖道我家又不曾買卻是女兒變將出來的如今吃別人疑忌如何是好過了一日到晚收拾了鋪便進裏面教安排晚飯來吃養娘們搬來三口兒吃酒之間員外吩咐養娘道你們自去歇息我們要商量些家務事養娘聽了言語各自去了不在話下員外與永兒説道孩兒一個家緣家計皆出於你有的是金銀緞匹不計其數外面有當值的裏面有養娘鋪裏有主管人來買的緞匹生疑道只見賣出去不曾見上行從今以後你休在門前來聽了賣得百十貫錢值得些什麼若是露出斧鑿痕迹來吃人識破倒是大利害會把家計都撇了今後也休變出來了永兒道告爹爹奴家自在裏面只不出來門前聽做買賣便了員外道若恁地甚好叫將飯來吃罷女兒自往房裏去了自從當晚吩咐女兒以後鋪中有的緞匹便賣沒的便交去別家買先前沒的便變出來如今女孩兒也不出鋪中來聽了胡員外甚是放心隔過一月有餘胡員外猛省起來這幾日只管得門前買賣不曾管得家中女兒若納得住定盤星好倘是胡做胡為教養娘得知卻是利害當日胡員外起這念頭來看女兒來到中堂尋女兒不見房裏又尋不見走到後花園中也尋不見往從柴房門前過見柴房門開著員外道莫不在這裏面麼移身挺腳入得柴房門只見永兒在那空闊地上坐著一條小凳兒面前放著一隻水碗兒手裏拿個朱紅葫蘆兒員外自道一地裏沒尋他處卻在此做什麼又不敢驚動他立住了腳且看他如何只見永兒把那朱紅葫蘆兒拔去了塞口打一傾傾出二百來顆赤豆並寸寸剪的稻草在地下口中念念有詞含口水一噴喝聲道疾都變做三尺長的人馬都是紅盔紅甲紅袍紅纓紅旗紅號赤馬在地上團團的轉擺一個陳勢員外自道那個月的初十邊被我叮嚀得緊不敢變物事卻在這裏舞弄法術且看他怎地計較只見永兒又把一個白葫蘆兒拔去了塞口的打一傾傾出二百來顆白豆並寸寸剪的稻草在地下口中念念有詞含口水一噴喝聲道疾都變做三尺長的人馬都是白盔白袍白甲白纓白旗白號白馬一似銅牆壁一般也擺一個陳勢這柴房能有許多寬轉卻容了四百多人馬排下兩個陳勢還空得有戰場並不覺一分兒狹窄看得員外眼花撩亂如在夢中光景只見永兒頭上拔下一條金篦兒來喝聲變手中篦兒變成一把寶劍指著兩邊軍馬喝聲道交戰只見兩邊軍馬合將來喊殺連天驚得胡員外木呆了道早是我見若是別人見時卻是老大的事終久被這妮子連纍要無事時不如早下手顧不得父女之情員外看了十分焦燥走出柴房門去廚下尋了一把砍骨的蠻刀復轉身來卻説胡永兒執著劍喝人馬左右旋合龍門交戰只見左右混戰不分勝負良久陳勢走開赤白人馬分做兩下永兒把劍一揮喝聲收只見赤白人馬依先變成赤豆白豆寸草永兒收拾紅白葫蘆兒內了胡員外在背後提起刀看得永兒分明只一刀頭隨刀來尸首在地面上時有詩為證父子天性豈忍戕只妨妖法惹災殃可憐兩隊如雲騎不救將軍一命亡員外看了永兒身首異處心中又好苦又好悶又好慌便把刀丟在一邊拖那尸首僻靜處蓋了出那柴房門把鎖來鎖了沒精沒彩走出綵帛鋪裏來坐地心中思忖道罪過我女兒措辦許多家緣家計適來一時之間我見他做作不好把他來壞了也怪不得我若顧了他時我須有分吃官司寧可把他來壞了我夫妻兩口兒倒得安全他的娘若知時如何不氣終不成一日不見到晚如何不問著什麼道理殺了他胡員外坐立不安走出走入有百十遭到晚收了鋪主管都去吩咐養娘安排酒來我與媽媽對飲三杯員外與媽媽都不提起女兒兩個吃了五七杯酒只見員外嘆了一口氣簌簌地兩行淚下媽媽道沒甚事如何這等哭員外道我有一件事又是我的不是處你我夫妻兩個方得快活我看女兒做作不好一時間見不到把他來壞了恐怕你怪你不要煩惱媽媽道員外怎的説這話孩兒又做什麼蹊蹺的事員外把永兒變人馬之事從頭至尾説了一遍媽媽聽得説捶胸攧足哭將起來道你忘了三年前在不廝求院子裏住時忍飢受凍不是我女兒如何有今日你便下得手把我孩兒來壞了員外道單是我一時間焦燥卻也是為著身家所繫萬不得已你休怨我且看日常夫妻之面媽媽道你殺了我女兒我如何不煩惱媽媽又疑道適才我見女兒好好地在房裏如何説是壞了乃問道你是幾時殺的員外道是日間殺的媽媽道既是日間殺我教你看一個人媽媽入去不多時膊臂胳膊拖將出來員外仔細看時吃了一驚道正是我女兒日間我一刀剁了如何卻活在這裏嚇得員外肚裏慌張想道終久被這作怪的妮子連纍不免略施小計保我夫妻二人的性命只因員外動了這念頭有分教永兒弄得一段奇異姻緣鬧遍了開封一府正是一味平安方是福萬般怪異總非祥畢竟員外施出什麼計來且聽下回分解
