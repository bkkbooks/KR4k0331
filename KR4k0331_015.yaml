body:
  text: 第十五回才子佳人兩下貪姻緣錯配總難堪不如意事常八九可與人言無二三話說雷太監來到叔景園中張鸞引出胡媚兒來拜見了雷太監看見生得十分妖麗滿面都堆上笑來問道青春幾歲了媚兒道年方一十六歲雷太監雙睛覷定沈吟了一回連讚了幾聲好上馬而去少停便差個官身請張鸞到府敘話雷允恭在廳上相候報道張鸞到了慌忙下階迎接張鸞是個鑒貌辨色的心下想道他今日意思比平日倍加殷勤必有好處上廳坐定便問恩官呼喚有何臺旨雷允恭道適才見令姪女甚好才貌只是皇子年方十四歲令姪女的年庚反長恐難充妃嬪之選若只做宮人可不骯髒了鄙意倒有一說要與煉師做個親家不知意下何如張鸞道對親的是令弟還是令姪雷太監笑道並非弟姪就是下官本身張鸞道恩官是穿官近臣休得取笑雷允恭道鍊師有所不知我們雖然淨過身的七情六欲卻與常人一般夜間冷靜不過常想要個對頭同睡每當寒天冷月教個小廝抱背抱腳沒甚意思也有結識個娼家外宅時時作伴到底不是常法縱好而不妙不如娶下一房長久相處豈不美哉張鸞道這事可做得麼允恭道內宮娶妻前朝都有故事漢朝石顯有妻有子唐朝高力士娶妻呂氏李輔國娶妻元氏見於史冊可據煉師休得推辭下官看過曆日明日是個結婚之日上午納些薄聘晚間便來親迎有煩煉師做主先與令姪女說知過門之後只圖個富貴受用罷了張鸞見他十分執意心雖不樂口中只得應允別了雷太監回到淑景園中將此話對媚兒說了媚兒道叔叔將奴嫁個太監有甚出息張鸞道我也是這般想來只是他現在有權有勢違拗不得你但放心去時我自有道理當日無話到次日雷太監家早上便掛起紅綵大吹大擂准備做親筵席上午先去行聘聘禮是金鳳珠冠一頂大紅紵絲蟒衣一襲小團花碧玉帶一條金叉二對金釧二對其餘隨身一應新衣件件成雙花紅羊酒不必細細說了把張鸞寓中擺得甚是錦片一般有詩為證花紅羊酒儘鋪陳太監今宵喜結親有勢有財胡亂做世間多少獨眠人至晚雷太監蟒衣玉帶乘匹紫騮馬押著五綵花輿笙簫鼓樂往園中來親迎那時張鸞將新汗衫一件捻訣書符口中念了些咒語教媚兒穿了就把這口訣傳與了媚兒但是要穿時念個鎖身咒若要解時念個脫衣咒媚兒都會了當下裝扮得天人相似上了花輿隨雷太監去了張鸞送出園門自回卻說雷太監同媚兒交拜成親也沒個丫頭老嬤服侍只是些小內侍們攜了燭花雙雙引入洞房交杯飲酒此時天氣尚寒雷太監房中鋪下紅氍毹地衣張著貂鼠帳幔錦衾繡褥百事奢華上床時節一般的也會說幾句勾搭話兒只有一件奇事媚兒卸了花冠繡襖解到貼肉汗衫再解不開分明是生成的皮膚一般連下截小衣都被衫兒裹定便是雷太監自來動手也只看得便只得和衣睡了討不得粘皮貼肉親近一番此是張鸞的法術次日侵早合府的官身私身閒漢都來磕頭要參見夫人雷太監都辭了吩咐小內侍們且稱他是新娘莫叫破夫人惹人笑話少停張鸞也上門賀喜雷太監請入書房坐下告訴出這段怪事來張鸞道此是緣法不到或者恩官尊造第七宮中別有良姻舍姪女沒福服侍雷太監道且看今夜如何當下留張鸞一席酒飯而去到晚臨睡時媚兒脫衣依舊如此原來雷太監最好受用他在錦繡叢中滾出來的線結兒也捱不得一個在身上捱著時便是個大疙瘩只為愛那媚兒的容貌陪他和衣睡過一夜分明受了一夜苦楚第二晚再成不得了只得各被各頭到第三晚另收拾個房戶送媚兒自睡張鸞也知道相處不來必然退出誰想他心下雖不喜歡卻又捨不得打發回去張鸞心下躊躇道這事我又不好開口怎麼處如今我且傳下媚兒一個真容以後覷個方便設個法兒就勸他獻與主上倘得召幸或者博個封號強如無名無目做太監的乾老婆當晚行個請仙傳真法看官你道怎樣法兒如要傳某人真容打掃一間潔淨房子桌上預備紙筆及各樣顏色安設酒果供養寫一道細細的情節疏頭和請仙符攝魂符焚了念請仙咒攝魂咒各一遍將房門鎖閉其人不拘遠近能攝其生魂到來畫畢方去生者當時只如啽囈一般便是遠年死鬼亦能攝其遊魂與生時不異所以形容態度傳得逼真畫仙一到便聽得筆墨亂動到放筆聲響此仙已去徐徐開門進去真已傳就大抵請詩仙者來的多分是能詩之鬼請畫仙者來的是能畫之鬼若偶然遇得真仙下降詩必入妙畫必通靈那晚張鸞就在媚兒臥房之中如法請下畫仙到夜半聞得放筆之聲張鸞開了鎖進去看時畫得雙頰如花秋波欲溜猶如活的一般上面草書僧繇筆三字乃知是晉時張僧繇下降所謂僧繇畫龍不點睛點睛龍飛飛上天便是此人真仙筆也張鸞歡喜次日用絹紙裱個小小軸兒懸掛內室只等雷太監再相會時討他聲口便進說詞去說他了卻說媚兒在雷太監家沒瞅沒睬從這一夜打個囈掙到朝來覺得昏昏悶悶自覺精神減少便問小內侍道這裏可有會說平話麼小內侍道有個瞿瞎子最說得好聲音響亮情節分明他就在本府簷頭居住媚兒道你與我喚來消閒則個小內侍稟知了雷太監將瞿瞎子喚到扶入中堂免他行禮把一張小桌兒一個小杌兒教他坐於檻外媚兒坐於中間垂簾而聽吩咐不用命題只揀好聽的便說瞿瞎子當下打掃喉嚨將氣拍向桌上一拍念了四句悟頭詩句說入正傳原來說的是紂王妲己的故事說起來妲己是紂王聘來的一個美人迎至中途一陳狂風天昏地暗從人都驚倒了風過處掙扎起來看時只有妲己端坐不動紂王道他有福分立為正妃十分寵幸卻不知那妲己已不是真的是個多年玉面狐狸精起這陳怪風攝了美人開去自己卻變做他的模樣百般妖媚哄弄紂王紂王只為寵了這個妃子為長夜之飲以酒為池以肉為林誅殺諫臣肆行無道其時萬民嗟怨惹起周武王興師伐罪破紂王於牧野殺妲己於宮中就說了一番又念四句詩詩曰盡道商王寵幸殊豈知妲己是妖狐假饒狐智能賢達還勝人間呂武無媚兒聽了歎口氣道古人云人生不得逞胸臆雖生百歲猶為夭若得意一日死而無怨便教取一貫錢賞了瞿瞎子去了心下想道同一般狐媚他能攘妲己之位取君王之寵我之靈幻豈不如他乎其夜獨宿房中他夢見自家選入皇宮蒙朝廷十分寵愛冊為皇后宮娥簇擁富貴非常母親聖姑姑封為國太哥哥左黜亦拜大官一門貴戚榮盛無比猛然覺來乃是南柯一夢紗窗上日色通紅了只見小內侍捧著一個洗臉銀盆放在朱紅面架上稟道今日是第三遍大選皇妃老公公侵早便往禮部去了請新娘起來梳洗早膳小的們服侍過也要給個假去看一看媚兒道我身子困倦且不梳洗你們要去看時自去這班小廝們得了這句話分明村裏先生放學一夥子都跑了媚兒道既是第三遍大選合城美色都聚在一處我也去看看是怎麼樣兒起來梳洗對著明鏡道似我這般顏色便人類中也稀少卻困守此地可不枉了我心靈性巧將一幅青布齊眉裹頭裝做村姑模樣把房門拴了使出舊時狐精伎倆從房後踰牆而出開了後門一溜煙走去直到禮部門首也擠在人叢中來只見衙門大開遠遠的望見雷太監和禮部官員都坐在堂上一班官媒婆引著各良家女子過堂上面照冊點名從東角門進西角門出也有貧戶愛女的父母自家跟隨在門外伺候也有官家小姐整隊家人養娘跟著來總數何止百人都是十三四歲的其間眉清目秀紅唇齒白的也儘多只沒有個超群的嬌姿出尖的美色媚兒一一看了道古來說佳人難得一個花錦東京人才也只如此矣衆人捱捱擠擠下午方散媚兒躲在土地堂中至晚竟不回家發個癡念頭要往朝廷大內遍看三宮六院如何富貴你道他為何發這癡念頭一來被仙筆傳下他的真魂因此精神顛倒二來有王家后三字在肚內打攪聽了妲己的故事越發心中發癢按捺不住乘夜溜入皇城雖然妖狐幻惑來不知跡去不知蹤但那皇城裏面比民間不同不是頑處他見前門侍衛嚴緊也未免心懷恐懼不敢闖入轉到後宰門原來一夥子匠人修葺御花園恰好做工完了太監在那裏審問工頭什麼說話打著兩盞紗燈兩個火把照得白日一般媚兒乘鬧中溜進徑入御花園行了多時猛見宮中牆垣高峻難以踰越又打個寒噤且坐下躊躇則箇忽然想起皇太子獨居東宮血氣未定倘然討得相見必有憐愛之意聞得他又是赤腳大仙轉生骨氣非凡若取得他一點真元又落得一節便宜了轉步向東迤邐而進過了金水橋想要在御溝中鑽進一來怕他水深二來有銅柱隔絶不便只得又向前行聽宮漏正打夜更月尚未起只見遠遠的數點火光急跑上前去望時卻是四五個小太監提著紅紗燈兒做夥出來出恭媚兒道他既有門而出我不怕無門而入趁火光悄地看時果然有個角門開著媚兒捱身進去觀個便處爬上屋簷過了幾層院子只聽得下面讀書之聲媚兒且不下來在屋上揭去幾片琉璃瓦挖開望板向下張看原來這去處叫做資善堂是皇太子讀書之所這皇太子生性聰明好學雖然夜深兀自秉燭而坐幾個內侍們四下倚檯靠壁東倒西歪都在打瞌睡媚兒道此機失了更待何時便從窟隆中飛身而下瞧見後堂幾個老宮人守著茶爐在那裏煎茶桌上擺著剔漆茶盤及銀碗金匙之類媚兒去了兜頭布兒把嘴臉一抹變做年輕美貌一個絶色的宮娥忽地偷得來一個盤茶一個銀碗吐些涎沫在內口吹氣變成香噴噴的熱茶原來狐涎是個媚人之藥人若吃下便心迷意惑不拘男女一著了他道兒任你魯男子難說坐懷不亂便露筋祠中的貞女也鑽入帳子裏來了媚兒捧了茶盤妖妖嬈嬈的走出後堂恰待向前獻與皇太子忽見皇太子背後閃出一尊神道怎生模樣的有臨江仙為證眉似臥蠶丹鳳眼面如重棗通紅鋼刀偃月舞青龍戰袍穿緑錦美號是髯公一片丹心懸日月扶劉佐漢成功神靈千古播英風馘魔稱上將護國顯神通這尊神正是義勇武安王馘魔上將關聖從來聖天子百神呵護這日正輪著關聖虛空護駕見媚兒施妖逞幻看看上交了聖心大怒便顯出神威將青龍偃月刀從頭劈下媚兒大叫一聲撇了茶盤望後便倒皇太子聽得狐吃了一驚內侍們都驚醒了攜著畫燈四處照看只得一個牝狐頭腦迸裂死於地下衣服如蟬蛻一般褪在一邊亂起衆人打著行燈火把只怕還有狐黨在內前後都照一遍絶沒影響正不知那裏來的當夜將狐尸抬出後面明早太子入宮奏過聖上命司天監占其吉凶司天監奏道狐妖冒人衣服時常有之但皇宮內地何從竊入此非常之妖也昨日是尾火狐值日適有狐怪宮中宜慎防火災然狐死似有鬼神擊之此乃皇太子千秋之福亦不為大咎矣後來火災不驗天子亦不追究後人有詩云浪說司天據理真其中裨是何人只將泛語尋常應宣室何曾問鬼神話分兩頭再說雷太監這晚從禮部回來教請新娘陪伴飲酒小內侍稟道新娘從早閉著房門至今未開叫喚亦不答應不知何故雷太監自去敲了幾下又喚了幾聲裏面寂然發起性來叫把房門打開床上床下都看到何曾有半個人影心下想道他見我待得不甚親密或者逃走去了只是女兒家弓鞋襪小這般牆垣又沒個梯子如何去得躊躇了一回又道他便去也只在他叔叔那邊教人去看就知端的便差個官身連夜往淑景園張鸞寓所看新娘在否張鸞見官身到來道其來意張鸞大驚道你家老公公差矣我姪女既嫁了他生死是他家的人了女孩兒家往那裏去少不得只在老公公家裏終不然不見了一個又要我賠一個不成官身領著言語自回復去訖張鸞當晚心下懷疑把門閉了即便書符念咒要攝媚兒的靈魂到來審問平昔間符到魂來這番偏不應驗張鸞叫聲怪事便向媚兒真容前重復凝神注想了一會再焚一道追魂符只見一陳冷風過處畫中嚶嚶的似有哭聲忽地走將下來正是媚兒的妖魂扯住張鸞大慟張鸞勸止了他問其緣故媚兒告訴道妾今不敢隱蔽實乃雁門山下狐精也隨母親聖姑姑雲遊求道中途遇風變刮來此地蒙仙官收養視同骨肉感恩非淺不意為雷家強娶耽誤終身前宵啽囈一番自覺精神耗散昨聞禮部選妃偷身去看自念紅顏不落人後便潛入皇宮希圖蠱惑不意陰中觸了關聖之怒攖其刀鋒即將妾魂牒送酆都問罪妾再四苦求蒙關聖稽查簿籍道妾冥數合得人身他日發跡貝州有中宮皇后之分即今月內該往本地胡員外家託生正待釋放恰遇仙符幾番見召遂至於此方知妾之魂已在圖畫之中今三魂再得團聚仗仙官之力將畫送入胡員外家便是妾之生地矣他日貝州之事仙官亦是有名人數倘遇我母親聖姑姑幸寄一信說罷依然走在畫上去了張鸞因想起媚兒被風刮來之時他曾聞空中神語兩句道胡家女兒王家后送與沖霄處士受我只道他本是姓胡原來還有胡員外家託生一節據那王家后三字已不是趙家媳婦不知貝州之事又是如何我在江湖上也聞得有個聖姑姑神通廣大此時正不知在那裏若會了聖姑姑這話自然明白了那晚想了一夜次日侵早雷太監親到園中只怕張鸞尋他要人便自己先來與他陪話張鸞不對他說明只將套話兒支吾答應求他用心尋訪少停滿京中傳遍說昨夜有個牝狐死在東宮資善堂今早畚出後宰門去了張鸞肚裏已自了了暗暗的稱奇那雷太監如何想得到媚兒身上只吩咐官身私身閒漢等四下尋訪出一千貫文充賞這些衆人當一場生意見神見鬼東捱西問那有消息正是水中撈月何曾有海底尋針畢竟無不在話下再說張鸞早飯後打扮得齊齊整整頭戴鐵道冠魚尾模樣身穿皂沿邊烈火緋袍將媚兒真容捲起放在一個荊筐籃中左手提著籃兒右手拿著殼扇聞知胡員外住在平安街上徑奔這條路來正是白雲本是無心物卻被清風引出來畢竟張鸞怎生把這畫送入胡員外家且聽下回分解
