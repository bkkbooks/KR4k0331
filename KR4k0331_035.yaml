body:
  text: 第三十五回學些伶俐學些騃伶俐兼騃是大才騃無伶俐難成事伶俐無騃做不來話說胡永兒先前引兵攻打州縣之時軍中擄掠得人口內中有個小廝生得十分清秀永兒一見便喜問他經歷答道姓王名俊年方一十三歲父母雙亡隨著外公出來避兵不意中途失散被擒到此望娘娘饒命永兒見他言辭敏給容色可憐又與王則同姓收在帳下為養子出入不離甚是憐愛王則見了也自歡喜教外人都稱他做小王子不覺過了二年那小廝一十五歲越長成得好了怎見面如傅粉體似凝脂脣若塗朱目如點漆身才秀溜是未經嚙破的幸童態度妖嬈像不曾戴髻的美女賦性清揚真自喜出詞儇利得人憐馬上共驚挾彈子主家重見賣珠兒胡永兒朝夕相傍倒看上了他與他私下成就了好事原來婦人家只是初次廉恥要緊難好破例壞事到得開手時一不做二不休連自家也息不得念頭了永兒初時跟著聖姑姑行動風雲作伴山水為家半像個出家人樣子這個道兒是不想著的如今住在曲房深院錦衣玉食合著了俗語飽暖思淫慾這句了眼見得宮中翠袖成群蛾眉作隊自己只守著一個王則況且他有三妃六嬪不得夜夜相聚看了粉粧玉琢這般個小廝能不動情這小廝竭力奉承爭奈永兒淫心蕩漾不滿所慾這小廝乖巧但出外見個美男子便訪問他姓名進與永兒永兒自會法術便攝他到偽宮中行樂中意時多住幾日不中意時就放他去了自古道若要不知除非莫為若要不聞除非莫說王則與永兒同窩居住便道不曾親眼看見難道沒些風聲吹在耳朵裏面一夜間吃得爛醉忽想起這事怒氣勃發提了一把青銅寶劍到宮中來殺永兒步至偽宮門前忽然轉個念頭道事不三思終有後悔這一套富貴都是永兒作成的怎好負他況且他神通廣大若殺他不得反壞了面皮不好相處轉到別院將寶劍擲在地下嘆了口氣自去睡了恰好聖姑姑這幾日正在聖母行宮王則次日早起一逕來見聖姑姑敘了些閒話王則便道近來仗托洪庇地方倒寧靜只是訪得民間婦女多有私下養著漢子的敗壞風俗今如何處置他聖姑姑道凡男女相就都是夙世姻緣如做夫婦的是正緣私合的也是旁緣還有一節七情六慾男女總則一般女當為節婦男亦當為義夫男子三妻九妾兀自嫌少如何怪得婦人況且婦人讓著男子只為男子治外一應事體是他做作婦人靠著他現成吃著故所以守著男子的法度從一不亂若是有才有智的賽過男子他也不受人制人也制他不得你且說漢帝劉邦誅秦滅項何等英雄任看呂太后在宮中胡作胡為全然不管他也不把呂后當作個尋常女子看成人生世上得意難逢趁著時好運好得便宜處且便宜得快活處且快活此等閑事非達者所當經心也只這一席說得王則嘿然無語辭別回府想著聖姑姑說話亦自有理從今以後我也莫管他他也莫管我各盡其樂豈不美哉當下召張琪任遷等教他一路察訪民間美色不拘有夫無夫只要出色標致不一日張琪訪得本州關家莊關疑之妻趙無瑕年方二十歲姿色無雙王則就教張琪領兵取來觀其顏色如何張琪領三百軍人圍住關家莊立要趙氏關疑又不在家慌得他一門老小躲了趙氏道賊徒慕我之色而來我若不挺身出去倘被進門搜索反為不美乃取解手刀一把藏在身邊自出中堂來見張琪張琪見他果然天姿美色心中大喜便欲拖他上馬趙氏大喝道將軍不得無禮將軍此來取妾去者還是自要還是郡王要張琪道王府聞娘子美色特遣小將相迎此去富貴非常切勿遲疑趙氏道既是郡王要妾須郡王自來妾有話相對若郡王不來妾雖死亦不去也張琪單馬去飛報王則王則乘了一匹五花驄引著偽府中親隨親自到關家莊來看了趙無瑕真個比花解語比玉生香吳宮西子不如楚國南威遠遜王則大驚道原來世上有這般女子可上前與寡人攀話趙無瑕口稱萬福不慌不忙的說道大王為一方之主侍巾櫛者必須香閨淑質繡閣嬌姿如妾陋貌殘軀不足以辱後宮願大王以綱常為重恕妾一身大王陰德必當享年千歲王則道寡人所愛是你的顏色即當立你為后休得閒話趙氏再三求告王則只是不允趙氏料道不免大罵道你這反叛賊徒如魚游釜中不久亡滅還要污人妻子我恨不得一刀砍下賊人之頭豈肯從汝哉身邊拔出解手刀便欲自刎眾人搶得快做不成手腳趙無瑕罵不絕口只求速死王則心中不忍吩咐張琪散了眾軍只留五十名壯士環守著他務要勸他隨順如執意不從滿門斬首王則自回偽府中去了卻說趙氏被張琪同壯士看守一日一夜求死不得心生一計便道大王真心要妾妾何敢執迷以害妾全家之命但妾頗讀書知禮若以威相逼雖死不從妾有老姑在堂丈夫在外須待他一面而別另居他室擇日禮聘庶妾無苟合之羞大王亦免強婚之議望將軍善言傳達張琪又將這番說話飛馬傳去王則依允著他婆婆看守只不許他夫妻相會來日便要聘娶入宮張琪喚他婆婆出來把媳婦交付他身上倘有差池全家不保五十名壯士分守著前後門不容他丈夫回家相見原來關疑已自回了見說家中有這一節事不敢進門只在左近人家住下含著眼淚打聽消息那婆婆也只怕兒子回來被軍人所害悄地寄信叫他不要回來當晚婆媳兩個割捨不得抱頭而哭趙氏收淚對婆婆說道媳婦今日不難一死只恐連累婆婆但媳婦到彼偽府必然自全節操婆婆可預先收拾細軟家私約會了丈夫待妾起身之後作速逃竄東京以避賊人之害媳婦與丈夫雖做了兩年夫婦並無生育丈夫年紀正小前程萬里自然別有良緣只恨媳婦薄福奉侍婆婆不了到今生死之際又被賊徒隔絕不得與丈夫一面指上金戒指二枚煩婆婆寄與我丈夫做個憶念說罷放聲又哭正是世人萬般哀苦事無過死別與生離縱教鐵漢應魂斷便是泥人也淚垂婆媳兩個這一夜眼淚不乾泣聲不絕捱到天明婆婆真個吩咐王娘收拾得兩包細軟金珠又寄信與兒子教他預先遠遠的覓一輛小車兒准備走路且說王則將聘娶的事都託在張琪身上張琪侵早先到關家莊巡哨了一遍打聽得夜來無事歡喜不勝少停聘禮已到黃金白金各四錠黃的每錠重四十兩白的每錠重五十兩綵帛二十端雙羊雙酒大吹大擂送上門來排設在中堂婆媳兩個重新哭起婆婆這些東西分明是買我身上的肉我何忍要他趙氏道今日雖買婆婆的肉他日好買那賊徒的肉婆婆道怎麼說趙氏道這賊徒少不得天兵到來拿住解去東京千刀萬割你把這金銀留著到那時送與劊子手在刀頭上買他一塊肉來祭你媳婦我在泉下也得快活莫說婆媳二人悲傷之事再說張琪催那婆婆收了禮物自己又去催趲取親人從一百名偽府親軍金鼓旗槍前導二十來個宮人都乘著寶馬捧的是金冠繡蟒玉帶紅袍一般有偽內臣執了龍鳳掌扇引著香車細輦十來隊樂人吹打只要奉承趙氏歡喜所以儀容極盛趙氏別了關家祠堂又拜了婆婆四拜又望空拜了丈夫四拜哭了一場登車下簾眾人一擁而去那婆婆哭倒在地養娘喚醒關疑知道妻子起身方敢回家已自哭得不耐煩了忙忙的收拾行李棄了家私同養娘扶著婆婆潛地逃入東京去訖再說王則聞張琪報道新人已娶來了喜從天降慌忙大排儀仗親出府門迎接軍士們人人望賞個個生歡做兩行排列讓香車進府王則親自開簾不見動靜抱將出來看時頸上繫著羅帛原來在車中密地自縊真烈婦也史官有詩讚曰罵賊非難紿賊難夫家免禍九泉安似玆賢智從來少不但芳心一寸丹後人又有詩云罵賊曾聞元楷妻從客就義更稱奇衣冠多少偷生者不及清河趙與崔清河就是貝州之地隋末時有個崔元楷元楷之妻罵賊而死此詩是表彰二烈婦之大節男子不及也王則這晚一場掃興想道婦人性烈不干眾人之事將屍首著張琪給歸原夫追還聘禮次日張琪聞知關家逃走去了稟過王則葬於城外王則出榜但是民間美色或父母獻女或丈夫獻妻者俟選中者官給聘禮百兩倘藏匿不獻致被他人首出即治本家之罪於是奪民間妻女不計其數百姓討了個有姿色的老婆便道是不祥之物若討得醜的反生歡喜當時有個口語道莫圖顏色好醜婦良家寶休嫌官不要夫妻直到老至今說醜婦良家之寶語起於此胡永兒明知王則貪色恣慾到也由他但是自己有些私事不要王則進宮把一隻金簪插在檻外繞屋便像千圍烈火把一隻銀簪插在檻外繞屋卻似一派大水外人寸步難進閒常沒事時收了法術或是請王則到宮相聚或是王則自來夫婦依然歡好虧殺他夫婦貪淫戀色墮了進取之志也是氣數只到得如此彈子和尚見王則所為不合天理久後必敗無成竟自不辭而去了左黜自恃國舅凡事姿意施為張鸞卜吉雖在其位全無權柄到落得清閒受用吳三郎改名吳旺和張琪任遷都討了個地方做了知州之職享用富貴時常領兵寇掠鄰境搶擄些子女財帛貢與王則只為奸臣夏竦蒙蔽朝廷養成了這般大勢任那一方百姓受苦只是隱匿不奏一日仁宗皇帝御駕往西太乙宮行香禮畢正欲還朝忽然百宮隊裏走出個新參御史那人姓何名郯上前快走幾步一手扯住御衣伏地大哭仁宗道卿有何屈事奏與朕聽朕當為卿申理何郯奏道沒甚屈事只可惜太祖皇帝四百軍州看看侵削陛下枉有堯舜之資將來不免桀紂之禍也仁宗大驚道卿何出此言可細剖之何郯奏道西夏反了趙元昊邕州反了儂智高無人收伏今貝州又反了王則河北一路皆為賊巢陛下不思選求良將討賊安民竊恐輿圖日蹙天下非復趙家之有矣仁宗道朕已命范雍征討元昊楊畋征討儂智高未見次第貝州兵變當時便遣冀州太守劉彥威平定卿言從何而來何郯又奏道范雍年老為元昊所輕楊畋久出無功虛耗糧草貝州反賊王則殺得劉彥威片甲不回稱王僭號河東地方都震動了告急文書雪片到京都被樞密院使夏竦隱匿不奏陛下不誅夏竦天下不得太平此時夏竦也在駕前嚇得面如土色支吾不敢仁宗大怒道夏竦奸臣朕委你執掌兵權不思報效欺君誤國本當斬首姑且革職為民夏竦滿面羞顏只得謝恩去了仁宗又問道方今何人可任樞密使之職何郯奏道只今天下聞名剛正無私的無如包拯此人昔年曾任開封府尹治得一清如水只為不肯依附夏竦棄官而歸陛下若欲選求良將削平三處大寇只消起用包拯他所薦舉無有不當仁宗大喜准奏即日起召包龍圖陞為樞密使之職包拯在家聞召連忙起身到東京面君謝恩已畢仁宗問道今西夏廣南河北三處反叛卿有何良策定國安民包拯奏道以臣愚見范仲淹可專任西夏狄青可專任廣南文彥博可專任河北陛下要天下太平除非委此三人可責成功仁宗道河北只是一個軍卒鼓譟如何恁地利害包拯奏道王則不足道他有一班妖賊幫助能興妖法仁宗道彥博年已八旬卿如何獨舉薦他包拯奏道臣聞童謠有云八隻眼兒嗔巍然三教尊天神為將鬼為軍不怕武只怕文王則則字旁是貝字又貝州俱是八隻眼之義妖人中僧道俱有獨奉王則為主故說巍然三教尊神將鬼軍乃妖術也這一般人武有餘而文不足故說不怕武只怕文今著文彥博去正合著這句讖語又見貝字著一文是個敗字臣所以不薦他人獨舉彥博且彥博雖然年老精力不衰才智過人老成持重若此人一去王則必敗無疑矣仁守天子聞奏大喜連降三道詔書令使命分頭去召三人連夜赴京擢用有詩為證夏竦奸邪太不仁欲將一網盡賢臣但有忠佞分明日便是邊疆息戰塵不說范仲淹狄青二人之事就中單表文彥博此人乃河東汾州人氏年少曾討西番有功累官做到首相因與夏竦不合固求去任罷為西京留守年已七十九歲精力勝如二三十歲的後生使命領敕星夜到了西京文彥博并本州大小官員出郭迎接聖旨至州衙裏開讀罷各官望闕起身謝恩文彥博領了詔令別了家眷兼程而行不一日到了東京官員都在接官廳伺候迎接入城次日早朝隨班見帝怎見得早朝但見祥雲迷鳳闕瑞氣罩龍樓含煙御柳拂旌旂帶露宮桃迎劍戟天香影裏玉簪珠履聚丹墀仙樂聲中繡襖錦衣扶御駕珠簾捲黃金殿上現金輿鳳扇開白玉階前停玉輦隱隱淨鞭三下響層層文武兩班齊當日仁宗天子召文彥博至面前聖旨道河北貝州王則造反今命卿為元帥收伏妖賊當用人馬幾何副將幾人任卿便宜酌處文彥博奏道臣聞王則一黨也是妖人若人馬少恐不能取勝臣願保舉一人為副將得十萬人馬方可以克敵仁宗道軍馬依卿所奏但不知保舉何人為副將文彥博奏道臣乞曹偉為副將仁宗道這曹偉莫非是下江南第一有功封王的曹彬的子孫麼文彥博奏道正是曹彬嫡孫仁宗聞奏龍顏大喜命宣曹偉見駕仁宗當殿封文彥博為統兵招討使曹偉為副招討使撥賜內帑金銀錢帛犒賞三軍二人謝恩出朝便去各營點兵發馬樞密使包拯具酒送行私對文招討說道老相公此行定成大功但賊人中有一妖僧叫做彈子和尚此僧變化多端相國可以預備文招討道多承指數三杯酒罷包拯別去文招討即日離京上路渡黃河直抵河北界上軍馬就於冀州駐紮真個是人人欲建封侯績個個思成蕩寇功畢竟文招討征伐貝州勝負如何且聽下回分解
