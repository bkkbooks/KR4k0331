body:
  text: 第二十二回多言人惡少言癡惡有憎嫌善又欺富遭嫉貧遭辱思量那件合天機話說媽媽一隻手牽著永兒臂膊出來永兒見了爹爹背轉了臉道個萬福對娘道爹爹沒甚事叫孩兒出來做甚說罷依舊進房去了胡員外親眼見了女兒好生生在那裏到是滿面羞慚開了口合不得又被媽媽搶白了一場員外只得含糊過了一夜次日早起走去開柴房門看時嚇得員外呆了只見刀在一邊剁的尸首卻是一把株笤帚砍做兩截員外道昨日明明是我下手的如何卻是笤帚似此成妖作怪決留他不得了只教他離了我家便了員外躊躇一日到晚來與媽媽夜飯便商議道常言道男大當婚女大須嫁如今永兒年已長成只管留他在家不是長久之計他的終身也是不了媽媽道今日家計都是女兒掙的何忍推他出去況且你我膝下並無第二個人還是贅一個女壻在門幫家過活你我也得個半子倚靠員外道媽媽我初意亦是如此只是女兒從幼嬌養慣了好的是頑耍便趕開養娘把柴房中豆人草馬爭戰之事述與媽媽聽了似此弄手弄腳倘然落在別人眼裏說將出來可不斷送了你我的性命不如擇個良姻緣嫁出去在公婆身邊到底不比自家爹媽少不得收斂些過了三年五載待他年長老成連女壻收拾回來可不兩得其便只這一席話哄過了媽媽便應道員外見得也是次日天明便叫當值的去前街後巷叫得兩個媒人來當值的去不多時叫得兩個媒婆兒有一首小詞名駐雲飛單道做媒婆的行徑堪嘆媒婆兩腳搬來疾似梭八字全憑做年紀傳來錯喳舌上弄風波將貧作富撮合成交那管終身誤只要男家財禮多只望花紅謝禮多那兩個媒婆一個喚做快嘴張三嫂一個喚做老實李四嫂兩個來到堂前叫了員外媽媽萬福媽媽叫坐了請茶茶罷安排酒來相款張三嫂起身來告媽媽和員外道叫媳婦們來不知有何使令員外道且坐你二人曾見我女兒麼張三嫂道前次曾見小娘子來好個小娘子員外道我家只養得這個女兒年方一十九歲要與他說親特請你二人來商議則個張三嫂道謝員外媽媽照顧媳婦既是小娘子要說親事不知如今要入贅卻是嫁出去胡員外道我只是嫁出去李四嫂道若要嫁出去時這親事卻有員外取出二兩銀子來道權與你二人做腳步錢若親事成時自當重重相謝兩個道媳婦們不曾出得分毫之力如何先蒙厚賜受之不當口裏雖恁般說兩個都伸手去接那銀子是張三嫂先接到手作謝出來到綵帛鋪裏借戥子夾剪把銀子平分了兩個於路上商量道那裏有門廝當戶廝對的好人家趁熱就去說便好李四嫂道急切難得只看我們造化張三嫂道今日講過了你也不要瞞我我也不要瞞你大家分頭去尋訪訪得一頭來我兩個有話同說有錢同共有酒同吃李四嫂道說得是我尋得來也對你說你尋得來也對我說兩個約定了分路而去張三嫂想道西街上大鋪張員外單生一個兒子年方一十七歲只要說一個好媳婦我且去走一遭只怕他嫌胡家年長成不成吃三瓶且去哄杯酒吃也好當下張三嫂徑到張員外家張員外見個媒婆入來問道有何事到我家張三嫂道有一門好親特地來說員外道多少媒人來說過都不成得如今不知是誰家女兒張三嫂道是開綵帛鋪胡員外的女兒生得花枝般好張員外道我曾在金明池上見來真個生得好只不知多少年庚張三嫂道一十九歲獨養女兒張員外道長兩歲也不妨只怕他不願嫁出我只有這個兒子我卻不肯入贅張三嫂道胡員外也情願嫁出來張員外見說十分歡喜教安排酒來與張三嫂吃三杯取出一兩銀子相送說道若親事成時別有重謝張三嫂收了銀子作謝出門吃了兩家的酒醺醺的自言自語道今日是好日都順溜這頭親事管情要成過了今夜明日起個黑早到胡家去說莫要通知李老實卻說老實李四嫂這日因在金沙唐員外家門首經過想著他有個兒子年方二十一歲向來定下徐大戶家的女兒因此女害了癆怯未曾完娶二月間女兒已死那唐小官人是要緊做親的若說胡員外宅裏女兒必然樂從走到唐家門首卻好唐員外在門前閒坐看見李四嫂前來原來相熟的便道四嫂那裏來李四嫂道有句話特來到宅唐員外道既有話請到裏面講李四嫂跟員外進去坐了問道小官人在宅麼唐員外道出外去收些小貨未回李四嫂道徐家小娘子沒了另扳得有好親麼唐員外道還不曾你看見有好頭腦作成則個李四嫂道有一頭在此說來必定中意唐員外道是那一家李四嫂道是開綵帛鋪的胡員外的女兒年方一十九歲唐員外聽得說笑道我知胡員外的女兒且是生得好個聰明伶俐當初胡家開典鋪的時節我家便央人去說胡員外要招贅在家搖得頭落不肯因此扳了徐家這頭親事只不知胡員外有口風沒有你卻如何來說李四嫂道昨日胡員外叫將我去與我一兩銀子又與了三杯酒吃要說門當戶對的親情願嫁出故此媳婦特來宅上說唐員外見說十分歡喜即時叫安排酒來叫李四嫂吃了也把一兩銀子相送道若親事成時另有重謝有煩用心著力則個李四嫂謝了唐員外出來一路上歡歡喜喜也打帳瞞過了快嘴張三嫂明日獨自個去做這頭媒人卻說次日胡員外家開了大門是張三嫂先到剛要進門遠遠地望見東邊來的好似李四嫂模樣張三嫂道這婆子清早起那裏去我且躲在一邊看他只見李四嫂到了胡家門首兩頭打一看徑鑽進門內來了正與張三嫂打個照面正是夜眠清早起更有不眠人兩下都吃了一驚好生沒趣張三嫂道你來有甚話說李四嫂道看見你在此特地進來陪你張三嫂道我也想到你決然到這裏的所以先來等候兩個笑了一場李四嫂道阿姆你實說尋得頭好主兒麼張三嫂道不瞞你說有一個上好頭腦管取十說九成李四嫂問那家張三嫂道是大鋪張員外家一十七歲花枝般的小官人李四嫂道阿姆莫怪我說男大女小團圓到老到是雌的大了兩歲恐怕不中本宅的意張三嫂道你快閉了口常言道妻大一有飯吃妻大二多利市妻大三屋角攤如今剛大兩歲正是利市發財旺夫如何不好你嫌我這主兒不好有甚別個主兒勝得這一頭的李四嫂道我這家卻勝得多哩是金沙唐員外家兒子長房長媳目下說成就行聘就做親的張三嫂道便是那望門寡的硬東西麼誰家女兒是銅盆肯去對那鐵掃帚恁般頭腦不講得也罷也省些後來抱怨李四嫂道我與你打個掌偏要員外成我這頭親事張三嫂道不須賭得從今說過了成了你的我也不來爭成了我的你也休指望八刀只吃杯喜酒便了鋪裏主管聽得了便插口道這句話說是各人船底下有水各人自行拌乾了涎唾兒也是沒用正不知我家員外喜那一頭哩姻緣是五百年前結下的勉強不得兩個方才住了口雙雙的走進客房座裏來有詩為證媒婆兩腳似船形有水河中各自行空自相瞞爭起早誰知員外不應承卻說胡員外正走出客座來兩個媒婆相見了員外叫坐道難得你們用心昨日說了今日便有張三嫂不等四嫂開言便搶著應道有一頭好親事是小媳婦尋來的西街上大鋪張員外家單生一子年方十七人才出衆真個十分俐伶一手寫一手算胡員外聽說了道且放過這頭親事李四嫂道我說的又是一個主兒是金沙唐員外家好個小官人年二十一歲了百伶百俐寫算俱精五六年前曾在宅上求過親的不曾成得今番又來相求胡員外搖著頭道這頭親也且放過一邊別有親時再煩你二人來說兩個媒人都道恁地好親事如何教放過了員外且與院君商議則個胡員外道我心裏便是有些不在意院君也十分做不得主便去衣袖裏摸出一兩銀子來送與二位道天早不敢相留權當一茶有煩用心體訪一頭誠實小官人待我心裏像意方好兩個媒人受了銀子只得起身出來說道雖然親事說不成也不白折了這個早起想起來這頭媒人不是獨做得的今後須是你吹我唱大家攛掇慫恿不怕他不聽兩個又把一兩銀子分了各自去訖從此兩個媒婆真個和同水蜜一條跳板上走路話休絮煩但有好親去說聽得說兒郎聰明伶俐便教放過了如此也不知幾次又隔了數日兩個媒人商量道難得胡員外去時便是酒和銀子不曾空過我兩個有七八頭好親事去說只是不肯不知是甚意故李四嫂道我說要尋個小官人莫非到嫌忒聰俊了麼張三嫂道今日我們兩個沒處去了我和你去胡員外宅裏騙他幾杯酒吃又騙得他兩把銀子大家取一回笑耍李四嫂道你有甚親事去說張三嫂道你休管只顧同我來叫你吃酒便了兩個來到胡員外家卻好員外正在鋪內兩個坐定吃茶員外問道有甚親事來說張三嫂道告員外今有和員外一般開綵帛鋪的焦員外他有個兒子甚是誠實只怕太過分了些員外問道他兒子幾歲諸事如何張三嫂道焦員外的兒子雖則也是一十九歲了還是奶子替他著衣服三頓喂他茶飯口邊涎瀝瀝他不十分曉人事滿門都稱他是憨哥胡員外聽了道這頭親事倒稱我意煩你二位用心說則個院君面前莫說實話只是褒獎罷了兩個媒婆聽得說口中不說心下思量千頭萬頭好親花枝相似兒郎都放過了卻將這個好女兒嫁這個瘋子兩個又吃了數杯酒每人又得了二兩銀子謝了員外出來對門是個茶坊兩個人去吃了茶李四嫂道你沒來由教我忍不住笑捏出兩把汗只怕胡員外焦燥起來帶纍我什麼意思張三嫂道我和你說這許多頭親事都教放過了我且閒耍著他若胡員外焦燥時我只說取笑誰想到成了事李四嫂道想是中意了若不中意時今日如何把四兩銀子與我們比往常更是加厚兩個廝趕著一頭走一頭笑徑投國子門來見焦員外焦員外叫請坐吃茶員外道你兩個上門是喜蟲兒有什好話來說張三嫂道告員外我兩個特來討酒吃與小員外說親焦員外道我的兒子是個呆子不曉人事的誰家女兒肯把來嫁他李四嫂道與員外一般開綵帛鋪的胡員外宅裏花枝也似的一個小娘子年方一十九歲多少人家去說親的都不肯方才媳婦們說起宅上來了胡員外便肯應承特教我兩個來說焦員外心中好生歡喜道你兩個若說得成時重重的相謝兩個吃了數杯酒每人送了二兩銀子出得焦員外家徑來見胡員外李四嫂道焦員外見說宅上小娘子十分歡喜教來稟復要員外揀個吉日良辰下財納禮要甚安排都依宅上吩咐胡員外聽說不勝之喜自叫媒人去對張院君說院君細問時只說小官人生得豐厚是個有造化的只是從小嬌養慣了穿衣服還要別人服侍生在這般的富貴人家好不受用院君也允了媒人去焦家回復話休絮煩回家少不得使媒人下財納禮奠雁傳書焦員外因是自家兒子不濟事每事從厚不只一日揀了吉日良辰成那親事卻說焦員外和媽媽叫嬭子來吩咐道小官人成親房中的事皆在你身上若使夫妻和順我卻重重賞你嬭子道多謝員外媽媽嬭子自有道理媽媽道恁地時你慢慢教他好嬭子與媽媽入房裏來看憨哥道憨哥明日與你娶老婆也憨哥也道明日與你娶老婆也嬭子又道且喜也憨哥道且喜也嬭子口中不說心下思量道我們員外好不曉事這樣一個瘋子卻討媳婦與他做什麼苦害人家的女兒那胡員外也沒分曉聽得人說這個女子十分生得標致又聰明智慧寫算皆能卻把來嫁這個瘋子不知是何意故當夜過了至次日焦家打點迎娶不在話下晚間胡媽媽送新人入門少不得要拜神講禮參筵拂座嬭子扶那憨哥出來胡媽媽一時就看見吃了一驚但見面皮垢積口角涎流帽兒光歪罩雙丫衫子新橫牽