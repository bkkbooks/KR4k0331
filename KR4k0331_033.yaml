body:
  text: 第三十三回劉寵清名舉世傳至今遺廟在江邊近來仕路多能者也學先生揀大錢這首詩是個有名才子王叔能所作那紹興錢清鎮有個錢太守廟這太守姓劉名寵在西漢桓帝時為會稽太守一清如水絲毫不染升任臨行之日山陰縣許多父老號泣相送每人齎百文錢贈為行資劉寵感其來意揀一文大錢受了後人思其清德立廟祀之號為一錢太守廟這鎮就喚做錢清鎮王叔能偶然在此鎮經過拜了太守之像因想近來仕路貪污只要大主錢兒便取所以題這四句詩雖然做得好可惜還未盡其意如今做官的若單揀大主錢兒方才上索就算做有志氣的了他的算計恰像歸乘法兒分毫不漏他的取錢卻像做土磚的地皮也齕下了三分那管你大主兒小主兒好像扒灰掃地的畚得來簸箕裏頭就是只說揀大錢可不是未盡其意了另有詩云當初只揀大錢裝近日分毫也入囊若是取錢能取小喚為廉吏亦何妨那貪官也有個計較他取得錢來將十分中拚著幾分上面打點使用一般得個美升便做道萬一公論穿了犯著對頭罷職家居也做個大大財主落得下半世豐足受用子孫肥田美宅鮮衣駿馬何等奢華任他地方百姓咒罵我耳朵裏又不聽得比如做清官的沒人扶持沒人歡喜一筆勾了回去地方上許多鼻涕眼淚又帶不回家纍及妻子不免飢寒六親無不抱怨便有聖明帝王他在九重之上那裏曉得外邊備細恁般說將起來可不倒是做貪官的便宜說話的據你說人人該做貪官了雖則如此那百姓們千萬張口咒詛祝頌難道全然沒用或者生下子孫賢愚不等後來家道消長不齊暗暗裏報應天道自然不爽只目前人不知道還有一件假如朝廷洪福齊天地方平靜且算做僥幸若是氣運適然地方合當有事定然是那貪官惹出禍來這禍依然是他先當前一回說那貝州知州張德若不恁般胡做如何激變了軍心弄成大禍這便是貪官的樣子且說當日知州見倉裏失了米庫裏失了錢不勝焦燥將王則送司理院如法逐一勘問報來這勘官姓王名漿問王則道說你昨日散了兩營請受你家能有多少大如何堆放得六千人錢米今日州庫不見了許多錢倉內不見了許多米你且說如何弄將出來的王則初時抵賴後來吃拷打不過只得供認道昨日是王則下班日則在家閒坐只見那多有請的從王則門前過都怨恨道役了三個多月要關支一個月錢米也不能得又有四個人不知從那裏來不由王則分辨借王則屋裏散了六千人錢米那四個自去了實不知是甚人勘官道豈有不識姓名的人你不詢問他來歷便容他在家裏散錢米請受教獄卒拖翻王則著力好生夾起再打王則受不過苦楚只得供說一個姓張名鸞一個姓卜名吉一個喚做瘸師左黜一個喚做蛋師又名彈子和尚勘官把紙筆教王則寫將出來見了大驚想道這卜吉張鸞是殺了鄭州知州逃走去的彈子和尚是騙了善王太尉三千貫錢包龍圖三番兩次奈何他不得現今兩處都行得有文書緝捕那瘸師左黜不知何人一定也不是善良之輩如何這班人都合做一夥聚在貝州此事非同小可當時教將王則押了招狀依舊監禁獄中即時回覆知州細細的陳其利害嚇得知州面如土色欲待認真搜捕誠恐這夥妖人等閒的拿不到手反惹其禍欲待隱瞞過去連王則都寬了他罷奈倉庫中錢米失散王則明明裏招出四個人來衆人共知怎好丟手這般大事虎頭蛇尾如何壓服得軍民做得一州之主左思右量只得出個榜文榜云貝州知州張為緝捕事從排軍王則招稱同盜倉庫妖賊張鸞等未獲如有擒捕真賊來獻者每名官給賞錢一千貫知情不首一體治罪故示一名張鸞係遊方道人頭戴鐵如意冠身穿皂沿緋袍一名卜吉客人裝扮一名瘸師左黜係瘸腳頭戴破巾身穿粗布衫一名蛋師又名彈子和尚耳帶金環身穿烈火袈裟慶曆四年月日知州吩咐書手將榜文一樣寫十來張懸掛各門及州前並城內外衝要去處一面喚緝捕使臣立限捕獲不在話下卻說兩營六千人和老小都得王則家借支錢米與我們知州將他罪過把他送下獄中受苦人人都在茶坊酒肆裏說沒一個不罵知州狗賊不近道理說猶未了只見瘸師走來營前拍手高叫道營中有請的官人們聽著王都排不合把錢米散與你們衆人你們都看見他在自屋裏搬出來的知州卻把倉中的米庫中的錢隱匿過了反陷王都排偷盜即今要差人來拿你兩個管營的追取你們錢米還倉還庫我想你們為漢的買賣米是吃了錢是用了那裏賠出去還官衆人聽了都亂嚷起來道我們吃的用的又不是官物現在該支的錢糧不肯關與我們到要追奪我們的恁地時真個逼我們反了瘸師道王都排好意支散錢米與你們如今被知州打得皮開肉綻禁在獄中性命不保你們知恩報恩肯出力救他出來麼衆人道我們也有此意只是力量不加又沒個頭腦如何救得他出來左黜道官人們也說得是必須要一個為首的我與你們為首衆官人肯相助也不衆人看了左黜口裏不說心下思想道看他這一些兒大又瘸了腳便跳入人的咽喉裏也刺不殺人隨他去恐不了事倒裝幌子左黜見衆人不則聲問衆人道你們因甚不則聲莫不是欺我身小力微奈何不得人我變個奈何得人的教你們看看左黜口中念念有詞喝聲道疾將身顯出神通不見了那四尺來長的瘸師只見身長一丈腰大十圍頭似車輪目如燈盞手中執兩把潑風刀如兩扇板門相似衆人見了大驚忙忙的拜道我們有眼不識泰山原來是天神可知道昨日王都排家裏不甚寬大散了六千人錢米衆人拜罷起來看時端的只是個瘸師瘸師道衆人休三心兩意因是你貝州人合當有難天教我來提拔你們你們從與不從只在今日說聲未了營裏跳出兩個槍棒教師來一個姓張名成一個姓竇名文玉那兩個各提一條棍棒在手叫道王都排是好人合當救他那個不肯去的我先與他鬥一百合衆人齊聲道都去都去瘸師道難得兩位恁般義氣就煩你做頭領教他們在此整頓器械我今獨自一個先去救我都排壞了貝州的知州你們就來接應輔助得王都排做了貝州之主教你們豐衣足食快活下半世衆人聽得說都應道我們就來相助有詩為證重瞳吝賞終亡國吳起同甘便勒勳只為米錢私散去一朝反了六千軍左黜離了營前迤邐奔入州衙裏來正值知州升廳坐在虎皮交椅上胡言亂道左黜入去時使個隱身法並無個人看見左黜一閃閃在知州背後捉個空兒將交椅往後一退知州撲地的跌了一交衆人慌忙扶起知州道想是交椅日久腳損壞了另換一把坐罷左黜暗暗的笑道這賊贓狗怎知道我瘸師也來借名嘲我我再耍他一耍衆人將交椅換過鋪上虎皮坐褥安放得穩穩的知州方才坐定左黜在背後將他紗帽猛打一下撲的一聲響那紗帽離頭似箭一般去了直到廳下落地衆人只道知州相公袖裏放出一隻鵓鴿子來了只見知州捧著頭叫道快拾取紗帽來戴衆人方才曉得是知州的紗帽正待去拾取卻被左黜隱在下面又先拾得在手大盼盼的拐上廳來對著知州叫道太尹你今日沒了冠也你今日沒了頭也把紗帽捻起又道太尹你的頭兒已被左黜拾得在此衆人聽得左黜二字便道這裏正出榜文捉他卻來將頭套枷知州見他身材短小不將他為意乃問道你便是那瘸師麼左瘸將左腿一拍說道這隻腳可是假得的知州道我正要拿你你如何敢來左黜道曉得太尹見怪待來拜見領罪知州大怒罵道從不曾見恁般大膽的妖賊喚教左右拿下取長枷來將左黜枷了送到司理院去與王則對證錢米獄卒把左黜押到勘事廳前就獄中拽出王則來王則見了左黜大驚道你為何也來在這裏左黜道不是我進來如何救得你出去司理院王漿問道你這漢子從實供說倉庫之中錢米怎的樣攝了去左黜道勘官連你也不理會得知州愚蠢月錢月米俱不肯放支與他們教兩營人切齒怨恨我到賠著四千貫錢替知州散了他不感激謝我反欲加罪是何道理王漿焦躁喝令獄卒著力拷打獄卒提起杖子拖翻左黜便打有這般作怪的事才打一下去左黜全然不覺倒是行杖的叫痛恰似打在自家身上一般換幾個獄卒行杖都是如此但是打一下便叫起痛來撇著板子躲向一邊去了王漿不信走下來自提杖子去打這棒不像打左黜倒像打勘官也撇了杖把手掩著屁股便走連叫作怪只見左黜哈哈大笑喝聲疾把自己身上和王則身上的索子就如爛也似都斷了枷也開了嚇得王漿道這漢子真是個妖人忙叫獄卒並衆人一齊向前來捉被左黜用手一指禁住了許多人的腳一似生根的一般一步也移不動左黜和王則直至廳下知州坐在廳上依先戴了紗帽坐著虎皮交椅比較錢糧只見左黜喝道張太尹你害盡貝州人報應只在今日我今日不為貝州人除害非大丈夫也知州見他兩個來得凶掇身望屏風背後便走忽地堂內搶出兩個人來那兩人非別正是張鸞卜吉各仗一口刀卜吉向前揪住知州張鸞向知州一刀連肩卸臂斷顙分尸把知州殺了嚇得廳上廳下人都麻木了轉動不得王則道你衆人聽我說你們內中有一大半是被他害的今日我替你們去了禍胎一州人都得快活你們吃他苦的隨我入衙裏來搶掠些金銀叫你們富貴衆人見說都來幫助王則兩營教師張成竇文玉率領著六千軍卒卻好都到州衙前聽得說王則殺了知州一齊搶入來正遇著司理院王漿引一家老小出衙逃避張成棍起先把王漿打倒衆人齊上踹做肉泥一家老小都結果了性命胡永兒自己到了州衙裏面和左黜等將知州滿門殺盡又訪聞知州平素心腹用事之人都搜尋來殺了打開獄門把罪人都放了到知州家內搬出金銀錢寶綾羅緞匹在階下堆積如山連這十三匹綵帛剪下來的五尺零頭做一包兒包著也在奶奶房裏搜將出來王則道許多財物都是貝州人的骨髓今分做三分把一分散與營中有請的一分給賞鋪行缺帳及知州詐錢被害之家一分散與窮經紀人教他安心做道路王則據住州衙出榜撫安百姓令兩營軍人整頓兵器頂盔掛甲分布四門固守城池兩個教師就充做統領兩營軍馬如今做一回話兒說過去了那其間老大一場事當時只走了兩個官一個是通判董元春一個是提點田京兩個收了印信棄了老小奔上東京奏知朝廷要請兵與知州報仇只因這番有分教討賊將軍空費一番心力謀王術士大施萬種妖邪正是一燈能發千家焰尺水翻成萬丈波畢竟朝廷遺甚人來勦捕且聽下回分解
