body:
  text: 第十四回仁慈勝似看經典節儉何須點化金跨鶴腰纏無此理堪嗟愚輩枉勞心話說聖姑姑初到東莊原約楊巡檢一年半載便有回復誰知一口大話就閉了三年的角門楊巡檢已自十分信服的又見移樹運米如此神通少不得有個妙用為此只吩咐管莊的老王暗地打聽消耗自己再不敢來敲門打戶討消問息忽一日楊奶奶開一隻衣箱只見箱內堆著多了東西取來看時原來就是三年前叫老嬤嬤送與聖姑姑這二百私房銀子原封不動在內奶奶吃了一驚忙喚老嬤嬤來認時果然不差這分明是靈鬼所為就是搬柴運米的一個法兒他們那知就裏只管胡思亂猜道這衣箱多時鎖下不開為何銀子倒在裏面又是幾時送來的不免叫老嬤嬤到東莊上打探一遭老嬤嬤坐乘小轎到東莊老王家來問其動靜老王道以前半夜三更常聽得院裏大驚小怪叫喚呼喝之聲如今好幾日不聞聲響不知何故老嬤嬤道你且討個梯兒待我爬上屋去偷望一望看是怎的老王見是掌房的嬤嬤自然要奉承一分又且奶奶差來如何違拗慌忙在敞廳上去掇個長梯子弄了半響弄進屋來靠在回廊屋簷上老嬤嬤先爬上屋去望了一望就下了梯說道院裏靜悄悄地絶無動靜我腳軟站不住還讓你老人家來老王真個上梯去舒頭而望並無一人自爬上屋脊仔細前後觀看忽然見了明晃晃黃燦燦這座金山心下又驚又喜下得梯來心生一計瞞著老嬤嬤只說不見什的想是從後門走了老嬤嬤轉身去後老王一腳箭跑到城中報與家主楊巡檢知道如此這般想來是老爺洪福特來報喜楊巡檢喝道誰教你去望來老王道是奶奶差老嬤嬤來叫小人去看不關小人之事因是好幾日院裏不聞聲響想不在了所以小人大膽不然也不敢楊春心下沉吟便叫家童備馬親往東莊把敞廳後壁封條揭了開進去看時裏面沒人來往亂草縱橫回廊下小角門依然緊閉楊巡檢自去敲了幾下不見答應叫安童拾起磚塊去打打了一個時辰只如不打一般楊巡檢發個性急叫莊戶轎夫隨從人等一齊用力把門撞開楊巡檢吩咐衆人退後只帶四個安童跟隨不往書房廳屋住所一徑串出後樓去看只見樓下豎著這座太湖石已變成一大塊紫金楊春暗想道聖姑姑神通果然非小掉轉頭來猛見聖姑姑和蛋子和尚左黜三人端端正正坐於樓下楊春大驚慌忙下階拜倒稟道弟子久失侍教聞師父點化已成特來拜謁安童道老爺莫拜上面坐的是個死的不然怎不回禮楊春起身上前看時原來都是塑的渾身儼如生相稱讚不已看四下雜屋中堆積百般貨物器用尚值得四五百金三個的衣服行李都不見了後邊四株大梨樹果然西園移來的種得整齊只不知甚麼緣故不別而行想是普賢祖師不願造個行宮在此聖姑不好回話竟自去了楊春歎息了一回便叫安童去迎接奶奶到來不多時楊奶奶接到楊春領他見了渾身說是聖姑姑自塑下的奶奶拜了四拜轉身見了這座金山誇道人間金子怎的有恁般赤色只可惜點化得忒大了叫人不便移動楊春道多著些人來搬他家去做個鎮家之寶看見香案邊帷下黃布帳子一頂自去取來罩在金山上面叫安童一面喚莊戶轎夫隨從人等討了扛棒繩索一齊進來何止三四十人這班人聞安童呼喚問其緣故已自曉得一見帳子裹著都去偷揭來看那一個不驚喜夥裏自相議論也有個說眼見稀奇物壽增一紀也有個說畢竟做官宦的福分大財神跟著他走也有個說皇天心也不平有這些金子不派點屑粒與我們貧漢又與那財主做甚有幾個有氣力常出尖的人將繩索向前要去捆縛那金山不動手時猶可才動手時忽然金山下面起陳狂風見一隻黃斑老虎撲地跳將出來嚇得衆人叫聲呵呀四散奔走逃命楊巡檢拖著奶奶一隻臂膊跑上樓去將門窗都閉了過了一時不聽見樓下動靜在窗子眼內偷看時老虎已不見了楊巡檢推開樓窗叫人一個也不答應只得大著膽走下樓來只見這些丫鬟養娘兀自在神像案桌下躲著也有跑出去的和安童在門口探頭探腦望著裏面消息楊巡檢喝道虎在那裏兀自見神見鬼的做甚張智安童和養娘們方才放心進來楊巡檢叫安童一面備馬一面喚齊轎夫送奶奶回宅到家後夫妻兩口說道這聖姑有靈既然塑下渾身必然要那金山供養不許人移動所以顯個老虎出來嚇人如今不去動他自然沒有事商議定了把存下貨物器用一應搬回這三間樓下叫作聖姑堂每年正四七十這四個月的初一日西園設齊楊巡檢燒香點燭一遍便封鎖了也不容外人進去瞧看其餘月份連本宅人都不許進去又吩咐安童莊客等不許向外人面前多嘴饒舌常言道拿得住的是手掩不住的是口家主恁般吩咐了一般又有忍嘴不牢的做新聞異事說將出去滿縣人都亂哄道楊巡檢莊上出了一座金山又有個黃斑老虎也有同輩親友特為此事來問楊春楊春只推沒有後來這個聖姑宮直待貝州反後樞密院行下文書各處搜查妖人蛋子和尚左黜等餘黨此時楊巡檢已故了奶奶老病在床管家稟知小主人私下喚莊戶連夜毀了這三個土偶看那金山時仍是一墜太湖石老虎是紙剪的已朽壞了此是後話正所謂時來鐵也生光運退黃金失色有詩為證堪笑楊春識見莽狐精錯認真仙長黃金不作鎮家山險使兒孫作妖黨楊巡檢一段話表過不提看官們如今要曉得媚兒的下落少不得打個大寬轉又起一宗話頭了話中單表一人姓張名大鵬西安府人氏從小讀書十二歲上沒了爹娘跟隨個全真先生出去遊蕩在燕都大房山偶染疫病那全真棄之而去幸遇外國異人救好了他見他手骨不凡傳授他一家法術能呼風喚雨役鬼驅神若與白雲洞法術比較也是半斤八兩差不多兒他平生與東京一個人交厚結為兄弟常寓在他家那人姓朱名能有一手好武藝提起那話還是祥符元年的時節真宗皇帝惱那契丹韃子欺慢中國有佞臣王欽若奏道從來若非真命天子上不得泰山所以秦始皇恁般英雄也被風雨打將下來我皇若要鎮服四海誇示外夷須邀福天瑞東封泰山方可稱一朝聖主真宗問道泰山曾封過幾遍了王欽若奏道七十二遍了真宗准奏就在王欽若身上要他三日之內報過七十二般祥瑞事事須要有據王欽若退朝面帶憂容一時間多了這嘴三日裏面那有七十二般祥瑞便說靈芝甘露麒麟鳳凰見今世上都生得有三日內也取不將來那朱能正在王欽若門下做個館賓曉得他有這件事在心便道此事不難依朱能說只用一般祥瑞便可抵擋得那七十二般了王欽若欣然問計朱能道草木鳥獸之瑞都是後來不為希罕只有上古伏羲時河中龍馬負圖而出天示陰陽卦象謂之天書此為祥瑞之祖如今若得天書下降把來宣布中外泰山就封得成了王欽若道天書怎得降來朱能道不消相公費心朱能自有妙策來朝容稟當晚朱能回家與張大鵬商議張大鵬道不是劣弟誇口仗平生學的道法只今夜送個天書信息到皇帝老兒宮裏去朱能道愚兄此番便是出身之階了全仗賢弟幫襯這個當下張大鵬行個嫁夢的法子真宗皇帝睡在宮中夢見紅光曜室一個神人頭戴七星冠身穿絳衣手捧文書一本告道上帝有命降天書大中祥符三篇陛下宜虔誠受之聖祚萬載正待舒手去接那文書卻猛然驚覺五更鐘動真宗皇帝上殿正是九天閶闔開宮殿萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍袞龍浮百官早朝已畢便召宰相王欽若面對把夜來之夢與他說了王欽若奏道此乃我皇志一氣動與天心相通方有此夢兆這天書自伏羲時龍馬負圖直至如今不曾再見若果然降下便是國家之上瑞休言七十二般禎祥便千萬般也賽不過矣乞我皇速出聖旨一道九門傳諭四下訪察天書消息真宗皇帝准奏當下取龍鳳花箋就御案上拂開提起玉管兔毫筆御手親寫道朕在深宮恭默思道夢有神人星冠絳衣傳說帝命當降天書大中祥符三篇如有人先得者不拘軍民人等詣闕速獻即時擢用如係職官加秩進祿欽哉無忽景德五年正月日御筆王欽若捧了這道聖旨辭朝而去便仰文書房一樣抄了九張差人向九門張掛把御筆收藏奉為至寶左右報朱能進見王欽若忙教請進相見已畢朱能道相公正要啓奏天書恰好有這道聖旨可謂湊巧之極矣王欽若道據聖上此夢敢是真有天書下降麼朱能道莫管真不真只在朱能身上包有天書還相公就是但得權充巡官之職庶幾便於察訪王欽若道只恐卑職不稱大才有何難哉煩足下用心成事之日必當保奏重用當下便差人拿名帖到樞密院去將朱能充作皇城司巡官之職朱能就在相府掛了牙牌出來對張大鵬說道皇上果有異夢此乃賢弟之神力只是大中祥符三篇那裏求取張大鵬道天書左右是個名色劣弟已摹倣老子道德經之意胡謅三篇不知可用得否便在袖裏摸出草稿送與朱能看朱能原不甚通文理卻滿口稱妙便道就煩賢弟一寫用甚紙張我去取來張大鵬道劣弟前年在高麗國去帶得些皮紙還剩得有每篇寫做一卷用黃帛包裹明日五鼓仁兄徑去擊登聞鼓報承天門鴟尾上降得有天書只依我說就是朱能道朝廷不是取笑的倘或駕到承天門沒有天書獲罪不小張大鵬道劣弟必不違誤仁兄之事次日五鼓朱能先去敲張大鵬的房門又去叮囑這事張大鵬在床上答應道已停妥了朱能曉得張大鵬的手段便不疑惑一口氣跑到登聞院將鼓鼕鼕的亂捶有值日鼓吏報與本院院使審問來歷帶去朝房先見了宰相王欽若王欽若聞說有了天書不勝之喜須臾淨鞭三響宮裏升殿受朝王欽若引著登聞院院使奏道天書下降承天門見有皇城巡官朱能來報在朝門外候旨真宗聞奏便教宣朱能上殿朱能拜舞已畢真宗問道天書在何處卿又何以知之朱能奏道臣自從前日見了九門聖旨晝不敢寧夜不敢睡想得帝命天言必降於高嵬之處又天機祕密必不是白日降下今早臣從承天門下巡視望見鴟尾上有黃帛曳出料想必是天書不敢不奏真宗天顏大喜趨下帝座龍行虎步直到承天門下驚得滿朝文武顧不得鴛班鷺序紛紛的下殿隨行朱能指點鴟尾與真宗看了真宗便遣兩個內侍取梯升屋原來小小一個黃袱包兒兩條帶子纏在鴟尾之上解將下來王欽若接得在手跪奏真宗有詩為證星冠鴟尾總玄虛聲臭俱無豈有書君相一時俱似夢天言口代竟誰欺真宗對天再拜御手捧著步行到殿把與翰林學士陳堯叟啓封宣讀乃是大中祥符上中下三篇篇中都是道家之語讀罷百官皆呼萬歲真宗命內侍取金匱來盛了權送在景靈宮聖祖案前供養待興造玉清昭應宮專奉天書就命陳堯叟草詔宣播天下改今年為大中祥符元年擇日起駕親往泰山行禮加封王欽若為兗國公朱能為荊南巡檢三年之內直升到節度使之職情知這番富貴都是張大鵬作成的相見之間生怕他提起前因便頗有疏慢之意張大鵬猜著這個意思也不說破他只不來往便了於此可見朱能薄德處後來十五路軍州表章都奏得有天書天子不知那一個是真是假到疑心起來有參知政事丁謂也為著諂佞得寵與王欽若兩個爭權訪出了朱能挾詐欺君密地奏聞真宗真宗就將丁謂替了王欽若之職差使臣去拿那朱能問罪朱能自恃武藝把使臣殺了統率手下兵衆反將起來戰敗被擒到招得有張大鵬名字聖旨將朱能碎剮又行海捕文書各衆弋獲奸人張大鵬因此張大鵬又向江南飄蕩改名張鸞自號沖霄處士他有了一身法術那一處不去了常言道官無三日緊過了幾年之後這事便懶散了張鸞在江湖上打聽得真宗所生皇子今已長成那皇子乃是赤腳大仙轉生怎見得原來真宗二十一歲上登基宮中尚無皇嗣乃御製祝文頒行天下令各處名山宮院修齊設醮祈求上帝時玉帝正與群仙會聚問誰人肯往群仙都不答應只有赤腳大仙笑了一笑玉帝道笑者未免有情即命降生宮中與李宸妃為子生後晝夜啼哭不止便御榜招醫有個道人向內侍說貧道能止兒啼真宗召入宮中抱出皇子叫他診視道人向皇子耳邊說道莫叫莫叫何似當初莫笑皇子便不哭了真宗大喜間其緣故道人說此情由已罷出得宮門化陳清風而去這皇子是誰便是四十二年太平有道的仁宗皇帝他在宮中只好赤腳再不愛穿鞋襪此其驗也真宗因感齊醮靈應愈加信奉各處修復道家廟宇張鸞聞得此信又且皇子是大仙轉生以為必然與道流有緣先在東京時曾與太監雷允恭相識甚蒙敬重那雷允恭寵幸用事官拜宣政使之職與丞相丁謂又是內外交結的張鸞為此再到東京見了雷太監告訴他前事冤枉就便託他打丁丞相的關節希圖興隆道教自己討個賜號大抵術士輩任你神欽鬼服總要借重皇帝的敕封方免得天庭責罰雷允恭道遠年舊事不須掛念先生只在家下淑景園中作寓目今皇太子選妃蒙皇太后懿旨吩咐正在忙冗之際待稍空閒同去見了丁丞相再有商議張鸞謝了手下官身引至淑景園中書房內寓下按宋史所載真宗皇帝共改了五個年號咸平六年景德四年祥符九年天禧五年乾興一年此時是祥符九年二月中旬張鸞一夜間見月明如晝在園中閒步忽然黑雲掩月一陳怪風從西而來張鸞道奇哉又是甚麼神道過往捻下定風訣定睛而看須臾風頭過處雲開月朗只聽得一聲響亮半空裏墜下一個女子有詩為證情知天上無人住那得佳人墜九霄陳陳晴風迷道眼若非月怪即花妖那女子非別正是胡媚兒這小妖精這回書直接上第六回的情節他與聖姑姑離了劍門山一路同行到永興地方因天色已晚要趕到樹林中歇宿正行走間對面起陳黑風刮得人立腳不住那婆子是武則天娘娘請去幽宮中相會這小妖精被風刮起半空飄飄蕩蕩直吹到東京雷太監園中墜下天后所說託與沖霄處士便是這話了張鸞見這女子來歷蹊蹺近前看時已被冷風吹得半僵了即便扶進書房把熱湯灌醒問其名姓答道賤妾安德州人姓胡小名媚兒同母親往西嶽華山進香不期中途遇了一陳怪風把賤妾吹向空中那時昏迷不醒耳中只聞得神語云胡家女兒王家后送與沖霄處士受須臾如捲殘雲似飄落葉正不知去了多少里數墜於此地望恩官救取則個張鸞細看那女子妖麗非常況且應對之間有枝有葉不慌不忙情知不是人類又聽說神語奇怪暗暗的想道莫非這妮子到有妃后之數麼則今雷中貴挑選宮人似恁般美貌料也難得正所謂奇貨可居也便道要問沖霄處士只貧道便是小娘子須認做貧道姪女貧道方可相留媚兒忙下拜道蒙活命之恩便伏侍尚且甘心況為叔姪敢不從命張鸞扶起安放他在後面小房中歇了次早去見雷允恭說道貧道有個姪女小名媚兒頗有姿色近因父母雙亡無倚無靠今已取到寓所太尉若看得中意時也報他一個名兒萬一有幸作成貧道做個外戚雷允恭大喜便同張鸞到淑景園來正是得他心會日便是運通時畢竟如何且聽下回分解
