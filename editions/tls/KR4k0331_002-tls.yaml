body:
  text: 第二回寶冊誰人能會取刻時羽化上瀛洲話說玉帝在瑤池宴回守天宮的執事人員都來接見單單不見了袁公有修文院舍人禰衡字正平起啟奏道白雲洞君私發秘書竊了如意冊下界已七日矣玉帝大驚道這如意冊乃九天秘法不許泄漏人間只因世上人心不正得了此書必然生事害民那畜生獸心未改有犯天條不可恕也當下鳴起天門報鼓百神俱至玉帝傳旨命雷神豐隆遣本部雷公電母火速下界擒袁公赴修文院仰本院舍人會同北斗真君鞫問正法卻說袁公正到天門打探聞知此信自言自語道那個多嘴饒舌的閒在那裏不去打瞌睡卻去報新聞搬起這樣是非我且把如意冊包裹停當仍舊放在玉篋裏面臨時與他圖白賴則個一頭走一頭伸手去摸那袖兒卻是一個空袖吃了一驚原來放在石床上不曾帶來便慌忙撥轉雲頭回到白雲洞中這夥猿子猿孫見袁公回來得快一擁前來問信袁公此時那有心情回答他一言半字舒著雙臂拉開逕奔石床上取了如意冊兒翻身復上天門正撞著雷公電母一群聖眾駕著雷車飛奔前來電母便將閃電亂掣火鞭飛舞金蛇走躍袁公大驚道這婆子好利害哩他到曉得幾分劍術正要探取雌雄二丸與他賭鬥只見雷部謝仙等眾擊起連鼓如山崩地塌之聲四圍雷火焰焰燒著把袁公分明困在火城之中險些兒燎去了皮毛嚇得袁公掩著耳閉著眼口中叫道列位有話好講不要出粗雷公道奉上帝法旨與你取討如意冊有無自到修文院中回話袁公連聲應道有有有心中暗想道既是上帝有旨來拿我如何卻到修文院去想是著我尋取原書這修文院是我老袁自家屋裏只消得出諸袖中便了此時十分驚恐已自放下了七八分況且眼見得雷部神通怎敢違抗當下謝仙取鐵鍊套在袁公頸上乘著雷車頃刻進了天門逕投修文院來正是青龍共白虎同行吉凶事全然未保且說那修文舍人禰衡早已升座怎生品格有西江月為證作賦平欺時彥挾才敢傲王侯懷中刺敝不輕投只有孔楊好友鸚鵡洲前夢慘漁陽鼓裏聲愁一生剛正表清流天府修文職受不多時只見旌旛寶蓋簇擁著北斗星君到來怎見得亦有西江月為證七政樞機有準陰陽根本寒門攝提隨柄指星辰斗四杓三一定天道南生北運七公理獄分明招搖玄武擁前旌不教人間法令當下修文舍人降階接入行禮讓星君坐於上首這裏雷公電母將袁公解進修文院來交割一面繳還聖旨自回本部去了卻說袁公被一番雷電鬧吵得不耐煩到得本院如醉如夢左右吏卒押他跪於階下高聲稟道拿得偷書賊當面袁公抬頭一看只見兩行擺列得旌旛齊整棍棒森嚴覷上面時端端正正坐著兩位問官右首修文舍人是本院職掌還不在意左首皂衣玉簡分明認得是北斗星君這一驚非小原來南斗注生北斗注死隨你顏回楊烏這般壽夭若求得南斗星君添上幾豎幾畫便活到一百九十閻羅天子也不敢去想他會面倘惹著北斗星君性氣把筆尖略動一動疾時了卻性命便是玉帝御旨降一千道赦書也休想他起死回生今日這一番多凶少吉如何不驚恐當時袁公不等上面開言雙手擎著如意寶冊獻上連連磕頭只稱死罪北斗星君喝道孽畜你擅啟天封私偷秘法比監守自盜加等合當擬斬袁公只叫饒命磕頭不止禰衡舍人問道你有無泄漏天機從實說來袁公道我老袁一生不作誑語那如意冊上諸般變化之法已整整齊齊鐫在白雲洞兩旁石壁上了若說泄漏委是不曾見過生人之面星君暗暗想道這畜生到也老實又喝問道你把秘冊鐫在石壁是何主意袁公道常聞說上帝無私卻不信有個秘字既說個秘字就不消留下文書既留下文書便是要留傳萬古玉帝篋藏我老袁石刻同是一般意思舍人喝道畜生休得強辭奪理袁公慌忙叩頭連稱死罪道我老袁一生愚直只是據理自陳豈敢強辯舍人道聞得這玉篋是天庭法寶有三不開無混元老祖法旨不開無九天玄女娘娘法旨不開無玉帝法旨不開你這毛畜如何開得袁公道起初時實是三番兩次展開不得末後志心皈命吾師九天玄女娘娘保佑弟子道法有緣永作護法不敢為非這篋蓋就登時揭起若到底揭不起時我老袁也罷了終不然喚個碾玉匠碾開來看早知天條如此森嚴玄女娘娘也不該作成我這個罪名往時常恨著世路狹窄每每在一封柬帖一篇文字上坐人罪過不道天庭浩蕩為看三寸長短小小冊兒不鑒我以好道之心翻坐以偷書之賊悔之無及死不甘心禰衡舍人聽說到世路狹窄幾句愀然動色想著自家得罪於劉表也只為著孫策一封書上況且生性剛直見袁公情辭慷慨涕淚交流心中十分不忍向著北斗星君道這毛畜所言儘自可聽論起道法流傳也有因緣在內況是九天玄女娘娘的高弟有煩真君同在玉帝面前保奏許他改過自新不知真君意下如何星君道原是先生屬下人員但憑裁決只是這番鞫問百神盡知也須成個招詞以便覆奏舍人道真君之言甚當便教左右將紙墨筆硯付與袁公袁公此時已知舍人有心出脫他罪過歡喜不勝連忙取筆寫道供狀袁公不知年歲向在雲夢山白雲洞住居修道因本師九天玄女娘娘舉薦蒙帝恩封為白雲洞君掌管九天秘書屬修文院典守多年並無過失近因九天仙真俱赴蟠桃壽宴自念道微德薄不得從行不合私發天封欲窺秘冊兩遍揭取篋蓋不遂志心祝禱本師九天玄女娘娘保佑方始開篋見書妄意天上無私欲作人間不朽輒將冊文鐫於白雲洞壁緣法自信專擅難辭然皆好道本心並無私念邪謀倘蒙赦宥情願專心護法不敢妄洩凡人如有違心天誅地滅所供是實北斗星君看罷供狀笑道到好說得身上十分乾淨袁公跳將起來說道我老袁不但身上乾淨心裏也乾淨說一是一說二是二不比他人言三語四舍人和左右都笑起來當下星君和舍人起身引著袁公逕到靈霄寶殿回奏玉帝道袁公犯罪雖深情詞可憫況且混元老祖曾遺下四句云玉篋開緣當來玉篋閉緣當去緣者袁也或者袁公有緣所以玉篋自啟他既無邪心宜看九天玄女面上從寬釋放為便玉帝准奏免其死罪革去白雲洞君之號改為白猿神著他看守白雲洞石壁又先發下天符一道著本境城隍土地逐去猿子猿孫一切黨類十里之內不許停留單單只容一個袁公居住如若妄傳凡人生災作耗一體治罪袁公謝恩已畢玉帝傳旨將御前白玉寶爐賜與袁公這爐名為自在爐若袁公在洞修行時爐的香煙繚繞自然不斷直透天門倘或袁公離了洞門香煙便熄分明把爐中這點真火降住袁公的野心使他不敢散亂袁公又謝了恩奏道臣所居雲夢山白雲洞雖則險僻卻與塵世未嘗隔絕聞仙官張楷能作五里霧願乞天恩借來遮掩洞門庶免外窺瞰玉帝准奏道若要霧不須煩仙官矣便喚掌天庫的取一件希奇無價之寶出來這寶名為霧母原來上界有四母都是天上至寶第一是氣母包著先天一氣大千世界轉輪其中即是彌勒禪師手中提著的布袋便是有詩為證和尚肚皮如甕眼兒笑得沒縫布袋早暮提攜手中不知輕重問渠袋有何物一氣陰陽妙用笑他世界眾生裏蚤虱亂動第二是風母藏著八方風氣怎見得東方滔風南方薰風西方飆風北方寒風東南方長風東北方融風西南方巨風西北方厲風這八風消息於風囊之中風伯飛廉掌之亦有詩為證人間尚有司風史況是天庭豈無主鹿身蛇尾號飛廉風伯從來功配雨少女前驅孟母狂折丹指點封姨忙縱使扶搖千里勢不離噓吸一風囊第三乃雲母是混沌初分時山川之氣所結團團如華蓋相似其雲五色不一若歲時豐稔雲色則黃有兵寇雲色則青有死喪雲色則白黑雲主水赤雲主旱若五色青此為祥瑞之徵雲師屏翳掌之亦有詩為證白衣蒼狗雖無意紅蕊金翹亦有徵假使雲師無職掌保章雲物辨何因第四是霧母狀如一副布帘約長八九尺亦名曰霧幙才展開些子分明是初啟蒸籠一般熱騰騰噴將出來若展盡時瀰漫百里把個乾坤都昏罩了及至捲起卻似水中吸桶那霧氣即便收藏當先軒轅皇帝在位時節有一個諸侯最為無道名曰蚩尤他得了這個霧幙能致大霧又創造刀大弩便自恃天下無敵手鼓眾造反要奪黃帝的天下黃帝與蚩尤大戰於涿鹿之野一軍都被霧氣迷惑東西不辨三日三夜不能取勝賴得九天玄女下降授黃帝陰符秘策造成一車名指南車車上站一個木人木人伸一隻手手伸一個指隨你車兒左施右轉這木人一手一指準準的對著南方當下遂破了蚩尤追而斬之其血流地變而為鹽只今陝西慶陽府城北鹽池便是因他創造兵器罪孽深重故今萬世百姓食其血也這霧幙是九天玄女收得獻上玉帝收藏天庫亦有詩為證黃帝神露是聖君蚩尤狂惡亦凶星不將霧幙歸天庫安得天開日月明後人又有詩云四母珍奇古未聞誰知天界假和真風雲聚散陰陽理不道成形各有神此詩是駁那氣母風囊雲蓋霧幙四件奇寶乃荒唐之說不知此乃坐井觀天淺見薄識之輩假如鏡能取火蚌能出水猛虎生風蜥蜴致雹在世間也多有奇奇怪怪不可思議何況天界事情則今閒話休題且說玉帝見袁公一心護法並無虛誑且是九天玄女弟子就取這霧幙交與袁公以為洞口永鎮之寶囑咐道此幙只可展開尺餘便有十里霧氣不可全展恐於世人不便又道你自今改過遷善專心修道還有上昇之日不然天誅不赦永墮無間地獄矣袁公不住口的唯唯拜辭了玉帝當下修文舍人再拜奏請御封仍將玉篋封記供養本院北斗星君亦拜辭而出袁公又往修文院拜謝了舍人往北斗司拜謝了星君右手擎著白玉爐左腋下夾著霧幙遂離了天界望著雲夢山白雲洞中鑽去那一班猿子猿孫猱玃之屬已被本境城隍山神土地奉著天符驅逐已盡袁公單單一身不勝悽慘且喜有了性命又得了兩件至寶正所謂一悲一喜便將寶爐陳設於石室之前只見香氣氤氳直透九霄雲外又將霧幙展開尺餘懸於洞口果然白氣騰空須臾之間散成十里濃霧把一個山洞如白麵包裹看不見洞外一些些子想洞外看著洞中亦如此矣袁公大喜道世上事多半是有名無實只這個洞名向來亦是虛傳今日才不枉喚做白雲洞也說罷覆身到寶爐前磕了四個頭以謝天恩從此日日如此不敢懈怠每年五月端午日午時便把霧幙捲起到天庭朝見玉帝謝罪一次過了午時仍然還洞又將霧幙展掛內外隔絕別是一個世界那洞中到也寬大各色名花異果四時不絕也夠袁公享用袁公自此只在洞中修真養性閒時便探取雌雄二丸戲舞消遣兩壁雖鐫著一百單八條變化之法仔細參求都是偷天換日追魂攝魄的伎倆其中卻有豆人紙馬鬼刀神劍種種害人之術袁公道怪道玉帝十分秘惜不許泄漏人間這般法術分明是金剛禪外道與自家心性無與早知如此便不開道玉篋也罷了心中懊悔無及取筆添數行字於石壁之後云此係九天秘法上帝所惜倘後人有緣得之者只宜替天行道保國佑民每年臘月二十五日夜半子時銜刀披髮登屋跨脊向北斗設誓弟子某修持道法於今若干年並無過失倘生事害民雷神殛之共七十六字照前鐫就說話的這是甚意思只因袁公在修文院成招立下誓願恐後有得法之人心術不正帶累非小他自己曾經雷神擒拿北斗星君勘問所以說持法者通陳北斗生事者受報雷神臘月二十五日乃玉帝下降之辰到此才見袁公本心好道並無私念也雖然如此依我說來還是鐫在石壁多了這一番事想緣會當然所以天庭亦不曾教他銷毀只因這般有分教白霧岩中再遇偷書之賊紅塵世界忽生弄法之殃正是有事不如無事好人心怎比道心閒畢竟後來何人盜法生出什麼事來且聽下回分解
