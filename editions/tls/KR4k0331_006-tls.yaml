body:
  text: 第六回慧劍若能揮得斷不為仙佛亦為神話說賈道士因看上了胡媚兒心迷意亂一夜無眠不到天明便起身開了房門悄悄的踅到樓下打探只見瘸子在榻上正打齁睡樓上絕無動靜回到房中坐不過一連出來踅了四五遍好似螞蟻上了熱鍋蓋沒跑路投處跑到廚下喚起老香公來教他燒洗臉水打點早飯廟中只有一隻報曉公雞教乜道宰來安排吃罷乜道已知道士的心事忙忙的收拾老香公還在夢裏哩便道阿彌陀佛留他報曉不好沒事壞這條性命做甚乜道笑道師父新學起早不用報曉了且說婆子和媚兒兩個在樓上商議道我們出外的日子多行走的路程少都為著這瘸子帶住了腳不得快走這個法官甚好意思不如把瘸子與他做個徒弟寄住此間我們自去倘然訪得明師有個住腳處再來喚他不遲到天明先叫瘸子上樓對他說了瘸子正怕走路恰似給了一個免帖歡喜無量三個商議已定只聽得樓下咳嗽響是賈道士的聲音說道婆婆可曾起身我叫道人送洗臉水上來婆子應道起動了待瘸兒自來擔罷瘸子下樓擔水沒拐得四五層梯了那乜道早已送到瘸子接上約莫梳洗了當賈道士走上樓來作揖問道昨夜好睡婆子道多謝這番看媚兒容貌又與昨日不同昨日冒雪而來還帶些風霜之色今番卻丰姿倍常真是桃源洞裏登仙女兜率宮中稔色人道士看了沒搔著癢處恨不得一口水咽他在肚子裏頭當下殷殷勤勤的問道婆婆高壽了小娘子青春多少婆子道老媳婦齊頭六十小女一十九歲了道士道是四十二歲上生的婆子道正是道士道這小哥幾歲如何損了一足婆子道村兒二十三歲了這隻腳是幼時玩耍跌損的因是他跑走不動帶遲我們多少腳步道士道昨日雪下得大了要銷溶乾淨也得四五日後才好走路哩既是小哥不方便多住些時也無妨婆子道老媳婦正有一句不識進退的言語告稟道士道有話儘說婆子道老媳婦亡夫當先原是個火丹道士與法官同道只是法術不高這村兒雖是醜陋到有些道緣去年一個全真先生會麻衣相法說他是出家之相要他去做個徒弟是老媳婦捨不得罷了今見法官十分憐愛意欲叫小兒拜在門下伏侍焚香掃地不知肯收留否道士有心勾搭那小狐精正沒做道理這一節非親是親正合其機便應道得小哥在此做個法侶甚好只是小道也有句話小道從幼父母雙亡沒個親戚看覷若蒙不欺願拜婆婆為乾娘婆子道老媳婦怎當得起兩下謙讓了一回道士拜了婆子四拜瘸子也拜了道士四拜從此瘸子稱道士做師父道士稱婆子為乾娘道士又與媚兒重見兩禮道今後就是哥妹一家了卻說乜道煮熟了雞切做兩碗又整幾色素菜將早飯擺在樓下道士同婆子娘兒三口下樓照先坐定只因瘸子這番做了徒弟卻讓道士坐於上首坐定道士道雪天沒處買東西只宰得個雞兒望乾娘賢妹隨意用些便揀下碗內好的將筋夾幾塊送上去婆子道老身與小女都是奉齋的只這村兒用葷不知法官這等費心不曾說得道士道奇怪賢妹小小年紀如何吃素婆子道他是個胎裏素道士道改日嫁到人家去好不便當婆子道那裏嫁什麼人家他是個有髮的尼姑時常想著出家哩道士想道這個又是機緣了便道出家是好事只怕出不了時反為不美孩兒有個嫡姑現在淨真庵做主持乾娘賢妹花肯離塵學道逕到那裏去修行這庵離此處止四十多里小哥又在這廟中相去不遠又好照顧免得兩下牽掛婆子道如此甚好只我媚兒許下西嶽華山聖帝的香願必要去的老身伴他去進香過了轉來時還到廟中商議道士道這個卻容易吃過早飯婆子見道士好情已是骨肉一家也不性急趕路了道士將自己身上半新不舊的道袍與瘸子穿了叫眾人稱他做瘸師又把自房隔壁一個空屋與瘸子做臥室喚個木匠收拾做些窗卻叫瘸子監工夜來瘸子也不到樓下來睡了又整些菜果擺設自家房裏請乾娘賢妹到房中閒坐說話中間捉個空就把個眼兒遞與那小狐精媚兒只是微笑因此這道士一時越發迷了有詩為證一腔媚意三分笑雙眼迷魂兩朵花只道武陵花下侶卻忘身是道人家道士託熟了兄妹緊隨著媚兒的腳跟半步不離兩個眉來眼去也覺得情意相通再過些時捏手捏腳都來了只礙著婆子沒處下手正是折腳鷺鷥立在沙灘上眼看鮮魚忍肚飢一連的過了三日天已晴得好了婆子打點作別起身道士苦留再過一日婆子被央不過只得允從道士回到房中悶悶而坐想著只有這一日了若不用心弄他上手卻不枉費無益走來走去皺眉頭剔指甲想了三個時辰忽然笑將起來道有計了慌忙在箱籠裏面尋出兩個絕細的綠色梭布抱到樓下來對婆子說道乾娘賢妹這一去不知幾時回轉揀得兩匹粗布各做件衫兒穿去也當個掛念已喚下裁縫了明日做完後日行罷婆子道重重生受甚是惶恐教媚兒謝了師兄道士轉身出去就教乜道村中去喚兩個裁縫明日侵早要趕件衣服乜道答應了就去那乜道一點淫心也不輸與那賈清風因見那道士手慌腳亂討不得上手自己明知不能了卻也每日留心去覷他的破綻這番喚裁縫一定又做什麼把戲且冷眼看他怎地話分兩頭卻說賈道士那日又白想過了一夜到得天明又著乜道去催取裁縫不多時回覆道裁縫已喚到齋堂了道士慌忙跑到樓上教婆子將這布出去道不知合長合短須乾娘自去看裁就吩咐他如何樣做我這村裏的裁縫沒有高手若隨他弄去怕不中意婆子真個捧著兩匹布隨著道士出去一到齋堂道士忙覆身轉來跑到樓下趁著媚兒獨自一個在那裏便上前抱住道賢妹我留心多時了乘此機會快快救我性命則個媚兒道青天白日羞人答答的這怎使得我娘就進來了道士道你娘處分裁縫還有好一會一刻千金望賢妹作成做哥的罷休要作難便偎著臉去做嘴媚兒也把舌尖兒度去叫道親哥做妹子的也不是無情怎奈不得方便日間斷使不得今晚下半夜母親睡著我悄悄下樓來在這榻上與你相會切莫失信道士便跪下去磕個頭道若得賢妹如此此恩生死不忘說猶未了只見老香公叫聲賈師父前面老媽媽問你討線哩道士慌忙答應又叮囑媚兒道適才所言賢妹是必休忘道士到自房取線去了不提防乜道正在樓上擔淨桶聽得賈道士的聲音悄悄的伏在樓梯邊聽著雖然兩個說話不甚分明這個肉麻光景都已瞧在眼裏料是有個私約了專等道士出去便走下樓來將媚兒雙手抱住道你與我師父有情我都知道了不說破你只要拈個頭兒便罷井亭上是我起手少不得謝一謝媒人媚兒終是性靈心巧眉頭一皺計上心來便道你放手恐怕人來瞧見不好意思包你有好處乜道真個放了手便道你怎生發付我去媚兒道恰才被你家師父纏不過了教他夜間開著房門我到半夜到房裏去你今夜等師父進房去了悄地先到樓下榻上睡著我下樓時先與你勾帳才到他房中去卻不好乜道也磕個頭道小娘子果然如此便是救度生命了說罷乜道出去了媚兒暗笑道機關泄漏大家不成了且耍他一耍教他今夜裏一場沒趣卻說婆子吩咐裁縫了當喚瘸子到樓下囑咐他道你在此間須要學好我與你妹子明早定是行了若有些好處便來挈帶來休只貪圖酒食討人厭賤下次做娘的到此處也沒光彩當日道士又來陪吃晚飯兩個裁縫趕完衣服了送了進來道士又向婆子道乾娘明日准行了也不須十分早起用些早飯了去婆子道多感厚意來朝總謝道士有了媚兒的私約十分快活回到房中煖起一壺好酒自家吃得三分醉意且坐在醉翁床上打個盹養些精神到下半夜去行事卻說乜道收拾完了捉個空先踅在天井裏芭蕉樹下蹲倒窺見道士房門已閉娘女兩個也上樓去了便悄悄地走在榻下眠著只等樓上的消息等了半個時辰不覺睡去這裏道士打了一回盹不知早晚只恐失了期約急急的將雙手抬著著房門輕輕扯開做個鶴步空庭一腳一腳的趕步兒走去到得榻邊將手向榻上摸時知有個人在榻上睡倒心裏想道這冤家果然有情已先在此等了慌忙脫了鞋兒倒身做一頭睡去那乜道被他驚醒也只想道這小娘子不失信果然來了兩個並不說話抱著先做了個甜嘴只聽得道士低位問道你是那個乜道已認得是道士聲音便應道師父是我道士也認得是乜道了他如何也在這裏一定這賊精曉得了些風聲在此打斷我的好事於是各自不好意思起來各自去睡了這道士分明做了一個魘夢自己也不信有這事那時到放下了心腸一覺睡去看看天曉眾人多起身了道士看看乜道只管笑乜道看著道士也只管笑那小狐精看著道士和乜道也只管笑正是今日相逢無一語想來都是會中人那道士雖然夜來失望還想他西嶽進香轉回尚有相會之日這個相思擔兒便不肯拋下當時叫乜道安排酒飯陪他娘兒吃了婆子把新做的兩件衫與媚兒各穿了一件收拾起程又囑咐瘸子幾句教他耐心瘸子答應道我都曉得道士和瘸子送出廟門婆子又殷勤稱謝道士道乾娘轉來是必到我廟裏來看看小哥孩兒明日便寄信到淨真庵姑娘那裏去倘或發心修行時節無如那裏清淨又對媚兒說道賢妹保重相見有日不覺兩眼墮淚險些兒哭將出來怕人知覺便掩著眼急急裏跑進去了媚兒心裏也自慘然看官牢記話頭這左黜自在劍門山下關王廟裏做道士再說娘兒兩個離了廟中望劍閣而進此時沒有瘸子帶腳行得較快一路無話看看永興地方相近天色已晚遠遠望見前面有個林子約去有十里之程婆子道媚兒趕到這樹林裏面歇宿此去西嶽不遠了娘兒兩個行不多幾步忽然對面起一陣大黑風刮得人睜眼不開立腳不住那風好狠正是無影無形寒透骨忽來忽去冷侵膚若非地府魔王叫定是山中鬼怪呼風頭過去只見兩個戎裝力士上前躬身道天后有旨教請聖姑相見婆子道天后何人力士道唐朝武則天娘娘也婆子道則天娘娘棄世已久如何還在且與老媳婦素不識面有何事相喚力士道娘娘現居此地與聖姑有段因緣數合相會便請同行聖姑姑到彼處自知端的婆子心下有些害怕欲持不去兩個力士左右的夾幫著不由你不走才動身時腳不點地不一時來到一個所在古木參天藤蘿滿徑陰風慘慘夜氣昏昏過了兩重牌坊現出一座大殿宇來力士不見了又見兩個宮妝侍女提著紫紗燈籠前來引接道娘娘候之久矣婆子進殿看時中間卻虛設個盤龍香案並無人坐在上面侍女道聖姑姑在此少待去不多時便出來道天后有旨請聖姑姑殿後相見婆子際著侍女竟進去但見珠簾高捲裏面燈燭輝煌天后居中坐下兩旁站著幾個紫衣紗帽的女官口中喝拜婆子朝上依喝拜罷方才平身天后傳旨賜坐婆子謙讓道天顏之下怎敢大膽天后道不須過遜今日之會亦非偶然朕方欲與卿細論因緣豈一立談可盡耶便叫取錦墩相近御手相攙而坐婆子又道山野醜陋人所不齒過蒙娘娘俯召有何見諭天后道卿勿以非人自嫌卿乃孤中之人朕乃人中之孤讀駱生檄至今寒心朕反愧卿耳遂吟詩一首詩曰朕本百花王權閨人間帝應運合龍興作態非孤媚國法豈不伸文人亦可畏不敢照青銅對面還知愧又道朕那時甚惜駱賓王之才獻俘時聞有他首級不忍視之誰知首級是個假的駱賓王逃去為僧從來做官的欺蔽朝廷都似此類外人猶以朕為誅戮太甚公道何在又嘆口氣道駱生做了和尚反得昇天朕今猶滯於幽冥不思黃巢之亂百年朽骨重被污辱金玉之類發掘一空致朕今日環佩凋殘誠羞見卿之面也婆子抬頭看時果然天后頭上挽個朝天髻絕無簪珥身上身袍無帶婆子道黃巢草寇無禮娘娘神靈何不禁之天后道凡殺運到時天遣魔王臨世朕生在唐初黃巢生在唐末男女現身不同為魔一也朕當權之時天下誰能禁朕朕獨能禁黃巢乎婆子道聞天后在位日鑄像造塔廣作佛事功德不小為何尚滯於冥途也天后道凡人先發清淨心後獲布施福朕居心不淨修成魔道當時享盡女福單恨不得為男佛祈求無非為此今因緣將到已蒙上帝遣作男身矣婆子道娘娘此番託生富貴還如舊否天后道既成魔道必乘魔運而生若無權勢魔力安施朕前是女身且為帝王何況男乎卿女媚兒冥數合為朕妃即今已託之沖霄處士卿勿慮也婆子道娘娘既轉男身復得稱孤道寡豈少三宮六院美麗妖嬈而擇取異類之女乎天后道卿有所不知媚兒前身是張六郎當時稱他貌似蓮花者朕與六郎恩情不淺曾私設誓云生生世世願為夫婦不幸事與心違參商至此今朕為君彼復得為后鴛鴦牒已註定豈可變哉朕之發跡當在河北從今二十八年復與卿於貝州相見卿宜琢磨道術以佐朕命婆子道吾母子正為求道而來不知道術在於何處天后道朕有十六個字卿可記取必有應驗道是逢楊而止遇蛋而明人來尋你你不尋人天后又道卿三年之內必有所遇行住一般不須性急若得道之後可往東京度取卿女雖然改頭換面卿亦自能認也天機宜秘不可輕洩倘八十翁聞之為禍不小婆子問道八十翁何人天后道漢陽王張柬之也他為五王之首與朕世世作對卿宜避之說猶未了只聽得殿前一片聲吶喊侍女驚惶傳報道漢陽王聞娘娘復有圖王之意統領大軍十萬殺將來也天后嚇得面色如土起身向座後便跑婆子道娘娘挈領老媳婦一路躲避則個心忙腳亂把錦墩踢倒撲地絆了一交驚出一身冷汗原來臥在一個大墳墓下殿宇俱無身邊已不見了媚兒四下叫喚全無跡影正不知那裏去了哭了一回想道嚴半仙說我女兒有厄果然有此不明不白之事看看天曉只見墓前荊棘中橫著一片破石石上鐫著大唐則天皇后神道字樣婆子道原來夢中所遊乃天后幽宮他吩咐許多言語一一記得此事甚奇我且看這十六個字有何應驗雖然如此想起初離土洞時母子三口劍門山留下了黜兒到此又失去了媚兒單單一身好不悽慘既道是行住一般不宜性急且到太華山下尋個僻靜處住下幾時再作道理因這一節有分教老狐精再遇一個異人重生一段奇事正是踏破鐵鞋無覓處得來全不費工夫畢竟媚兒何處去了這聖姑姑有甚人來尋他且聽下回分解
