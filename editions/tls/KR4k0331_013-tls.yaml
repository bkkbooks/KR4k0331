body:
  text: 第十三回古洞天書不記年誰將半壁向人傳一從辨出雷文字修鍊成時擬上仙話說賈道士留著瘸子指望掛住那老婆子一條心腸是與媚兒重會的大關目不知什麼緣故忽然而去心下又惱又疼神魂散亂就做出這個癡夢來醒後短歎長吁酸楚了一夜次日問起瘸子衣服被窩都在還道他不曾遠去叫人四下訪問有人說他在劍門山下雇了牲口一個遠方漢子隨著他去了從此又著了一急病勢轉添夜夜夢見這小妖精來纏他泄了幾遍成了滑精的病日裏三不知忽然火動下邊就流出來了以後合著眼便看見媚兒看看骨瘦如柴自知不濟歎道媚兒我與你呵今生不作吹簫伴後世當為結髮親對了乜道和小鬎鬁說的都是永訣的凄涼話兒老道士從來不出房的也來看了他幾次病勢已是九分九釐的地位少不得預辦後事延至交春油乾火盡嗚呼哀哉剛剛二十七歲正是貪花不滿三十昔人有闕小詞名清江引說得正好百般病兒都可解切莫把相思害驀地痛鑽心整日魂不在到鳴呼才省得冤孽債這癡道士臨死還一心牢掛著小妖精為此一片精靈不散那一世媚兒託生胡家叫做永兒道士託生焦家叫做憨哥雖然不得到老齊眉也算做少年結髮在姻緣簿上勾除宿賬此是後話不提再說瘸子和楊興趕路饑餐渴飲夜住曉行不一日來到華陰縣裏先在楊巡檢門首經過楊興與瘸子進宅報與家主知道楊春慌忙出來相見敘寒溫中也說幾句爐火的話兒探他不料瘸子全然不曉只把雙眼來睜一言不答楊春只疑他不肯輕易講論也不窮究獻茶後就叫楊興送瘸子到西園與聖姑姑相會瘸子進得園門先會見了蛋子和尚心下想道我母親好沒正經如何招個野僧同住難道許多年紀到要和尚起來一到淨室見了婆子便問道妹子媚兒怎麼不在一處住前邊那野和尚又是何人婆子道一言難盡先說林中躲風夢見則天娘娘如此如此醒來就失了媚兒後來遇著蛋子和尚正應了夢中遇蛋而明之語他帶得有天書只我識得乃是九天秘法若修鍊時須得千金之費我只推要建普賢祖師佛院小兒左黜能點化黃白借這話兒誘出他些財物來就乘機接你到此同行修鍊卻不是好瘸子笑道怪得楊巡檢一見面便說什麼爐火好是我不答應不然卻不露出馬腳來麼正說閒話間楊巡檢來拜瘸師送上新衣一套舖蓋一副就約母子二人明日同往東莊看屋看地婆子道要買辦些藥料及出入奔走少不得託我家蛋子兄弟若用別個恐怕口嘴不穩明日也要他走一遭楊春答應去了不多時眾人送晚飯來擺下一桌素菜瘸子私對婆子說道娘怎的弄得些葷酒兒來吃便好婆子道有名的楊老佛家葷酒不聞的你休得慣了嘴到明日修鍊時整年的不許動葷哩瘸子呆了把舌頭一伸當夜無話次日早飯後楊巡檢吩咐差一乘小轎兩匹馬去西園迎接他三位自己先到東莊相候婆子乘轎在前一僧一道騎馬在後管家引著飛奔東莊上來一路看時果然好個去處但見田連阡陌樹滿邱陵田連阡陌零星住下莊家樹滿邱陵整隊行來樵子山坳中寬寬一片空閒田地曾為比丘尼道場高阜處大大一圈精緻莊屋已非郭令公故業倘建佛庵道院儘叫千門萬戶怕做不下鳥革翬飛若作鬼窟神壇便住半載一年真個不聞雞鳴犬吠最喜主人能好客深林飛鳥任安棲婆子見楊巡檢先忙謝道老檀越如此信心都是夙因所致楊春道來路上曾看這一片當地麼婆子道已看見過十分稱意了這貴莊外面也好個形勢只不知裏面房屋何如楊春道就同往一看便引著眾人彎彎曲曲各處走了一遍原來雖說莊房卻造得甚有體製牆門裏面一片大空場是堆積柴穀之所兩旁設下倉庫中間三間大敞廳左右幫幾間雜屋那左屋就是管莊的居住廳後開個大大的魚池以防火燭右邊望去都是亭臺花木之類三株古柏橫斜半朽用個朱紅木架兒扶著左邊一帶迴廊迴廊盡處另有個角門進了角門又是三間半屋裏頭書室樓房藥爐茶無不具備楊巡檢每年收租算賬也到此十日半月價住所以收拾得整齊若閉上角門時分明別是一座宅院楊春道這幾間敝房可將就作寓否婆子道何消這般精室罪過罪過又道只今晚就在此住下罷一動不如一靜只是所借母銀望乞作速留意楊春道三日內便湊集送到三位日用供給就在這小莊支用只怕炊爨時還要用個小廝婆子道更不消得楊巡檢臨別喚管莊的老王來吩咐一應供給要你支持須是周備每月只開賬來看便了又教將敞廳後面兩壁關斷貼下封皮若送供給時就從老王家裏穿出迴廊去不許別人走動又將角門裏面鎖鑰付與聖姑任意開關於是帶了幾個莊客去西園取三位的行李婆子住下這房子稱心滿意了少停園公同幾個莊客將行李送到蛋子和尚的包裹有天書在內行坐不離已帶在身邊只有鋪陳棍棒在耳房中也一齊取來了日沒時婆子叫蛋子和尚將側門鎖斷三口兒做一處商議蛋子和尚遊方熟脫一應買辦合用東西俱是他奔走左黜腿不方便專管看守法壇燒香點燭及煨煮三餐茶飯婆子專主教導他們畫符念咒按時修鍊預充分派已完其柴米之類老王處每月總支免得日日纏擾第二日清早楊奶奶差掌房的老嬤嬤抬個小轎兒到東莊特看聖姑姑敲門進來道奶奶聞知法眷同住怕不方便不好自來看叫老身多多致意婆子道足感奶奶掛念老嬤嬤看著瘸子笑道此位便是令郎瘸法師麼聖姑姑與普賢菩薩恁般識熟何不央菩薩吩咐天醫醫好了這隻腿婆子道一人一相不可更改譬如觀世音千手千眼何曾嫌多減卻幾個彌勒祖師一個大肚子垂到膝下何曾道不方便吃藥消他老嬤嬤聖姑姑說的是又道轎子裏有隻小官箱相煩蛋師去取蛋子和尚取進來放在桌上是個描金箱兒鎖上一把白銅小鎖老嬤嬤張神捉鬼的道老身有句私房話兒叫兩位師父權且閃開袖裏摸出條豬肝紅的舊汗巾來角上縛個小鑰匙兒將鎖開了箱內取出幾包東西做一堆兒放著道這銀子共是二百兩是奶奶的私房叫老身送與聖姑姑聊助雜費別的面前莫說婆子稱謝收在一個抽屜桌兒裏頭老嬤嬤又叮嚀道放在謹慎去處才好婆子道不妨事老嬤嬤道老身是恁般小心的莫怪多講又道今後聖姑姑見普賢菩薩時也替老身寄個名兒老身是孫氏奉過二十多年齋了婆子道當得當得老嬤嬤道老身只為死了老公兒女又不孝順所以孤身傍在奶奶身邊度日那一世只求個好兒好女足矣說罷依舊將空箱鎖上婆子喚瘸兒拿著送他出門上轎去了瘸子鎖了角門進來已自曉得奶奶送得有銀子便熱鬧鬧的要買東買西婆子道奶奶瞞著人送來的且慢些動彈等楊巡檢送到看多看少再作區處有詩為證陰性從來吝嗇多百般好事被蹉跎偏於佛面貪資福肯把私財施道婆話說蛋子和尚見事湊巧心中歡喜便要將二十四紙天書求聖姑譯出講釋婆子道今番我三人有一處修鍊你瞞不得我我瞞不得你這大紙上看字不甚方便可將素紙釘成手掌大小本貧道將唐音譯出賢弟細細謄寫庶幾作用時便於翻閱蛋子和尚道如此甚妙且說紙墨筆硯合用多少一起買下這小事今日先做下不妨婆子道每人好紙四十九張要筆十枝墨五錠小硯二個硃砂三兩三個人便要三倍如今謄寫小本費紙也不多再加紙五張筆一枝墨一錠足以夠用婆子在西園時原有人送下些錢鈔便把來叫蛋子和尚製辦這事因是先前派定瘸子也不敢攙越須臾之間蛋子和尚將文房四寶買齊婆子取餘紙五張裁破每張裁做二十餘頁除符形照樣描寫其他文字俱將唐音譯過寫成蠅頭細字蛋子和尚寫一行明白一行快活一行正是雖然未得神通使不作三心兩意人一日一夜都寫完了婆子對閱一過一字無差第三日天明將原來二十四紙用火燒化因這天書秘本可一不可二亦恐留下人間或致褻瀆罪有所歸也早飯後楊巡檢來到東莊抬著一皮箱銀子足千金之數交與婆子收了道點出黃金時倒換銀子再點便有無窮了婆子道正是如此楊春又道今番別了聖姑不敢請見了但不知丹成大約在於何日婆子道也看緣法遲早多則一年少則半載那時定有好音奉復倘或遲慢也莫性急楊巡檢別去婆子教蛋子和尚先取五方之土就本莊權算中央餘者東南西北俱在十里外取用各將布囊盛下其他世間動用之物貴的如金珠賤的如木石吃的如豆麥燒的如煤炭粗的如缸甕細的如針線清的如茶酒雜的如藥材色色都要買得完備一面蛋子和尚製辦東西一面婆子打掃樓下設壇先期齋戒沐浴擇六甲日吉時將土布囊定五方之位相去各尺許周圍將新壘起約高一尺五寸空處用五穀填滿上設明燈三盞晝夜不絕外用黃布製成神帳一頂罩下前面設香案一座供養著甲馬雲鶴每日設茶酒果三品早起念淨口咒一遍淨身咒一遍淨法界咒一遍安土地咒一遍安魂咒三遍然後依法作用此是常規不必細述且說安壇次日先將各人合用紙墨筆硯等排於六甲壇下婆子起首腳踏魁罡二字左手雷印右手劍訣取東方生氣一口念通靈咒一遍焚符一道蛋子和尚和左黜都依著婆子行事雖然一般念咒燒符這符形都是婆子動筆畫的如此七七四十九日紙墨筆硯俱靈然後商議召將蛋子和尚要得自家書符婆子道書符最是難事須要以氣攝形以形攝氣假如此符是何作用便要作此觀想如要興雲便想得一個陰氣起自丹田漸覺滿身都是雲氣充塞從七竅中噴薄出來瀰漫乾坤如要起雷便想得一點陽氣起自丹田漸覺一身都是雷火運旋從七竅中搏擊出來震動天地想就時急將此氣落墨一筆而成所謂以神合神以氣合氣正要把我的神氣與天地貫通這符方有靈驗初時尚費收攝到工夫練熟閉眼神便聚書空符亦靈此通天徹地之妙訣也若只照著符形描畫自己的神氣先自散亂如何感動得神鬼俗語云書符不效卻被鬼笑寫符不靈倒被神驚我今先寫與你們看從何起手從何結構如何凝神運氣你們看得爛熟然後動筆一法通萬法通一法不通萬法都不通了切不可粗心浮氣自誤其機蛋子和尚和瘸子喏喏連聲不約而同的問道書符之法已領教誨今欲召將不知將便能來否若來時如何相待婆子道正要與你細講有內將方可召外將鄧辛張陶苟畢馬趙溫關此外之十將也眼耳鼻舌意心肝肺脾腎此內之十將也先鍊就自己十將統一不亂存神定儼如外將森列在前然後呼之即應役之即從初時或先現半身後現全身若見神貌兇惡不可畏懼如其醜陋不可嘻笑須要敬之如父母親之如朋友役之如奴僕苟或不然必取神怒又凡欲召將必先預定所行之事所問之語若召至無用其將不為准信次後雖召亦不來矣兩個和尚道士未曾見將先聽了這段說話分明像小學生初進學堂還不知先生什麼規矩一肚子戰戰兢兢毛骨俱悚各自去虔心靜坐凝神養氣婆子到書符時先叫他兩個看樣蛋子和尚到底聰明看了一遍就會了瘸子也時刻把手向空中描畫也是緣法已至他從來懶惰的到此也精勤起來因他用心不過畢竟也被他趕上大家步罡踏斗念咒焚符鍊了一七二七到三七微有影響或聞劍佩之聲或露衣袍之色著來此尚非真將乃將手下之人所遣來閱壇者也四七五七始現真形或半身或全身或獨行或聯騎跟隨人眾或多或少只是竟往竟來不向庭中停駐說話的卻是為何原來這將的英靈無處不在只為常人精氣與他不相感通所以俗眼不能看見今日為符咒所拘遊行時未免從法壇經過又撞著至心至意的目光凝聚豈有不見之理其竟往竟來還是作用未滿法力不到之處到七七四十九天眾將站立庭中拱手受令四圍簇擁如有千軍萬馬之勢全不覺庭中狹窄婆子在前和尚道士在後肅容端立婆子開口吩咐道吾等三人乃上帝眷屬奉九天玄女娘娘法旨得九天如意寶冊天文符籙闡宏道法特召汝等前來輔助聽吾差遣功成之日奏聞上帝紀錄超昇諸將鞠躬稱喏而退了一霎時庭中寂然有詩為證盡道有錢堪使鬼也知無術不通神試看神將庭中列只為天書咒語真話說蛋子和尚見神將來往初時不免矜持到後漸漸也習慣了只是每遍是婆子當前兩個隨著腳跟做事雖則一般偏有婆子蛋子和尚性急信心不過欲得自試一番便悄悄的起個五更步入壇前如法捻訣念咒只聽得響亮一聲庭中降下一員天將怎生模樣有西江月為證眼似銅鈴般大面如紫蟹鬚鋼幞頭金色放毫光繡襖團龍花樣手執皂旗一面招風喚雨行藏英雄猛烈誰敢當使者姓張天將張使者鞠躬而前道吾師召見有何法旨倒慌得蛋子和尚面紅心跳急急按定神魂答道這裏樓後北窗少幾株大樹遮陰只有西園上四株梨樹絕大可速移來植於此地神將應聲去了須臾只聽得一陣大風飛沙舞瓦耳邊如軍馬離沓之聲到天明風息蛋子和尚往後樓看時四株大梨樹做一行兒的種下了乃張使者差神兵所為也婆子知道是蛋子和尚幹出這事便著實發作了一場說這天將非凡人之比不該把沒要緊事輕易差遣況今道法未成又沒什本事在身倘觸其怒性命難保蛋子和尚道偶爾試驗一次今後再不敢矣卻說西園上園公因這番大風後失去了四株大梨樹慌忙去報與楊巡檢知道楊春正在驚訝只見東莊老王也來報道今早五更風起聖姑姑住下樓房後邊添下幾株大樹楊春道角門鎖斷你如何看見老王道這樹高出雲端小人從外面望見卻是自來沒有的所以報知楊春情知又是聖姑姑的神通暗暗稱奇便道我曉得了你們不得在外人面前傳播各賞了酒飯打發回去不提卻說婆子和二人商議道如今將已鍊就可將七十二位地煞變化次第修鍊每鍊一法必要經歷四十九日其中有簡便的只管并日做去大約三年之內務期完畢二人見說得快當歡喜無限從此加倍用心步罡踏斗畫符念咒時刻不虛鍊過一個七七先能暗中搬運柴米之類不去與老王支取老王道他不來支一定不是缺乏老漢且落得些受用去查那柴米數時依然按月減少老王大驚又去報與楊春楊春只教莫說看他怎麼光陰似箭看看三年將滿婆子等三個把七十二般道法俱已鍊成且說神通變化大略如何但見上可梯雲下能縮地手指處山開壁裂氣呵時石走沙飛匿形換貌儘叫當面糊塗攝鬼招魂任意虛空役使豆人草馬戰陣下添來八面威風紙虎帶蛇患難時弄出一樁靈怪風雲雷雨隨時用水火刀槍不敢傷開山仙姥神通大混世魔王法術高原來這白雲洞法上等不比諸佛菩薩累修來證入虛空三昧自在神通中等不比蓬萊三十六洞真仙費幾十年抽添水火換髓移筋方得超形度世游戲造化他不過憑著符咒襲取一時盜竊天地之精英假借鬼神之運用在佛家謂之金剛禪邪法在仙家謂之幻術所以玉帝慎重不許私啟天封留傳人世也雖然如此高明之人借資法術全身遠害做個仙家的津梁入山採藥不怕虎狼千里尋師不費車馬也到是個捷徑為此白雲洞留下這一脈以待有緣之人洞主白猿神又添一筆在後要他每年向斗設誓若生事害民雷神不宥只為玉香爐煙起早了些蛋子和尚少摹了後面七十六個字所以不曾看著這一條利害的話今日修鍊成功便認做驚天動地的學問長生不老的法門到後來果然生事害民動起河北一帶數載的干戈使人罵妖名千秋不滅此是後話且說聖姑姑這番修鍊只用得楊巡檢的銀子其楊奶奶二百金原封不動遣個靈鬼送還他去了想起雁門山下初離土洞之時母子共是三口如今雖添了個蛋子和尚畢竟少了個胡媚兒是個缺典少不得要尋取將來傳授與他這是婆子心上第一件事了那起庵鑄像的說話原非本心不須提起只是還有一件我等三人受了楊巡檢夫婦多時供養又得他金銀相助之力一旦不辭而去覺得恝然每人宜顯神通留一個憶念與他瘸子跳起來道我送個虎與他看莊婆子道我原許他點化黃金今將樓前這塊太湖石點成與他做個鎮家之寶瘸子道正好我的虎就著他看守金子使盜賊不敢動念蛋子和尚道劣弟不才意欲召個上好塑手將我等三人形像塑此樓下使他家子子孫孫朝夕瞻禮瘸子道不好不好塑出我瘸腿來你卻笑他蛋子和尚笑道恁地時只塑個坐像罷了當下婆子口中念念有詞望石上只一噴沫涎如細霧散落急把手掌擦之凡掌所到處皆成紫金之色不一時整千斤一塊太湖石明晃晃變化金山一座瘸子剪個紙虎口中有詞順風吹去喝聲疾只見這紙虎撲地跳兩跳便成個黃斑老虎猛烈咆哮與真虎無異瘸子吩咐道老虎老虎聽我法語鎮守金山不許攜取有人攜取老虎逐去說罷把袖一拂依然是個紙虎瘸子看金山座下有個空處便放那紙虎在內蛋子和尚攝了個巧匠的生魂閉於樓下一夜塑成三個渾身極其相似聖姑姑居中蛋子和尚居左左黜居右蛋子和尚一見不勝之喜便道是我塑下的像我先磕個頭兒起首瘸子道野和尚磕頭誰來答禮蛋子和尚道若起身答禮時只怕腿不方便的被人看破瘸子也笑起來婆子道休得閒講想起今日得道緣由遇楊而止遇蛋而明都是天后夢中指點他說二十八年後當在河北興旺約我去到貝州相助此是天數我等一來不可逆天二來不可忘了指點之恩自今為始各人隨意逍遙念想動時立刻相見若運數到日切莫異心以違天道說罷婆子騰空而起在空中把手招他兩個蛋子和尚把齊眉短棒拋向空中化成萬丈金橋大踏步上去了瘸子道我且向壺天頑耍則個便向牆角頭揀個空酒瓶兒放穩在地叫一聲我下來也雙腳望瓶嘴中一跳不知那裏去了正是從來只有神仙樂法術高時不讓他畢竟他三人相會何處胡媚兒又在何處翻騰出什麼來且聽下回分解
