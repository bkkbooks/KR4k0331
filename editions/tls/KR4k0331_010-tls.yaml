body:
  text: 第十回休將懶惰負光陰鐵杵勤磨變繡針盜法三番終到手世間萬事怕堅心話說蛋子和尚暗想道這小洞內必是袁公藏書之所低著頭鑽進去時只見裏面彎彎曲曲或明或暗或寬或窄有好幾處像屋的所在內有石床石石椅石桌之類亦有石筆石硯石碗石甕諸般家伙俱生成形像拿不起的並不見有甚麼書籍再進去時洞漸小了地下低窪約有一二尺深的水料是盡頭處了覆身轉來再看一回已知天書不在其內鑽出洞來到前面石屋內周圍細看叫一聲阿也遠不遠千里近只在目前這兩邊石壁上鐫滿許多文字不是天書又是何物只是一件天生石壁掇又掇不去要抄錄時紙墨筆硯又不曾帶來如何是好且憑著自己記性背他幾條下肚也不枉辛苦走這兩番方才站定腳頭抹一抹眼角仔細從頭辨認那字腳忽聞得一陣香氣撲鼻走出屋外瞧時白玉爐中早已煙起慌得蛋子和尚不敢回頭拽開兩腿腳不點地一口氣直跑過了石橋到了松棚裏面打坐良久喘息方定自古道痛定還思痛想著兩遍到白雲洞中擔了多少驚怕受了多少辛苦不曾掏摸一些子在肚裏不覺的放聲大哭一連哭了三日三夜兀自哀哀不止只聽得外面大聲問道棚中何人如此悲切蛋子和尚聽得人聲抹乾眼淚鑽出棚外看時卻是個白髮老者怎生模樣但見眉端抹雪頦下垂絲聲似洪鐘形如瘦鶴頭裹著一幅青絹巾腦後橫披大片身穿著四鑲黃布襖腰間緊束細腳踹方舄飄飄真欲凌雲手執籐杖步步真堪扶老若非海底老龍定是天邊太白蛋子和尚見他形容古怪連忙向前打個問訊那老者又道長老不多年紀緣何獨自一個住在這荒山之中有甚苦情啼啼哭哭試向老夫訴說則個蛋子和尚道好教長者得知小僧從幼出家並無親屬只因一心好道要學個驚天動地之術聞知此山有個白雲洞內藏著天書道法因此不辭辛苦欲求一見誰知兩遍端午到得洞中全沒用處便把第一遍尋不見天書第二次見了又不能抄寫備細說了一遍說罷又哭起來老者勸道長老不須過哀聽老夫一言這白雲洞老夫少年也曾到過蛋子和尚轉悲為喜忙問道長者既曾到過必見天書不知抄錄得多少老者道雖則看見無計傳取後來遇著方上一個全真道人對老漢說此天庭秘法不比凡書可以抄寫要傳法時也不用筆臨也不用墨刷只用潔白淨紙帶去到那白玉香爐前誠心禱告發個誓願替天行道不敢為非祈禱過了便將素紙向石壁有字處摹去若是道法有緣的就摹得字來若無緣時一個字也沒有蛋子和尚道長者可曾摹得老者道老漢精力已衰就摹得來也做不及了故此不曾蛋子和尚道長者高居何處若小僧摹得來時好來請教老者道老漢離此不遠閒時又來相探說罷策著一根籐杖望東路一直去了蛋子和尚似信不信的道一不做二不休拼得功夫深鐵杵磨成針再守他一年十二個月好歹要掏摸些兒本事到手終不然這秘法不許人傳又鐫他在石壁上怎的從此息了念頭又做著下年的指望一連四五日內留心訪那老者住處並無蹤跡心腸又放慢了這松棚中怎過得一年四季少不得打疊個衣包提一根防身短棍仍向外方遊行化齋不一日來到辰州地方是甚麼去處複嶺重岡控溪扼洞山有二酉五城之雄水有黔江武溪之勝羅公隱處鳥鳴占雨無差辛女化來石立與人不異明月洞泉澄岩上桃花山春滿峰頭齊天秀色每連雲龍澗腥風常帶雨蛋子和尚在辰州往來遊食非止一日無事不題卻說這日偶行至黔陽縣界上到一個曠野所在高低不等四望都是亂塚此時八月下旬天氣草深過膝甚是荒涼走了多時沒處化一口齋飯吃看看日色墜西肚中飢餓正沒擺佈處忽見高岡上四五個樵夫挑著柴擔忙忙而走蛋子和尚趕上一步扯住個老成的問道貧僧要到黔陽縣中那一條路去近些樵夫指道向南只管走下了這岡子便是羅家畈大路那裏有幾家莊戶你再問便了天色已晚咱們還要趕過界口去沒工夫與你細講說罷招呼一聲前面夥計慢走挑著擔飛也似去了蛋子和尚不好阻擋遙問一句道這裏喚做甚麼地名聽得那邊答個亂葬崗三字蛋子和尚點頭道怪得丘塚纍纍原來是土人埋骨之所人生一世草生一秋不學些本事做些功業揚名於萬代之下似此一坏黃土誰別賢愚歎了一口氣向南而行又去了好多路地勢漸平見有幾處田畦禾黍想是羅家畈了只不見個居人也有幾間零星草房都封鎖著門沒人住下只得忍餓又走看看日落天昏望見隔溪一林樹木那裏像有個人家欲待渡溪而去不知深淺走近灘邊把這防身短棍豎起向水中一按打個探子誰知水深丈餘那棍直到水底跳將起來便半橫半豎的向下流溜去了蛋子和尚打撈不著只得捨了這棍沿溪走去看時約莫又是一箭之地溪面稍狹有兩根雜木將草繩捆著橫倒水面做個浮橋蛋子和尚性急便把雙腳踹上不提防草繩日久朽爛這邊身勢去得太重把兩根木頭一腳蹬開好個莽和尚收腳不迭蹋地躺將下去喜得是個淺處剛剛淹到乳旁並不曾吃半口水兒只將衣包都打濕了左腳陷在深沙裏面掙得脫時一隻麻鞋已失了當時無可奈何不管三七二十一拖泥帶水走過那一岸去將濕布衫和那裙兒褲兒脫下絞乾了水依舊穿上把右腳麻鞋一發脫了拋去赤了雙腳提了濕衣包遙望著樹林而走約莫離那林子還有半里之遠早見有數間茅舍近前看時卻也閉著門在那裏門外茅簷邊側鋪著一窩亂草一個頭陀盤著雙膝在上打坐面前擺一卷經典左首安放包裹倚著一根兩頭鐵裹的齊眉短棒兒蛋子和尚去向前叫聲老師父貧僧是失水逃命的求慈悲救護則個那頭陀垂著眼皮全然不睬蛋子和尚又叫道貧僧飢餓了老師父帶得有乾糧望布施些兒見在功德那頭陀只是不睬蛋子和尚道啐是木的還是石的只不開口莫待纏他我且去敲門敲得開時化碗熱湯來吃也好又猛然想道這屋內不知有人住沒人住那頭陀同是佛門中出身尚然如此黑夜敲門打戶知道人心喜怒如何打煞也只一夜且喜不是個寒天這濕衣裳在身上暖過一夜好歹也乾了衣包便慢慢的整理也不打緊把搭膊將腰束緊也來簷下向頭陀對面打坐那頭陀見這裏和尚坐下去時便罵道死禿驢這簷下是老爺要伸腰躺腳的恁般不達時務不管濕衣裳胡亂擠來叫老爺怎得安穩蛋子和尚想道那裏有這樣的出家人開口便罵恁地粗莽沒奈何耐了氣又對他說道貧僧走錯了路頭一日沒討得口齋飯又失腳落在溪中渾身打濕了夜晚沒處去權借這簷下歇過一宵明早就行與老師父沒甚妨礙望乞相容則個那頭陀愈加發狠罵道死禿驢你不認得老爺麼老爺叫做石頭陀異名石羅漢的便是一生遊方行也是獨行臥也是獨臥不慣與人合夥你這禿驢知是好人歹人來此混帳走便走不走時一棍就結果了你性命說罷便站起身來將手去摸那棍棒蛋子和尚又餓又冷身邊又沒有器械只怕那頭陀了得敵他不過慌忙立起道老師父息怒貧僧迴避便了那頭陀又罵道死禿驢怕你不迴避須是遠遠的與我閃開若近在側時老爺一眼瞧見休想恕饒蛋子和尚連聲道不敢不敢便提著衣包望屋後便走黑暗中正不知那裏去好信步走去到得樹林中間只見一株大松亭亭直上約有百尺之高心下想道這樹上到好棲身只是怎得上去心生一計將搭膊解下連衣包拴在腰裏向那松樹旁一根小樹跨上去一手攬著松枝將身就勢越過那樹又盤上幾層揀個大大的丫杈中似鳥鵲般做一堆兒蹭坐著方才安身得牢忽聽得下面聲響蛋子和尚眼快在星光下仔細一看只見那頭陀提著齊眉短棍在樹林左右行來步去東張西望口裏哼道死禿驢真個那裏去了穿過林子又去一段路才轉來倒拖著棍棒向舊路徐徐而去蛋子和尚看了叫聲慚愧且喜不遭他毒手只是一件那頭陀獨自一個坐在人家門首好不冷淡得個人作伴也好為何抵死不容比及讓了他罷了又來東尋西覓只恐還在左近放心不下其中必有緣故終不然要做打家劫舍的勾當怕我礙眼這個荒村草舍將有甚大財鄉動了他火好生難解且莫管他自己安息一時再處方欲閉眼不覺肚中餓得疼痛腸鳴起來蛋子和尚道這一夜好難過就熬過今夜來朝怎得氣力跳下樹去便跳下時跑走不動倘遇了那賊頭陀乾折個性命與他聞得仙人餐松茹柏我且學他一學把松枝上嫩毛摘來試嘗雖不可口卻也清香吃了些兒引得性起不論老的嫩的滿把的放在口中去只管亂嚼嚥下了許多也覺得腹中充實了些忽然一陣風遠遠的聞得號呼哭泣之聲蛋子和尚道奇怪這裏又不是鬧熱村坊此聲從何而來側耳再聽時其聲哀急又像婦女聲音分明在前面茅屋那一搭兒蛋子和尚猛省道是了一定是那賊頭陀幹了不公不法的事出來欲待不理心頭氣忿忿的怎忍得住我且悄悄地去探個下落也得放懷當時解下腰間衣包縛在樹上重把搭膊拴緊了腰分開松枝望下踴身一跳兩腳點地毫無傷損將身抖一抖走出林子照前路一步一步的捱去約莫茅屋相近悄悄地舒頭去望那茅簷下略無動靜再走幾步向前看時已不見了頭陀走上簷頭左右細看端的不見了側耳聽時裏面哭聲也住了蛋子和尚心下疑惑輕輕的推那門兒原來是兩扇舊白板門這石頭陀在裏面用棍撐著撐得不牢初時推不開以後用力一扌雙撲的一聲棍兒倒地左一扇門兒早開這茅房原來是小小三間開闊兩進一披頭一進兩邊安放些做屋的土磚木料更有幾處粗重家伙中間空個走路第二進做個內室左首披屋裏面安排鍋灶石頭陀脫得上身赤膊正在灶下燒火煮飯吃聽得開門響慌忙起身來看說時遲那時快蛋子和尚一腳踹進門來正踹著棍兒便曲腰下去綽棍在手知道裏面有人出來急向木料堆裏一閃閃過石頭陀黑暗裏急切不辨見大門開著便鑽出外去探望蛋子和尚乘著披屋下有些燈光透出到對著裏面天井一溜進去這邊進去的還不曉得裏面詳細那裏面暗處有個老婆婆先已瞧見和尚叫聲啊呀又是一位羅漢來到死也死也蛋子和尚聽得聲音情知有些蹊蹺卻待進步盤問只聽大門右扇開的一響是那石頭陀作勢推開蛋子和尚慌忙退出仍伏在木料堆邊只見那石頭陀踏進門內時覆身向外發狠的鬼叫道有誰大膽的敢進來麼喊了一聲便坐身下去摸那地下的棍兒誰知這棍落在蛋子和尚之手和尚有了器械早壯了三分膽氣那時看得仔細就他蹲下去時做個水面撈衣勢將棍可對著他屁股竭力向上一挑那頭陀出其不意精頭皮倒垂磕下橫身臥地蛋子和尚怕不了事舉棍又打下去那邊把右手來擋正迎著棍兒去得重只一聲響打折了兩個指頭連皮兒掛著石頭陀負痛便叫好漢饒命蛋子和尚已知得了便宜左手持棍右手揸開五指一把抓去連腰胯連肚皮做一堆兒提起到天井裏面高高的向下一擲那頭陀殺豬也似叫喊蛋子和尚向前一步將右腳劈胸踹定捻起升籮般大的拳頭在他臉上晃一晃喝道賊頭陀你要死要活那頭陀方才認得就是落水的和尚只叫師兄是俺得罪了饒命罷蛋子和尚罵道賊頭陀我只道你是江湖上有名的好漢少林寺出尖的打手原來恁般沒用的蠢東西叫甚麼石羅漢你便是鐵羅漢我也會銷鎔你起來迎暉寺前偌大一塊大搗衣石我也只一拳打個粉碎先前我再三讓你是我出家人本等你又到林子裏面來尋趁我你實說在此做甚勾當惹得他家啼啼哭哭快快說來還有個商量若半句含糊我也不用棍打只教把你做個搗衣石兒試我拳頭一試說罷便把棍兒撇下右手捻起拳頭待打那頭陀心慌又被蹬緊了胸脯好不自在儘力叫道佛爺爺佛祖師放俺起來待俺細說蛋子和尚道賊頭陀便放你起來料你也不敢走卻待鬆腳放他只聽得屋裏黑暗中有人叫道師父與我家伸冤則個莫放鬆他蛋子和尚認得就是先前一般的聲音定了腳看時只見個白髮老婆婆腰馱背曲半蹲半走的摸將出來到天井中朝著蛋子和尚連連的磕頭只叫伸冤蛋子和尚道老人家不要多禮你有甚冤情快說來我與你做主老婆婆道這天殺的壞了我家媳婦母子兩口的性命只這一句引得蛋子和尚心頭火起將腳跟向那頭陀的心坎裏狠力的蹬上一下那頭陀大叫一聲口中鮮血直噴出來有詩為證僧家淨業樂非常何事芒鞋走十方做賊行淫遭惡報分明好肉自剜瘡蛋子和尚方纔收起了腳扯起老婆婆問其緣由老婆婆啼哭起來指著披屋裏面說道師父去看便知蛋子和尚還怕那頭陀奸詐再要加他上幾拳只見他直挺挺的不動踢他一腳也不做聲了方才放心走到披屋裏去把壁上的掛燈兒剔明那鍋中兀自熱騰騰的氣出揭開鍋蓋看時噴香的一鍋熱飯是那頭陀才煮下的蛋子和尚正在要緊之中便道我且吃他兩碗卻又理會向灶前揀起一把茅柴點著去找個碗兒來用剛剛的在破廚櫃內取得一隻磁碗一雙柳木筋兒猛看見牆角頭又是一個人睡著倒吃了一嚇仔細打一照原來是個婦人剝得赤條條的死在血泊裏面卻好老婆婆帶著哭也摸進來了蛋子和尚問道這婦人是你甚麼人為何而死老婆婆道一言難盡拖著凳子頭兒教師父請坐等老身慢慢的告訴蛋子和尚道你莫管我儘你說我都聽得便盛著飯一頭吃一頭聽那老婆婆的說話老婆婆坐在門檻上從頭至尾告訴道老身家姓邢這死的是老身的媳婦我的兒子叫做邢孝在這羅家畈種田為生因本縣縣令老爺貪財責取里正要百來擔好丹砂這丹砂雖說出在辰州卻不是黔陽縣土產卻在沅州老鴉井內這井好不寬大四圍生成的青石壁須要積下乾柴放起火來燒得那石壁迸開方才有砂現出這裏羅家畈莊戶種田空閒時都慣做這行生意里正科斂百姓的銀子顧人去到那邊納了地頭錢取丹砂奉承縣令這畈裏幾家莊戶都接受得工錢但是有老婆的都寄在親眷人家去了只我家媳婦有了五個月身孕出門不得又是老身七十多歲兩口兒做伴在這房子內看守一月前邢孝還在家的時節媳婦患個肚痛的症急切沒個醫人剛遇這頭陀上門化齋兒子回他道現有病人在家沒心緒齋得你他問是甚麼病兒子不合回他說道媳婦有五個月身孕了現今患肚痛只怕小產那頭陀道我叫做石頭陀石羅漢不但會看經也曉得些醫理有個草頭方兒依我吃了肚痛便止又能安胎兒子也是沒奈何只得憑他解開包裹把幾味草頭藥煮來灌下果然肚痛止了當日請他一頓飽齋又不要錢竟自去了只道他是好人昨日又到這裏化齋媳婦回他道男子漢不在家改日來罷他不肯去就把言語調戲我媳婦起來媳婦閉了門進來了不理他他坐在門首唸經只是不去到深夜時分老身睡了媳婦還在中間績麻那頭陀曉得家裏沒人悄悄地把門弄開竟走了進來將媳婦抱住恐嚇他道若聲喚就殺了你當下被他強姦了這還是小事又教媳婦去燒下一鍋滾湯我要洗個澡媳婦只得與他燒水又教傾一半在桶裏那天殺的原來不要洗澡把包裹打開取一丸白藥教媳婦吃了後來易產吃下便覺有些肚痛他又解出兩隻新草鞋來浸在鍋內對媳婦說道我要與你借件東西合個長生不死之藥藥成時送些與你吃了大家升仙媳婦道借甚麼東西他道要你五個月的血胎媳婦慌急了哭拜告饒那天殺的雙手抱定剝個寸絲不掛將他綁住手腳按在桶上把熱湯揉他的肚皮媳婦痛極了再三哀告只是不允又將鍋內兩隻熱草鞋輪番在肚皮上揉擦可憐血胎墜下我媳婦當時血崩而死老身嚇壞了伏在後面不敢則聲只聽那天殺的說道到是個男胎他又在布袋內取米造飯只待吃了便走不期遇著師父到來奈何了他正是天理昭彰惡人自有惡人收蛋子和尚問道他取下血胎在那裏老婆婆道想收拾在包裹裏面了因這老婆婆話長蛋子和尚也不知吃了幾碗飯把鍋內吃個罄盡只剩個鍋底和尚放下碗筷向廚櫃上層尋著他的包裹就在鍋蓋上打開看時裏面又有小布包兒解開來是一條布裙子正裹著血團團的小廝和那胎衣在內又是一包十多兩散碎銀子又有一疋細白布包著一件裂火袈裟也有件直裰子及零星衣服另有個布囊盛下二三升雜米蛋子和尚觀看血胎心下想道不知他那長生不死的方兒是真是假配甚藥物怎麼取用可惜造下這罪孽棄之無用了念聲阿彌陀佛將血胎連布裙子遞與老婆婆老婆婆看見了重新哭起肉來蛋子和尚開了銀包揀幾塊大的約莫倒有五六兩把與老婆婆道這銀子你將去斷送了媳婦其餘自家收拾起了此時天已漸明走出天井看那頭陀面皮發黃已自沒氣腳下穿的到好一雙青布僧鞋蛋子和尚剝來穿下將這根齊眉鐵包頭的棍兒挑了包裹叫聲老人家那賊頭陀已死了太平無事我去了也老婆婆道師父你去不得蛋子和尚真個住了腳問道為何去不得老婆婆道你雖然替我除了這害撇下了兩個死屍教我如何擺布蛋子和尚道也說得是我且把賊頭陀的屍首拋在荒郊再作計較放下棍棒包裹一手抓著那死頭陀的腰褲恰似小雞兒一般提起屍首出了門直到林子裏面去此時天已大明認得夜來這株大松樹正待撇下屍首踛上去取那衣包只聽得遠遠的有人喝道清平世界那裏和尚殺了人撇在這個地方蛋子和尚定睛看時林子後面有七八個莊家一個個背著包裹跨口腰刀提口朴刀飛也似奔將來蛋子和尚不慌不忙撇屍在地早踛上樹去了取得衣包在手眾莊家把這株大松樹團團圍定蛋子和尚在樹上叫道貧僧不是殺人的是殺那殺人賊的列位閃開待貧僧下來相見說罷便撲地一跳跳出眾人圈外眾莊家又把和尚圍住盤詰來由蛋子和尚道列位且說從那裏來眾莊家道我們奉縣令老爺差委往沅州採取丹砂昨晚到縣和里正交納今早起個五更走到這裏蛋子和尚道列位中可有邢孝麼貧僧要報個信兒與他眾人裏面走出個矮黑漢子上前道在下便是邢孝蛋子和尚指著這死屍道這個賊頭陀便是你七世的對頭邢孝聽罷這句話好似一千個榔槌在他心上亂敲面色都變了一把扯住和尚道對我說個明白蛋子和尚道如今我說了你也不信貴居去此不遠列位休散了大家去做個證見眾人道邢大哥莫慌既然同到宅上自然有個分曉當時眾人隨著和尚一路走雖然腳尖兒同向前腳跟兒同向後卻有三種情況不同蛋子和尚的心下欣欣喜喜好像撐船的逆風收港有個結束了眾莊家心下疑疑惑惑好像看把戲的不知搬出甚故事來只邢孝的心下驚驚恐恐好像解察院的訪犯一般有罰無賞正是背人偷酒吃冷暖自家知卻說老婆婆見和尚去了心中害怕起來勉強去舖上拽一條被單將婦人的屍首就地蓋了摸到門前兩頭看著又不知那一條是來路東一張西一望只等和尚到來區畫這事夢裏也想不到兒子回來這裏老眼模糊還未分明邢孝先走一步早已看見叫道老娘你緣何獨自一個在門外看誰媳婦在那裏不陪伴你老婆婆一見兒子便扯住放聲大哭道我兒你早歸一日也不見得好端端的媳婦被甚麼石頭陀石羅漢弄死了邢孝道怎麼說老婆婆哭道他死得好苦邢孝搶進門來看時眾人隨後都到了一擁上前到把那老婆婆擠在後面只見邢孝連被單抱起媳婦放在後屋中間對著搥胸大哭眾莊家人人悽慘問蛋子和尚道這事怎的樣蛋子和尚道等邢大哥哭過了再問老娘便知邢孝道我娘年老之人須是長老與我剖個明白蛋子和尚便把自家落水借宿直到打死了頭陀後面你家老娘與我說如此如此這般這般備細述了一遍邢孝止不住腮邊落淚眾人無不咬牙切齒老婆婆埋怨兒子道都是你聽信了那天殺的鬼話吃什麼草頭方安胎藥引得那賊頭陀上門上戶弄出這事來如今一命便是兩命卻不是你自家害了妻兒一般眾莊家勸道老娘如今說也是無益了且喜得遇著這位長老報了冤仇死者也得瞑目只是如今林子裏躺著一個家裏躺著一個不是個道理也該作速計較家裏有米麼可煮些飯來吃了相煩長老同到縣令相公處首明等他差官相驗順便就帶口棺木下來盛殮省得過些時被做公的看見林子內屍首又造謠生事在地方上做一場生意蛋子和尚道聞得縣令是個贓官告許他怎的要埋時自家埋下便罷了邢孝道卻使不得當下敲火煮飯眾人各剝得有些乾菜都將出來等飯熟大家吃飽老婆婆把銀子遞與邢孝說其緣由邢孝又向和尚叩謝眾人道也要老娘去走一遭邢孝安排個羊頭小車教老娘坐上鎖了門央一個相厚的莊戶同推著車兒蛋子和尚提了棍把兩個包裹打併做一個背著眾人一擁到黔陽縣來等不多時候縣令正升晚堂眾人將血胎一包當堂呈上首告地方人命事縣令把一干人逐一審過錄了口詞當交縣尉一員下鄉相驗到次日晚堂回話無異官批石頭陀係無籍遊僧所犯雖重已死不究其屍責令地方埋訖沈氏著邢孝自行殯葬蛋子和尚因義忿殺傷免罪餘人都發回家去單留蛋子和尚在縣有話吩咐退堂之後縣令喚和尚到了後堂書房中屏去左右誇獎了他幾句次說道我有封緊要書信禮物要寄到慶元府親戚那邊路程遙遠沒個可託之人適才聞得你恁般義氣又且英雄了得肯與我幹這件功勞回來之日重重酬謝蛋子和尚道貧僧遊方之人那一處不去既然相公尊委不敢有負縣令大喜喚心腹吳孔目送長老到城隍廟居住庫上支兩貫足錢發與道士著他供給等候修書完日標撥起身不題縣令進衙收拾金珠銀兩打箱籠之事卻說蛋子和尚和吳孔目到城隍廟中先有官身報知道士迎進客堂坐下蛋子和尚看見廟宇傾頹房屋敝壞道士也衣衫襤褸因問道這神廟香火可盛麼道士道神道極靈香火也不絕的蛋子和尚默然無語茶罷吳孔目將兩貫錢交付與道士便起身吩咐好生管待道士就把三百文錢送與吳孔目折個東道送他出門去了道士問了蛋子和尚吃葷用酒忙忙的吩咐廟祝買東買西安排停當擺設在臥房裏面請他來坐又把自己鋪蓋搬了出來讓這房與和尚安歇蛋子和尚飲酒中間問起道既然神道又靈香火又盛為甚廟宇恁般狼狽道士嘆口氣道雖然如此在小道卻有損無益蛋子和尚低聲問道莫非縣令難為你們道士紅了臉不敢答應蛋子和尚又道貧僧與這縣令素不相識只今日要貧僧到慶元府走一番相留在此貧僧一時應承了不知是甚麼書信聞得縣令是個貪官刻剝百姓足下必知其詳你休疑慮著我但說不妨我們出家人難道到與贓狗做一路不成道士見他言語出得至誠便把兩指做個錢圈兒說道縣令老爺愛的是那個東西莫說別件只這城隍廟裏不論月大月小要納還他香火錢十貫不足數時小道還要賠補若布施得些米料在這裏縣中便來取用去了所以門內廊廡都無力修整他戴了幞頭神道也是勢利他的雖說威靈顯赫只在小百姓上做工夫撞著做官的全無報應蛋子和尚道他是那裏人氏有甚親戚在慶元府便一封書信打甚麼緊何必用著貧僧道士道他正是慶元府慈谿人氏姓侯雙名明宰在此做過四年官了每年積下若干贓物運至家中恐有虞定要個有本事的護送將去去年用人不當到洞庭湖中被劫去了聞得今番要走旱路他留著禪師一定為此他原是窮儒出身只這任官家中解庫也開過好幾個了貪心兀自不止禪師你道狠也不狠蛋子和尚道原來恁地道士道適才禪師盤問小道多口了路途中在他們管家或公差面前是必休題蛋子和尚道不消吩咐當晚酒飯已罷道士別去了蛋子和尚在房中思想道這些詐人的錢財到叫我替他送了去這事不成不成睡到五更只推解手取了包裹棍棒出了廟門一溜煙走了明日道士不見了和尚慌了手腳稟知縣令縣令道早是不曾託他幹事這遊方和尚全無信行也不責備道士只追他這兩貫錢完庫道士只得又去生錢借債補完這項倒折了三百文錢一頓酒飯後來侯縣令多用賄賂得陞京職自家建個生祠在縣中去任後被眾百姓夜半時抬那祠中的土偶折了腳撇在糞坑裏面了縣令在中途被馬驚墮地折足而死可見天道不爽此是後話有詩為證儘人吃著亦無多苦苦貪求卻為何試看墨吏終當敗縱免人誅有鬼訶卻說蛋子和尚那日出了黔陽縣離了辰州又往湖北荊南一路遊去逢山看山逢水看水留連光景不覺又過了一年看看李白桃紅又早梅黃杏紫蛋子和尚切記著本等前程預先買就一百張潔淨純綿大紙帶歸雲夢山下草棚中來將紙預先編個一二三四的號數把石頭陀這疋細白布縫個袱包兒包著又去清水潭中洗個淨浴到端午日早起在地灶中煨飯吃飽正待扎縛停當只見雲暗山頭下著一陣大雨蛋子和尚道卻不是晦氣這雨日日不下偏是今日與我送行起來只得在松棚內望空磕頭禱告道某今日有緣得見天書之面望乞斂雲收雨速現紅輪看看捱到巳牌時分雨已停止和尚喜不自勝取了綿紙提了齊眉棍棒便走此是第三遍了路徑已熟只山地濕高下崎嶇況且冒霧而行只恐遲誤忙忙的向前比及霧氣將散石橋也到了蛋子和尚舉目看時吃了一驚原來這橋是天生成一條青石經雨後其滑如油隨你節節小心如何把得腳住有人問道那三百六十日的濃霧難道石橋沒些濕氣直等這番大雨看官有所不知但是尋常的霧都是地氣上升天氣不應其氣氤氳迷亂而成所以沾衣而濕觸石則潤久而不解這白雲洞的霧是霧幕中噴出來的只是乾霧分明是蜃樓海市望之有形就之無所以前兩遍石橋全無濕氣今番雨後難行也若是三尺四尺不多步兒也還好處這三丈多長哩下面不測深淵可是取笑得的正是除非插翅飛將去動腳之時必墮傾是這般說時第三番又去空了卻不道風急雨至人急智生畢竟用著甚計來且聽下回分解
