body:
  text: 第三回橫生變化亦多途妖幻從來莫過狐假佛裝神人不識何疑今日聖姑姑話說諸蟲百獸多有變幻之事如黑魚漢子白螺美人虎為僧為嫗牛稱王豹稱將軍犬為主人鹿為道士狼為小兒見於小說他書不可勝數就中惟猿猴二種最有靈性算來總不如狐成妖作怪事跡多端這狐生得口銳鼻尖頭小尾大毛作黃色其有玄狐白狐則壽多而色變也按玄中記云狐五十歲能變化為人百歲能知千里外事千歲與天相通人不能制名曰天狐性善蠱惑變幻萬端所以從古至今多有將狐比人的如說人容貌妖嬈謂之狐媚心神不定謂之狐疑將偽作真謂之狐假三朋四友謂之狐群看官且聽我解說狐媚二字大凡牝狐要哄誘男子便變做個美貌婦人牡狐要哄誘婦人便變做個美貌男子都是採他的陰精陽血助成修鍊之事你道什麼法兒變化他天生有這個道數假如牝狐要變婦人便用著死婦人的髑髏頂蓋牡狐要變男子也用著死男子的髑髏頂蓋取來戴在自家頭上對月而拜若是不該變化的時候這片頂蓋骨碌碌滾下來了若還牢牢的在頭上拜足了七七四十九拜立地變作男女之形扯些樹葉花片遮掩身體便成五色時新衣服人有見他美貌華裝又自能言美笑不親自近無不顛之倒之除卻義夫烈婦其他十個人倒有九個半著了他的圈套所以叫做狐媚不止如此他又能逢僧作佛遇道稱仙哄人禮拜供養所以唐朝有狐神之說家家祭祀不敢怠慢當時有諺曰無狐不成村此雖五代時消息然其種至今未嘗絕也詩曰世間事事皆成假那得妖狐獨認真若使人情無假偽妖狐應自得天嗔話說大宋咸平改元真宗皇帝登極那時民安國泰自不必說卻說西川安德州有個梓潼村村中住個獵戶姓趙名壹原是敗落大戶人家為他行一人都稱他趙大郎那趙壹有個妻子姓錢是府中錢員外女兒年方二十二歲頗有顏色趙壹靠打獵為生那錢氏只在草堂中做些針指幫家過活稟性貞潔人人敬重一日出門汲水誰知被一個妖狐窺見那畜生動了邪心要去引誘他變做個俏秀才模樣穿一身齊整的衣服每日只等他丈夫出門便去到他門首或立或坐或時假裝飢渴討漿討水引得婦人開口他又故意掙幾句風話那婦人心堅如石全然不動因此魅他不得趙壹一連兩日在自己門首撞見了那秀才見他蹤跡有些奇怪問他姓名秀才答應在下姓胡名黜在前村看書閒步至此趙壹有心到前村訪問並無此人愈加疑惑忽一日錢氏早起梳粧不見了一只定髻的銀簪衫兒袖兒籠兒箱兒減粧兒被窩兒各處都翻遍了只牆腳下有個老鼠穴也點著燈照過幾遍那有些影像到午上煮飯熟了揭開鍋蓋這枝簪不歪不斜插在飯鍋中心拔起看時卻又作怪這滾熱的飯鍋裏面簪兒還是冷的錢氏恐丈夫不信瞞過不題又一日早起下床正要穿繡鞋卻不見了一隻趙壹道想是貓兒啣去了另換一雙穿罷那日趙壹出不多時便回袖裏摸出一隻繡鞋兒與妻子看道可是你的錢氏道正是那裏拾來趙壹道三里之外一枝石榴樹上掛著卻不是怪事錢氏方才敢把銀簪之事對那丈夫說起趙壹道此必山魈野魅所為常言道見怪不怪其怪自壞莫睬便了自是趙家怪異不絕亦無傷損夫妻兩個無可奈何只不理他後來慣了越不在意其時重陽節近風高草枯正是射獵的時候趙壹和幾個一般的獵戶駕著鷹犬掛了弓箭各執使慣的器械出了梓潼村到山中打獵但見人人逞勇個個誇強逞勇的道一箭可貫雙鵰誇強的道一人能斃二虎的叫的叫聲音悽慘驚駭的無非是野獸飛禽死的死活的活血肉淋漓束縛的總只是披毛帶角鷹犬媚人偏作勢刀槍遇物本無情只圖多獲作生涯一任旁人呼鳥賊趙壹和眾獵戶打圍將晚得了些巴鹿兔之類眾人均分了卻欲轉身忽然山土凹裏趕出一群獾來眾獵戶道我們各逞本事趕取那獾先得者眾人出來相賀趙壹道說得是叫幾個沒本事的莊戶守著鷹犬趙壹提著一柄鋼叉又同五六個好漢各執些槍棍的飛奔上去那一群獾被人趕急四散走了眾人便分頭追趕趙壹覷定一個絕大的豬獾盡力趕去約莫二三里路那獾已不見了趙壹心中不捨跑上高處望時只見那獾還在前山坡下亂草中東跳西鑽要尋個孔洞躲藏趙壹盡力又趕轉過了幾個山坡那獾走得沒了只見一頭大角鹿在坡下吃草那鹿見有人來便跑趙壹道雖趕獾不著若得此鹿也好遮羞慌忙脫下布衫拴在腰裏奔上坡趕了好一程那鹿又不見了只聽得泉聲亂響趙壹跑得口渴正要尋口水吃看看幾處澗水都是小小去處不甚潔淨依著流泉來路捱尋上去又行了一程直到那山土凹之中一股清泉如珠簾噴薄下來一面一個水潭潭內都是石子其清澈底趙壹放下鋼叉將手掬起呷了幾口道彀了眼見天色已晚提了鋼叉回身便走卻不知已來了二十多里之地此是九月初八日日光才退早現出半輪明月乘興而來敗興而去一步有一步約莫行不上一二里月光之下遠遠望見前面樹林中有些行動之影趙壹站住腳頭定睛看時卻原來是一個野狐頭上頂了一片死人的天靈蓋對著明月不住的磕頭趙壹道奇怪常聞人說狐能變化莫非這孽畜弄這道兒我且悄悄看他怎地只見那狐拜了多時趙壹望去看看像個美男子與先時所見胡黜秀才無異趙壹道原來如此不覺心中大怒輕輕的放下鋼叉解下弓來搭上箭弓開的滿箭去的疾看正狐身颼的射去叫聲著正是明槍易躲暗箭難防正中了狐的左腿那狐大叫一聲把個天靈蓋抓將下來復了原形帶箭而逃趙壹一來天晚二來心中也不免有些害怕打個寒噤不敢追趕掛了弓把布衫展開披在身上倒提鋼叉飛奔舊路而回卻說眾獵戶回村中沽了些濁酒煮熟了野味在山下涼棚內圍坐吃著等那趙壹的消息一人說大郎來得遲一定被他得手了一人說兩隻腳趕著四隻腳也把穩不得一人說趙大手段原來了得又有一人說此時不見回莫非趕不著獾反被獾趕去眾人都在談笑內一個眼快的指道這不是他來了眾人都走出涼棚迎著只見趙壹空手而回眾人道我等已趕得兩個豬獾烹煮在此大郎何故許久方回眼見得出采有分了趙壹道我雖趕不著這獾兒卻也撞著一件異事釋了一段大大的疑惑就把狐精弄月被射之事說了一遍眾人道虧得老兄除了地方一害似此說我等反來相賀中間多有不信的道趙大郎趕不著獾卻裝這篇鬼話來哄我我如何肯信除是我親眼看見方准又有個年長的道寧可信其有不可信其無一面扯著趙壹進涼棚內坐著把大碗斟酒送他一面又引著幾個狐狸精故事與眾人閒說眾人到底疑信參半趙壹道我一箭射中彼腿胯大叫而去想必地下血點尚存可驗我等明日同去就依著血跡尋取狐穴料不止一個兩個盡數拿來剝他皮做件襖子過冬卻不好麼眾人道如此再沒話說若果有些證見我等出來相請沒有時便是說謊少不得擾你大大一個東道趙壹應允當晚吃了一回大家拿些野味回家去趙壹到家中把前項事說與渾家渾家口雖答應心中也不十分決然趙壹一夜無眠巴得天明便跳起身來只聽門前樹葉亂響趙壹道今日是初九重陽信到風起了推窗看時只見絞得水出的一天烏雲趙壹性急道天變了趁這未下雨時我且扯眾人同走一遭回來早飯未遲忙忙的梳洗完了穿上布衫走到東鄰西舍去敲門時一個個都還在床上翻身叫得他起身東家又等洗臉水西家又等吃點心把趙壹等得不耐煩看看等下一天大雨趙壹起初還只指望雨止一口說不妨事不妨事過一會兒一發下得大了料是行走不成只得回轉家中吃了早飯在草堂中坐著兩隻眼睛呆看著天這雨自早至晚何曾住點有一篇苦雨詞道得好雨兒雨兒下得好沒撻煞又不要你插秧又不用你澆花又不等你洗面又不消煎茶急忙忙不住點為著什麼簷前溜緊一番慢一番細一番大一番刮得人耳朵裏害怕心兒裏愁緒如麻把個活動動的人兒都困做了籠中之鳥就是跨下個日行千里的馬兒也討不得出腳皇宮天子你在何處閒耍恨風伯偏不起陣利害的風兒刮刮雨師呵你費盡心力有什奢遮只落些兒咒罵索性你下個無了無休我到也無說話只怕連你也有那厭煩的時節這些濃濃淡淡的雲兒少不得收拾還家勸你雨師呵何不早一刻收拾了罷趙壹那時恨不得取一根萬丈的竹竿撥斷雲根透出一輪紅日又恨不得爬上天去拿個幾萬片絕乾的展布將一天濕津津的雲兒展個無滴渾家見丈夫晚飯懶吃只是納悶蓄得兩瓶好酒打開暖下把煮下的野味搬來與丈夫吃趙壹不覺吃得大醉進房來衣也不解襪也不脫倒身便睡直至四更方醒抬頭已不聽得有雨想是晴了又捱一個更窗上漸有些亮光趙壹起身便去推窗看天卻還是烏洞洞的且喜雨卻住了趙壹道這些害睡癆的料還未醒就吃了早飯去不遲忙催渾家起身燒湯梳洗安排早飯吃了飯出門看時又在下著濛濛的細雨趙壹道這些狗毛雨卻不濕衣服怕怎地行上幾步見地下十分泥濘趙壹復轉身來脫了襪套上一雙蠟底的腳屐走到東鄰西舍去拉他們時一個個都不肯動身道什麼緊要拖泥帶水跑許多路去若果有野狐被你射著此時正在害瘡料不連夜搬去忙他怎的趙壹見去不成又悶了一夜到第三日天色晴明趙壹道今日料無推託了侵早先到各家去約了一聲回家早飯過了又去東邀西拉有幾個老成的回了不去道這般半濕不乾的地下讓你後生家走罷其餘眾人道我們跟大郎拿得狐精卻來回話一行二十餘人各執器械趙壹當先領路彎彎曲曲走過了多少山坡眾人已自走得個不耐煩比及到了林子裏面各處搜尋並無半點血跡原來被這日大雨沖沒了趙壹也是這般解說眾人那裏肯信道這茂林之中上有樹枝遮蓋終不然雨沖得這般乾淨就是血跡沖沒了少不得他的穴洞也在左近如今那裏有個影兒趙壹引著眾人見神見鬼的尋覓了半響只管走遠了去眾人道呸青天白日打這樣鬼官司我等不去了轉去擾你的東道罷氣得趙壹啞口無言到得村中你也道趙大調謊我也道趙大亂說清平世界有什麼狐精狐精則趙大便是個說謊精至今人遇說謊的還說是精趙又說是亂趙的我們都為此狐精也有詩為證妖狐拜月本為真趙壹原非說謊人雨洗血跡無覓處世間屈事有誰論趙壹回來眾人都到他草堂上坐定要他出來做東道趙壹無可奈何只得將渾家幾件衣衫向解庫解些錢來備酒與眾人吃連幾個長老的都請來眾人咬嚼了一番臨起身道既擾了大郎今後別人問時我們便答應一聲有狐精也罷趙壹愈加不忿從此更不提起射狐一節話分兩頭卻說被箭的牡狐是個老白牝狐所生那老狐也不知年歲頗能變化自號一個美號叫做聖姑姑在這雁門山下一個大土洞中做個住窟這山東西兩峰突起其高接天北來南去之雁都從兩山中間飛過所以喚做雁門這聖姑姑生下一牡一牝牡的叫做胡黜兒牝的叫做胡媚兒原來狐精但是五百年的多是姓白姓康但是千年的多是姓趙姓張這胡字是他的總姓當晚聖姑姑同媚兒在月明之下講些丹術只見黜兒拐著後腿一步一顛叫而來到得土洞邊便倒在地下打滾亂老狐上前觀看已知左腿上著了一箭慌忙去拔時這箭頭入得深了落得痛苦全不動彈聖姑姑心生一計叫一聲兒子忍痛著便屏一口氣將牙關緊緊的咬住箭幹用雙手把他的腿盡力一推撲的一聲這箭幹便離了皮肉抽出來撇在地下那牡狐卻發昏去了原來這箭剛剛射中在腿彎裏筋絡已被射斷了兩條又且捨命掙回跑了許多路如何不死聖姑姑對著流淚喚媚兒一同抬他到土床上放下經兩個時辰方醒這老狐也識得幾味草頭煎湯洗治全無功效兩日之後看看待死正在悲傷忽想起益州城中有個太醫姓嚴諱名嚴三點此人有起死回生手段若求得他藥來時有何虞哉吩咐媚兒好生服侍哥哥自己扮做有病的老丐婦提一條百節竹杖逕望成都府而來只因這番直教老狐平添一段的見識重啟無限的事端正是法是有緣終到手病當不死定逢醫畢竟嚴太醫如何用藥救得那小狐精否且聽下回分解
