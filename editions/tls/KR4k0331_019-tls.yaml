body:
  text: 第十九回近日廚中乏短供嬰兒啼哭飯籮空母因附耳和兒語爹有新詩謁相公話說糜都監倚富欺貧見胡員外窮形窘狀負債不還胡員外冒雪而往落得一場怠慢肚裏又氣又苦倒是糜家老院子留義見飢寒之色看他不過拉他到僻靜之處一個小酒店內揀副乾淨座頭請員外上座陳學究下面陪席喚酒保吩咐打兩角酒要煖得滾熱卻不用小杯有上好嗄飯只顧搬來酒保道只有新出籠的黃牛肉別沒甚賣留義道有壯雞宰一個卻不好胡員外道一味足矣何勞過費留義道簡褻休笑留義親到甕邊把酒嘗得好了方教酒保去煖酒保滿滿的切一大盤牛肉連小菜鹽醋碟一齊擺下放著三個大甌子正待斟酒留義奪了他酒壺道待我們自便你自去宰雞快快煮來胡員外對留義道你老人家也請坐下留義道員外和教授在上小人如何敢坐陳學究道你不坐時連我與員外坐下的都不安了留義道既恁地吩咐時小人旁坐斟酒大膽休怪把大甌子滿斟兩杯送與員外和學究吃胡員外還是空心出門的吃了兩甌熱酒便覺面紅心跳道在下不能飲了有飯求一碗罷留義怕他肚飢也不苦勸便吩咐酒保道等雞熟了先拿一位的飯來我陪教授還吃壺酒酒保煮熟了雞也剁做一盤連酒送到才去取碗盛飯將一吃一添捧來問道那一位用飯留義叫送在胡員外面前叫一聲請員外擎著飯碗在手剛咽到一口想著家中妻女眼睜睜在指望如今卻空手而回我便有這碗飯吃了他們的飯還不知在那裏幾時到口不覺弔下兩行珠淚陳學究已知其意乃道當初是我多嘴的不是帶累員外將財買氣也料不到糜家是這樣人又對著留義道你家家主公少年與我相交如一個人百事與我商量有仁有義今日紗帽上了頭叫聲老爺就似閻羅王面前重換個人身一般連肚裏心肝五臟都變過了留義道黃河尚有澄清日豈可人無得運時員外暫時落寞終有好日且請吃個飽卻又理會若是我家主到底不認時在小人身上會也打一個來與員外經紀過活胡員外道如此多謝了吃了兩碗飯便放下筷留義道再請些胡員外道多了些酒實吃不得了留義看著陳善道既不用飯還勸杯酒麼陳善道員外從來節飲胡員外道自從患難之後一發來不得真個是酒落愁腸今日領二位高情已為過分了陳善與留義兩個也吃完了酒飯陳善便立起身來在袖裏摸出三百文銅錢把與員外道這一串錢胡亂拿回家去買頓點心只恨窮教讀不能十分加厚留義喚酒保會過了鈔還剩得一百多錢也送與胡員外說道小人卻輕褻了聊當一茶之敬胡員外想著家中苦楚又見他兩個都出於至誠只得受了作揖稱謝正是有意種花花不開無心插柳柳成陰有詩為證欺心官長輸窮漢有意家奴勝主人善惡俱由心上發由來不在富和貧從來施不在多要於當厄東京城內有名堆金積玉的胡員外今日患難中見了三百多銅錢便十分歡喜百分感激可見好人原是容易做的越顯得糜都監的人品反不如陳學究與留義了話分兩頭且說張院君共女兒冷冷清清坐著永兒道爹爹出去告人未知如何媽媽道世情看冷暖人面遂高低爹爹沒奈何擔著臉皮去告人知道如何永兒又道媽媽雪又下得大風又冷爹爹去告誰媽媽道我兒家中又沒錢不叫爹爹出去終不成飢得過日了我兒你且去床頭邊尋幾文銅錢出巷去買些點心來吃待你爹爹回來卻又作道理當時永兒去床頭翻來倒去止尋得八文銅錢媽媽道我兒都拿去買幾個炊餅來你且胡亂吃幾個充飢永兒拖著一隻破鞋將衣襟兜著頭踏著雪走出不廝求院子來那街市上不比深山曠野這裏往來人眾地下積雪不起都踐做爛泥十分難走永兒才轉個灣一腳踏個高低跌上一交手中銅錢撒做一地衣服都泥污了永兒爬將起來顧不得衣服在爛泥中檢起銅錢只有七文那一文不知拋向那裏去了尋了一會不見只得罷了行到大街賣炊餅處永兒便與店小二道個萬福道叔叔買七文錢炊餅小二哥接錢在手看時有一文錢是破的揀出不用永兒把來繫在衣帶上道只買六文錢罷小二哥把一生荷葉包了六個炊餅遞與永兒永兒接了取舊路回來已是未牌時分永兒沿著屋簷正走之間到一個空處只見一個婆婆拄著一條竹杖肐膊上掛著一個籃兒從背後趕上前來那婆婆怎生模樣的但見腰跎背曲面瘦皮寬眉分兩道雲髻挽一窩絲眼如秋水微渾髮似楚山雲淡形如三月盡頭花命似九秋霜後菊卻原來是個叫化婆子看著永兒道個萬福永兒還了禮婆婆道你買什麼來永兒道家中母親教奴家買炊餅來那婆婆道我兒好教你知道我昨日沒晚飯你肯請我吃個炊餅麼永兒口中不語心下思量我媽媽也昨日沒晚飯今日沒早飯這婆婆許多年紀好不忍見便解開荷葉包來把一個炊餅遞與婆婆婆婆接得在手看了炊餅道好卻好了這一個如何吃得我飽何不都與了我永兒道告婆婆奴家心不是都把與你家中三口兒兩日沒得飯吃媽媽叫爹爹出去告人祇留八文銅錢教奴家出來買炊餅中途跌了一文又退了一文破錢只買得六個炊餅媽媽吃兩個奴家吃兩個還留兩個等爹爹回來只怕他沒吃什麼東西要把與他救飢因是婆婆年高奴家不忍只得讓一個與婆婆吃婆婆道你媽媽問炊餅如何買得少了你卻說甚的永兒道媽媽問時只說奴家肚飢就路上先吃了一個就是婆婆道既然炊餅要將回去把這文破錢捨我罷永兒全無難色真個就在衣帶上解下這文錢遞與婆婆婆婆道倘你媽媽問起錢來又是怎的回答永兒道只說街上泥濘跌失了兩文錢就是婆婆道難得我兒心好且自聰明實對你說我不肚飢不要吃這炊餅還了你去永兒道我與婆婆吃如何又還了奴婆婆道我試探你則個難得你這片慈悲孝順的心我撩撥你耍了將這文破錢在手心中顛一顛呵一口氣便變成周周正正的一文好錢遞在永兒手裏問道這法兒好麼永兒道什麼樣法兒婆婆教會奴家則個婆婆道這小法不為希罕你肯學時還有許多好耍子的一發教你你識字麼永兒道奴家識得幾個字婆婆道我兒恁地卻有緣法伸手去籃兒內取出一個紫羅袋兒來外面細細一條麻索兒纏緊看著永兒道你可收了永兒接了袋兒道婆婆這是什麼物事婆婆道這個喚做如意寶冊許多好耍子法兒都在上面你可牢收了若有急難時可解開冊子來看便有解法倘不省得處只暗暗的喚聖姑姑我便來教你切勿令他人知道永兒把冊兒揣在懷內把這文變的好錢直穿在裏頭裙帶上謝了婆婆先走不上幾步回頭看時那婆婆忽然不見有詩為證一枚炊餅見人心羅袋天書報德深識得好心還好報施恩何必吝千金永兒捧著炊餅還家媽媽道我兒如何歸來得恁遲衣服都泥污了敢是跌了一交麼永兒道媽媽街上雪滑難行又跌失了兩文錢只買得六個炊餅媽媽嘆口氣道我兒命苦的只是苦多兩個錢的炊餅也飽不得我們一世只索罷了這泥污處莫動彈他等待乾時擦去了就是娘兒兩個把炊餅各吃了兩個那兩個仍把荷葉包了放在一邊不多時員外歸來媽媽見他臉紅問道你去這半日見甚人來那裏得酒吃員外把中途遇了陳學究同到糜都監家這段話述了一遍又道喜得天無絕人之路虧了他家老院子留義一片好心請我到店中吃了酒飯又與陳教授湊出三百多錢相助媽媽歡喜教員外去糴些米買些柴炭且過三五日又作區處娘兒兩個把剩下的炊餅又分吃了等待米來免不得做些飯吃到晚去睡永兒卻睡不著思想日間那婆婆與我冊兒時說道有急難便可解開來看今是爹爹雖糴得些米彀得幾日之用少不得又是飢餓也算做急難了我且去開開看有救餓的法兒沒有永兒款款的起來輕輕的穿了衣裳走出房門原來胡員外住下房屋是一間一披無非是些籬簽土砌那側邊披屋又破了只好將就做個炊爨之所把那一間屋隔斷做下兩個臥房前半段逼近了外街自己老夫妻住著後半段便把與女兒做房卻又在左邊抽出一條走路通著廚下天井裏去當夜永兒開門出去雖不經由爹媽床邊卻在緊貼壁如何不驚覺了媽媽問道我兒那裏去永兒道我肚痛起來有事媽媽道我兒想是受寒了你起身時仔細避風多穿件衣服莫要重重做病永兒道不妨事下床夾著了鞋兒到側邊破屋內只見雪光照耀如同白日廚下土灶沙鍋面桶之類無物不見永兒去懷中取出紫羅袋兒來解開細麻索兒打一抖抖出這個冊兒來看時只因胡永兒看了這個冊兒有分教少年閨女變成作怪妖精倒運乞兒仍作多錢員外正是直教三十六州年號改五六七載戰塵飛永兒怎麼樣變化成就且聽下回分解
