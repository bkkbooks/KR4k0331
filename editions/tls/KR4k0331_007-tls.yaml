body:
  text: 第七回座有閒人堪說鬼胸無奇字莫吟詩但將談笑消清晝閒是閒非總不知話說聖姑姑似夢非夢見了武則天娘娘說起一段因緣原來媚兒是張昌宗轉生那一世則天娘娘為男張昌宗為女相會在貝州復得配合稱王稱后則今媚兒已不見了又不知與那一個沖霄處士好生奇怪既說道行住一般明明教我歇腳我如今想來那裏是住處思量一會道有了這華山嶽廟的香願原是媚兒說起且到西嶽廟聖帝前進炷香保佑媚兒就便看那裏有甚僻靜之處可以棲身好歹等他三年再作區處瘸子既把與道士做徒弟看這道士十分美意諒不至於失所到是放得下的當下婆子獨一人自往華陰縣太華山去進香怎見得了太華山景致有西江月為證峭壁聳突如削危崖仙掌遙擎蓮花湧地燦明星屈曲蒼龍臥嶺太白攜詩欲問昌黎賈勇先登不如收拾利和名睡個希夷不醒婆子到得山上向西嶽座前撮土為香拜了聖帝幾拜磕了幾個頭通陳了一回無非是祈求道緣早遇母女重逢的說話下得殿來觀看景致訪問陳摶先生有人指道這個希夷峽便是他尸解的去處方知陳摶已仙去了婆子愛這個希夷峽幽靜夜間就在峽下存身日裏只借化緣為名來山前山後行走看這來往男女雲遊僧道觀其動靜若化得幾分錢換些素酒素食受用也是常事一日同著一般樣的貧婆閒站了半日不曾撞見個肯布施的香客看看午牌將過只見兩乘小轎抬著一個婦人一個丫鬟上山燒香眾貧婆等他出殿燒紙過了便去上前抄化婦人道今日沒帶得錢來婆子聽得他這話便閃開一邊那些眾貧婆因早起到今不曾討得一文錢算定這女眷定肯開手的如何放過抵死纏住要他發心善捨你一句我一句道明中去了暗中來今生布施來生福那見海龍王沒寶婦人焦燥道我又不是楊老佛楊奶奶你有本事到他那裏享用他大請大受纏我怎的分開眾人下了階上轎抬著飛奔去了眾貧婆歎聲晦氣沒興沒致的四散走開婆子看個老實知事的便去問他道方才說甚麼楊老佛楊奶奶是甚意思貧婆答道這裏華陰縣裏有個楊春巡檢出名叫做楊老佛乃大富之家夫妻兩口都好道各處燒香布施不拘僧尼道士但是有本事的與他說得來講得合他便整年價供養這奶奶一年也到這山上兩遍見了我們每人整十來個錢這樣捨又把大食籮抬著火燒饝饝給散我們吃今年二月中來過一遍了到秋間定是又來你少不得看見的婆子聽在肚裏當晚過了一夜明日早起打扮個貧乞老道姑的模樣下山到華陰縣前問了楊巡檢家逕到他家門首去只見門前貼著謹慎出入四字又有兩行告示上寫道一應僧道尼姑止許於每季首月初一日西園赴齋本宅門首例不布施婆子暗想道卻又作怪只見鎮門的石獅子上靠著一個老門公解開布衫在那裏捉虱子見了婆子進門慌忙把布衫披上喝道快走出去婆子上前打個問訊道貧道是西川人氏發心來朝西嶽經由貴縣缺少了回去盤纏特求布施則個這管門的張公道老道姑你沒造化十日前來還沒有這告示如今不布施了婆子道久聞巡檢老爺夫婦好道四方那個不傳說好個楊佛子楊奶奶如今怎的就灰了這善心張公道本宅老爺奶奶當初果是歡喜施捨四方僧道若能講經說法的便把房子與他住下不論年月供養臨動身時又齎助他盤纏衣服之類這門首時刻有人募化不是這般冷靜只為一月前南路來一個尼姑約莫四十多歲會說些因果奶奶好聽的是因果話兒留在宅內住了半個多月又是十四五個遊方和尚做一班兒念拂抄化也有頂包的也有撚指的也有點肉身燈的本宅也齋了他一遍布施他些錢帛誰知那一班是大夥強盜這尼姑正是個引頭暗暗裏漏個消息夜間裏應外合明火執杖打劫了若干東西去老爺和奶奶還走得快躲了這性命他兩個老人家商量說是前生欠下那和尚尼姑的債莫去告官帶累地方鄰里了從今為始也不布施也不許放進門來相見只每年正四七十這四個月初一日在西園設齋一遍如今四月初一日又過了老道姑你不如別處去罷我這縣裏除了本宅也少個慷慨施主就化了一兩個錢來也濟得甚事婆子道出家人裏面好歹不同只為他歹的帶累了好的張公道正是婆子道貧道也不指望布施了只聞得老爺奶奶是兩位現世的菩薩特求一見他日西方路上也好做個相識說猶未了只聽得宅裏有人開那第二重門出來張公道老爺出廳了你快些躲避莫累我們受氣慌忙向自己腰邊一個破纏袋裏頭拈出個銅錢來放在石獅子頭上道我自把這文錢捨你去罷婆子那裏肯走只見裏面一個安童牽一匹高頭白馬到大門前帶住韁繩站著隨後楊巡檢出來頭戴金線忠靖冠身穿暗花絹道袍腳踹烏靴手執一柄川扇背後一個安童打傘一個安童抱著交床一個安童捧個盒子盒內無非香燭之類盒上又放個紫檀空盒兒又有一班家用的吹手各帶樂器隨著出門那巡檢老爺踏著交床跨上雕鞍眾人一擁望西而去張公埋怨道你不見老爺出去了早是他沒看見你若看見你時又嗔怪我門上人不遵他的告諭我捨你這文錢你不收了還要怎地婆子道那要你老人家壞鈔沒有得布施便罷這錢貧道決不敢受兩下裏正在你推我辭忽有個慣賣山亭兒的壽哥挑著擔子打從門首經過側首門房裏跑個四五歲的小廝出來扯住張公叫道老爹爹我要個山亭兒玩耍張公見這婆子不肯收受便喚住壽哥擔子在石獅子頭上取下這文錢來買了一個山亭兒把與小廝道好好玩耍不要弄壞了再不買與你那小廝笑哈哈的跑向門房裏去壽哥挑著擔也自去了婆子道這小廝是你老人家甚麼人張公道是老漢第二個孫兒方才抱交床跟隨老爺的是大孫兒就是那小廝的親哥婆子道怪道一般嘴臉生得伶俐你老人家好善積下來的張公道老爺身邊許多安童只歡喜我的大孫兒出去不拘遠近定要他跟隨婆子道方才老爺往那裏去卻用用著一班吹手張公道西門外迎請梵字金經哩婆子道這經是那裏來的張公道是個哈密僧帶來的這哈密僧又啞又聾在這裏西門外觀音庵內借住活到九十九歲無疾而終身邊別無一物存留下這部梵字金經庵裏長老說有人造個龕子斷送了他就將這部經把與他去是我家老爺替他造龕燒化又請僧眾做些法事與他今日到那庵內請這部經供養在西園佛堂裏去婆子道是甚麼經張公道知道他是佛經道經灶王經誰識後半個字來婆子道若是梵書貧道或者到也辨譯得出張公笑將起來道聞得此經是西域天竺國來的一片泥金寫就與世間字體不同所以叫做梵字金經先在庵中經過了許多人的眼睛並無人識你這老婆子調這樣謊罪過罪過婆子道不瞞你老人家說貧道曾跟普賢菩薩受過一十六樣天書所以諸經梵字無有不識原來這老狐精多曾與天狐往還果然能辨識天書說普賢菩薩乃是鬼話張公聽了大驚道普賢是觀世音一輩你如何看見得他婆子道貧道與這位菩薩有緣不時相會的你老爺要瞻禮他也極容易張公道是真的還是假婆子道千真萬真張公道若果然如此等老爺回時老漢即便稟知只不知女菩薩尊姓安歇何處今恐怕老爺回得遲你等不及去了倘或要尋你時那裏相請婆子道貧道喚做聖姑姑若老爺有請我時向東南方叫聖姑姑三聲貧道即便來也這婆子說罷飛也似的跑去了常言道一人吃齋十人念佛因這楊巡檢夫妻好道連這老門公也信心的見婆子說話有些古怪便認真了當日楊巡檢到庵中拜了佛像請出了梵字金經來解去舊繡袱揭開細看喝采了一回重換個大紅蜀錦袱兒包了放在紫檀匣內自己捧著坐在馬上一班吹手笙簫細樂迎入西園中佛堂內面供養在觀音菩薩面前燒香點燭又拜了四拜打發吹手先回自己又在園中遊玩了一番臨去吩咐園公莫放閒人到佛堂裏去恐不潔淨四個安童跟著騎馬而回有詩為證笙簫一隊擁雕鞍手捧金經心裏歡識得如來真實意唐書梵字一般般這裏張公見楊巡檢下馬便跟進廳來稟道老爺賀喜了今日請得金經就有個能識梵字的到此求見楊巡檢問道是何等樣人張公道是個女菩薩法名聖姑姑他說是普賢菩薩的徒弟能識一十六樣天書老爺若要請他相見只向東南方喚他三聲他立地便到楊巡檢似信不信道有這等事且待明日看他再到我們首來否楊巡檢進了內宅把這迎取金經和那聖姑姑的這班說話一一對奶奶說了奶奶道適才有件怪事正要說知我到天井中去看石榴花只見東南方五色祥雲一朵冉冉而來雲中現一位菩薩金珠瓔珞寶相莊嚴端坐在一個白象身上我心裏道是普賢菩薩出現慌忙禮拜下去抬起頭來就不見了我只道是假相這般說起真個是普賢菩薩同著這聖姑姑來的這聖姑姑定不是凡人據這菩薩出現的是他徒弟也不見得明日只依他叫喚他若來時把這梵字經教他識認看他怎地若果是普賢菩薩的徒弟定不說慌的說話的這雲端裏的菩薩是誰就是聖姑姑變來的第二回書上曾說過來他是多年狐精變人變佛任他妖幻只沒有甚麼大神通所以成不得大器有詩為證藤蘿牽攣為瓔珞樹葉披來當道衣堪笑世人無法眼認真菩薩便皈依當夜無語到來日楊巡檢喚當值的備下香燭擺在廳上自己穿著一身潔淨新衣走出廳前對著東南方志心的叫了三聲聖姑姑聲猶未絕管門的張公來稟道昨日的老道姑已在門外了楊巡檢心中驚異便道請進這請進兩字還說不完只見廳上站一個老道姑到向下邊打個問道老檀越貧道稽首了楊巡檢已知是聖姑姑又不見他走進門來何得就站在廳上心中又疑又怕慌忙磕頭下去道我楊春有何能敢煩聖姑姑下降有失迎接婆子道不須老檀越過禮你夫妻都有佛緣的貧道承普賢祖師吩咐特來一見楊巡檢看那聖姑姑模樣雖然髮白面皺但兩眼如星光比凡人精神不同身上襤褸卻也乾淨當下楊巡檢分明見了個活佛歡天喜地接入後堂請奶奶出來相見夫妻兩口拜為師父整備素齋款待聖姑姑上坐他老夫妻坐於兩旁席間提起金經一事婆子道不是貧道誇口任你龍章鳳篆貧道都知當下齋罷楊巡檢叫安童備起轎馬自己夫妻兩口和那婆子共是兩乘轎一個馬少不得男女跟隨直到西園這西園雖不比金谷繁華端的也結構得好但見地近西偏門開南面行來夾道兩行宮柳間疏槐步入迷縱一帶竹屏盤曲徑前面設五間飯僧堂中間造幾處留賓館樓窺華嶽那數他纍石成山水引渭川不枉了築亭臨沼迥廊雅致到書房疑是仙家淨室幽閑傍佛堂如遊僧舍開徑逢人宜置酒閉門謝客可逃禪楊巡檢和奶奶讓婆子先下了轎吩咐園公引路逕到佛堂三個同拜了佛像楊巡檢教安童抬過一張黑漆小桌兒抹得乾乾淨淨親手捧那紫檀匣兒安放桌上開了匣蓋將經取出解開紅錦包袱請聖姑姑觀看這婆子合掌念了一聲阿彌陀佛便將經文展開前後看了一遍說道原來是一卷波羅蜜多心經卻是天竺梵書又後面脫了菩提薩摩阿五個字所以世人不能認辨楊巡檢不信教取一卷唐本心經把與聖姑姑逐字配對分說果然少了五字楊巡檢夫婦自此愈加敬重當下楊奶奶要請聖姑姑到家中同房住下早晚講論這婆子不願就將佛堂後邊三間淨室打掃潔淨收拾鋪陳器具逐日三餐供養這聖姑姑在內這婆子只是獨自一個住著夜間也不要個丫鬟婆娘作伴又對楊奶奶說素齋素酒有便送些來吃若不便也不消貧道可以十年不飲不食楊奶奶想道這飲食可是一日少得便束緊了肚皮怎過得十年我且推個事忙不送他幾日供給看如何吩咐園公只說有事家來鎖了園門一連七日影也沒人走去第八日楊奶奶乘個小轎親到西園開著鎖望他只見聖姑姑在靜室中安然不動坐在蒲團上念佛楊奶奶道聖姑姑可飢麼婆子搖首道正飽哩楊奶奶回宅對丈夫說道聖姑姑七日不吃東西全不妨事越有精神有恁般奇異夫妻兩口越發道是活佛了從此華陰一縣都傳個遍說楊巡檢家供養個活佛論起理來若是活佛他也何求於人受人供養到底有見識的少縣裏若男若女每日價成群逐隊都到西園去求見也有願拜他做師父的過了一兩個月沸沸揚揚隔州外縣都知道這話來的人越發多了楊巡檢恐怕惹是招非不便對聖姑姑商議只說閉關三年一概不接見外客把佛堂前門鎖斷貼下兩層封條卻在後邊通個私路彎彎曲曲的魆地裏送東送西楊巡檢又向本縣知縣說知討一道榜文張掛禁絕外人混擾眾人見了縣衙禁約再也不來纏張只本宅老夫妻兩口有時來園中游玩私到淨室整日整夜的談論些因果佛法眾人也不好去管他自此這老狐精只在華陰縣裏受楊巡檢家供養他也自家想道則天娘娘所言遇楊而止四字已應驗了只不知這遇蛋而明這四個字又是如何說話的忘了一樁緊要關目了那胡媚兒還不知下落緣何不見題起看官且莫心慌只有一張口沒有兩副舌頭怎好那邊說一句這邊說一句如今且丟起胡媚兒這段關目索性把遇蛋而明四個字表白起來單說泗州城界內有個迎暉山迎暉寺寺中住持老和尚法名慈雲只一個房頭大小到有三四眾徒弟又有一個老道叫做劉狗兒這慈長老年近六旬極是個志誠本分的一日州裏有人家請他看經慈長老想道身上衣服有個把月不曾漿洗了又沒得脫換且燒鍋熱湯淨一淨也好拿個桶到寺前潭中去汲水只見圓溜溜的一件東西在水面上半沉半浮看看嗒到桶邊乘著慈長老汲水的手勢撲通的滾到桶裏來慈長老只道是蛋殼兒撈起來看到是囫圇蛋兒像個鵝卵慈長老道這近寺人家沒見養鵝那裏遺下這個蛋兒且看他有雄無雄若沒雄的把與小沙彌咽飯若有雄的東鄰的朱大伯家雞母正在那裏看雞送與他抱了出來也是一個生命佛經上說好吃蛋的死後要墮空城地獄倘或貪嘴的拾去吃了卻不是作孽把蛋兒向日光下照時裏面滿滿地是有雄的忙到朱大伯家教他放在雞窠裏面若抱出鵝來便就送你罷朱大伯應承了不抱猶可抱到七日朱大伯去餵食只見母雞死在一邊有六七寸長一個小孩子撐破了那蛋殼鑽將出來坐在窠內別的雞卵都變做空殼做一堆兒堆著朱大伯慌了便去報與住持知道慈長老聽說吃了一驚跑去看時連呼作怪作怪是老僧連累你這窠雞卵都沒用了等明年蕎麥熱時把幾斗賠你罷朱大伯道不消得這也是各人的命運只怕東鄰西舍傳說開去鬧動了官府把小事弄成大事前村王婆家養一窠小豬內中有一個豬前面兩雙腳全然像個人手被保正知道報了州裏說民間有此怪異州裏差幾個公人押了保正到了王婆家要這個豬去審驗這一夥人到時要酒要飯又要詐錢連母豬都賣來送了他還不夠用如今老師父快快拿這怪物去撇下了休得要連累我家慈長老聽了這般說話嘿嘿無言只得脫下皂衫連窠兒蓋著帶回寺裏也不對徒弟們說知逕到後面菜園中拿柄鋤兒鋤開牆角頭一搭地就把雞窠做了小孩子的棺木深深的埋了正是一坏濁土埋藏不滅的精靈七日浮生斷送在無常倏忽死生二字皆由命禍福三生總在天若是蛋中的小孩子死了到也終了個禍根不知能遂長老的意否且聽下回分解
