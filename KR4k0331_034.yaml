body:
  text: 第三十四回從來叛亂數應然也是朝廷政未全試看聖明全盛日放牛歸馬任安眠話說大宋慶曆年間仁宗皇帝雖然聖明卻被奸臣夏辣蒙蔽引用王拱辰魚州詢等一班小人造言生事謀害忠良一連罷去了六個賢臣那六個文彥博韓琦富弼范仲淹歐陽修包拯他六個都是老成練達肯替國家做好事的自六個去後夏辣受樞密使之職專一賢嫉能招權納賄所以州縣多有貪官天下不得太平西夏反了趙元昊廣南反了儂智高都未收復今日貝州反了王則也為著貪官而起當時貝州一州的官只走得通判董元春提點田京兩個徑至京師把反情奏知朝廷仁宗天子聞奏便召樞密院官商議夏辣奏道此乃知州張德不放錢米一時激變軍心非地方之反叛也不煩聖慮臣保一人乃冀州太守劉彥威此人將門之子文武雙全只消此人領著本部人馬前去相機剿撫可保無虞仁宗准奏即忙傳下聖旨令冀州太守速領本部人馬徑往貝州或撫或勦一任便宜行事事平之後論功升賞這太守姓劉名彥威雖然是文科出身家世將門精通韜略使一柄大桿刀有萬夫不當之勇當日接了敕警便請都監茹剛商議茹剛道聞得貝州一夥妖人作耗廣有神通須當量力而進不可輕敵劉彥威大笑道劉某曾讀詩書自古道邪不勝正吾仗天威討誅反賊有何懼哉當下擇個吉日點起本部五千人馬茹剛領一千人為前部先鋒牙將段雷領一千人馬為合後自己統三千人馬為中軍一齊進發殺奔貝州來卻說貝州報子探聽得劉彥威起兵飛馬來報王則貝州一州人都慌了王則雖然學得些武藝從未經過戰陳也不免恐懼急請左黜張鸞卜吉三個人來商議說話的問你彈子和尚到那裏去了看官有個緣故那和尚三遍到白雲洞袁公處盜法時節曾到白玉香爐前誠心禱告發願替天行道不敢為非只為不識天書虧得聖姑姑辨認就同聖姑姑和左黜三個一齊修鍊因見聖姑姑說河北三十六州合當換主衆人該得輔助王則除滅貪官污吏這都是天數彈子和尚信了這般言語所以把善王太尉三千貫錢相助王則散與兩營軍士以後衆人去殺州官和尚就躲過一邊不曾同去為何的一來是佛門中出身又是慈長爺手下長大的終帶三分慈悲之意二來他心靈性巧既說過了願常把替天行道四個字存在胸中就蒿惱包龍圖也是包龍圖先要去拿他卻不是他惹禍今日雖然信道天數也要觀其動靜不肯出身露體生事造業這裏王則據了貝州城那和尚自在城外甘泉寺裏居住只有左黜等三人朝夕共事故此今日王則只請他三個商議瘸師道打聽得他那裏有多少人馬王則道有五千人馬左黜道便是他有五萬亦不足慮這裏兩營共有六千人留一半守城一半迎敵看我左黜本事王則親到教場點軍只見軍中走出兩個新添統領使的教師來一個是張成一個是竇文玉參拜過了稟道兩營軍士受了主帥大恩並無寸報某等情願各分本部一千五百人出城乘他安營未定殺他一陳挫他鋭氣使他不敢正眼覷俺貝州王則大喜各人賞了披掛一副戰馬一匹點了三千人馬犒賞已畢吩咐來日出軍小心在意過了一夜次日兩個統領使全身披掛整軍馬大開城門分兩路殺將出去瘸師看見他去得雄猛且教他試探來兵虛實也不阻擋且說張成引著一千五百軍先行約出城三十餘里地名傅家疃恰好遇著冀州先鋒茹剛軍馬正欲排開鬥勢准備廝殺竇文玉軍馬又到了茹剛領這一千軍喘息未定怎當這裏兩支三千生力軍忽地衝來況且寡不敵衆立腳不牢四散奔走茹剛連斬數人只是按捺不住張成竇文玉見敵軍亂竄兩匹馬一齊拍動上前來擒茹剛茹剛力敵二將全無懼怯鬪了二十餘合見貝州軍泰山般圍裹將來回顧手下祇剩得一人一騎無心戀戰殺開條路而走張竇二將恰待追趕報馬到來冀州大軍到了相距十里之外二將不敢進逼慌忙收軍轉回貝州把軍馬扎住城外二將入城見了王則稟道冀州前部先鋒已被小將殺得大敗虧輸正欲追趕怎奈劉太守大軍已到小將只得收兵現屯城外專候主帥鈞旨王則道聞得劉彥威這廝手段高強今前部失利已滅威風二位將軍便算第一功了乘此鋭氣便可住扎城外防他攻城明日交戰當令軍師們相助二將得令連夜離城十里扎了兩個大寨各占一寨倘有敵兵來攻互相救援卻說茹剛收拾得敗殘軍卒來見劉太守謝罪劉太守大怒道凡行兵者必須遠遠哨探一有風聞預作准備你全不用心致被賊人出其不意衝動官軍紀律何在本當斬首號令交戰在邇誠恐於軍不利喝教捆打一百罰在後隊催趲糧草倒換後隊段雷為先鋒之職到傅家疃下寨探子打聽得張成竇文玉率領賊軍離城十里分為二寨住扎劉太守笑道我知賊人無能為也這傅家疃乃是貝州咽喉之路若賊人乘勝就此扎寨截住來路雖有十萬之師安能窺其城下哉今乃捨此不守依城立營吾破之必矣吩咐段雷道打劉字旗號先行約至來日平明到彼寨前索戰只要輸不要贏引他到傅家疃一路來我自有計段雷領計去了又差帳下兩個校尉各領三百步軍連夜潛行伏在他柵寨近側左右等他們出寨迎敵便去奪寨放火又吩咐茹剛准備雲梯火炮攻城之具來日午時在貝州城取齊處分已畢自己中軍少不得拔寨都起別有號令不題卻說張成竇文玉雖槍棒教師實不通兵略偶然初次出兵得勝自誇其能便看得不在意了次日聞得官軍搦戰旗號上打著劉字張成竇文玉都要建功爭先出陳各使一根鑌鐵槍騎著戰馬耀武揚威望見官軍早已排成陳勢門旗開處擁出一員將來頭戴鐵盔身穿繡鎧手中掄一柄宣化大斧二將道這不是劉彥威是誰二將更不打話挺槍直取那將那將握斧相迎鬥上三十餘合賣個破綻叫聲暫歇撥回馬頭便走張竇二將招動人馬儘力趕殺那將且戰且走約有十餘里那將回身又鬥上七十合又走二將不捨只顧追趕官軍撇下金鼓滿地賊人亂搶只見俊馬如飛報來叫道將軍休趕了後面寨中兩路火起張成竇文玉知道中計著了忙急引衆軍退後部伍早已亂了行不多路只聽得連珠炮響刺斜一支軍衝出來為首一員大將橫刀躍馬大喊反賊休走劉彥威在此等候多時了二將從不曾見這般威容先自心慌措手不及被劉彥威手起刀落先斬竇文玉於馬下張成料走不脫只得舞槍來鬥不上三合劉彥威瞋目大叫嚇得張成手軟掄槍不動被劉彥威馬頭早到一手提下雕鞍擲於馬下衆軍齊上結果了性命劉彥威麾兵掩殺三千軍馬折其大半有詩為證兵家料敵最先機輕敵須知定喪師堪嘆教師矜小勝一朝墮計盡輿尸再說王則聽得城外廝殺急請左黜等一同登城幫助只見敗軍紛紛而至叫道張竇二統制已被殺了劉太守兵隨後便到快開城門則個王則教守門的放進問其備細大驚對左黜等道劉彥威英雄名不虛傳列位有何退敵之法左黜道貧道已算下了且教敗殘軍士守城替出一千五百人來貧道與張卜二公各領五百在我們三個身上大家殺他一陳教他片甲不回王則道每位五百人恐太少左黜道自有天兵鬼卒五百人只將來擺樣助陳而已王則道全仗列位扶持同享富貴王則便傳下號令挑揀一千五百精壯軍人分為三隊正在選軍未畢只聽得城外喊殺連天官軍已到劉彥威吩咐段雷茹剛一面准備攻城自己跨一匹追風好馬立於陳前將刀頭指著城內大叫道貝州有會事將王則綁捆出來獻與朝廷免你一城人屠戮王則見他軍容雄壯不敢則聲左黜穿領布衫仗一口劍領著五百軍步行出城將劍尖兒指著劉彥威道你會事領了人馬速回冀州免納首級若少遲延教你一行人都死於吾手劉彥威道你這廝是助王則的逆黨看你的衣甲皆無又沒馬匹敢和我廝殺可惜你殘疾之人還不夠我一刀哩左黜道我不與你鬥口教你看我手段則個劉彥威在陳前施逞刀法欺敵左黜左黜用劍尖一指喝聲疾只見面前捲起一陳狂風吹向官軍陳裏黃沙撲面一陳都開眼不得劉彥威叫聲罷了撥回馬頭便走被左黜領軍大殺一陳方才轉去劉彥威直走至二十里外方才風息計點軍馬三停損了一停不多時段雷茹剛引軍都到問其緣故稟道小將正欲攻城只見大風飛沙走石料得賊人妖法恐有摧折收軍而回劉彥威道吾不知賊人伎倆誤墮其計且只在傅家疃休息三日吾自有計破之吩咐軍中每人預備青紗眼罩一個聽用到第四日四更造飯五更起身只選五百匹好馬五百名長槍手都帶眼罩在身邊以防備風沙一遇賊軍不論好歹便直衝過去用長槍刺殺之段雷茹剛領軍為左右翼一等中軍殺入賊軍兩翼便圍將來務要殺他個盡絶休要走脫一個卻說左黜勝了一陳王則心下稍安連日哨探雖然不見動靜守城的也不敢懈怠到第四日報道官軍又到張鸞道前日瘸師立功今番輪該貧道了卜吉道徒弟替吾師一行也引了五百步人飛走出城你道卜吉怎生模樣頭挽雙丫髻身穿緑錦袍凶睛眉打結橫肉臉生毛仗劍諸神伏揚聲百獸鄭州無運客天下有名妖劉彥威只道原是這瘸子出陳今番換了一個又不知什麼妖法莫等他做手腳只管衝突前去便了只見卜吉不慌不忙口中念念有詞喝聲疾把兩個衣袖望前張開袖裏奔出千千萬萬豺狼虎豹之屬張牙舞爪齊向官軍陳上衝去劉彥威的馬見了嚇得直跳起來將劉彥威掀翻在地卜吉大踏步正待向前卻被左右兩翼一齊攏來急救上馬官軍見了異獸都拋戈棄鼓各自逃生卜吉乘勢追殺奪了二百餘匹好馬軍器不計其數劉彥威又折了一陳軍士損傷者極多仍退在傅家疃內想道我一生未嘗見此妖人欲待收兵回去心下不甘欲待再戰又無良策況且五千人折了一半若再摧折豈不恥笑正躊躇未決吩咐軍中牢守寨柵不敢妄動過了一日只見冀州有文到原來僉判夏有守招募壯勇軍一千戰馬三百匹差統領使陶必顯押來助戰陶必顯遞了軍冊參見過了劉彥威大喜道天使我成功也打發回文去了就教陶必顯領新到一千軍另立一營為犄角之勢吩咐軍中畫匠將棉布畫成獅子圖形三百具限十日內報完叫陶必顯引新到軍為前部衝鋒將畫成獅衣披在三百戰馬身上倘賊軍作起妖法虎豹突至放出三百獅衣馬軍士篩鑼隨後獅為百獸之尊篩鑼以像其聲虎豹見之必退矣自己引大軍隨後而進再令段雷茹剛各引三百弓弩手預先埋伏左右只等賊兵出城抄出背後亂箭射之雖有風沙虎豹只宜向前不能向後劉彥威分撥已定自謂大勝之策再說王則正和左黜等三人議事探子報官軍又到張鸞道這番少不得貧道行了也引本部五百人出城迎敵卻是馬軍卜吉道劉彥威這廝連戰不退歇了許多時又來其中必有計謀不才願隨師父同往一看左黜跳將起來道說得是今日我們都去索性結果了他省得終日來刮得俺們不自在王則道貝州成敗決於今日全賴列位用心瘸子和卜吉都引軍去了王則親上城樓擂鼓助戰且說陶必顯初到不知高低使著一根狼牙棒抖擻精神大呼搦戰只見吊橋下處飛也似一隊人馬衝將出來為首一個道人頭戴鐵冠身穿緋袍面如噀血目若朗星手持鼇殼扇一把背上背口松紋古劍陶必顯暗暗稱奇想道這廝手中不拿軍器一定靠著妖法了已有准備何足懼哉喝教衆軍一齊衝突上去對面張鸞口中念念有詞將鼇殼扇一揮喝聲疾只見平白地起陳冷風吹得人毛骨凜冽如冬天相似半空中一朵黑雲正罩在官軍陳上冰雹亂下都打得破頭傷腦馬俱股憟不容不亂竄倒把劉彥威大軍衝動弄得七斷八續急急鳴金收軍點兵時不見了陶必顯原來陶必顯嚇得昏了倒撞入賊人隊裏去衆軍綁縛去了再說段雷茹剛兩路伏兵聽得喊殺連天已知交戰急忙引軍殺出分明看見左黜卜吉在前用力追趕須臾天色昏暗不分人形兩軍恰好相撞各認做賊軍六百弓箭手一齊發箭都是自射自軍少停天氣清朗六百人止剩得有百餘個活的其餘都射死了此乃左黜卜吉行法之力也段雷先伏在土窖中不曾傷損脫去盔甲混在殘兵中逃去茹剛身中五六枝箭倒在地下不能行動望見賊兵來到拔出身邊佩劍自刎而亡後人有詩云不是將軍無智武熠熠妖星如衆虎甘陵城畔弔忠魂白日清霜共千古劉彥威見段雷引殘兵逃回曉得茹剛身死痛惜不已又打聽得陶必顯被擒方知妖人如此利害夜間秉燭而坐正思去住之策忽然營中發喊起來劉彥威安坐不動差人問時說道營前密布鹿角一時都不見了劉彥威大怒按住軍中不許喧譁妄動綽刀在手叫點起火把自出營前來看果然周圍鹿角全然失去正驚訝間只聽得東邊鼓角齊鳴殺聲震耳不知何處兵來劉彥威叫段雷引兵向東邊迎敵去了須臾東邊寂然西邊又起火光燭天如在一二里之近劉彥威大怒提刀上馬自引數百人往西迎去約行了三四里金鼓不聞火光也漸息了劉彥威只得轉回才到營前只見南邊鼓角又起殺聲至近劉彥威吩咐段雷後營巡視自己在前營立馬而看也不去迎他了軍中點起火把通紅如同白日不多時南邊聲響又絶殺氣又從北邊而來劉彥威一夜不睡正沒理會處約莫五更時分只聽營中又發喊起來說道司更的被大蟲咬去了劉彥威喝道此地那得有大蟲到來說猶未了只見營裏面一個美貌婦人手中仗劍騎著一匹大蟲直衝出來劉彥威連忙跳下雕鞍那馬早已驚倒婦人和大蟲都不見了軍中一夜不得安息到天明看時滿營都是虎跡巡風的報道失去鹿角只在里許之外做一堆兒堆在那裏劉彥威嘆口氣道此等妖人教劉某亦無可奈何矣即時拔寨奔回冀州連夜申文到樞密院去說妖人如此乞添兵遣將廣求智謀之士速行前去剿除以絶後患原來宋朝一款但凡舉薦邊將失機誤事者薦主一同罪罰因此樞密使夏辣瞞過朝廷不行舉奏話分兩頭且說騎大蟲的婦人是誰正是胡永兒他見官軍屢戰不退今番又一場大廝殺也到陳前觀看已知張鸞得勝還不了事直到傅家疃劉彥威寨前布散鬼兵蒿惱他一夜只為劉彥威數未絶所以結果他不得只逼迫得他逃走且說當晚張鸞等收兵入城衆軍解到陶必顯請功陶必顯磕頭願降王則准了就封為統領之職領著張竇二將的軍馬點兵時並不損一個王則大喜連夜殺牛宰馬大賞三軍一回吩咐守城軍士小心在意自己和張左等三人排宴在州廳上吃個盡醉方休看看五更將絶只見廳前一聲響亮踱個胡永兒進來衆人大驚連忙起身迎接胡永兒道你們衆人吃酒快活誰知我一夜辛苦劉彥威這廝已被趕回冀州去了把夜間蒿惱他事情說了一遍王則拱手稱謝道貝州方有泰山之安也胡永兒道堅守孤城不成大事趁此目下軍威便可收伏附近州縣衆人道說得是當下再點人馬王則同左黜引軍打東南一路胡永兒同卜吉引軍打西北一路只留張鸞守城不上半年連得了曲安肥鄉邯鄲廣平等十數縣城池招降人馬多得錢糧弄得勢力大了東京賣肉的張琪賣炊餅的任遷賣麵的吳三郎打聽得胡永兒是王則的渾家俱到貝州投奔王則王則見人心歸順乃自立為東平郡王敕封胡永兒為皇后左黜為國舅張鸞為丞相卜吉為大將軍蛋子和尚雖不曾出力衆人推他手段高強封為國師月送錢米在甘泉寺供養只怕日後有用他之處以下張琪等都掛印封官其勢越大分兵四出抄掠各處聞得他妖術通神無不望風而靡河北州郡大半為王則所有王則役起人夫就州廳改造王府宮殿與朝廷制度一般又左黜張鸞卜吉都造得有衙門耗費錢糧無算又尊聖姑姑為聖母娘娘創造行宮一所以備他不時來往百姓晝夜并作無不嗟嘆又遍訪民間有顏色閨女納入王宮上等的為妃嬪次者做宮娥服侍又選美女三十人賜左黜等三人張鸞原是天閹近不得女色辭而不受卜吉見師父辭了也不敢用只左黜原為調戲婦人被趙大郎一箭射傷左腿做了瘸子今日雖然學得一身法術淫心不改收納了十個美女日夕取樂又各處自行選取與王則賭賽的受用只因這般有分教草頭天子坐不成一面江山瘸腳妖人做不徹千般鬼怪正是奢淫無度終遭禍變詐多端久必窮畢竟王則後來的事如何且聽下回分解
