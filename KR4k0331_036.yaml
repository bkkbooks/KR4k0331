body:
  text: 第三十六回勝敗兵家雖不常從邪從正判殃祥若知邪正妖祥理及早回頭不用商話說文招討大兵到冀州駐劄冀州太守劉彥威迎接二招討入城備說王則妖法難敵文彥博與曹偉商議道王則占據州郡身住貝州目今進兵還是合兵徑打貝州還是分兵四下攻取招討必有奇謀神策曹偉道曹某係副將安敢僭越計謀主帥有命一聽指揮文招討道不然招討乃名將之子孫曾與先王建立邊功彥博雖為主將終是書生全仗招討共成王事不必謙遜曹招討應諾道河北州縣雖歸王則皆因懼勢非為心服今聞大兵到此自顧不暇何暇出兵相助仗主帥神威直搗貝州若貝州攻破餘者不消加兵自然服矣文招討道招討所見極明打聽他城中兵不滿萬我這裏有大兵十萬更得招討奇謀破賊如反掌矣曹招討道曹某亦探聽得王則等輩雖不能用武施文盡行妖法日前劉太守去收伏時被王則用了妖法是以損兵折將而回據曹某愚意主將將三萬人作中軍以二萬人與曹某作左輔以二萬人與總管王信為右弼分為三路作長蛇之勢以二萬人與轉運使用鎬為押後以五千人令先鋒孫輔各營巡視以五千人與劉彥威幫助孫輔就為司導今王則兵不滿萬止可敵我一路我軍若勝則三路並進若有少虧則兩路必來救應此萬全之策也文招討見說大喜道招討如此用兵何愁貝州不破此日文招討分三路人馬來取貝州先打個榜文前去榜上數王則十般大罪一不合激變軍心二不合擅殺州官三不合擅據城池四不合聚集妖黨殺傷官兵五不合稱王立后六不合擅封官職七不合縱兵侵掠州縣八不合私役人夫起造王宮僞府九不合姦淫民間婦女十不合叛國害民長惡不悔今天兵十萬前來征討只要首惡王則一人餘黨悉赦不問如有擒斬王則來獻者一體敘功倘王則自知其罪束手歸降當奏聞朝廷待以不死如仍執迷抗拒兵臨城下悔之無及王則見了這榜文嚇得手足無措急聚左黜等一班人計議左黜道前日冀州劉彥威殺得片甲不回今文彥博年已八旬自來送死雖有雄兵十萬能奈我何張鸞道貧道在東京時多聞文彥博之名曾有異人推他八字說他出將入相一生富貴無比年近八旬再為朝廷建大功勞安邦定國壽近百歲而終此乃天上福神不可輕也又童謠有云貝州一郡虎怕文不怕武今文招討正應其姓凶吉難保依貧道愚見不若把知州張德貪污之處緣由委曲訴明卑詞謝罪煩文招討上奏天子願自具軍糧替國家出力或征西夏或討廣南倘得功成奏凱仍不失侯王之位不知軍師意下如何左黜道做大難為小仗我等法力便趙官家自來亦不怕何怕一老頭兒哉丞相奈何自損志氣張鸞道當舉事時本為貪官害民人心共憤恰遇奸臣在朝匿而不奏使我輩得成其事今朝政清明去邪用賢命大臣統兵而來大非往時可比我等單恃些法術安知彼處無會事之人軍師請三思之卜吉在旁只不開口王則見二人議論不一抽身便起衆人俱散王則徑入僞宮來見胡永兒把兩般說話都說一遍永兒道大王奈何棄已成之業而束手受制於人乎千斤擔子自有我哥妹二人承當若不放心再請母親聖姑姑到萬無一失張卜之言不可聽也王則聽了大喜道王后之言是也是晚飲宴盡歡就宿於永兒宮中卻說卜吉當日口中不言心下想道我本是做客生理為胡永兒下井衝撞了州官幾送殘生幸遇我師父救了性命報了此讎誰知王則激變民心背反朝廷大傷天理前日蛋師不辭而去也只為看不上眼我等若不見機反與文招討作對誠為逆理的了遂連夜來見張鸞說道適間瘸子甚有不然師父之意師父在此有損無益為今之計不若見機而作跳出是非門為上張鸞道汝言正合吾意我有個師父在天臺山玉霄峰隱居修道不若同到彼處尋訪採藥煉丹圖個神仙正果豈不為美二人商議已定當夜便離了貝州城望天臺山而去有詩為證一念貞邪轉吉凶奸雄回首即英雄今朝雙翮沖霄去不問洛州舊戰烽後來道君皇帝蓋萬歲山差十制使往江南辦採花石這一個制使在天臺玉亭洞看好了一根金松原來金松不比凡松垂條如細柳結子如碧珠只有臺州生産這根松更生得玲瓏可愛根株盤旋在一塊巧石上制使將御用字樣黃旗插著擇日起夫連石抬去忽然洞中走出個老道者說道此樹乃先師沖霄居士手植貧道在此看守七十多年了乞留方便莫動他罷制使道松石圖樣已打在御前去了怎罷得老道者道煩回奏但說鄭州卜道人求留下作伴制使不聽指揮人夫動手正下鍬時只聽得一聲響亮石倒迸裂金松登時枯死制使吃了一驚老道重又再三求告制使依允老道者將手輕輕的扶起那巧石這金樹依舊茂盛制使回朝奏與道君時朝中有曉得仁宗故事的說道沖霄居士乃張鸞卜道人是卜吉仁宗到道君時將近百年卜吉尚存疑其得仙矣此是後話再說王則次早聽得有人報道張卜二人都不知到那裏去了急召左黜問之左黜道張鸞原與我們不同支派敢因議論不合懷慚而去卜吉是他徒弟一同去了我們也不靠著他可召張琪任遷吳旺三人回來聽用張琪等正在各地方為官享福聞得貝州信到各率本處軍馬齊來助戰王則打聽得文招討大軍已到乃大開城門引軍靠城擺列陳勢瘸子緊緊相幫左手吳旺右手任遷留張琪和陶必顯在城頭擂鼓訥喊胡永兒親自領兵繞城巡警文招討將兵分作三路出於陳前與王則打話王則見了文招討出馬唱個喏道王則因州官貪濫挺身為百姓除害衆人推我暫領一隅之地又不侵犯別人朝廷何必興兵到此文招討大喝道汝造下十大逆天罪惡今天兵到來理合開門投降輒敢拒敵不知死活王則道久聞招討大名高壽宜知進退以享餘年若必欲交鋒恐手下不相饒讓勿罪勿罪文招討大怒喝叫擂鼓先鋒孫輔挺槍指揮人馬來搶城捉王則王則見人馬搶來望後一退讓左黜馬頭在前劉彥威在文招討身邊指著瘸子道這賊道慣使妖法元帥宜防之說猶未了只見左黜在陳前叩齒作法烏雲猛雨雷聲閃電火塊亂滾就兵馬隊裏捲起一陳黃沙來罩得天昏地黑黃沙內盡是神頭鬼臉之人引著許多豺狼虎豹前來衝陳衆軍只鬥得人如何能鬪得神鬼猛獸戰馬驚得亂竄把馬上兵將都顛下來了王則見文招討陳腳亂動乘機趁勢驅人馬一掩文招討同先鋒孫輔大敗而走王則領人馬隨後趕來副招討曹偉總管王信見文招討兵敗便各引本部兵馬前來救應王則見兩路軍馬齊來惟恐有失急下令收軍馬入城文招討引軍離城三十里傅家疃下寨計點人馬殺傷并自相踐踏死者無數文曹二招討及總管王信聚集衆將共議攻城之策文招討道我與西番戎兵大小也曾戰數百陳不曾見王則這等妖法可知劉太守輸與這賊劉彥威道小將初時被妖賊刮起風沙敗了一陳小將吩咐軍各備眼罩第二陳卻趕出猛獸來又折一陳小將又吩咐軍中將布畫成獅形覆於馬背此孔明破南蠻之計不料第三陳卻是陰風冰雹人馬一半凍死這夥妖人真是變化不測必須破其妖法方可取勝曹招討道聞得貝州會妖邪術者不過四五人餘者俱不會然這妖邪法術曹某有個道理可以破得文招討聽了歡喜道敢問招討有何妙計可破妖法曹招討道王則這家法術和尚家喚做金剛禪道士家叫做左道術若是兩家法術都會喚做二會子皆是邪法只怕的是豬羊二血及馬尿犬糞大蒜若滴一點在他身上就變不成神鬼弄不得邪法文招討大喜吩咐軍上但交戰時刀槍頭上都要蘸血曹招討教做五百個唧筒都盛豬羊二血選五百個身長力大的軍人做唧筒手配著五百個弓弩手交戰時若見神鬼異獸等唧筒弓弩一齊發作有詩為證邪不勝正從來有識破之時豈能久任你妖群變化多今朝難免唧筒手文招討犒賞了軍士至次日擺布軍馬留明鎬守傅家疃大寨其餘多叫依先分作三隊離城三里排成陳勢鼓聲震地喊殺連天原來王則手下無甚英雄好漢廝殺全仗妖法屢屢取勝不把文招討在意當日聞得軍馬臨城張琪和吳旺任遷商議道我等三人自到貝州從無尺寸之功枉學得道術在身今日何不施展三人一同來稟王則情願領本部兵出戰王則道前日文彥博大敗被他左右兩路兵來攻救去今日吳旺可引一支兵東去邀住他右軍任遷可領一支兵西去邀住他左軍張琪作先鋒與孫輔交戰寡人同國舅軍師攻取中軍務要擒此老翁以絶後患三人得令引兵出城分路而去卻說先鋒孫輔領著五千人直逼城下搦戰正撞著張琪軍馬張琪不知武藝只靠著水火葫蘆當下忙忙的念咒雙手把那葫蘆口向前擎起只見水葫蘆中左邊噴出一道水來如高巖瀑布右邊噴出一道火來如野焰燒空遇水的淋頭澆面遇火的燎髮焦眉孫輔抵當不住恐衝動大軍撥馬刺斜望東而走張琪指揮人馬追趕去了王則見前軍得利便大驅人馬而進與文招討大軍相遇門旗下左黜披髮仗劍又驅出許多妖鬼及異獸出來文招討喝開陳門放出五百名唧筒手五百名弓弩手唧的射的一齊發作箭上都有穢物那些神鬼異獸被穢物豬羊二血破了法形消影滅左黜出其不意吃了一驚再要擺布時卻被文招討人馬乘勢掩殺將來大敗落荒而走王則急急引兵入城拽起吊橋將城門緊閉不出再說吳旺一支兵東去正遇著曹招討前部驍將董忠挺槍直取吳旺吳旺從幼也曾習些槍棒兩個鬥起槍來一來一往約二十餘合曹招討後軍已到曹偉雙刀法神出鬼沒親出陳前助戰吳旺料不能敵把馬一拍騰空而起其去如飛曹招討追之不及再說孫輔引著敗軍東走忽見空中一將躍馬而過離地數丈料是妖人慌忙扳起弓來望空一箭正中在馬上那箭都蘸得有惡血吳旺騎的是妖馬本是紙剪就的著了箭仍變做紙吳旺從半空中倒顛下來孫輔帶轉馬頭正待擒人張琪軍恰好追到看見空中墜下一人認得是吳旺連忙救了曹招討大軍都到張琪不敢戀戰保著吳旺而走到吊橋叫開城門城中接應進去了吳旺這一支兵隔絶在後盡數投降曹招討麾下再說任遷將木凳變成大蟲騎著搖頭擺尾自謂無敵領一支軍西去王總管前部驍將柳春生原是獵戶出身用一柄渾鐵鋼叉部下都是步軍柳春生認是真虎提起鋼叉便搠任遷見勢頭來得凶猛把大蟲一拍那大蟲跳起有二丈多高張牙舞爪望柳春生身撲將下來柳春生一閃閃過把鋼叉向大蟲尾後盡力一搠喝聲著胳月察一聲只見大蟲倒地看時不是大蟲卻是一條板凳這板凳屬木鋼叉渾鋼打就的金能木況鋼叉頭上也蘸得有惡血著了一些其妖法便解任遷腳根落地早落慌了被柳春生肩膊上一叉搠倒活活綁住賊軍無主各自逃生文招討這一陳殺廝三路得勝就逼著貝州城下寨劉彥威在城下拾得無數的怪物來獻都是紙剪草做的及赤豆白豆之類但是粘著穢氣故收不去了先鋒孫輔收得吳旺的紙馬來獻曹招討招降軍士千餘人王信部下柳春生解到正賊一名任遷及變虎板凳一條文招討一一記在功勞簿上文招討將任遷親身細細審問方知起手連王則共是六人以後又有張琪等三人彈子和尚先去了張卜二人與左黜不合也去了今城中只有胡永兒和左黜張琪吳旺四個還有胡永兒的母親叫做聖姑姑往來不常文招討臨行時聽包龍圖說得彈子和尚甚是利害今聞說不在城中又放下了一頭憂慮當下審畢喝叫上了囚車送在大寨中明鎬處看守等待捉了王則一同解京每早用一碗豬羊血淋頭正是從前作過事沒興一齊來有詩為證紙馬形消木虎痿數年妖法頓成灰何如餅麵生涯穩無是無非不吃虧王則輸了這陳折了許多人馬又失了任遷正是刀添三個軍人用七分成這裏文招討十萬大軍倍增意氣河北州郡先被王則侵占的聞得官兵得勝都潛地差人送款虎視貝州指日可得文招討下令五百軍人上山去砍伐木植造作攻城器械雲梯炮石天橋火箭數日之內俱齊備文招討令傍城攻打衆軍士直到城旁邊攻打只見貝州烏雲黑霧罩了城子半虛空中隱隱現出神頭鬼臉毒蛇猛獸軍士都打不得城反傷了許多兵馬一連打了兩三日只打不下文招討在帳中納悶夜間秉燭隱几而臥忽然一陳冷飛過處見一妖嬈美婦人將白羅帕擁頸冉冉而來到文招討前跪下文招討大喝道我奉王命引大兵到此是何妖精敢來衝突婦人道妾非妖精乃本州關疑之婦趙無瑕也王則愛妾顏色強妾成婚妾守志不從縊死今塋葬在城外淺土之中正在老相國軍營之內被軍人囉唣不安乞老相國憐憫遷骨於十里之外九泉銜恩文招討道原來小娘子是位烈婦下官失敬小娘子精靈不泯必知此賊何時可滅婦人道這賊魔運將盡但老相國三日之內主有大厄須當謹慎文招討大驚只因這一番有分教鬼怪魔君盡被雷霆碎首妖邪逆黨俱遭刀劍分尸正是不泯貞魂終為厲無知逆賊定遭殃要知結末事且聽下回分解
