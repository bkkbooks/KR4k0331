body:
  text: 第二十八回炊餅皆烏火不燒豬頭扎眼術能高只因要捉瘸師去致使三人遇女妖話說當下瘸師見任吳張三人趕來急急便走緊趕緊走慢趕慢走不趕不走三人只是趕不上張屠道且看他下落卻和他理會不妨三人離了東京行了一二十里趕到一個去處叫做蛟莫那條路真個冷靜有一座寺叫做莫坡寺只見瘸師徑到入莫坡寺裏去了張屠笑道好了他走入死路了看他那裏去我們如今三路去趕任遷道說得是吳三郎從中間去趕張屠從左廊入去趕任遷從右廊入去趕瘸師見三人分三路來趕徑奔上佛殿爬上供桌踏著佛手爬上佛肩雙手捧著佛頭三個齊趕上佛殿看著瘸師道你好好地下來你若不下來我們自上佛身拖你下來瘸師道苦也佛救我則個只見瘸師把佛頭只一攛那佛頭骨碌碌滾將下來瘸師便將身早鑽入佛肚子裏去了張屠道卻不作怪佛肚裏沒有路你鑽入去則甚終不成罷了張屠爬上供桌踏著佛手盤上佛肩雙手攀著佛腔子望一望裏面黑暗暗地只見佛腔子中伸出一隻手來把張屠劈角兒揪住張屠倒跌入佛肚裏去了吳三郎任遷叫聲苦不知高低兩個計較道怎地好任遷道不妨事我且上去看一看便知分曉吳三郎道小大一哥放仔細些休要也入去了任遷道我不比張一郎即時爬上供桌踏著佛手盤在佛肩上攀著佛腔子望裏面時只見黑暗暗地叫道張一郎你在那裏叫時不應只見一隻手伸出來一把揪住任遷吃了一驚連聲叫道親爹爹活爹爹可憐見饒了我再也不敢來趕你了我特來問你要炊餅要饅頭砂餡我便送將來與你吃只見任遷頭朝下腳朝上倒撞入佛肚裏去了吳三郎看了道苦呀苦呀他兩個都跌入佛肚裏去我卻如何獨自歸去得欲待上去望一望看只怕也跌入了去欲待自要回去這兩個性命如何做道理處只得上去望望供桌來手腳酥麻抖做一堆不敢上去尋思了半響沒奈何只得踏著佛手攀著佛腔子欲待望一望只怕跌了入去欲進不得欲退不得吳三郎即自思量道好沒運智只消得去尋些硬的物來打破出佛肚皮便救得他兩個出來正待要下供桌卻被有個人在背後攔腰抱住了只一攛把吳三郎也跌下佛肚子裏去了一腳踏著任遷的頭任遷叫道踏了我也吳三郎道你是兀誰任遷應道我是任遷吳三郎道張一郎在那裏只見張琪應道在這裏任遷道吳三郎你如何在這裏來了吳三郎道我上佛腔子來望你們一望卻似一人把我攛入佛肚子來任遷道我也似一個人伸手劈角兒揪我入來張屠道我也是如此這揪我們的必然是瘸師他也耍得我們夠了四下裏摸著若摸得他見時我們且不要打他只教他扶我們三個出佛肚去他若不肯扶我們出去時不得不打他了當時三個人四下裏去摸不見瘸師任遷道原來佛肚裏這等寬大我們行得一步走一步張屠道黑了如何行得任遷道我扶了你行吳三郎道我也隨著你行迤邐行了半里來路張屠道卻不作怪莫坡寺殿裏能有得多少大佛肚裏到行了許多路正說之間忽見前面一點明亮吳三郎這裏原來有路又行幾步看時見一座石門參差門縫裏射出一路亮來張屠向前用手推開石門注目定睛只一看叫道好這裏山清水緑樹密花繁好一個所在吳三郎道誰知莫坡寺佛裏有此景致任遷道又無人煙何處可歸張屠道不妨既有路必有人煙我們且行又行二三里路程見一所莊院但見名花灼灼嫩竹青青冷冷溪水照人清陳陳春風迎面暖茆齊寂靜銜泥燕子翻風院宇蕭弄舌流鶯穿日騎犢黃頭稚子吹來短笛無腔荷鋤黑體耕夫唱出長歌有韻羸羸瘦犬隔籬亂吠行人兩兩山禽藏古木聲催過客張屠道待我叫這個莊院當時張屠來叫道我們是過往客人迷蹤失路的只聽得裏面應道來也來也門開處走出一個婆婆來三個和婆婆廝叫了婆婆還了禮問道你三位是那裏來的張屠道我三個是城中人迷路到此一來問路二來問莊中有飯食買些呢婆婆道我是村莊人家如何有飯食得賣若過往客人到此便吃一頓飯何妨你們隨我入來三個隨婆婆直到草廳上木凳子上坐定婆婆掇張桌子放在三個面前道我看你們肚內飢了一面安排飯食你們吃你們若吃得酒時一家先吃碗酒三個道恁地感謝莊主婆婆進裏面不多時拿出了一壺酒安了三隻碗香噴噴地托出盤鹿肉來斟上三碗酒婆婆道不比你們城中酒好這裏酒是杜醞的只好當茶三個因趕瘸師走得又饑又渴不曾吃得點心聞了肉香三個道好吃一人吃了兩碗酒婆婆搬出飯來三個都吃飽了三個道感謝莊主依例納錢婆婆道些少酒飯如何要錢一面收拾傢伙入去三人正要謝別婆婆求他指引出路只見莊門外一個人走入來三個看時不是別人卻正是瘸師張屠道被你這廝蒿惱了我們半日你卻在這裏三個急下草廳來卻似鷹撲燕雀捉住了瘸師正待要打只見瘸師叫道娘娘救我則個那婆婆從莊裏走出來叫道你三個不得無禮這是我的兒子有事時便看我面下草廳來叫三個放了手再請三個來草廳坐了婆婆道我適間好意辦酒食相待如何見了我孩兒卻要打他你們好沒道理張屠道罪過莊主辦酒相待我們實不知這瘸師是莊主孩兒奈他不近道理若不看莊主面時打他粉骨碎身婆婆道我孩兒做什麼了你們要打他張屠任遷吳三郎都把早間的事對婆婆說了一遍婆婆道據三位大郎說時都是我的兒子不是待我叫他求告了三位則個瘸師走到面前婆婆道三位大郎且看拙之面饒他則個三人道告婆婆且請不願與令郎爭了只叫他送我們出去便了婆婆道且請少坐我想你三位都是有緣的人方到得這裏既到這裏終不成只恁地回去罷了我卻有法術教你們一人學一件把去終身受用婆婆看著瘸師道你只除不出去出去便要惹事直叫三位來到這裏你有什法術教他三位看婆婆看著三個道我孩兒學得些劇術對你們三位施逞則個三個道感謝婆婆瘸師道請娘娘法旨去腰間取出個葫蘆兒來口中念念有詞喝聲道疾只見葫蘆兒口裏倒出一道水來頃刻間波濤泛地衆人都道好瘸師道我收與哥哥們看漸漸收那水入葫蘆裏去了又口中念念有詞喝聲道疾放出一道火來頃刻間烈焰燒天衆人又道好瘸師又漸漸收那火入葫蘆裏去了張屠道告瘸師肯與我這個葫蘆麼婆婆道我兒把這個水火葫蘆兒與了這個大哥瘸師不敢逆婆婆的意就將這水火葫蘆兒送與了張屠張屠謝了瘸師道我再有一件劇術教你們觀看取一張紙出來剪下一匹馬安在地上喝聲道疾那紙馬立起身來尾搖一搖頭擺一擺變成通身雪練般一匹白馬有西江月為證眼大頭高背穩昂昂八尺身軀渾身毛片似銀堆照夜玉獅無比雲錦隊中曾賽每聞伯樂聲嘶登山度嶺去如飛真個日行千里瘸師騎上那馬喝一聲只見曳曳地從空而起良久那馬漸漸下地瘸師跳下馬來依然是匹紙馬瘸師道那個大郎要吳三郎道我要學那個紙馬兒法術瘸師就將紙馬兒與了吳三郎吳三郎謝了婆婆看著瘸師道兩個大郎皆有法術了這個大郎如何瘸師道娘娘法旨本不敢違但恐孩兒法力低小正說之間只見一個婦人走出來那婦人不是別人正是胡永兒永兒與衆人道了萬福向著婆婆道告娘娘奴家教這大郎一件法術請娘娘法旨婆婆道願觀聖作胡永兒入去掇一條板登出來安在草廳前地上永兒騎在子上口中念念有詞喝聲道疾只見那凳子變做了一隻吊睛白額大蟲這大蟲怎生模樣有西江月為證項短身圓耳小吊睛白額雄威爪蹄輕展如飛跳澗如同平地剪尾能驚鹿咆哮嚇煞狐狸卞莊雖勇怎生施子路也難當抵胡永兒騎著大蟲叫聲起那大蟲便騰空而起喝聲住那大蟲漸漸下地來喝聲疾只見那大蟲依舊是條板凳婆婆道任大郎你見麼任遷道告婆婆已見了婆婆道吾女可傳這個法術與了任大郎胡永兒傳法與任遷任遷謝了婆婆道你三人各演一遍三人演得都會了婆婆道你三人既有法術我有一件事對你們說不知你三人肯依麼張屠道告婆婆不知教我三人依什的但說不妨婆婆道你們可牢記取他日貝州有事你們可前來相助同享富貴張屠道既蒙娘娘吩咐他日貝州相助今乞指引一條歸路回去則個婆婆道我叫孩兒送你們入城中去瘸師道領法旨三個拜謝了婆婆婆婆看著三人道我今日叫孩兒暫送三位大郎回去明日可都來莫坡寺中相等三人辭別了婆婆永兒當時瘸師引著路約行了半里只見一座高山瘸師與三人同上山來瘸師道大郎你們望見京城麼張屠吳三郎任遷看時見京城在咫尺之間三人正看時只見瘸師猛可地把三人一推都跌下來瞥然驚覺卻在佛殿上張屠正疑之間只見吳三郎任遷也醒來張屠問道你兩個曾見什麼來吳三郎道瘸師教我們法術來你的葫蘆兒在也不在張屠摸一摸看時有在懷裏吳三郎我的紙馬兒也在這裏任遷道我學的是變大蟲的咒語張屠道我們似夢非夢那瘸師和婆婆並那胡永兒想都是異人只管說他日異時可來貝州相助不知是何意故三人正沒做理會處只見佛殿背後走出瘸師來道你們且回去把本事法術記得明白明日卻來寺中相等當時三人別了瘸師各自回家去有詩為證逍遙蝴蝶真成幻富貴南柯亦偶然怎似夢中齊授法等間變化似神仙當日無話次日吃早飯後三人來莫坡寺裏上佛殿來看佛頭端然不動三人往後殿來尋婆婆和瘸師卻沒尋處張屠道我們回去罷正說之間只聽得有人叫道你三人不得退心我在這裏等你們多時了三個回頭看時只見佛殿背後走出來的正是昨日的婆婆三個見了一齊躬身唱喏婆婆道三位大郎何來甚晚昨日傳與你們的法術可與我施逞一遍異日好用張屠道我是水火既濟葫蘆兒口中念念有詞喝聲道疾只見了葫蘆兒口內倒出一道水來叫聲收那水漸漸收入葫蘆兒裏去又喝聲疾只見一道火光從葫蘆兒口內奔出來了又叫聲收那火漸漸收入葫蘆兒裏去了張屠歡喜道會了吳三郎去懷中取出紙馬兒來放在地上口中念念有詞喝聲疾變做一匹白馬四隻蹄兒巴巴地行吳三郎騎了半響跳下馬來依舊是紙馬任遷去後殿掇出一條板凳來騎在凳上口中念念有詞喝聲道疾只見那凳子變做一隻大蟲咆哮而走任遷喝聲住那大蟲漸漸收來依舊是條凳子三人正逞法術之間只聽得有人叫道清平世界蕩蕩乾坤你們在此施逞妖術現今官府明張榜文要捉妖人若官司得知須連纍我衆人聽得慌忙回轉頭來看時卻是一個和尚身披烈火袈裟耳帶金環那和尚道貧僧在廊下看你們多時了婆婆道吾師恕罪我在此教他們些小法術和尚道教得他們好便不枉了用心教得他們不好空勞心力可對貧僧施逞則個婆婆再教三人施逞法術三人俱各做了婆婆道吾師我三個徒弟何如和尚笑道依貧僧看來都不為好婆婆焦燥道你和尚家敢有驚天動地的本事你會什麼法術也做與我們看一看則個只見那和尚伸出一隻手來放開五個指頭指頭上放出五道金光金光裏現五尊佛來任張吳三個見了便拜三個正拜之間只聽得有人叫道這座寺乃朝廷敕建之寺你們如今在此學金剛禪邪術和尚即收了金光衆人看時卻是一個道士騎著一匹猛獸望殿上來見了婆婆跳下猛獸擎拳稽首道弟子特來拜揖婆婆道先生少坐先生與和尚拜了揖任吳張三個也來與先生拜揖先生問道這三位大郎皆有法術了麼婆婆道有了先生道貧道也度得一徒弟在此婆婆道在那裏只見先生看著猛獸道可收了神通那猛獸把頭搖一搖擺一擺不見了猛獸立起身來卻是一個人衆人大驚婆婆看時不是別人正是客人卜吉卜吉與婆婆唱個喏婆婆道卜吉因何到此卜吉道告姑姑若不是老師張先生救得我性命時險些兒不與姑姑相見婆婆問先生道你如何救得他先生道貧道在鄭州三十里外林子裏聽得有人叫聖姑姑救我則個貧道思忖道乃婆婆之名為何有人叫喚急趕入去看時卻見卜吉被人吊在樹上正欲謀害貧道問起緣由卜吉將前後事情對貧道說了因此略施小術救了他大難婆婆道原來如此恁地時先生也教得他有法術了卜吉道有了婆婆道你們曾見我的法術麼和尚同道士道願觀聖作只見婆婆去頭上取下一隻金叉喝聲道疾變為一口寶劍把胸前打一畫放下寶劍雙手把那皮貝就一拍拍開來衆人向前看時但見金釘朱戶碧瓦盈簷交加翠柏當門合抱青松繞殿仙童擊鼓一群白鶴聽經玉女鳴鐘數個青猿煨藥不異蓬萊仙境宛如紫府洞天衆人卻看了失驚道好正看之間只聽得門外發聲喊一行人從外面走入來衆人都慌道卻怎地好和尚道你們不要慌都隨我入來掩映處背身藏了看那一行有二十餘人都腰帶著弓弩手架著鷹鷂也有五放家也有官身也有私身馬上坐著一個中貴官人來到殿前下了馬展開交椅來坐了隨從人分立兩旁原來這個中貴官叫做善王太尉是日卻不該他進內上班因此得暇帶著一行人出城來閒遊戲耍信步直來到莫坡寺中與衆人踢一回氣毬了又射一回箭賞了各人酒食自己在殿中飲了數杯便上馬一行人衆隨從自去了衆人再到佛殿上來婆婆道我只道做什麼的卻原來一行人來作樂耍子也教我們吃他一驚張屠任遷吳三郎道我們認得他是中貴官在白鐵班住喚作善王太尉如法好善齊僧布施和尚聽得說道看我明日去蒿惱他則個衆人各自散了只因和尚要惱善王太尉直被他開封府三十來個眼明手快的伶俐了得的觀察使臣不得安跡見了也捉他不得惱亂了東京城鼎沸了汴州郡真所謂白身經紀番為二會之人清秀愚人變做金剛禪之客正是只因學會妖邪法斷送堂堂六尺軀畢竟和尚怎地去惱人且聽下回分解
