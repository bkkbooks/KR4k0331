body:
  text: 第九回道法緣法各一宗白雲洞裏最神通有緣千里能相會無緣對面不相逢話說蛋子和尚在雲夢山下草棚中棲身專等五月端午日霧氣開時便去白雲洞中盜法此時已是四月初旬算來端午只有一個月了心下十分焦燥雖然求法的念頭甚誠還在半信半疑恐怕那僧伴所言道聽途說未知是真是假若是假時這霧氣那裏來的時常跑在山嶺上打個探望只見茫茫蕩蕩的一片白正不知中間是怎樣光景一日吃飽了飯又買些酒來吃個半醉說道聞得醉飽之人霧氣傷他不得我頭頂著天腳踏著地怕什麼袁公袁婆等什麼端午端六只管問他要這天書罷了乘著酒興冒霧而行約進去還沒有一里那霧氣漸濃眼也開不得了只得轉身出來方知僧言不謬守到端午日看看巳牌時分霧氣漸開交了午時天氣清爽蛋子和尚道慚愧果有此話今日被我守著了腳穿一雙把滑的多耳麻鞋手提一根檀木棍兒抖擻精神飛也似的一般奔去行過二三里路高高低低都是亂山深澤草木蒙茸不辨路徑只中間一線兒略覺平穩似曾經走破的依著這路行去約莫十里之程果然有個石橋跨在澗之上足有三丈多長祇一尺多闊橋下波濤洶湧亂石縱橫如刀槍擺列蛋子和尚初時看見未免駭然一念想著既到此間如何生退避心死生有命怕他怎的把眼睛只看著前面大著膽索性走去不覺竟一溜煙的走過了那邊便是石洞洞口上面鐫白雲洞三字進得洞時好大一片田地別是天日但見平原坦坦古木森森奇花異草四時不謝長春珍果名蔬終歲不栽自足楚王遊獵馳騁未經司馬辭章形容不到避秦假使居斯地縱有漁郎難問津蛋子和尚觀之不足玩之有餘行到前去見一座大石峰峰下供著一個白玉爐瑩潔可愛蛋子和尚道且莫論天書法術只這般景致這般寶貝都是世人夢想不到的今日到此也是宿緣有幸爬上峰頭正待飽玩忽聞得香氣撲鼻剛說得一聲奇怪早見爐中一縷香煙已裊裊而起蛋子和尚大驚道莫非午時過了白猿神歸來也撲地的跳下峰頭也不回顧一心照著來路狠跑連這根檀木棍兒忘失了到得石橋邊只見霏霏霺霺霧氣漸生這和尚著了忙在橋上打個腳絆險些兒落在下面去且喜過了石橋膽便壯了放開腳步十來里路須臾走到方才回頭看時一天濃霧把洞門依舊遮藏回到草棚中坐了一個多時辰喘息方定心中納悶道特地這遍辛苦只看些景致討不得一點兒消息還不知這天書真個有也沒有正是貪看天上中秋月失卻盤中照夜珠到那一個端午整整的還有三百六十日怎生樣捱得過又思想了一回道一遍生再遍熟再等一年我也不看什麼景致了一口氣跑到那白猿神的臥室隨他藏得天書多多少少滿擔的挑他出來任我揀擇取用卻不好從此息心息意做個長久之計把這草棚兒權當個家業整月整日的四處去閒遊募化一日行到一個地方處名曰永州其地有個石燕山有個浯溪都有些奇處怎見得其山堆滿的零星碎石狀如燕子若風雨時節遠遠望去就像飛燕一般人若走近也撲在身上來及拿到手中看時卻還是一塊石頭風息雨止便不飛了那浯溪石崖上天然嵌下一塊鏡石高一尺五寸闊三尺厚三尺其色如漆明澈異常雖比不得秦時照膽鏡把五臟六腑都照出來卻也一根根鬚眉朗然可數蛋子和尚因愛這兩處古跡在永州多住些時一日又到石崖邊去看時卻不見了石鏡單單留下個窟窿正當驚訝之際只聽得山坡下鑾鈴聲響一群人眾飛奔前來蛋子和尚伏在一株大松樹旁偷眼覷時為首馬上的是一位年少郎君生得脣紅齒白頭戴唐進士巾身穿吳綾道袍騎下一匹瓜黃馬兒後面跟著十來個家人那郎君下了馬步到崖邊看看這個窟窿指天畫地不知與家人說些甚麼隨後四個莊戶牽繩帶索的扛著一塊黑色大石頭來蛋子和尚心下想道一定是這郎君取了那石鏡去了把石頭照樣做一塊來嵌著哄人只見莊戶抬到崖邊眾家人道趁這繩索方便不要歇手眾人一齊上前助力也有在上面牽的也有在下面推的也有將槓子幫襯的不一時將那塊石頭弄到窟窿跟前相著體勢安頓停當慢慢的扯起繩索那石頭恰好嵌下眾人發起一聲喊來原來那塊黑色石頭就是石鏡這郎君姓冷是木處冷學士的公子雖然生得標致為人刻薄渾名叫做冷剝皮有個田莊只在這五里之內叫做冷家莊這冷公子一心愛那石鏡驀地教人偷回莊上去誰知此鏡有神離了石崖就如黑炭一般全無半毫光彩方才送還舊處剛剛嵌入明朗如故蛋子和尚聽得眾人發喊伸出頭來看時冷公子早已看見喝道兀那和尚獨自一個在此探頭探腦莫非是剪徑的毛賊麼蛋子和尚只得出身向前打個問訊道貧僧稽首了貧僧是泗州城人氏發心要朝各郡名山經遊貴地不知貴人到來失於迴避眾家人道這行腳僧無禮見了大爺頭也不磕個兒蛋子和尚卻待回言到是冷公子說道出家人不須行禮動問長老尊姓何名到敝地幾時了掛搭在於何處蛋子和尚道貧僧在迎暉山迎暉寺出家叫做蛋子和尚到貴地雖然將及一月並不曾落個寺院只是風餐露宿冷公子便道難得有緣相遇敝莊不遠欲屈長老到彼素齋是必勿拒蛋子和尚道多承大檀越厚意當下冷公子上馬先行吩咐兩個家人跟隨長老隨後慢來卻說兩個家人在路上對長老說道我大爺好的是道家不信佛法從不曾齋一個僧布施一文錢的今日見了長老便請莊上赴齋是十分敬重破格相待了蛋子和尚道你家大爺姓甚家人道姓冷百家姓上冷訾辛闞的冷字家老爺在朝官拜翰林院學士止生下這一位公子留在家中讀書新近娶了個小主母在莊上以此這幾日只在這莊上住說話之間已到莊前蛋子和尚看時果然好個冷家莊但見門迎黃道山接青龍路列著幾樹槐陰面對著一泓塘水打麥場平平石碾正好蹴球放牛坡密密草鋪又堪馳馬層層精舍似齊孟嘗養客之居處處花臺疑石太尉娛賓之館定是宦家良別業非同村戶小莊園蛋子和尚到得堂中冷公子出來重新講禮看坐問道長老出家幾年了青春多少不像有年紀的蛋子和尚道貧僧虛度一十九個臘了從幼出家的原來僧家不序齒只序臘冷公子道俗家端的姓甚難道真個姓蛋不成蛋子和尚道貧僧在佛門長大並沒有個俗家相認只這蛋子二字姓也是他名也是他冷公子道聞得命犯華蓋的定要為僧為道長老從小入空門是十二分的硬命了今年十九歲是那月日生蛋子和尚道貧僧是月內領進寺門的說起來像是十一月的光景日子時辰都不曉得說罷只見一個家人出來問道素齋已完擺設何處冷公子沉吟了一會答應道擺在採蓮舫裏罷冷公子先起身道請長老到後園赴齋蛋子和尚道多謝了冷公子道方才失問了敢也用些葷酒麼蛋子和尚道葷酒到不曾戒得冷公子笑道怪道長老這般雄壯恁地時小莊到也便當吩咐家人把些現成魚肉之類煖一大壺好酒一同素齋送去又道在下有些俗事不得相陪了蛋子和尚道不消費心少停拜謝當下別了冷公子隨著家人彎彎曲曲走到後園這園中有個魚池約莫數畝之大正中三間小小亭子仿著江南船樣一順兒造進去的亭子四圍種些蓮花此時是深秋天氣雖沒花了還有些敗葉橫斜水面亭上有個匾額寫採蓮舫三字旁注探花馮拯題池邊三間大敞廳兩旁都是茂竹廳前大石頭砌就一個玩月臺臺下繫一隻渡船家人請長老下了渡船家人解了纜把個單槳兒撶著頃刻便到亭子邊送和尚進那採蓮舫內依先撶著渡船去了蛋子和尚看時果然與船舫無異一間間都有照壁隔斷都是開關得的第一層是個小坐起第二層又進深些擺有桌椅等件旁邊都是朱紅欄杆掛下斑竹簾兒第三層四圍暖窗中設小榻分明是個臥室蛋子和尚心裏暗想道要請我吃齋到處吃得如何送我在水池中間敢是怕我走了去不領他的盛意麼終不然難道他不信佛法怪我們僧家哄我到這絕路餓死不成正在徬徨之際只見兩個家人抬著食盒撶了渡船送到亭子中間桌上擺著是一碗臘鵝一碗臘肉一碗豬膀蹄兒一碗鮮魚一碗筍乾和那香蕈煮的一碗油炒豆腐一碗青菜一碗豆角見是四葷四素一大壺酒一錫掇子白米飯蛋子和尚叫聲起動也不謙讓恣意飲啖眾人等他吃完收拾過了抹淨了桌子卻待轉身蛋子和尚問道你家大爺在那裏貧僧作別了好去眾人道大爺還沒有主意想是要留長老過夜哩說罷眾人下船又撶去了蛋子和尚道留我過夜是甚麼意思我且耐性住著看恁地看看天晚又是兩個家人一個抱著一副鋪陳一個拿些茶食點心之類下了渡船到亭子上一面擺著茶食請師父用茶一面擺設臥具叫聲安置他兩個又下船去了蛋子和尚道且快樂睡他一夜明日卻再理會當夜無話到得天明兩個家人又來送湯送水擺設早飯整整齊齊的兩葷兩素蛋子和尚吃罷便道貧僧無功食祿今日是必要去了家人道大爺還要與長老面會講些什麼說話這幾日不得工夫只叫我們好生款待長老莫要怠慢你且寬心住下幾時怕他怎的蛋子和尚道你大爺有甚話說索性說個明白我住在此也安穩家人道大爺肚裏的事我們手下人怎曉得長老莫非夜間怕冷靜要個人作伴麼若是要時莫說別的就要個婆娘也是容易去年大爺養個全真道人也在這個亭子上講甚麼採陰補陽的法兒每夜少不得婆娘相伴大爺曾喚過了三四個娼妓陪伴他來作成我們也鬼混了一個多月如今往洛陽去了約道今年又到還不見來蛋子和尚道貧僧從不曾破色戒也不怕冷靜只是一件既承你大爺美意相留就放我在這園中閒走閒走散澹一時也好家人指著南邊敞廳道這廳後一帶樓房就是娶的新姨住下常有丫鬟們下樓採花恐怕外人行走不便蛋子和尚聽得這話便不開口話分兩頭卻說冷公子生長富貴之家迷花戀酒之事到也不在其內只有一件不老成好的是師巫邪術四方薦來術士無有不納恰好這幾日前鄰縣王樞密的公子薦一個人來叫做酆淨眼自言眼睛能見神鬼更有魘人之術且是厲害漢時有那巫蠱之事刻成木人手持木棍埋於地下夜間祀鬼咒詛使木人往擊其人唐時呂用之在高駢門下用事專權亂政將銅鑄就高駢一個小小身軀眼耳俱用物蒙著藏於篋中埋於自己臥床之下使他耳目昏亂惟我所制則今酆淨眼之術又自不同要魘那人時在僻靜處設立祭壇供養神將壇前畫一大圈圈內放一個磁罈將那人姓名籍貫生年生月生日生時寫置放罈內他在壇前書符念咒攝其生魂三日攝不來到五日五日攝不來到七日生魂來時祇長一尺二寸面貌與其人無異若走進圈內把令牌下攝入罈中書符固封埋之坎方其人立死有詩為證當年老耄說高駢太子曾含巫蠱冤若使咒人人便死誰人不握死生權這四句詩言人死生有命就是魘魅之術弄得死時也是本人命盡祿絕俗語道得好棺材頭邊那有咒死鬼然雖如此又有一句話道寧有屈死沒有冤生若是那人福祿正旺便遺個天雷也打不死他若是庸常之輩一般也有屈夭的終不然陰間設立枉死城為著甚麼閒話休提且說冷公子聞酆淨眼有這家法術急欲學他但未曾試得真假何如見這蛋子和尚是個遊僧又不曾落個寺院一心哄他到家裏要將他試法已問得他名字籍貫了只這生辰就單有年月卻沒有日時便著人到酆淨眼下處請他到來商議此事酆淨眼道若沒有生辰須得本人貼身衣服一件及頭髮或爪甲也是一般冷公子道這卻容易便吩咐家人取匹新布做成衫兒送與那和尚說道大爺恐怕長老身上不潔淨教送這件布衫換下舊的來漿洗又喚個待詔與他淨頭吩咐暗地收拾他剃下的頭髮來回話莫拋失了那和尚只認作好意那知就裏便家人也不曉得主人之意當下家人哄得他脫下貼身布衫一件又收拾得剃下一頭短髮獻與冷公子冷公子不勝之喜就同酆淨眼到東邊一個收米的倉廳上來如法擺設壇場辦下些紙馬香燭之類只留兩個極小的家人答應將門扇兒下鎖每日辦下三餐家人們都在門口聲喚安童開鎖接進並不許進來窺看真個雞犬不聞甚是祕密卻說酆淨眼巴不得魘死那和尚顯他法師有靈傳授與冷公子得他一注大財無不用心當下取一幅黃紙寫下奉法追取生魂一名蛋子和尚泗州城人氏迎暉山迎暉寺出家今遊方到本處緣由將他頭髮裹做一個包兒又將他貼肉布衫書下許多追魂符在上面總做一束放於淨罈之內壇前將石灰畫個大圈圈下安著淨罈一個酆淨眼一日行香三遍夜間在壇前書符念咒步罡踏斗每夜弄到二三更到第三日這裏全無影響那邊蛋子和尚已覺有些頭痛身熱到第五日看看病倒臥身不起酆淨眼見圈子外微有黑氣往來已知是遊魂蕩漾次日叫冷公子問取和尚消息得知臥病不起越加用心做張做智的施設到第七日黃昏以後那團黑氣往來甚頻不住的在圈邊打旋交至三更果然聚成一尺二寸一個小和尚之形或進或退徘徊圈外被酆淨眼圓睜怪眼把令牌向案桌上狠擊一下喝道值日天將城隍土地這時候不奉吾法旨更待何時說猶未絕那小和尚一滾滾進圈來對著罈中便鑽下去不鑽時猶可一鑽下時忽壇前起陣怪風空中如霹靂之聲罈兒迸開了七八塊那酆淨眼口吐鮮血死於壇前可憐做了一世的術士到此未能害人先害自己有詩為證邪術有驗害他人無驗之時損自身圈外遊魂仍不滅壇前淨眼總非真法隨鐔破兒童笑咒與人空公子嗔萬事勸人休計較舉頭三尺有神明後人又有詩云毀人還自毀咒人還自咒譬如逆風火放著我先受咒詛神如靈祈禱福且厚冥冥司命者大權寧倒授願發平等心相安庶無咎冷公子驚倒在地半晌方才甦醒兩個十來歲的安童嚇得啼哭不止當下冷公子慌忙自去開鎖喚起家人收拾壇場尸首到來朝買下棺木盛殮一面寫書與王樞密公子只說中惡身死一面叫人打聽蛋子和尚那和尚出了一身冷汗病已好了冷公子十分沒趣雖然機關不曾漏洩卻也無顏見他之面封下二兩銀子叫原服侍他的兩個家人打發他起身去自己只推遠出不與相見蛋子和尚只道見他有病不留他居住卻不知借他試法險些兒送了殘生當下蛋子和尚接了銀子千恩萬謝道多承布施了他剃著光光潔潔的頭兒貼肉又換了一件新布衫歡歡喜喜離了冷家莊而行依先四處遊方去了卻說王樞密公子接得冷家書信打發回書也免不得報與酆家家小知道他家也有妻兒女兒親兒眷兒聞得此信即趕上一大隊過這冷家莊來守著棺木哭哭啼啼沒奈何他自知事不正經央個主文先生出來處些殯葬之費與他又把些盤纏銀兩送與眾人內中有個出尖的奸猾老兒與主文先生私講得了些偏手於中一力擔當攛掇抬回棺木方才清淨也費過百十兩銀子冷公子一生刻薄慣要算計別人不道這一番做了折本的買賣地方鄰里見是宦家又是有名的剝皮公子誰敢出頭開口只是背地裏暗笑正是大風吹倒梧桐樹自有旁人說短長不在話下再說蛋子和尚閒遊度日光陰易過不覺又是一個年頭閒話休敘看看自春而夏又逢端陽已是五月節氣蛋子和尚一月前又轉到雲夢山下將那草棚添蓋完好依舊住下預先備些素糧自初一日起便不出去化緣只在棚中打坐養定精神等到端午早起扎縛停當一條搭膊將布衫兒緊緊束著穿一雙多耳麻鞋約莫午時將到冒著霧氣就走走到洞邊剛剛霧氣斂盡蛋子和尚喜不自勝這是第二回了越發膽大信步行去早過了那三丈長一尺闊的不測橋梁進得洞門無心觀看景致望著那座供白玉爐的大石峰一直走去原來石峰對處是個天生石屋約有民房五六間之大中間空空洞洞並無鋪設穿過石屋後面又是個小小石洞蛋子和尚進這洞內想必是白猿神藏書之所矣低著頭鑽進洞去正是不思萬丈深潭計怎得驪龍頷下珠只因這一番竟把個蛋子和尚空費一番精神重受一年辛苦不知幾時才盜得法來且聽下回分解
