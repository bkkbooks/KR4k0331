body:
  text: 第五回請君莫作冤讎想處處春風自在天話說左瘸兒想起自家五體俱足只為一箭之故做了個瘸子行動時右長左短拐來拐去好不像樣此讎如何不報婆子道冤仇宜解不宜結你自不小心把個破綻露在別人眼裏受這一場苦楚天幸與嚴半仙有緣救得性命就損了一足不過外相當初七國時孫臏軍師唐朝婁師德丞相也都是個跛子便說上界八洞神仙也有個鐵拐李在裏面我兒這個不足為恥因提起嚴半仙三字猛然想起他囑咐之言不覺淒然流淚瘸兒道娘我依著你說話不記懷便了你卻為何掉淚婆子道凡得道者神不能制鬼不能禍人不能傷我等身無道術只是裝點人形幻惑愚眾少不得數有盡時萬一此後再有三長兩短終不然靠著太醫活命況且嚴半仙說我兒女俱有災厄不知到底做個什樣散場因把半仙勸他尋師訪道的一席話細說一遍說得兩個兒女毛骨悚然當下婆子便要離卻土洞出外求道瘸兒媚兒也都願跟隨三個就商量道那一路去好瘸兒道只有東京汴州乃當今皇帝建都之地花錦世界人煙稠密多有異人在彼婆子道這般繁華去處怕你們心神不定惹出什麼是非來我聞得郢州一帶有三江七澤之勝你家祖公公傳下四句道要做法中王除非到沔陽要出法中弄除非問雲夢雲夢是兩個澤名正在沔陽萬山環繞聞得其中有個白雲洞乃天書所藏有白猿神守之我等道法因緣若到彼處心有所遇瘸兒道常言出處不如聚處東京是三教聚集之所若到那裏時便不能夠傳道得法看也看些好景致吃也吃些好東西婆子道恁樣話就不是專心求道之人了媚兒道此去郢州甚遠哥哥現在一支腿不方便要他跑許多路不知何年可到依我說得如打永興一路去那裏有西岳華山是陳摶先生修行之處我們一來在聖帝前燒炷香二來訪陳先生求他的五龍蟄法其餘終南太乙石樓天柱幾個名山都是神仙來往所在次第去遊玩訪尋一番就是東京也七八近了到了東京又商議郢州路道卻不是一舉兩得這瘸子聽了此言正合其意連聲道妹子說的是一力攛掇婆子點頭依允當下瘸子扮個村農媚兒扮個村姑老狐慣扮做老貧婆的自不必說離了土洞望西京一路而來此時正是二月初旬天氣溫和時但見真山真水名草名花灣環碧浪幾行嫩柳舒眉森聳青峰數樹夭桃露頰雙雙粉蝶翩翩對對蜻蜒點水乍晴乍雨養花天不暖不寒遊玩日踏青士女歌連袂選勝遊人醉舞貂話說媚兒雖扮做村姑自是妖麗這瘸子行步不便別人兩步他只一步不時的落後去了走不上十來里便要歇腳娘女兩個只得隨他每遇歇息處村中女眷們張姑李嫂互相喚呼聚集觀看都道這個老貧婆到有恁般好女兒若肯把與人家做媳婦百來貫錢鈔也肯出這瘸子不知是他什麼人也有說這瘸子必是老婦人的親兒這女子一定是養媳婦又有多嘴的上前問他才曉得是哥妹便道一個店兒搬出兩樣貨來同是這老婦人肚皮裏出來的男的恁醜女的恁俊亦有輕薄子弟故意盤問搭話捱捱擠擠媚兒也到老成總不理他只低著頭以後纏得不耐煩只揀靜僻所在方歇一日只好行得五六十里他三個本是個狐精飢餐花果渴飲清泉夜間揀長林茂草中便住宿路上就擔擱了幾日不為大事不比做人出門便有許多費用就是日裏吃一碗稀粥夜間一條草薦若沒有幾文錢鈔在腰囊裏也盼不得到手說到此處反是畜生便宜三個狐精行了數日且喜都遇卻晴和天氣忽一日刮起大風濃雲密布降下一天春雪原來這雪有數般名色一片的是蜂兒二片的是鵝毛三片的是攢三四片的是聚四五片喚做梅花六片喚做六出這雪本是陰氣凝結所以六出應著陰數到立春以後都是梅花雜片更無六出了這瘸兒好天好地兀自一步一顛況遇著恁般大雪越發動彈不得只管叫苦叫屈婆子道此去離劍門山不遠那裏好歹有個庵院可以安身說不得再捱幾步去當下摘些樹葉頂在頭上權當箬笠遮蓋瘸兒也不免把著滑逐步捱去約莫又走了兩個時辰看看望著劍門山相近劍門乃五丁力士所開有西江月為證大劍插天空翠嵯峨小劍連雲天生險峻隔西秦插翅難飛過嶺一自五丁開道至今商賈通行蜀王空自鑿凶門畢竟金牛沒影未到山下只見前面林子裏隱隱露出紅牆頭出來婆子指道到這個所在暫歇卻不好三個努力走上前去看那金字牌額原來是座義勇關王廟前面門道三間中間朱門兩扇半開半掩捱身進去再看時右一間塑個掙獰軍漢控著一匹赤兔胭脂馬左一間豎起一道石碑兩旁都是柵欄第二層正殿三間極其宏麗一帶朱紅子閉著殿前右邊砌一座化紙的大火爐左邊設一座井亭四圍半牆朱紅欄杆只留個打水的道兒婆子道殿內必有道流居住我們莫驚動他只在井亭上安歇些時也好幾個走進亭上只見中間是個八角琉璃井兩旁設得有石凳三個剛才坐定這雪越下得大了瘸子道這天也會作弄人又不是臘雪報豐年沒要緊下著許多做什麼我們也好沒來由由那見得死期便到尋什麼師訪什麼道如今受這般苦楚婆子道當初達摩祖師面壁九年藤蘿穿膝也只不動那九年之內不知受了多少雨雪終不然有房子蓋著他這雨雪是大概天時那在為你一個你卻抱怨他不是罪過說猶未了只聽得大門呀的一聲開響瘸子便向欄杆漏空處張看只見外面走個人進來頭上裹著破唐巾身穿百補褐襖腰繫黃繩腳曳草履你道是誰正是本廟管香火的乜道人那人一隻手拿著雨傘一隻手提著一個纓絡的大瓦罐子約莫容得五六斤酒口中喃喃的道出家人卻把酒當性命這般大雪要我村裏去買這膿血跑上了許多路老天有眼只教他吃了肚痛一頭說一頭把傘和瓦罐子放下卻抬那大門環子去撐門瘸子心裏想道正在寒冷得些酒吃也好這瘸子常時只是懶到此偏健說時遲那時快出了井亭做三四步拐去早把那酒罐兒提起嘴對嘴骨咯咯的咽將下去吃一個不亦樂乎乜道人聽得聲響回頭看見大喝道那裏窮鬼來在這裏做賊偷酒吃我辛辛苦苦向村裏多少路買得來你卻見成受用瘸子忙把酒罐放下要走被道人劈面打上一掌打個翻筋斗爬起來拐著腿向井亭亂跑道人不捨趕到井亭裏面只見娘兒女兒一窠子坐著那婆子慌忙起身道個萬福說道我娘兒三口往西京省親的路上遇了大雪權借此躲一時我這村兒是個憨子著老媳婦賠禮莫計較罷道人正變著臉還要發作幾句一眼睃著婆子背後遮遮隱隱站個俊俏的女兒心腸就軟了把這股熱騰騰的氣撇向爪哇國裏去了忙改口道你兒子忒不通理做出恁般手腳既是憨子也罷了只是吃去好多酒哩怕裏面師父問時你老人家照樣答應則個出了亭子復身向前面柵欄邊取雨傘拍乾夾著提了酒罐望大殿東廊下嘻嘻的帶笑而去這裏婆子向瘸兒埋怨道你直恁貪嘴惹禍天罰你帶個殘疾若生下兩隻快腿連這石井欄都偷去換酒吃了媚兒取笑道只這翻筋斗的本事也換得酒吃瘸子笑道雖然翻個筋斗落得肚子裏比你們暖和正在說話只聽得廊下腳步響裏面走個後生道士出來原來這廟中有個老道士姓陳道號空山年紀雖不上七十得個痰火症終日靜養吃飯痾尿都在房裏再不出門只這後生道士便是廟主他姓賈道號清風年方二十四五雖是羽流平生有些毛病專好的是花酒因這劍門山是個險僻去處急切要見個婦人之面也不能彀聽得乜道說有個俊俏村姑在井亭內坐著這罐子內酒多酒少也不去看連忙走出殿前踏著雪地一逕到井亭內來問道你這一家眷屬那裏來的婆子道老媳婦是雁門山下居住至親三口因欲往西嶽華山進香途中遇雪到此打攪適才村兒不知進退偷了些酒吃老媳婦已埋怨他半日了望法官休責賈道士道這小事何妨不勞掛懷兩隻眼睛骨碌碌覷定背後的小牝狐魂不附體怎見得有詞名駐馬聽為證堪羨村姑兩鬢烏雲巧樣梳生得不長不短不瘦不肥不細不麤芙蓉為面雪為膚看他衣衫上皆齊楚曾否當鑪相如若遇錯認了卓家少婦賈道士又道這雪天出路極是難為人你娘兒受過辛苦了瘸子跳起道便是辛苦再得口酒兒下肚方好婆子嗔著眼看他便住了口道士又道這井亭也不是安身之處日裏還好夜裏風咶咶的怎過得殿後有潔淨房子來往客官常來借寓的請老娘到裏面去煨些炭火烘烘這些打濕的衣服也好婆子道不消得胡亂過一夜明日便走路的賈道士道這天倒還不像晴的況這裏山路崎嶇極是難走不比別處便晴了雪路土也還泥濘我們兀自害怕教這小娘子如何行動這廟宇是個公所就住上十來日那個要你房錢只管等天晴了日色晒幾日卻上路也未遲婆子道多謝法官只是打攪不當道士道說那裏話誰個頂著房子走常言道與人方便自己方便就是黏茶淡飯小道也供給得起若不嫌怠慢胡亂吃些不用打火瘸子道娘難得法官如此好善我們便在房子裏住去夜裏睡去也做個好夢婆子看著媚兒道我兒心下如何媚兒道但憑娘做主賈道士見他依允歡喜無極便道小道引路了隨我進來當下娘兒三口隨著道士從東廊下去轉過正殿又過了齋堂打廚下穿過直到後邊只見兩間新造的小小樓房天井裏種幾棵花木三口兒到樓下站定道士從新見禮一個個都作揖過方才看坐問道老娘高姓婆子道老媳婦姓左這村兒原名左黜因他損了一足喚做左瘸兒這小女叫做媚兒道士道小道姓賈賤號清風今日不期而會也是有緣婆子道有掌家的老師父請來相見則個道士道家師老病幾年不見客了方才殿後西邊的這小小角門裏面便是他的臥房如今只是小道掌家婆子道法侶共有幾位道士道還有個小徒正月裏喪了父親往俗家去了未來方才買酒的道人姓乜也是新進廟門不多時的廚下還有個老香公單管燒火煮飯此外並無他人三位一路來的怕肚裏餓了有現成素齋可用些婆子道不消得帶有乾糧道士道乾糧留在改日路上吃道士連忙到廚下去亂了一回弄了些素肴麵飯叫乜道捧出擺上一桌子又向自己房中取幾碟乾果也擺著婆子謝道何勞盛設道士道山中之物款待休笑只見乜道取了一大壺酒來把四個磁杯一套子放著道士擺開三個杯兒滿滿斟酒對婆子道請老娘居中坐了小哥居左小娘子居右寬心請一盞消寒婆子道老媳婦母子大膽相擾也請法官坐下道士道怕小娘子見嫌不敢奉陪婆子道但坐何妨道士道既蒙老娘吩咐小道禮當執壺便取個杌子在這瘸兒肩下隨身兒坐了媚兒害羞還站在婆子背後婆子道在客邊比不得家裏我兒只管坐下休虛了法官的盛意媚兒方才坐了不坐猶可一坐之時道士斜對著看得十分親切比前愈加妖麗把這三魂七魄分明寫個謹具帖子盡數送在他身上了有詞名黃鶯兒為證仔細覷妖嬈轉教人神思勞看他不言不語微微笑貌兒恁姣年兒尚小不知曾否通情竅小身腰若還摟抱不死也魂消婆子叫黜兒也斟一杯酒回敬道士四個坐下又飲了幾巡說了些閒話只見乜道也精精緻緻的戴了一頂新帽子身上換了一件乾淨布襖又旋著一壺酒到樓下來說道熱酒在此多用些兒若要吃飯時廚下也有婆子道夠了不消得道士便將壺內餘酒斟上一大磁甌拈個火燒把與他吃取他手內這壺熱酒放在桌上換這空壺與他叫拿向廚下去這分明嫌他礙眼打發他開去的意思誰知這乜道年紀雖不多也是個不本分的原是劍州一個宦家的幸僮因偷了本家使婢被鄉宦打個半死趕出叫化他父親乜老兒在日與本廟老香公曾做過舊鄰所以老香公在道士面前多了這嘴收留他在廟裏但他的舊性尚存見了這花撲撲的好女兒怎肯轉腳當下一眼睃定了那小鬼頭兒站在道士背後只是不走道士也忘懷了只顧其前不顧其後大家又坐了一回只見婆子起身道蒙賜酒食俱已醉飽天色晚了告止罷道士覷著媚兒正在出神聽說告止便道再請一杯兒慌忙取壺斟酒卻不知酒壺已被瘸子在他手中取去吃得罄盡了端的是心無二用當下娘兒三口下席稱謝道士也起身答禮只見乜道手中捧著一把空壺兀自呆呆的站著道士問道你幾時來的乜道答應道我幾曾去的道士一肚子氣又不好發作只得忍住教他快快收拾便向婆子說道這兩間樓房是小道春間自家造的雖說蝸窄極是幽靜就是過往客官借宿也只在前面齋堂兩廂房住下並不曾到此因怕小娘子要穩便特地開來奉借婆子道多承過愛我娘兒們無可為報道士又道這樓上有涼床這裏又有個小木榻儘你們隨意自在指著天井側裏一個小門說道這裏面便是小道的臥室倘或少東缺西只煩小哥呼喚一聲就是婆子見他十二分殷勤甚不過意便道法官請自便來日再容相謝道士去不多時忙忙又取個燈兒放在桌上又泡些茶來道請三位吃茶安置又叫乜道到老道房中借個淨桶放在樓上恐怕他娘女兩個夜間要起來解手原來這道士有個嫡親姑娘年紀有五十餘了也在涪江渡口淨真庵為尼去這劍門不遠這老尼隔幾個月便來看他姪兒或住一日兩日方去每遍來時借慣淨桶用的所以今日老道更不疑惑卻說賈清風也防乜道有些饞臉直等他下樓去了方才轉身婆子道難得這法官如此用心處分得恁精細明日若沒雪時我們快走罷顧不得路滑難行了出家人的東西一個便是兩個莫要太蒿惱他不當人事瘸子道有心打攪他了便老著臉再住幾日索性等個晴乾好走莫待走不動又退轉來反惹他笑話你們若執性要去時我是只在這裏等你媚兒笑道哥哥吃得快活不肯去了瘸子道閒常趕你們腳跟不上你只是焦急此去劍門這一路上好不險峻難走哩拖泥帶水的弄甚把戲我也是從長計較可行則行可止則止你卻說我吃得快活了不肯走終不然在此處朝朝寒食夜夜元宵這法官今日也只是敬著新客難道日日如此壞鈔我吃得快活偏你不曾動口媚兒道我是耍子你便認真起來婆子道你兩個休對口到天明我自有個計較那瘸子趁著些酒意便向榻上倒頭而睡婆子攜著燈和媚兒上樓去了道士在房中暗想道天生這般好女子若肯嫁我時情願還俗又想道這女子初時害羞以後卻熟幾分了老天若肯再降幾日大雪留得他多住些時不怕他不上手明日料行不成我且再陪些下情著實鉤他一鉤人心是肉做的難道是鐵打的這老娘又是個貧婆瘸子只貪些酒食都不是難處之事那賈道士準準的想了一夜眼縫也不曾合這還不足為奇誰知那乜道也自癡心妄想魂顛夢倒分明是癩蝦蟆想著天鵝肉吃怎能彀到口正是癡心羽士專盼著握雨攜雲老臉香僮也亂起心猿意馬劍門不是巫山廟錯認襄王夢裏人畢竟這些道家與小狐精弄出什麼事來且聽下回分解
