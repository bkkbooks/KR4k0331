body:
  text: 第十一回跳丸雙轉疾如梭瞥眼年華又早過有事做時須急做誰人挽得魯陽戈話說蛋子和尚第三遍端午遇了天雨之後石橋濕滑行走不得心生一計放下齊眉短棍將這棉紙包袱緊緊的縛在背上倒身下去將雙手抱定石橋那石橋的兩旁底下未免有些稜角不比橋面光滑兩腳可以做力逐步挺去霎時間過了蛋子和尚爬起身來合著掌叫聲謝天謝地便急急的進了白雲仙洞來到白玉爐前雙腳跪下磕頭通陳道貧僧到此第三番了望乞神靈可憐傳取道法情願替天行道倘作惡為非天誅地滅發罷願走到石屋中解下包袱取出紙就地展開逐張檢起照一號二號順去先從左壁上起將手捻定通前至後凡有字處次第拂過共一十三張每張摘去紙角記認了轉向右邊逐一按摹右邊字又密又長摹到二十四張覺得香氣來了後邊還有一段摹不及了忙將摹過的三十七張亂亂的捲做一束用包袱裹了提著餘紙棄下不及收取急走出得石屋白玉爐內煙氣大發慌忙跑出洞來將包袱照前縛在背上仍用腳手做力像猢猻踛樹一般踛過了那三丈長一尺闊光如鏡滑如油的一條石橋大凡走路的去時覺遲轉時覺快蛋子和尚喜得這番到手又且險處已過檢起地下棍棒拽開腳步沒多時走到草棚之中不等喘息定便解下紙束展開來看原來在洞中時手忙腳亂心神恍惚只像黑隱隱的有些字跡一般如今看時原是一張素紙何曾有一點一畫每張檢看都是如此弄得蛋子和尚目瞪口呆手癱足軟這場沒興不可形容想著見神見鬼這許多時都是瞎帳受了三番辛苦險些兒誤了性命竟恁無緣一兩行兒也僥幸不得前兩番雖是空行還是個不了之局今番望絶再沒個題目做了發個惱把這紙張撇做一地轉思轉苦心下酸痛起來淚如珠湧不覺放聲大哭起來哭了一場要往潭邊尋個自盡出得草棚行不多步剛遇見去年的白鬚老者迎著問道長老求道辛苦蛋子和尚滿臉羞慚答道不好向長者告訴命裏無緣一束紙白去白來全沒半字在上似此薄命不如死休說罷淚下如雨老者道長老且莫悲傷有緣無緣也未可定這天書既不由筆臨墨刷字跡從何而來蛋子和尚大驚道去歲長老吩咐不用筆墨如何又恁般說話老者道天書不比凡況明授者屬陽私竊者屬陰日光下之陰氣伏藏自然不見此陰陽相剋之理也要辨得有緣無緣須於戍亥子三個時辰擇個月盈之夜在曠野無人處將紙向月照之隱隱有緑字現出這便是機緣已到若沒字時便是無緣了蛋子和尚如夢方醒如死忽生道多承長老指教只今晚不知有月否老者道初旬月光未足直待至十一至十五這五日內月漸盈滿如法照之若見字便將筆墨依樣描出老漢臨期又來相會蛋子和尚稱謝不盡老者別了和尚轉彎去了蛋子和尚不勝歡喜轉到草棚中把地下紙張重復拾起依照東西暗記各順號數做兩束兒卷著藏於布包之中好生安放依了老者的吩咐直到十一日預先磨下一甌墨汁黃昏時分帶到一個最高的山頭上面揀個平穩處將布包打開鋪在地上先將左壁上摹過的紙一張張對月照看依舊一字俱無蛋子和尚這一慌非小定了心想又將右壁上摹過的紙月中照看果然隱隱現出緑色字樣細字有銅錢大粗字有手掌大但多是雷文雲篆半點不識且喜有了字傳下時再作計較當下將筆和墨就原紙上照樣描寫到下半夜來月色倒西便不甚分明了收拾回去次晚又來一連五日天氣晴明也是數合如此到十五日二十四張紙都已描完收放布包裏面到草棚中一夜不睡想著這天書文字不知何人識得老者約我臨期相會又不見來好生悶人到五更時才合眼去只聽得草棚外似老者聲音說道欲辨天書須尋聖姑蛋子和尚夢中跳將起來便問聖姑是何人此時天已黎明趨出棚外看時並無人影蛋子和尚道奇怪明明有人說話如何不見了想了一會道是了這白髮老者一定就是白猿神化身因我求道心誠感動了他兩番到此指迷今夕在夢中喊我果然如此定是有一個聖姑能辨天書的在那裏只不知住居何處天涯海角怎得相逢不免四處去尋訪他在此守株待兔料是無益這草棚也用不著了當下將天書布包一并打在衣包之內煨飯吃了取了衣包棍棒將地灶中火炊起用松毛引在草棚上燒著只看棚倒在那一方便向這方走路是他心無主意把這草棚只當聽憑天數一般有詩為證三番求真吃盡苦到頭不辨一身事這回只得走天涯識字之人在何所這一日是東北風火勢被風刮起必必剝剝把草棚上蓋都燒完了一聲響亮那幾根柱子向北帶西而倒蛋子和尚道風頭向南那棚柱反倒北去也好古怪哩北方帶西正是關中地面那裏是帝王建都之地多有異人或者聖姑在彼未可知也便遙對白雲洞去處磕了一個頭謝別了白猿神大踏步望北行去後人有古風一篇單表蛋子和尚三番求道之事詩云洞天深處濃雲鎖玉爐香繞千年火中有袁公飽素書石壁鐫傳分右左梵僧原是蛋中兒忽發驚天動地思掉臂出門不返顧天涯遊遍求明師迷津偶爾來雲夢行人指示神仙洞年年端午去朝天香沉霧捲些時空奇書靈神魂騫餐風宿雨何精虔絶壑千尋甘越海危梁三尺輕登天貪看景物爐煙起一番辛苦成流水再來繞洞覓天書覓得天書無筆紀天書不用兔毫傳空摹石壁愁無緣堪憐血淚神翁導千驚萬恐剛三年三年驚恐幾損命空山獨守心堅定分明緑色現雷文夜半峰頭月如鏡欲辨雷文有聖姑愁懷誰向夢中呼一別山靈作行腳孤征遙望長安途長安自古繁華府名山長駐神仙侶此去逢師萬法通不負三年立志苦話說蛋子和尚行至宛丘內鄉縣此時五月中旬天氣炎熱想著得把扇兒用用才好走不多步恰好見個扇鋪那時摺疊扇還未興鋪中賣的是五般扇子那五般是紙絹團扇黑白羽扇細篾兜扇蒲扇蕉扇蛋子和尚道羽扇倒好只是寫不得字團扇又不像出家人手中執的買柄細篾兜扇寫個訪聖姑三字在上倘或路途之間遇個曉得來歷的也好指引走上街頭叫聲店倌取兜扇來看揀選一柄中意的講就五分銀子買了原來這店面後半間設個小座三啓排下一張桌兒幾把椅兒靠桌處是個半窗窗外小小天井種幾竿瘦竹桌上擺得有筆硯之類蛋子和尚一眼瞧見了便道有心辱惱寶店告借筆硯一用店倌道主人不在外面但用不妨慌忙取出放在店匱上蛋子和尚才磨下墨還未曾動筆只聽得裏面一聲誰取了筆硯去店倌答應道有個長老在此借來寫個字就拿來了便對和尚道快寫罷主人出來了說聲未絶只見裏面走出個人來頭裹萬字頭巾身穿單褂兒看見和尚扇上寫著訪聖姑三字拱一拱手便問長老那裏來要訪聖姑怎的蛋子和尚道貧僧是泗州城迎暉寺來的聞得聖姑廣有道行特地訪他那人道泗州城是嶺南地方這般遠處也曉得聖姑哩蛋子和尚暗暗裏驚呀道果然有個聖姑了便問施主會過聖姑麼那人道曾會過來蛋子和尚現今在何處有煩施主指引那人道且請到裏面坐下容某細講蛋子和尚走進坐啓那人又道熱天恕無禮了請坐某去潑杯茶與長老吃那人進去了蛋子和尚見桌有幾冊雜書內一本是破損不完的偶然取看其書名抱朴子內一條云丹水出丹魚先夏至十日夜伺之魚皆浮水赤光如火取其血塗足可步行水上不溺蛋子和尚道這內鄉縣有個菊潭又有個丹水只聞得菊潭兩岸都是天生甘菊飲此水者多壽卻不知丹水又産此異物早得此法怎要遭羅家畈落水之苦正思想間只見那人自家拿個托盤盤中放著兩碗泡茶放在桌上道長老請茶蛋子和尚道相擾不當兩下坐了吃茶那人開口道在下姓秦單諱個恆字去年往華陰縣西嶽華山進香聞得街坊上人多說道本縣楊巡檢家供養著活佛在那裏叫做聖姑姑我問他他怎見得是活佛他說楊巡檢家請得焚字金經無別人識得只有聖姑姑能說楊巡檢敬之如神供養在西園合縣的人多多少少去拜他為師在下也去隨喜了兩番後來因四處聞名人越去得多了便閉關不接外人如今聞得還在那邊算來住個一年有餘了蛋子和尚道他單識得梵字還別有甚麼道法麼秦恆道聞得也有些異處能整月不食也不飢餓又時常與菩薩們往來我們卻不曾試他蛋子和尚道施主親見過聖姑是甚麼模樣秦恆道也只是個老婆婆但神氣不同像有些仙風道骨長老此去只怕還未出關不能相見倘相見時乞道賤諱說不日又來參謁蛋子和尚道當得當得謝了擾茶當下問了華陰縣路徑作別去了尋至菊潭邊果然一潭清水蛋子和尚道雖不是菊花時候不可當面錯過將手捧水來吃了幾口脫得赤膊又洗了個浴穿了衣服問路到丹水那邊去這一年是閏七月該六月初二日夏至此時五月二十一日了蛋子和尚記得分明坐在近處草宿一晚到二十二日恰好是夏至前十日了蛋子和尚來到水邊見是一條大河問著土人方知原是個通渠只這二三里河面內所出之魚都帶紅色更不雜亂所以喚做丹水可見水族也有個界限此乃造化之奇也因這丹魚又少又小又不中吃所以丹水中絶沒個打魚的船兒蛋子和尚特地往下流頭雇個小小漁船移來住下多買些酒食和漁翁同吃對他說道今夜要煩你下個網取得幾個丹魚時我教你個戲法作耍漁翁道甚麼樣戲法蛋子和尚道取這丹魚的血塗在腳底上念個咒語呵口氣往水面上行走如履陸地漁翁道此法惟我漁家切用千萬傳這口訣與我蛋子和尚道若有了魚傳你卻容易漁翁乘著酒興忙去艄頭取網漁婆見他醉了不肯與他兩人廝鬧了一場奪得網來整理停當便要撒將下去蛋子和尚道且住我還有個咒語停一會兒等魚自浮水方可取之兩個人且在船上敘些閒話漁翁帶醉不覺睡去了蛋子和尚眼睜睜看著水面亦聞得游泳唼哺之聲並不見有赤光候至夜深月從東起照見水面果然魚皆浮起那丹魚映著月光其色如火蛋子和尚急急的喚醒了漁翁那漁翁醉還未醒呼么喝六的望空打下一網拿不多幾個小魚兒再下網時魚多驚散了共取得十來尾殺起來血又不多蛋子和尚心下想道有心使這遍乖了且把漁翁來試一試若有驗下年來多取些備用也未遲教漁翁舒過雙腳來把些魚血塗在那腳心裏口中假做念咒呵口氣喝聲疾叫漁翁下水快走那漁翁老實真個望水面雙腳跳下撲通的一聲沒頭沉下漁婆在艄頭看見叫起屈來蛋子和尚也著忙了把船上木板竹篙亂撇下水去喜得漁翁識水性的在船頭下水卻在船艄上爬起老夫妻兩口纏住蛋子和尚絮聒個不了不休蛋子和尚無言回答只得招個不是情願賠禮到次日天明包裹中取出一墜銀子約有二錢重與他買酒吃壓驚方才罷手放和尚起岸那漁船自去了蛋子和尚歎口氣道古人云盡信書則不如無書世上傳留法術都只捕風捉影有假無真即是白雲洞天書雖是三番親到方信其為真然未曾辨識試驗尚不知其何如也只因蛋子和尚好奇太過求真太急偶見抱朴子書上有這一段話便要試他及至不驗連白雲洞天書都疑心起來了有詩為證世間戲法本無真載籍傳來也哄人何事癡僧偏易信漁翁落得壓驚銀又有人駁這首詩道古人之言定然有據人自不得其傳不可直謂其妄也詩曰世間變幻儘多奇抱朴傳來未必虛自是奉行無祕訣見今丹水出丹魚蛋子和尚見天氣炎熱因過秋林見其泉石秀麗心下喜歡道據秦恆所言聖姑閉關未必便能相見莫等到那邊時進退兩難我且住過六月等秋涼走路未遲這山寺中和尚們見他扇上訪聖姑三字也有不曉得的絮絮叨叨的盤問他也有曉得的道便是華陰縣那個老婆子蛋子和尚聽見僧衆聞名一發放意了話分兩頭再提那聖姑姑在楊巡檢西園住起是去年五月中今年又是七月一載有餘了他猛然想起媚兒不知下落天后說道自有人來尋你也不知該在何年何日在此內外不通便有呂純陽張道陵出世那個半夜敲門三更打戶把這仙機妙法特地尋你則甚還是與外人相接庶幾便於尋訪聞楊奶奶冒了風寒有十分沉重諸醫不效楊巡檢正在著急乘此機會勸他起個無遮大會保禳奶奶安康那時僧道畢集必有所聞矣當晚送供給的家童來便將建會保禳的話對他說了又道若是老爺肯發心時貧道只今晚便求普賢菩薩的聖水來救取奶奶管情沒事家童回去述與楊巡檢聽了楊巡檢頓足道正忘了聖姑姑有這個良醫何不去求他便教掌房的老嬤嬤快到西園求他聖水所言保禳道場但憑開規起建老嬤嬤到西園見了聖姑姑把楊巡檢吩咐的話一一說了那老狐精那裏有甚麼聖水魆地裏到臥室中把個磁碗撒一潑尿做張做智的擎出房來交與老嬤嬤老嬤嬤接在手中分明捧了玉杯甘露戰兢兢只怕損了一滴討個盒兒盛了拿回獻與楊巡檢楊春平信奉到此豈疑其詐真個認做仙丹妙藥叫丫頭扶起奶奶的頭親手把這碗狐尿灌在他口裏去原來藥性本草上有一款狐尿主治寒熱瘟瘧偶然暗合了楊奶奶到半夜來頓覺清爽討湯水吃楊春喜從天降稱贊聖姑姑不絶那時就有個親知灼見的對他說是老牝狐撒的臊溺他家如何肯信這也是狐精的法緣將到自然有這般造化世間萬事皆如此也有詩為證運未至時真成假時若通時假亦真莫向人前誇本事還愁造化不如人次早楊春巡檢親到西園從後邊私路進去見了聖姑姑再三稱謝就問他保禳道場如何規則婆子道這個道場名為無遮大會或是講經明心見性或是念佛專修西方世人根器鈍多利少如今還是說些因果以勸化世人念佛不論善男信女在家出家願來者聽本宅施主備齊款待別個有頭髮的吃去不算只光光和尚要齊滿一萬之數數滿之日做個回向功德其福無量不但老檀越夫妻長壽還要觀音菩薩送子文昌帝君填祿世世富貴才表貧道的一點報效之意原來楊巡檢夫妻兩口極過得好真個是如魚似水百從千隨雖然偏房有子卻不喜歡只要奶奶有個親生方才心滿意足聞了此言如何不喜當下取曆日看了擇於八月初三啓請聖姑出關十一日道場起首先去稟過了縣尹自己寫個告示張掛西園門首寫道本宅因家眷不安發心啓建無遮大會以八月十一日為始一連七日四方善男信女僧尼道衆真心願來念佛者本宅例有齊襯如有棍徒乘機囉唣擾亂佛場定行送官懲治不恕特示天禧二年七月日卻說楊奶奶自服過聖水之後病勢漸退雖然精神未復且喜沒事了感聖姑姑活命之恩做下青紵絲道兜一個紫花細布道衣一件將白綾做了夾裏梅緑暗花錦裙一條雲頭道鞋一雙至初二差兩個丫鬟跟著老嬤嬤從西園後邊私路進去送與聖姑姑說奶奶多多上覆感謝聖姑姑救命之恩明日出關恐不得自來參見特具拜佛新衣一套幸勿棄嫌聖姑姑道逐日擾宅上如何又要奶奶費心就辭不過只得收了便道回去時致意奶奶耐心保重十一日道場起手奶奶那時也康健了請早過拈香功德滿日還保扶奶奶添個公子哩老嬤嬤道奶奶諸般稱意了只少一件兒男男女女也生過五胎只是不育聖姑姑道奶奶今年幾歲了丫鬟道老爺四十一歲奶奶小二歲今年三十九歲了聖姑姑道這場病症也是明九年分的晦氣應過便沒事了看奶奶不是孤相命中定有好子只是招得遲些說了好一會你謝我我謝你的辭別去了到初三日楊巡檢自去西園揭封皮開鎖一面著人打掃飯僧堂便叫修理鍋灶一面請出聖姑姑到佛堂中商量安排道場合用家伙除卻菜蔬茶水臨期每日備辦其他米麥豆粉油鹽醬醋及桌凳碗碟件件預先運到此時哄動了華陰縣裏那個不傳說楊老佛家齊僧有等無籍的化了串街的婆娘平昔不曾吃一日素念一聲佛的也學裹頂唐巾戴個道兜整備起齊之日來道場中趁口和哄到了十一日天色方明便有人一出一進的觀看但見園門洞啓佛堂弘開琉璃燈下燭台上油燭成行獅子爐前香案間牙香滿盒念佛台高裝法座起號專待供佛陀飯僧堂雜擺春臺放鉢只延僧侶劈柴煮飯火夫亂叫斧頭來洗菜熬油廚子只嫌幫手少可惜富家齊一日堪充貧戶費終年少停楊巡檢帶了一班家樂到西園前後左右點檢了一回這些僧徒道友男男女女源源而來又有一等閒漢兒童雖不念佛投齊都來趁鬧觀看此等最多越顯得人山人海只聽得淨室中共是三遍鐘鳴第一遍聖姑姑起身梳洗第二遍聖姑姑早齊更衣第三遍樂人一齊吹出但見堂中畫燭齊明香煙繚繞好幾個丫鬟養娘簇擁著聖姑姑齊齊整整穿著一身新衣搖擺出來向佛前拈香膜拜楊巡檢隨後也拜了一班吹手迎出前堂那婆子全不謙讓徑往高座上坐了楊巡檢口稱師父倒身下拜衆人中也有去年拜過他的也有新來的不分男女但是佛會中一齊隨著磕頭那婆子端然不動原來這念佛會中為首的謂之佛頭他若開談衆都靜聽他若念佛衆都齊和其人妄自尊大旁若無人從來有這個規矩這婆子也只蹈襲而已拜罷聖姑姑吩咐男左女右分班而坐楊巡檢看見人衆嘈雜避在旁邊一個書房中坐了一會先回去了這夥老少婆娘張姨李媽你扯我拽的各尋伴侶向右首坐下但是僧流居士俱在左邊也有說是女僧捱向右邊坐的急忙裏辨不出真假亦有捱擠不下只在兩旁站立的其他投齊行腳都在外邊四散或坐或立聖姑姑將界方在案上猛擊三下吩咐衆善友不許揚聲各宜靜聽無常迅速時至不留要免輪回作速念佛偈曰西方有路好修行阿彌陀佛勸你登程不肯登南無阿彌陀佛你若登程吾助你阿彌陀佛只須念佛百千聲南無阿彌陀佛每稱揚佛號衆人齊聲附和畢聖姑姑道貧道從西川到此感承本宅官府相留一年有餘今日出關啓請這個道場一來要保國治年豐民安道泰二來要保本宅官府人口平安福祿遠三來要保十方大衆道心開發早辨前程貧道今日也不講甚經說甚法且把諸佛菩薩的出身敘與大衆聽著你道觀音菩薩是甚樣出身偈曰觀音古佛本男人阿彌陀佛要度天下裙叉化女身南無阿彌陀佛做了妙莊皇帝三公子阿彌陀佛不享榮華受辛苦南無阿彌陀佛那婆子將觀音菩薩九苦八難棄家修行的事敷演說來說一回頌一回弄得這些愚夫愚婦眼紅鼻塞不住的拭淚到午齊時分聖姑姑收了科下坐赴齊衆人也有住下吃齊的也有竟自回去的只飯僧堂僧衆齊齊的坐下每人一大碗飯碗上頂著一簇乾菜兩片大豆腐兩個大饝饝一索長壽綿線線上穿三十文襯錢做七八路的隨頭派去這是第一日來的還少只有二百餘衆管家登記明白了剩下的飯大籮裝著憑這起黃胖道人癩皮化子隨意大碗價吃飽到明日又是如此來的人一日多似一日供給的支持不來了稟過楊巡檢又出個曉示但是遊方僧衆俱於各處庵堂寺院支領齊襯本宅預先派開錢糧差人分頭主管登記其飯僧堂專待四方道友又吩咐各庵院主細心察訪僧道中果有德行超群法術驚衆者即時稟知本宅另行優待這是聖姑姑的主意話休絮煩再說蛋子和尚在秋林山住了兩個月見天氣已涼了收拾包裹望永興一路進發免不得日閒化齊夜間投宿路上便有人傳說華陰縣宦家啓建無遮大會勸人念佛蛋子和尚猜道一定是聖姑倡首便趲行前去不一日到了華陰正是八月十七這裏是第七日道場了婆子逐日的將文殊普賢諸佛化身他演說那個親眼看見的敢與隨他質證道個不字蛋子和尚到時已知備細他一心要見聖姑誰耐煩到庵院中支領常例齊襯待到西園又怕門上拒阻沉吟半晌便徑到楊巡檢宅門首去在石獅子邊盤膝坐著念佛管門的張公道你那長老想是沒耳朵的本宅現今齊僧卻不到庵院中去領受在此閒坐則甚蛋子和尚舉扇道貧僧沒耳朵老菩薩是有眼睛的怎不看扇上寫的字樣貧僧是求見聖姑的不是討齊襯的言之未已只見宅門裏面走出兩個有年紀的婦人來背後安童捧雙幢的食盒兒跟著你道那婦人是誰一個是掌房的老嬤嬤一個是女陪堂如何叫做女陪堂比如男子家讀書的有個伴讀頑耍的有個幫閒至於那女眷們廝伴的就叫做陪堂也不是女教學又不是針線娘逐日只清話閒耍或是吃茶飲酒下棋投壺遇著好佛的就陪著燒香供佛大人家往往有之張公指著道長老你要見聖姑時只央這兩個老人家引進便得相見蛋子和尚慌忙起身打個問訊道女菩薩貧僧稽首了貧僧要見聖姑相煩引進則個老嬤嬤先立住腳那女陪堂和安童也住了老嬤嬤問道長老那裏來的要見聖姑則甚蛋子和尚道貧僧泗州城人迎暉寺出身去年得了個不起之疾夢中虧著那聖姑姑救我特地相訪不期在此聞知貴府告示凡遠來行腳徑赴各庵院支領齊襯並不許到佛堂纏擾莫非會中多是女菩薩麼佛門廣大如能挈帶貧僧也去磕一個頭也是一場緣法老嬤嬤道一般也有男人在彼起初長老們也都在一處散齊後來人衆所以派開了如今只一位去時卻也不妨女陪堂便道喜得奶奶不在那邊沒甚妨礙老嬤嬤道奶奶近日有病也虧著聖姑姑救好的這個道場也為保禳啓建因奶奶身子還不健旺去不得不然也在彼拈香拜佛了這食盒內的點心茶果奶奶著老身送與聖姑姑用的蛋子和尚見那婆子又和氣又健談便問道聞得聖姑識字最深曾在貴府辨認過什麼梵字金經果有此事麼老嬤嬤道千真萬真的這本經經過許多名僧都不曉得偏有他婦道家字字能識老爺為此上敬重他起口裏自說腳下自走不覺到了西園只見門內門外鬧哄哄的往來何止千人都道在佛地上走一遍過世人身不絶有這般邪說所以佛會聚人極易老嬤嬤道長老且在飯僧堂暫住待老身稟過聖姑方來喚你相見走了幾步又縮轉來說道不曾問得長老甚麼法名老身好去說話蛋子和尚道貧尚沒姓沒名從小只叫做蛋子和尚老嬤嬤道到是個光頭渾名帶笑的走進去了這一日聖姑姑正說的是羅卜救母的因果說了又念佛念了佛又說到午牌時分完了老嬤嬤將送來茶果放在淨室中無非是白糕油餅蒸酥麻團及榛松棗栗之類等候聖姑姑進來女陪堂迎著相見便道連日辛苦奶奶十分掛缺特地備下些粗點心請老菩薩用些聖姑姑稱謝過了女陪堂推聖姑姑坐了客席自家坐了主席也去扯老嬤嬤同坐老嬤嬤再三不肯聖姑姑道佛門中更無大小只管坐著不妨老嬤嬤方才取個小杌兒放在旁邊叫聲大膽坐了下去殷殷勤勤的送茶送果說話中間提起了奶奶求子之事女陪堂問道老菩薩你當初曾有兒沒有聖姑姑道貧道有個兒子在遠方出家做道士女陪堂問道緣何不做和尚卻做道士不是女菩薩的本等聖姑姑道萬法初無二理三教本是一宗就是老身佛法也講道法也講老嬤嬤就插嘴道老菩薩你醫法也講不然如何能救人的病症聖姑姑笑道奶奶貴恙是虧了聖水老嬤嬤道你又會夢中去救人有恁般事麼聖姑姑道沒有老嬤嬤道方才有個長老是泗州城人他道你夢中去救了他病特地尋訪他手中拿一把細篾兜扇上寫訪聖姑三字他名字又叫得奇怪叫什麼團子和尚女陪堂道差了是叫做蛋子和尚只這個蛋子直觸在聖姑姑心裏那老狐精最有急智便忙扯個謊道這和尚是我前世的兄弟平生最是孝順我曾有病他割下腿上一片精肉煎湯我吃我就好了今世我合去救他正是恩恩相報如今他在那裏便引來見我則個老嬤嬤應承去了卻說管西園齊飯的本是不打發遊僧因見是掌房老嬤嬤與女陪堂同引來的一般有齊有襯蛋子和尚吃了齊正靠在門上閉看只聽得叫聲蛋長老是你前世姊兒喚你蛋子和尚回頭見是老嬤嬤問道誰是貧僧的姊兒老嬤嬤便把聖姑姑說的話述了一遍如今喚你相見蛋子和尚明曉得是科諢只得將錯就錯把直裰整一整隨著老嬤嬤直至淨室中聖姑姑先起身招架蛋子和尚一見便放下棍棒衣包磕頭稱謝聖姑姑慌忙扶起認做兄弟再取個杌子就叫他隨著老嬤嬤坐了兩下裏並沒半點相干未免敘幾句鬼話只因這番相會有分教盜法的黠僧兼辨天文蝌蚪坐關的妖嫗頓成地煞神通破楊巡檢幾分的家私費趙管家一番的心計正是一莖儘有千尋勢尺水能興萬丈波要見分明且聽下回分解
