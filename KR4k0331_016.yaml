body:
  text: 第十六回君今不識永兒誰便是當年胡媚兒一自妖胎成結果凶家害國總由斯話說大宋盛時東京開封府汴州花錦似城池城外有三十六里的城二十八座城門有三十六條花柳巷七十二座管絃樓若還有搭閒田地莫不是栽花蹴氣球那東京城內勢要官宦且不說他只這財主員外也不知多少有染坊王員外珠子李員外泛海張員外綵帛焦員外說不盡許多員外其中有一員外家中巨富真個是錢過北斗米爛陳倉家中開三個解庫左邊這個解庫專在外當綾羅緞疋右邊這個解庫專當金銀珠翠中間這個解庫專當琴棋書畫古玩之物每個解庫內用一個掌事三個主管這個員外姓胡名浩字大洪祇有院君媽媽張氏因這員外平昔間人正是眼睛有一對兒女無一人因這員外平昔間一心只對著做人家盤本算利得一盤十得十盤百全不想到兒女頭上那院君又有一件毛病專一吃醋撚酸不容員外娶妾置婢還是十年前員外偷了個丫鬟院君知道登時把丫鬟打個半死發與主管教他召人賣了又和員外鬧吵拌唇舌做面嘴整整的有個把月不得太平所以員外也不做這個指望總日只在錢鈔中滾過日子有詩為證世間只有婦人癡吃醋撚酸無了時不想歡娛容易散百年香火是孩兒光陰似箭胡員外不覺行年五十本家解庫中三個掌事的一夥兒商量打出錢來備下一副羊酒公禮侵早進去捧觴稱壽那九個主管另做一起其餘家人安童們又做一起都來磕頭城中一般的員外及相識人家也有親來捧觴的也有差人送禮的免不得吩咐當值的備下筵席寫個顏色帖兒請人吃麵飲酒中間只聽得賓朋裏面你親家我親家的交杯酬酢都說些家常兒女的說話員外轉想著自家無男無女心中默然不樂到筵席散了眾賓作別而去院君在房中另整個攢盒請員外飲三杯賀喜員外覷著院君驀然思想起來兩眼托地淚下媽媽見了起身向員外道員外家中吃不少穿不少百事豐餘彀你受用雖不比為卿為相的富貴榮華也是千人欣萬人羨的一個財主況且今日壽誕又是個好日緣何恁般煩惱胡員外道我不為吃著受用家私雖是有些奈我和你無男無女日後靠誰結果則今日酒席上個個有親戚扳談的都是男女面上來的偏我孤身獨自常言道養兒待老積穀防饑明年就是五十一歲望著六十年頭了生育之事漸漸稀少因此心中傷感媽媽道東村有個王老娘四十八歲養頭生我今年纔四十七歲還不算老終不然就養不出了或是命裏招得遲也未見得我若也到五十歲沒有生育那時少不得娶個通房與你還有一說聞得當今皇太子也是皇帝拜求來的偏我庶民之家拜求不得如今城中寶籙宮裏北極佑聖真君甚是靈驗不若我與你揀個吉日良時多將香燭紙馬拜告真君祈求子嗣不問是男是女也作墳前拜掃之人便叫養娘們安排熱酒我與員外解悶則箇夫妻二人吃了數杯收拾了家伙歇息了又過數日恰遇吉日良時叫當值的買辦香紙安排轎馬停當丫鬟跟隨了逕到寶籙宮門首下轎走入宮裏來到正殿上燒了香少不得各處兩廊都燒遍了來到真武殿上胡員外虔誠禱祝生年月日拜求一男半女也作胡氏門中後代員外堆金山倒玉柱叩齒磕頭媽媽亦然插燭也似拜了幾拜祝罷化紙出宮回家不在話下自此之後每月逢初一十五便去燒香求子已得半年光景忽一日時值十二月間解庫中正當算賬的日子又且逼著殘冬當的要當贖的要贖那掌事的和主管又要應接主顧又要打點清理賬目交割好不忙哩只有中間那個解庫當古玩的到底比那邊清閒一分主管正在解庫中把一年中當過贖過的本利賬目結算托地布簾起處走將一個先生入來那先生頭戴魚尾鐵道冠身穿皂沿邊烈火緋袍左手提著荊筐籃右手拿著殼扇行纏絞腳多耳麻鞋有飄飄出世之姿分明是神仙模樣原來神仙有四等走如風立如松臥如弓聲如鐘只見那先生揭起布簾入來看著主管主管見他道貌非俗急起身迎入解庫與先生施禮畢凳上分賓主坐了主管道我師有何見諭那先生道告主管此間這個典庫是專當琴棋書畫的麼主管道然也先生道貧道有一幅小畫要當些銀兩日後原來取贖主管道可借來觀一觀看值多少主管只道有人跟隨他來拿著畫只見那先生去荊筐籃內探手取出一幅畫來沒一尺闊遞與主管主管接在手裏口中不說心下思量莫不是先生作耍笑這畫兒值得多少不免將畫叉將起來看時長不長五尺把眼一觀原來光光的一幅美人圖上面寫僧繇筆三字畫倒也畫得好只是小了些不值什麼錢主管放了畫叉回身問道我師要解多少先生道這畫非同小可要解一百兩銀子主管道我師休得取笑若論這一幅小畫兒值也不過值五六百錢要當百兩銀子差了幾多倍數如何解得先生道這是晉朝張僧繇畫的世間罕有之物主管道張僧繇到今五百多年了這幅美人圖還是簇簇新的如今世上假畫也多忒說的沒分寸了先生道足下既認不真只當五十兩去罷主管道便五兩也當不得先生定要當主管只是不肯當回他去又不肯去兩個說假誇真嫌多道寡正在爭論之間只聽得鞋履響腳步鳴中間布幕起處員外踱將出來問主管燒午香也未主管道告員外燒過午香了那先生看著員外道員外稽首員外道我師請坐拜茶員外只道他是抄化的只見主管把畫幅叉起呈上員外道此位師父有這幅小畫定要當五十兩銀子小人不敢主張員外把眼一覷笑道我師這畫雖好不值許多如何當得五十兩那先生道員外你只知其一不知其二這幅畫兒雖小卻有一件奇妙處員外道願聞其詳先生道此非說話處請借一步方好細言員外與先生將著手逕走進書院內四顧無人員外道這畫有何奇妙先生道這畫不比世上丹青乃是神仙之筆於夜靜更深之時不教一人看見將畫在密室掛起燒一爐好香點兩支燭咳嗽一聲在桌子上彈三彈請仙女下降吃茶一陣風過處這畫上仙女便下來那員外聽得思量道恁地時果是仙畫了只怕未必如此先生見他沈吟便道員外如若不信且留畫在此今夜試看明日來領當價員外道我師恁地說必非謬言敢問我師尊姓先生道貧道姓張名鸞別號沖霄處士員外點著頭即同先生出來教主管當與這張先生去罷主管道日後不來贖時卻不干小人事員外道不要你管只去簿子上註下一筆說我自當的便了員外一面請先生吃齋就將畫收在袖子裏卻與先生同入後堂裏坐定吃齋罷員外送先生出來主管兌足了五十兩白銀交付先生先生作別自去不在話下員外在家受了媽媽的束縛等閒女子也不得近身況且說是個仙女妖嬈美貌是生平不曾見面的如何不魂搖洛浦神蕩陽臺當日巴不能夠一拳把白日打落譙樓上立地催他起鼓正是眼望捷旌旗耳聽好消息未到天晚先教當值的打掃書院安排香爐燭臺茶架湯罐之類預思量定下一個計策向媽媽說道我有些賬目不曾明白今夜要到書院中細去算清快催晚飯來吃媽媽信之不疑真個的早早收拾晚飯兩口兒吃罷員外道媽媽你先請歇息我去去便來不覺樓頭鼓響寺內鐘鳴已是初更時分但見十字街漸收人影九霄雲暗鎖山光八方行旅向東家各隊分棲七點明星看北斗高垂半側六博喧呼月下無非狎客酒人五經勤誦燈前盡是才人學士四面鼓聲催夜色三分寒氣透重幃兩支畫燭香閨靜一點禪燈佛院清胡員外逕到書院推開風窗走進書院裏面吩咐當值的道你們出去外面伺候回身把風窗門關上點得燈明了壁爐上湯罐內沸沸的滾了員外打些上號龍團餅兒放在罐內燒一爐香點起兩支燭來取過畫叉把畫掛起真是個摘得落的妖嬈美人員外咳嗽一聲就桌子上彈三彈只見就桌子邊微微起一陣風這一陣風真個是善聚庭前草能開水上萍動簾深有意滅燭太無情古寺傳鐘響高樓送鼓聲惟聞千樹吼不見半分形風過處只見那畫上美人歷歷的一跳跳在桌子上一跳跳在地上這女子從頭到腳五尺三寸身材生得如花似玉美不可言正是添一指太長減一指太短施朱太紅傅粉太白不施脂粉天然態縱有丹青畫不成有沉魚落雁之容閉月羞花之貌只見那女子覷著員外深深的道個萬福那員外急忙回了禮去壁爐上湯罐內傾一盞茶遞與那女子自又傾一盞奉陪吃茶罷盞托歸台不曾道甚麼那女子一陣風過依然又在畫上去了員外不勝之喜道這畫果然有靈如今初次只莫纏他等待第二遍細細與他扳話不遲當時把畫軸自家捲起叫當值的來收拾了家伙員外自回寢室歇息不在話下到第二日又說要去算帳忙忙的催取晚飯吃了又到書房中來卻說張院君私想道員外昨夜管帳今夜又算帳我不信有許多賬算既然有賬算時日裏工夫丟向那裏去卻到夜間恁般忙迫事有可疑不免叫丫鬟提個行燈在前媽媽在後逕到書院邊近風窗聽得一似有婦人女子聲音在內媽媽輕輕的走到風窗邊將小拇指頭蘸些口唾去紙窗上輕輕的印一個眼兒偷眼一觀見一個女子與員外對坐面說話這媽媽兩條忿氣從腳板底直貫頭頂門上心中一把無名火高了三千丈按捺不下便舒著手推開風窗門打入書院裏來員外吃了一驚起身道媽媽做什麼那媽媽氣做一團道做什麼老乞丐老無知做得好事你這老沒廉恥連連兩夜只推算賬卻在這裏做不仁不義之勾當這沒來歷的歪行貨那個勾引來的你快快說正鬧裏那女子一陣風過處已自上畫去了那媽媽氣忿忿的喚梅香來與我尋將出來教你不要慌員外口中不言心下思量道你便把這書院顛倒翻將轉來也沒尋處那媽媽尋不見這個女子氣做一堆猛抬頭一看看見壁上掛著幅美女媽媽用手一扯扯將下來便去燈上一燒燒著丟在地上員外見媽媽盛怒之下不敢來奪那畫烘烘地燒著紙灰起地上團團的轉看看旋到媽媽腳邊來媽媽怕燒了衣服退後兩步只見那紙灰看著媽媽口裏只一湧出來那媽媽大叫一聲驀然倒地有詩為證傳神偶入風流譜帶焰還歸離恨天只為妖消不盡重來火宅作姻緣胡員外慌了手腳便教丫鬟相幫扶起來坐在地上去湯罐內傾些湯將媽媽灌醒扶將起來交椅上坐定媽媽又罵道老無知做得好事喚養娘扶我去臥房中將息媽媽睡到半夜光景自覺身子有些不快自此之後只見媽媽眉低眼慢乳脹腹高身中有孕胡員外甚是歡喜卻有兩件事心中不樂一來可惜這軸仙畫被媽媽燒了再不得會仙女之面一來恐日後那先生來取贖怎得這畫還他不在話下光陰似箭日月如梭經一年光景媽媽將及分娩員外去家堂面前燒香許願只聽得門首有人熱鬧當值的報員外道前番當畫的先生在門前胡員外聽了吃了一個蹬心拳只得出來迎接道我師又得一年光景不會不敢告訴今日我房下正在坐草之際有緣得我師到來只見那先生呵呵大笑道媽媽今日有難貧道有些藥在此就於荊筐籃內取出一個葫蘆兒來傾出一丸紅藥遞與員外教將去用淨水吞下即時就得分娩員外收了藥留先生吃齋先生道今日宅內忙迫不敢相煩改日卻來拜賀擾齋說罷作別而去亦不提起贖畫之事且不說先生卻說員外將藥與媽媽吃了無移時生下一個女兒來員外甚是歡喜老穩婆收了不免做三朝湯同百歲一週取個小名因是紙灰湧起腹懷有孕因此取名叫做湧兒後來又嫌湧字不好改做永字時光迅速不覺永兒長成七歲生得十分清秀素臉黑髮明眸皓齒如觀音座龍女一般他夫妻兩口兒愛惜他如掌中之珠櫝中之玉員外請下一個教授在家教永兒讀書這教授姓陳名善為人忠厚老成是個積年句讀之師員外請得到家夫妻兩口兒好生敬重正是雖說慈親護嬌女喜逢賢主對佳賓這段話且擱過一邊再說雷太監自那日不見了新娘差人四下尋訪並無蹤跡只恐張鸞發惡著實賠禮奉承張鸞已知不干雷家之事樂得受他恭敬只為丁丞相諂佞與皇太子不甚投機真宗皇帝晚年又得了個風疾不能視朝所以雷太監雖十分有心要引薦張鸞無處用力張鸞又聽了小妖魂一番鬼話況且胡員外家見在投胎生女眼見得有幾分靈驗把自己進身一節也不甚要緊只將淑景園做個下處在東京城內城外散淡遨遊一來要尋訪聖姑姑相會二來要看取胡員外女兒下落光陰似箭不覺到了景德元年真宗皇帝晏駕皇太子登基是為仁宗皇希因委雷允恭管造山陵誤移皇堂於絕地被學士王曾劾奏並發丁丞相內外交結許多惡跡仁宗龍顏大怒將丁謂貶去遠州司戶參軍雷允恭即時處斬抄沒家私連淑景園都沒入做了官產張鸞因在這園中住久怕有是非干涉預先脫身遠去浪江湖忽一日遊至山東濮州地方其時四月節氣正值亢旱各縣都出榜廣召法師祈禱無驗聞得有個女道姑在博平縣揭榜建壇刻期禱雨張鸞心下思想道這一定是聖姑姑了我且去看個動靜拽開腳步逕投博平縣來正是久旱管教逢甘雨慢云他鄉遇故知畢竟張鸞這一去就遇著聖姑姑否且聽下回分解
