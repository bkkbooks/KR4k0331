body:
  text: 第二十六回君遠天高兩不靈濫官污吏敢橫行腰間寶劍如秋水要與人間斷不平話說知州心下躊躇了半晌舉筆判道卜吉不合逼取車腳錢致不識姓氏婦人情慌走避誤落入井井在久閉空宅之中素多凶怪及打撈不獲亦一異事也卜吉原無威逼之情似難抵償然誤死人命不為無因合應脊杖二十刺配山東密州牢城營當軍當下當廳斷了二十脊杖喚個文字匠人刺了兩行金印押了文牒差兩個防送公人一個是董超一個是薛霸當廳押了卜吉領了文牒帶卜吉出州衙前來卜吉到州衙外立住了腳回頭向著衙裏道我卜吉好屈婦人自跳在井中我又不曾威逼他他又不是別人是本州土神教我下去獲得這件寶物獻你你得寶物自應免我之罪倒把我屈斷刺配密州去我若掙扎得性命回來卻將你隱匿寶物事情敲皇城打怨鼓須要和你理論董超見他言語不好只顧推著卜吉行了薛霸道你在這裏出言語連累我兩個卻是利害急急離了州衙走到一個酒店三個人同入來坐定董超道取兩角酒來薛霸道卜吉我兩個雖然是奉公差遣防送你到山東密州路程許多遙遠你路上也要盤纏我們自不曾帶盤纏隨人走的你有甚親戚相識去措置些銀兩路上好使用我兩個不要你的卜吉道告上下小人原有些錢為吃官司時不知誰人連車子都推了去今叫我問誰去討小人單身獨自別無親戚盤纏實無措辦處薛霸焦躁道我們押了多多少少兇頑罪人不似你這般嘴臉你道沒有盤纏便是李天王也要留下甲仗生薑也要捏出汁來有我們手裏的行貨不輕輕的放了說了一場還了酒錢兩個押著卜吉出鄭州西門外來正走之間只聽得背後有人叫聲董超董超回頭看時認得是本州吳孔目便叫薛霸押著卜吉先行自己落後一步與他相見吳孔目道在下奉知州相公所委適斷配卜吉出來這廝在州衙前放刁如今奉知州相公臺旨叫你二人怎的做個道理就僻靜處結果了他揭他面上金印回話重重賞的董超應承了自趕上來和薛霸知會只就前面林子裏結果了他休兩個押卜吉到一所空林子前董超道我今日有些困倦行不動且就這林子裏睡一睡則個薛霸道才離州衙行不到三十里路如何便要歇董超道今日恁起得早了些要歇一歇只怕卜吉逃走了時生藥鋪裏沒處買你等我們縛一縛便是睡也心穩卜吉道上下要縛就縛我決不走董超將條長索把卜吉縛在樹梢上提起索頭去那邊大樹枝梢上倒吊起來手裏拿著水火棍道卜吉我們奉知州相公臺旨叫害你卻不干我們事明年今月今日今時是你死忌卜吉慌得魂不附體兩眼吊淚哀告道二位我與你目前無冤往日無仇便是知州相公我也並沒得罪於他如何就要結果我性命望二位開天地之心保留殘命生生世世當效犬馬之報一頭說一頭淚如雨下董超道你啼哭也沒用知州相公怪你在州前放刁要結果你他是一州之主誰敢違拗你要性命我回去倒要替你受毒棒不成薛霸道董超哥有恁般閒氣力與這蠻子講話早了早放等他閻王面前快討個好人身說罷在董超手裏劈手奪過棒來卻待舉起要打卜吉道苦呀苦呀我命休矣猛然記得與我寶物的聖姑姑曾說有急難時教我叫他乃大叫聖姑姑救我則個叫猶未絕只見林子外面一個人大喝道防送公人不要下手我在此聽得多時了董薛二人吃了一驚慌忙就跑出林子外面來看時是一個先生怎生模樣有西江月為證奕奕風神出眾堂堂七尺身材面如紫玉美鬍腮兩點朗星堪怪束髮鐵冠如意紅袍腰繫黃天師張姓自天來只少虎兒騎在那道士摔拳拽步趕入林子裏來看著兩個公人道知州叫你們押解他去如何將他吊起害他性命是何道理兩個公人慌了手腳道先生我們奉知州相公臺旨並無私怨先王道你亂道如今官司清明如鏡緣何無罪要壞他性命我是出家人本當不管閒事適才聽得林子裏高叫聖姑姑是何意故你且放他下來待我問他董超只得把卜吉解放了卜吉道告先生聽卜吉說我因販皂角去東京賣了回來路上見一婦人叫腳疼走不得許我五百文錢賃我車子載他到鄭州東門內一個空宅子前這婦人跳下車子走入去我不見他出來入去一時婦人自跳下井去地方人道我逼他下井捉了我解到官司知州叫我自下井打撈死戶我下去時原來井裏沒水卻有一條路見一所宮殿遇著個仙姑與我一件寶物叫我送與知州免罪臨上道時吩咐我道若有急難時便叫聖姑姑先生聽得說了道原來恁的看著兩個防送公人道這卜吉不當死遇著貧道可同來林子外村店裏吃三杯酒更齎助你們些盤纏好看他到地頭則個董超薛霸道感謝先生四個人同出林子外來約行了半里路見一個酒店四人進那酒店裏坐了酒保來問道張先生打多少酒先生道打四角酒來有雞回一隻與我們吃酒保道街市遠沒回處先生道又沒甚蔬菜如何下得酒酒保道酒來了四個人一家吃了一碗先生道有心請人卻無下口東觀西望見壁邊一隻水缸先生看時是一缸乾淨水先生袖內取出一個葫蘆兒來拔了塞兒抖出一丸白藥來放在水缸裏依先去凳上坐了叫酒保來道我們四個如何吃得淡酒我方纔將下口放在你水缸裏與我將去煮來酒保道張先生你四個空手進來不曾見什麼下口先生道你自去水缸裏看酒保去看時只見水動雙手去撈撈出一尾三尺長鯉魚來道卻不作怪只得替他犀刂了魚落鍋煮熟又加些鹽醬椒醋將盤子盛了捧得來與他四個一面吃酒董超道感謝先生厚意薛霸道這魚滋味甚好怎的再得一尾吃也好先生道這個不足為禮貧道平日好飲貪杯難得相遇二位四海之內皆相識也若不棄嫌同到貧道院中盡醉方休來日起程不知二位尊意如何薛霸是後生心性道難得先生好意相請今日也將晚了我們就同往仙院借宿一宵只是不當取擾董超終是年紀大曉得事叫薛霸到靜處說道這先生是個作怪的人著甚來由同他到院中去薛霸道董大哥你空活這許多年紀不識得事這酒店裏主人家也認得他但有差遲只問酒店裏要人董超道也說得是先生還了酒錢四個人離了酒店一路說些閒話不知行了多少路只見那先生用手一指道這個便是貧道小庵董超看時好座茅庵不甚大蓋得團簇庵前庵後沒一個人家兩個便有些心疑先生開了門請三人就門前坐地先生道你們三個莫憂這裏儘有歇宿處今晚且快活歇一夜來早便行此時是六月中旬月兒早上先生掇張桌子出來放在外面入裏面去安排出葷腥菜蔬之類鋪在桌上先生道方才在酒店中請二位不足為禮就此盡醉方休兩個公人面面相覷私議道這先生酒店裏請我們吃了如今來在庵裏又安排許多酒食欲待不吃肚裏又飢待吃他的不知他主何意故薛霸道我兩個押著這一個罪人干繫不小方離鄭州一程路就撞著這個蹊蹺張先生倘若是有些緩急都有老小在家裏不是耍笑董超道不來由客來時由主既到這裏且吃了他的看他如何先生將酒出來各人吃了十數杯都飽了兩個公人道謝先生酒食都吃不得了我三個借宿一宵來早便行先生道淡酒不足為禮何心致謝你二位且請坐那先生起身進去不多時拿出兩錠銀子都有五十兩重便道二位各收一錠休嫌輕微薛霸不則一聲董超道感謝先生賜了酒食已為過擾這銀兩決不敢受先生道你二位權自收了表意而已二人被先生推不過各收了一錠先生道貧道有一件事奉告不知你二位肯依麼兩個思量道酒也吃了銀子也收了如何不依得便道先生休道一件事十件事也依先生但說不妨先生道你二位各收了五十兩銀子做養家錢念卜吉是個含冤負屈的人貧道又不認得他只是以慈悲好生為念且聽卜吉說來他是平白的人卻叫他吃這場屈官事望二位怎地做個方便留他在庵裏相伴貧道貧道姓張名鸞若知州問時只說張鸞要救卜吉便了不知二位意下何如董超不敢則聲薛霸卻叫將起來道先生你好不曉事普天之下莫非王土率土之濱莫非王臣你雖是出家人住在鄭州界上也屬知州所管他是本官問出來的罪人什人敢收留他你道我們得了你的銀子你便挾制著我們你的銀子分毫不動在此請自收去先生道不須焦燥肯留時便留下不肯留時你二位收下銀子再告杯酒董超道擾了先生酒食又賜了銀子何須只管勸酒先生道不只勸酒貧道有個小術就呈二位看看上至知州下及庶民都教他們賞個雙月則個先生就懷中取出一張紙來將剪刀在手把紙剪了一個圓圓月兒用酒滴在月上喝聲起只見那紙月望空吹將起去三個人齊喝采道好只見兩輪月在天上有詩為證堪憐卜吉本無辜獻鼎翻教險害軀只為覆盆難鑑察故將雙月照糊塗先生道看貧道這輪明月面上請一杯酒這裏四人自吃酒卻說鄭州上至知州下及百姓哄動了城裏城外居民都看空中有兩輪明月有那曉事的道只有一輪月如何有兩輪月此必是個妖月且不說哄動眾人卻說這先生與三個賞月吃酒將散先生道二位做個人情把卜吉與了貧道罷董薛二人道我們家中各有老小比先生不得知州知道我兩家實難分解先生道知州吩咐你們要安排他死其事甚容易我叫你兩個帶一件表證回與知州看只見先生將道袍袖結做一個肐揣在背後雙手揪住卜吉用索子將卜吉背剪綁了縛在草廳上薛霸道先生你早晨要救他緣何如今又要縛他先生道教你二人帶他一件物事去見知州董超道不知教我兩個帶什的物事去先生道知州既要壞他性命如今貧道替你下手剖腹取心帶去與知州表你二人能事董超道使不得這是斷了的罪人知州要謀害他是知州的私意如今將著心肝去知道的便是先生殺了他不知道的只說是我兩個謀財害命這一場屈官事叫我兩個吃不起先生道原來你們怕吃官事我也是取笑你們便把卜吉解了就安排三個人睡先生道二位若回州裏去時說我張鸞要救卜吉可牢記取三個叫了位置就在外面歇宿先生自進裏面去了董超薛霸二人一睡直睡到天明閃開眼來看時兩個吃了一驚身邊不見了卜吉也不見了庵院先生卻睡在山神廟內紙錢堆中兩個面面相覷道苦也苦也我兩人不曉事走了罪人如何是好董超道我們不要慌和你且告知州一逕回到鄭州正值知州午衙陞廳兩個公人來廳前跪下知州便問道你兩個解卜吉往山東何如今日便回董超薛霸道告相公昨日押卜吉上路去在三十里外撞見一個道士邀到庵中要奪卜吉小人們和他爭執那道士是異人剪一輪紙月吹在空中便見兩輪明月知州聽得就道作怪昨晚因見兩輪月吵鬧了州城一夜後來卻是如何董超道那道士叫小人們就庵裏歇睡了一夜今日早起開眼打一看時卻是個山神廟的紙錢堆裏正不知卜吉和道士那裏去了那道士自稱他叫做張鸞知州道既有姓名這妖人好捉了當日即喚緝捕使臣吩咐言說未了只見一個道士鐵冠草履皂沿緋袍直上廳前高聲道貧道張鸞在此喏也不唱知州大怒道汝乃妖人怎敢如此無禮道士道汝乃一州之主如何屈斷平民卜吉無罪把他刺配山東路上兀自叫人殺害他性命又取了他無價寶物是何道理知州道休得胡說他有什麼無價寶物張鸞道金鼎現在你庫中我叫他出來只見那道士叫道金鼎金鼎我今相請作速出來眾人立等諕得知州並廳下的人都呆了只見金鼎從空中飛將下來兩隻耳朵搧動如翅膀相似直飛到廳上知州見了道怪哉怪哉說猶未了金鼎內鑽出一個人來那人正是卜吉一跳跳出金鼎外來右手仗劍左手揪住知州就廳上把知州一劍剁為兩段眾人見知州身死俱各手足無措廳上廳下人都道終不成殺了知州就恁地罷了一齊向前捉那道士卜吉兩個見眾人來捉提著金鼎跳在馬臺石上放下兩個齊把雙腳跨入鼎再叫聲列位請了我們去也將頭向下一縮兩個人都不見了忽然起陣狂風風過處連金鼎也都不見了眾人面面相覷都道自不曾見這般怪異的事就請本州同知管事六房吏典買辦棺木將知州身屍殮盛了一面差緝捕公人四下裏搜捉張鸞卜吉一面商議具表奏聞朝廷只因此起有分教大鬧河北鼎沸東京朝廷起兵發馬收捉不得直惹出一位正直大臣治國安民正是聊將左道妖邪術說誘如龍似虎人畢竟那時表奏朝廷如何且聽下回分解
