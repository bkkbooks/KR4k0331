body:
  text: 第一回不信精靈能變幻旋風吹落活燈花話説大唐開元年間鎮澤地方有個劉直卿官人曾做諫議大夫因上文字劾宰相李林甫不中棄職家居夫人曾勸丈夫莫要多口到此未免搶白幾句那官人是個正直男子如何肯伏氣為此言語往來上夫人心中不樂害成一病請醫調治三好兩歉不能痊可忽一日夜間夫人坐在床上吃了幾口粥湯喚養娘收過粥碗只見銀燈昏暗養娘道夫人且喜好個大燈花夫人道我有甚喜事且與我剔去則個落得眼前明亮心上也覺爽快養娘向前將兩指拈起燈杖打一剔剔下紅焰俄的燈光明了落在桌上就燈背後起陳冷風吹得那燈花左旋右轉如一粒火珠相似養娘笑道夫人好耍子燈花兒活了説猶未了只見那燈花三四旋旋得像碗兒般大一個也毬滾下地來咶的一響如爆竹之聲那燈花爆開散作火星滿地登時不見了只見三尺來長一個老婆婆向著夫人叫萬福老媳婦聞知夫人貴恙有服仙藥在這裏與夫人喫那夫人初時也驚怕聞他説出這樣話來認做神仙變現反生歡喜正是藥醫不死病佛度有緣人當時吃了他藥雖然病得痊可後來這婆子竟纏住了夫人要做個親戚往來抬著一乘四人轎前呼後擁時常來家咶噪遣又遣他不去慢又慢他不得若有人一句話兒拗著他他把手一招其人便撲然倒地不知什麼法兒血瀝瀝一副心肝早被他擎在手中直待衆人苦苦哀求他才把心肝望空一擲自然向那死人的口中溜下去那死人便得蘇醒因此一件怕人劉諫議合家煩惱私下遣人縱迹他住處卻見他鑽入鶯脰湖水底下去了你想鶯脰湖是什麼樣水那水底下怎立得家必然是個妖怪屢請法官書符念咒都禁他不得反吃了虧直待南林菴老僧請出一位揭諦尊神布了天羅地網遣神將擒來現其本形乃三尺長一個多年作怪的獼猴那揭諦名為龍樹王菩薩劉諫議平時供養這尊神道極其志誠所以今日特來救護斬妖絶患詩曰人生切莫畜獼猴野性奔馳不可收莫説燈花成怪異尋常可耐是淫偷那獼猴似人之形性最靈巧就是尋常爬窗上桌開盤倒甕扯袖牽衣搔蝨子弄巴氣質十分不雅況且多年豈不作怪又有長大一種其名為猿尤為矯捷那猿內又有一種通臂的兩臂相通隨他伸那邊一隻臂這邊一隻就縮進去做一條臂膊舒將出來所以善能緣崖登木人若把箭去射他時右來右接左來左接近來近接遠來遠接全然不怕還有年深得道的善曉陰陽能施符咒神通廣大不可盡述怎見得但見生居申位裔出巴山生居申位申陽官子孫聚居裔出巴山巴西侯宗族蕃衍柔腸易斷嘯月明誰不含悲長臂能通登樹杪何愁善射數學傳風后誰知是前代曆師刀法授雲長錯認做人間劍俠神通卻是降龍祖變化平欺弼馬溫話説春秋周敬王時吳越交爭吳王夫差圍困越王勾踐於會稽山之上虧得下大夫文種卑詞厚禮去請行成吳王依允將越王夫婦摘去冠服囚於石室之中替吳國養馬三年方始放回越王一心要報此讎想吳國有魚腸之劍三千難以抵敵有上大夫范蠡獻計挑選六千君子軍朝夕訓練訪得南山有個處女精通劍術奉越王之命聘請他為國師那處女收拾下山行到半途逢著一個白髮老人自稱袁公對處女説道聞小娘子精通劍術老漢粗知一二願請試之處女道妾不敢隱但憑老翁所試袁公覷著樹梢頭透出一竿枯竹踴身一跳早已拔起撇向空中墜下那根竹迎著風勢咶喇一聲折作兩段處女接取竹梢袁公接取竹根袁公就勢去刺那處女那處女不慌不忙將竹梢接住轉身刺著袁公袁公飛上樹梢頭化為白猿而去原來處女不是凡人正是九天玄女化身因吳王無道玉帝遣玄女臨凡助越亡吳那袁公是楚國中多年修道的一個通臂白猿因楚共王校獵荊山他連接了共王一十八枝御箭共王大怒宣楚國第一善射有名百步穿楊之手喚做養由基前來射他白猿知養由基是個神箭躲閃不及一溜煙走了共王教大小三軍圍住山頭搜尋無把一山樹木放火都燒了至今傳説楚國亡猿禍延林木為此也那白猿從此躲入雲夢山白雲洞中潛心修道今日明知玄女下降故意變作袁公試他的劍術後來處女見了越王教練成了六千君子軍也不回復范蠡也不拜辭越王徑自飄然而去有詩為證玄女神機豈妄投六千君子只凡流要知天上些須妙已是人間第一籌話説處女下了南山來於越國那時有越王差來迎接人衆香車寶馬自不必説今日不辭而去卻未免獨自一身半雲半霧行至舊路只聽得茂林之中一聲叫道玄女娘娘一聲叫師父處女按住雲頭將慧眼一看時原來正是袁公雙膝跪下了雙手捧著一個石盤盤中列著四般長命果口中只叫道師父可憐弟子一片誠心收留教誨則個且説那四般長命果品是榛子松子棐子核桃假如東南橘柚楊梅西北林檎梨棗此等並為佳品要之只算時新不堪長久只有那四般藏住殼內風吹不乾雨打不濕久而如新所以謂之長命果永為山家之積糧也後來丹青家有白猿獻果圖即此故事當下袁公放下石盤連連磕頭又喚道師父是必收留弟子在這裏那處女被他識破是九天玄女娘娘化身道不期這老兒到也利害又見他十分志誠便將他所獻四般果品每一件取他一個這是領他的情處其餘都向越王差來人役布施功德當下袁公就茂林中端端正正雙膝跪拜玄女受了向袖中取出圓眼般大兩個彈丸兒付與袁公袁公將雙手接著安放掌中看這彈丸兒好一似生鐵鑄成不甚光彩袁公口雖不語心中疑惑想道若是粉做的兩個團子到好充飢便是銀打的也不上二兩多重不濟甚事若只是兩個鉛彈兒我老袁又不學打彈要他做甚這裏心下躊躇那邊玄女早已知道便向那彈丸上吹一口氣叫聲疾只見放起光來須臾之間左一跳右一躍如兩條金蛇纏繞盤旋只在頭上頸下一往一來迸出寒光萬道凜冽難當耳中如聞千刀萬刃擊刺交加之聲嚇得袁公緊閉雙眼口中只叫好師父弟子已知師父神威饒恕俺則個原來這兩個彈丸就是仙家煉成雌雄二劍能伸能縮變化無窮若攝了光時只如兩個鉛彈相似倘跳躍起來能於百萬軍中橫行直撞來如箭去如風所以仙家飛出鉛彈百出百中今日玄女只是小小弄個神通恐嚇袁公雖然利害只削去了些頭毛眼毛其他並無損傷若心不至誠時一萬顆頭也取下來了玄女當時把袖一拂攝了劍光依然兩個鉛彈子兒收入袖中去了袁公才敢開眼嚇出了一身冷汗半響開不得口從此死心塌地跟隨玄女直至南山終日摘花獻果供奉玄女憐他小心謹慎把劍法盡傳與他袁公依樣煉成雌雄二劍收藏袖中亦能變化歡喜不盡此時越王已將君子軍六千直入吳國伐了夫差獨霸江東思想起玄女前功再遣人於南山尋訪更無蹤迹即令建仙女祠於南山之上歲時祭祀不絶你道為何尋訪不著這裏越國成功那邊玄女便上天回復玉帝去了況且神仙妙用要現便現要隱便隱亦非凡人之可測也且説玄女帶袁公上天朝見了玉帝玉帝見袁公好道封為白雲洞君教他掌管著九天祕書何謂祕書凡是人間所有之書不論三教九流天上無不備具但這天上所有之書人間耳未聞目未見的也不計其數所以就總喚做祕書就金匱玉篋收藏每年五月端午日修文舍人來查點一次此乃修文院之屬官也袁公雖然掌管奉有天條禁約等間也不敢私自開發忽一日間正值西天金母蟠桃勝會玉帝引著一班仙官將吏都往崑崙山瑤池赴宴怎見得有這古風一篇為證崑崙乃在赤水陽古稱地首天中央星晨隔輝挂天柱日月引避行其旁瑤房積石開玄圃寶樹琪花顏色古中有蟠桃萬丈高含蕊千年才一吐千年結實千年熟渥丹斗大如紅玉此時王母開壽筵十萬仙真共歡祝壽筵高啓碧琳堂鳳鏘鸞舞紛迥翔玉童前驅執羽蓋靈妃後列吹笙簧瓊漿飲罷顏婀娜玉盤托出神仙果食之壽與天地齊安得偷嘗一二顆袁公雖云修道未登正果且是天宮有執事的人員因此不得隨行他本是個最好吃果子的聞説蟠桃如斗之大三千年方始開花結果一次吃此桃者壽與天齊如何不口內流涎心中納悶便於袖中取出兩個彈丸吹口氣喝聲疾化成雌雄二劍左一跳右一躍戲舞了一回將袖兒一拂攝了劍光依舊收藏袖內正在無聊之際猛然想起自家掌管著許多祕書未曾展玩今日且偷看一會便怎地一頭説一頭便把雙眼溜去只見那金匱玉篋都編得有三教九流各類字樣袁公覷著許多儒字號口中喃喃的道那秀才買賣莫去纏他指著佛字號又道那黃臉老兒也不好相處看到道字號道這是我老袁的本業中間一個小小玉篋兒面上橫著無數封記原來這篋兒每年修文舍人來檢視時加上御封一道只見封不見開袁公暗忖道這重重封記必有妙處扯開御封把雙手去揭那篋蓋時卻似一塊生成全然不動袁公連叫作怪若是鐵打的篋兒只恐年遠鏽結了這是美玉琢成的直恁牢緊不知那個玉工做下的若與老袁商量再細細光去一層便好開閉了説罷抖擻平生的精神又去狠揭一下那玉篋兒恰似重加釘釘再用金鎔休想動得一毫看官聽説若是尋常猢猻兩番揭不起未免焦燥拿起手去捶腳去踏頭去撞都是有的那袁公畢竟多年修道火性已退的如何肯造次當下慌得他雙手捧著玉篋屈下兩隻老腿叫道吾師九天玄女娘娘保佑弟子道法有緣揭開篋蓋永作護法不敢為非連磕了三四個頭爬起來把玉篋再揭那篋蓋隨手而起內有火焰般繡袱包裹打開看時三寸長三寸厚一本小小册兒面上題著三個字叫做如意册裏面細開著道家一百零八樣變化之法三十六大變應著天罡之數七十二小變應著地煞之數端的有移天換斗之奇方役鬼驅神的妙用袁公心下大喜道只此一書夠我老袁受用矣一世從師受道今日到手時還是我自家簡得正是早知燈是火飯熟幾多時袁公手中捻著本如意册兒長嘯一聲飛下雲端竟往雲夢山白雲洞中鑽去那裏猿子猿孫和著一派大小猢猻之類跳舞歡欣都上前拜見袁公道我今得這本册兒做個傳法教主得道之日你們一個個都好了你們可把洞中兩邊峭壁與我削平我有用處衆猿聽了一齊與他那個不踴躍向前鑿的鑿磨的磨霎時將兩邊峭壁弄成一片鏡面相似袁公取出筆墨來放在桌兒上磨得滋潤蘸得筆飽向西邊壁上寫著三十六天罡大變法又向東邊壁上寫著七十二地煞小變法卻教衆畜動起錘鑿刻成三分深字樣袁公笑道人説天上無私緣如何也有個私書你做三十三天老大皇帝直恁私刻我老袁且與人為善你們衆弟子孩兒要學法的儘著去學衆畜道苦也俺們怎理會得全仗老公公教導袁公道丫頭做媒自身難保我老袁但能記誦尚未得手哩且慢消停半月十日等待玉皇老頭兒不言不語時節我老袁給個寬假到於本洞中逐節與你們演習説猶未了只聽得轟轟的一片聲響衆畜道雷鳴了想是天變也袁公道這不是雷鳴乃是天門上報鼓響凡天宮有刑獄問斷之事便鳴著報鼓儒書上所謂鳴鼓而攻也你們緊守洞中我老袁且上去點個卯探聽個消息説罷踴身一跳早出洞口冉冉望天門而去只此一去有分教袁公犯一次不赦的天條設一重不輕的法願正是會施天上無窮計難免今朝目下災畢竟不知如何且聽下回分解
