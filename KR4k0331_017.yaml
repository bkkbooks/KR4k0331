body:
  text: 第十七回春三夏四好栽秧萬目懸懸盼雨暘但願天下賢宰相用心燮理免災殃話説張鸞聞得博平縣有個老道姑登壇祈雨心疑是聖姑姑在彼一溜煙跑來進得博平縣城門只見門內懸挂著一道榜文榜文旁邊小凳兒上一個老者呆呆的坐著雖然往來人衆站住腳頭看榜的卻少張鸞走上一步從頭念去道博平縣縣令淳于厚為祈雨事本縣久旱田業拋荒祈雨無應如有四方過往不拘何等之人能説法降雨救濟生民者揭榜前來本縣待以師禮降雨之日本縣見斂就一千貫文在庫即時酬謝決不輕慢須至示者天聖三年四月日示張鸞看罷向老者拱手道貴縣幾時沒雨了老者見他道貌不俗忙起身答應道自去年十一月起到今並無滴水將有六個月亢旱了張鸞道聞得有個遠方道姑揭榜祈雨這信可真麼如今在那裏老者把雙手一攤撇著嘴説道在那裏一萬個也走了張鸞笑道卻是為何老者道這道姑姓奚自號女神仙有五十多歲了跟隨的徒弟男男女女共有十來個女的叫做仙姑男的叫做仙官據他説是大萬谷樂總管府來的善能呼風喚雨初時揭了榜文縣主相公好不敬重他要離北門十里之外擇高阜處建立雩壇名為五龍壇裝成青紅赤白黑五色龍形按方擺設又逼縣主相公要地方上一千貫文酬謝斂足了錢貯庫方始登壇縣主一一聽允他行的是什麼月孛之法他要各坊各里呈報懷孕婦人的年庚憑他輪算一個指稱魃母説腹中懷有旱魃不由分説教縣裏拿到壇前這道姑上面坐著指揮徒弟們鳴鑼擊鼓噴水念咒弄得這婦人昏迷便將他剝得赤條條的躺在一扇板門上雙腳雙手和頭髮共用五個水盆滿滿盛水浸著一個仙官對了北方披髮仗劍用右腳踏在他肚子上口中不知念些什麼言語其餘男女徒弟也有搖旗的也有打瓦的紛紛嚷嚷亂了一日這懷孕婦人晦氣弄得七死八活天上絶無雲影日色沒了只得散場託言龍王今日不在家明日管教有雨教縣主出三貫遮羞錢與那孕婦的丈夫責領回去到了第二日又輪一個魃母要拿到壇前行事衆百姓憤氣不平登時聚集起三四百人丟磚頭擲瓦片喊聲如雷要打死他師徒們這奚道姑慌了和他一夥改換衣服從壇後逃走了去縣主也不追究另出這道榜文各門張挂老漢是本地方里正怕有揭榜的來到只得在此看守張鸞呵呵大笑道原來如此貧道拚著一刻工夫與你們祈一壇甘雨耍子則個説罷將榜文一手揭了老者上前扯住道你大膽揭榜敢是真正有些本事麼休得耍大話小結果只有頭兒沒有尾兒學那女神仙壇前上去壇後逃走張鸞道你們要多少雨恁般大驚小怪老者道只要三尺甘雨高低俱足了張鸞笑道我只道倒翻江底掠盡海涯這還費貧道幾個時辰的躊躇只這點點雨水有何難哉當下老者將杌子寄放人家就引張鸞從縣前一路而行百姓們看見里正引個道人進城想情定是揭榜祈雨的大家歡喜都跟來看原來博平縣將有六個月不雨亢旱非常但見河底生塵田中坼縫樹作枯焦之色井存泥濘之漿炎炎白日天如怒目生威滾滾黃埃草欲垂頭而臥擔錢換水幾家買奪爭先迎客款茶多半空呼不出渾如漢詔乾封日卻似商牲未禱時途中行客渴如焚井底潛龍眠不起本縣也有幾個寺觀僧道們各依本教科儀設醮修齋念經祈禱縣令淳于厚每日早上往城隍廟行香一次全無應驗百姓起個口號道朝拜暮拜拜得日頭乾晒朝求暮求求得滴水不流縣令沒個主意了只得由他這日行香過了早堂方畢退在私衙安息只聽得堂上一片聲喧嚷將堂鼓亂撾慌得縣令冠帶不迭便服跑出後堂來門子稟道今日有個遠方道人揭了祈雨榜文百姓簇擁前來縣令吩咐里正率領百姓們在門外伺候單請道人後堂相見張鸞左手提著荊筐籃兒右手持殼扇子飄然而進見了縣令放下籃兒道個稽首縣令慌忙回禮問道先生高姓尊號從何處來張鸞道貧道姓張名鸞別號沖霄處士從海上到此適見榜文祈雨特來效勞縣令道先生行的不是月孛法麼張鸞道不是月孛法是日黑法不弄黑了日頭怎得下雨縣令也笑起來又問道北門外見築有雩壇不知可用得否張鸞道既有現成雩壇便用他罷縣令道約莫幾日之內可以致雨張鸞道早上壇早有雨晚上壇晚有雨縣令因奚道姑出醜一遍不甚準信便道先生誇得好大口只不知還用著甚法物好預先準備張鸞道並不用法物只教本縣各寺觀祈雨的僧道先去掃壇伺候縣令道這卻容易下官今晚吩咐停當先生暫在城隍廟中一宿明早登壇便了張鸞道但憑尊命只是一件隨分空間公館貧道暫歇一宵若到城隍廟去恐煩神道接見彼此不安縣令道公館儘有口雖答應心下不以為然張鸞早已知覺故意道貧道今早枵腹而來求些現成酒食縣令道要酒儘有只是素齋張鸞道貧道慣嗄酒的是鮮肉卻不用素縣令道不瞞先生説只為祈雨一事有三個多月禁屠下官只是蔬食要鮮肉卻不方便張鸞笑道官府斷屠從來虛套常言道官禁私不禁只好作成公差和里正尊官若不信時縣東第十三家呂屠家裏今早殺下七十斤大豬間壁孫孔目為兒子周歲請客買下十五斤兒今煮熟在鍋裏又縣西顧酒店夜來殺羊賣還剩得一隻熟羊蹄將蒲草蓋在小竹蘿裏放在床前米桶上可依我言語問他説官府不計較你平價買他的必然肯與縣令道不信有此事當喚值日買辦的依著先生言語問那兩家要購買豬肉五斤羊蹄一隻當值去不多時把豬肉羊蹄都取得來回話道那兩家初時抵賴不承被小的如言語破他便心慌即便將肉送出連價也不敢取縣令道先生是什麼數學恁般靈驗張鸞道偶中而已縣令方才曉得先生不比常人刮目相敬少停當值的暖到一大鏇酒約有六七斤二十來個大饝饝和豬肉羊蹄一行兒擺在桌上張鸞拱手道貧道不為禮了大碗大塊只顧吃霎時間吃個風捲殘雲只剩三個空盤子一把壺兒口裏説道蒙賜已點過心了到廟中卻又吃飯當下衆人都嚇騃了道沒見這樣會吃的好副大腸肚縣令背後立個俊俏小廝便接口説道不是大腸肚怎配得這張大口張鸞聽見便把這小廝一指説道你的口也不小只見這小廝的面點朱唇一時不由自己作主直張開到耳根邊圓圓的好似一隻朱紅漆碗開了再合不下又説不得話只是墮淚原來這小廝才一十五歲髮方覆眉生得清俊是縣令相公頂寵愛的一個親隨縣令見他作怪已知衝撞了先生之故慌忙作揖謝罪道先生可憐他年幼不知事看下官薄面饒恕他罷張鸞道貧道並不曾難為他縣令道這小廝原好副嘴臉張鸞指道如今原好副嘴臉縣令回頭看時小廝的嘴照舊好了一個押司在旁低低的説道這是障眼法兒張鸞已經聽得了卻不説破問縣令道這押司何姓縣令道姓陸名茂張鸞道好個陸押司慌得陸押司躲在一邊去了縣令差人送張鸞到公館安歇早晚酒食自有本館人供應張鸞臨別約縣令早起同到雩壇行香縣令道這是下官本等自當陪侍當日晚堂縣令吩咐各寺觀僧人道衆將五龍壇打掃潔淨鋪設齊整明日五鼓卻要先在壇上伺候迎接法師又吩咐本縣吏役侵晨取齊又標撥官馬一匹到公館去伺候法師起身當晚鬨動了博平縣次日東方發亮縣令出堂方欲上轎只見張鸞右手持殼扇左手提荊筐籃搖擺進來縣令相見了問道先生何又賜顧張鸞道昨日有約特來奉邀同步縣令道此去有十里之遙已曾撥馬奉候可曾到否張鸞道馬兒現在只是貧道會走用不著他縣令道用過早飯了麼張鸞道用過了縣令道既如此請先行一步下官隨後便來張鸞道貧道不認得雩壇有煩陸押司作伴縣令吩咐陸茂好生替先生引路陸押司領了縣主相公之命緊緊幫著同走一個眼錯忽然不見了先生慌得他手足無措料他不是落後趕上一步看時那先生前去約有二三十步之遠押司道在這裏還好倘然遊方道人一時口出大言不能取驗臨時溜去了教我如何回話又或者真個不認得路走錯了縣主先到雩壇也顯得我的不能幹事發狠的趲步上去要趕那先生只見先生在前緩緩而行這裏盡力只趕不上不論緊走慢走只差二三十步兒押司走得氣喘只喊叫道先生慢一步小人跟隨不上哩張鸞在前呵呵大笑道貧道走不慣慢走你若不上前引路時我走向天上去也不與你祈雨了急得押司捨命又跑眼盼盼看住在前再趕不著腳跟有詩為證遁甲之中縮地高雖然緩步去程遙押司饒舌今勞步耍得渾身汗似澆押司汗如雨下喘做一團只得高聲叫道小人已知先生神術了饒過小人罷張鸞道貧道是障眼法兒有什麼神術押司方才曉得是因昨日失言之過便磕頭謝罪張鸞把手一招分明似磁石引鐵一般不覺立在先生背後了押司一把扯住先生死也不放不彀幾步到了五龍壇上那夥和尚道士已先在了聞得新法師到來分作兩班下壇迎接張鸞看這雩壇甚是高爽四圍樹木成林那奚道姑擺設下的五龍尚在都是竹胎紙糊的塗抹著五色鱗文中間大大架起個油布幔兒設得有桌椅之類少停只見城內城外百姓們紛紛而至何止千數還不見縣令到來張鸞想道這縣令不肯陪我同行卻做張做智叫我先走自己要打轎來你為百姓祈雨便步行了這一遍兒也不見失了體面直恁做作我今番且耍他一耍便對著一個年少的道士説縣主未到煩你前往一催扯他左手過來自己捻個劍訣在他手心中又虛畫個符形急教捻緊拳頭吩咐道你見了縣主便傳吾言請縣主快來迎雨如遲疑開掌為信不可私自中途開看又脫下他兩隻鞋兒也畫個符在鞋底上教他穿了快走如要住腳高聲喝咄退二字小道士剛把鞋穿上兩足猶如有人搬運一般不由自己如風而去約有四五里之程遇了縣主相公頭踏到來喝一聲咄退腳便輕鬆由他收住了只見縣主相公坐下朱青紗幔的涼轎四抬四扶打著青羅傘行來小道士到轎前跪著稟道法師教請相公快來迎雨縣令道這般烈日雨在那裏小道士捻起拳頭對縣令道恐相公遲疑命小道開掌為信説罷把拳頭放開忽然一聲霹靂從掌中發起轎槓震得平斷嚇得縣令掩耳不迭面如土色直跌出轎來衆人七顛八倒連小道士也驚呆了停了一會縣令正待差人四下左近人家或騾或馬借來乘坐只見一班和尚們又引著許多百姓到來催取縣主上壇行香縣令已吃了這一番驚恐不敢遲慢此時只得教左右扶擁而行到壇一面差人回縣取轎馬到雩壇伺候轉身張鸞見縣令到來迎接上廳問道相公何不乘轎來縣令將雷震轎槓之事説了道先生原來有此神通法術今日祈雨不難乃萬民之有幸也張鸞道不是貧道誇口風雷雲雨是貧道腰囊內的東西且試個戲術與相公看乞借大傘一用縣令教將三簷青絹傘遞與先生先生接傘在手旋了兩旋驀地望上一手雙喝聲起吹口氣把這傘兒漸漸升上到最高處變化一朵烏雲將日色罩定紅光盡斂衆人都仰面而看張鸞把手一招這朵烏雲托地墮下仍是一柄青絹傘便透出一輪烈日縣令心中又喜又怕便請先生上坐要下拜相求速賜甘雨以救一方之困張鸞道不須過禮貧道十日前從南岷山經過遇著大雨貧道把這些雨雲收得在此今日捨與貴縣結緣罷便向荊筐籃中取出小小一個葫蘆擺在壇前教縣令焚香拜禱張鸞捻訣念咒作用已畢將葫蘆塞口拔去輕輕用殼扇一連幾扇只見壇前起陳大風一股黑氣從葫蘆中出直透九霄中成一天濃雲張鸞將葫蘆收了走到那竹胎紙糊的黑龍旁邊吩咐道黑龍黑龍助我神通乘雲宜速行雨須洪甘霖三尺慰彼三農順我者吉逆我者凶只見那黑龍鱗鬚俱動忽然騰空而去須臾之間閃電亂發雷聲激烈拳頭般雨點將下來嚇得百姓們四散都走了縣令也要下壇縣中取轎未到只得同吏役及僧道們在布幔中躲著頃刻大雨如注幸得布幔是熟油漬透的又架在高柱上才免得上漏下溼四旁卻沒有遮蔽衆人將桌椅都側下遮雨也有帶得遮陽傘兒的迎著風兒張開正在忙亂之際只見金蛇亂掣霹靂連聲不離雩壇左右旋轉縣令道敢問先生今日雷神為何發怒張鸞道想是看中意了幾個歹人哩當下張鸞高聲道雷部聽吾法旨如有真正貪官污吏破戒和尚穢行道士方許下擊如無此等速宜退避那時霹靂愈加連聲不絶慌得縣令先倒身下拜自陳悔過以下吏役及僧道們那一個説得嘴響的都著了忙團團的拜做一堆笑得張鸞眼花沒縫約莫一個時辰雨聲方歇雷電亦止衆人方才放心爬將起來向壇下一望落得山鳴川響池滿溝盈足足有三尺甘雨縣令剛在那裏稱讚先生之功只聽得壇下有人厲聲喝道何處初學敢在此施逞伎倆恐嚇衆人莫非要詐這一千貫錢麼張鸞看時卻是一個瘸足道者生得身材矮小衣服腌臢提著一根青藜杖從大雨中一步步枴上壇來渾身無一絲沾濡到壇上放下藜杖拱著手與縣令稽首縣令和衆人俱各駭然張鸞道貧道捨一壇甘雨救濟生靈你這乞道到此溷擾敢與貧道鬥法麼瘸子笑道諒你有何法敢與師父賭鬥張鸞大怒便把殼扇子一丟喝道快去打那乞道只見那把扇子冉冉而行徑奔那瘸子頭皮上來瘸子呵呵大笑把頭一手雙這頂破頭巾望上趫兩趫撲的脫了頭去迎那扇兒分明兩隻老鷹相撲一上一下瘸子喝聲枴兒何在只見地上橫著這根青藜杖忽然躍起一步步跳起打那張鸞張鸞把袖一拂身邊這隻荊筐籃兒離地相迎如藤牌架棍一來一往衆人都嚇得躲在一邊連縣令也不敢上前了兩下賭鬥各無勝負都收了法術張鸞大怒抖擻精神口中念念有詞舉手向北方一招大呼黑龍快來那瘸子聽得便在在壇上黃龍的頭上打將一下只見先前飛去行雨的那條黑龍半雲半霧飛向壇來這裏黃龍鼓鬣張麟就地騰起迎住黑龍在空中相鬥自古道土能剋水黑龍敵不過黃龍張鸞又叫青龍快去相助瘸子又把白龍一掌那青龍才飛起去白龍又去迎住惱得張鸞咬牙切齒急喚赤龍幫助五條龍向空中亂舞正按著金木水火土五行互生互剋攪做一團狂風大起布幔架子都吹倒了衆人正立腳不住忽然走出一個和尚耳墜金環身披烈火架裟手中托一個水晶盂這和尚正不知那裏來的喝道二位同道休得自傷和氣待貧僧與你勸解則個將手中水晶盂猛力往空中一拋變成一顆五彩明珠那五條龍都來戲這顆珠成圍作陳而去瘸子已認得是蛋子和尚暗暗喜歡彼此俱不説破只見和尚擊手道二位賭法沒有勝負那一個取得水晶盂還了貧僧就斷他是師兄張鸞和瘸子齊聲應道有何難哉兩個暗念咒語都收了法術那竹胎紙糊的龍形依然復還舊處恰似不曾移動一般又不見他那裏飛回的只見張鸞袖中取出一個水晶盂送還和尚瘸子道他是假的真的在我處果然向腰胯間也取出一個來大小一般無二那和尚都不接受卻在自家袖中摸出盂來笑道貧僧的現在二位休得相戲原來張鸞的盂是袖中葫蘆變的瘸子的盂是腰間柳瓢變的這時真盂出來二物都還本相各各大笑都取去了張鸞心下也自駭然想道這乞道的本事不若於我又不知那裏走出這莽和尚來更是利害有詩為證孫龐鬥智非為敵楚漢爭鋒未足誇爭似雩壇齊鬥法大家看得眼睛花只聽得壇下人語嘈雜百姓們絡繹不終人人執香來迎法師進縣縣中轎馬也都到了縣今方敢出頭問道適才下官見三位師父手段俱有驚天動地之術不相上下依下官説三教同源休爭客氣都請到敝縣下官一同尊禮備得有馬匹在此各請乘坐幸勿推卻瘸子見有馬匹在壇下便要去乘張鸞終有些不平之意明欺他是瘸腳便一把抓住道我們不許乘騎大家步行賭個遲快瘸子道足下莫非是騃子張鸞道如何是騃子瘸子道不是騃子怎的放了馬步行衆人都笑起來縣令道既三位不肯乘馬下官禮當陪步蛋子和尚道地下泥濘官府們不可失了禮瞻貧僧同二位道友先到貴縣相候説罷牽了兩個道人的手步下壇來百姓們起初只認得祈雨的一位師父如今忽然又添了一僧一道正不知那裏來的好生怪異紛紛的分開兩邊讓一條路與他們先行蛋子和尚在前張鸞居中瘸子在後走不多幾步瘸子故意拐著道二位慢行地下好不難走哩張鸞正中其意扯著蛋子和尚越走得快了只聽的後面叫聲呵呀回頭看時路旁有個小小水潭瘸子右腳陷入提得起時左腳把滑不住撲通的倒撞下水了張鸞口稱慚愧蛋子和尚道莫管他且到縣裏等他便了比及兩人進得縣門只見縣堂上一個人柱著青藜杖拐將下來口中叫道二位如何來遲張鸞大驚那人非別正是瘸子方知撞下水潭乃是水遁之法張鸞到此心下才服到縣堂上重新講禮方才動問名號瘸子道貧道姓左名黜因為左腿損傷改名左瘸法侶中都稱貧道瘸師這位就是貧道師兄號叫蛋師幻名蛋子和尚便是張鸞道二位莫非是在楊巡檢家與聖姑姑修道的瘸子道足下何以知之張鸞道貧道曾到永興地方多曾聽得人説起大名只是無緣會面今幸相逢多有沖撞説罷便拜下地去蛋師和瘸子兩個慌忙答禮問道師兄是誰張鸞道了名號蛋子和尚道原來就是沖霄處士聖姑姑甚想相會張鸞正待叩問報道縣令回來那縣令已知衆師父先到便下了轎步入縣門這班和尚道士百姓們都隨進來縣令教鋪下紅先請張鸞拜謝張鸞不肯縣令道下官為萬民屈膝禮之當然兩下再三謙讓才拜了兩拜次請那兩位相見那兩個教收起紅賓主作揖階下這班僧道及百姓們一齊拜倒歡聲如雷張鸞安慰了幾句言語教縣主發放回去和尚自去做回向功德道士自去殺雞謝將其餘百姓各自散歸縣令預先吩咐備有筵席擺在後堂款待三位縣令尚不知蛋子和尚及左瘸師名號到後堂一一動問都是張鸞代答縣令道先生如何曉得張鸞道原來平日最相慕的恰才説起方知縣令笑道下官勸三位休爭客氣正為此也既然三位都是神交今日之坐下官不敢僭序請三位自定位次蛋子和尚道張先生是今日有功之人自宜首席縣令也是此意張鸞謙不過只得允了瘸子讓蛋師坐了第二位自家坐了第三位縣令下面陪席縣令道蛋師莫不奉齋麼蛋子和尚道葷素不拘縣令暗想道不曾見這一般和尚道士當下酒過三巡食供兩套縣令起身把盞又教取一千貫文支帖親手遞與張鸞道此乃地方薄酬休嫌輕褻鶴駕行時但憑支取庫上即當賚送宋朝那時一貫錢值一兩銀子一千貫便值千兩就是千兩銀子一個人還帶不得況且千貫銅錢如何領得縣令也是有言在先了盡做人情算定那先生必然推辭的就受也受不得許多誰知張鸞正待推辭瘸子向耳邊説道這銀錢他日正有用處可以受之張鸞點頭便討紙筆過來寫著暫寄博平縣城隍收庫就央本縣庫吏將這紙燒在廟中香爐之內這一千貫錢就抬至神座下放著縣令默然半晌只得教庫吏來吩咐庫吏答應出來心中想道那見城隍替人掌財就是送去也乾被人取用了趁此黑夜抬回家中看他怎的又想道這一千貫文非同小可掩得誰人耳目況且官府事情倘在城隍廟中查問卻不穩便我且抬到廟中與道士共同商議大家八刀若官府問時只説城隍爺收去了那裏查帳好計好計當夜喚起齊人夫大槓小槓抬那一千貫錢到城隍廟正殿中間先對道士説知把法師親筆焚過然後將一千貫錢堆在香爐兩邊如兩個土墩相似庫吏私與道士約定黃昏後大家計較八刀庫吏回復去了道士也動了欺心想道常言見物不取反受其咎現送在我廟中的錢財如何卻與別人分用廟後有個大魚池不免喚徒弟們相幫陸續運去拋向池中總算城隍爺收去無形又無迹豈不乾淨等待久後從容取出受用連忙關了廟門喚齊了徒弟收拾家伙準備扛抬道士才拿得一貫錢在手覺得手中蠕蠕而動提起看時卻是一條赤練蛇慌忙撒手當下徒弟們發叫喊來只見兩堆錢亂動都變做了蛇成團絞塊滾向神櫥中去了此時五月十四日雨霽後月色倍明只聽得敲門響開來看時正是庫吏道士便將變蛇之事告訴了庫吏那裏肯信取火把向神櫥照看並不見一條蛇影庫吏認定道士將錢藏過各處搜索無獲心甚不平遂將此事詣告縣令縣令大怒將庫吏責打二十板革出道士逐出廟門不許容留這是後話有詩為證庫吏心貪道士乖欲圖千貫作私財八刀無成才丁有不是天災是自災再説張鸞等三人直吃到月明時候起身謝了縣令作別要行縣令道三位既蒙降臨屈在公館同宿一宵來日還要請教蛋子和尚道貧僧有個茅庵敢屈尊官同往隨喜一回縣令道琳宮何處蛋子和尚道離此不遠縣令送出前堂蛋子和尚道告求淨水一碗小廝取水到來蛋子和尚接得在手口中念咒含水向下一噴只見階前一片水響變化江湖波濤洶湧印月如銀左黜向腰間解下柳瓢撇下變化一葉小舟只因這番有分教左道成群敘出生死公案冤家相遇翻成貧富波瀾不知三人乘舟往何處去且聽下回分解
