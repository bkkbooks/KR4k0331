body:
  text: 第三十一回妖邪法術果通靈賽過仙家智略精且看永兒泥蠟燭黃昏直點到天明話説這李二不合為這一千貫錢首告那和尚既得了賞錢做資本開個果子鋪和尚來投齋理合將恩報恩反把言語來惡了他當日被那和尚從幡竿頂上直攛下來正在包龍圖面前龍圖看時只見李二頭在下腳在上把頭直撞了腔子裏去嗚呼哀哉伏維尚饗李二嫂大哭起來免不得叫人抬尸首回去殯殮不在話下卻説那和尚在幡竿頂上凳子高處坐著看的人人山人海越多了許多人喧嚷起來手下人禁約不住龍圖看了沒個意志捉他待要使刀斧砍斷這幡竿諸處寺院裏幡竿都是木頭做的惟有這相國寺幡竿是銅鑄的不知當初怎的鑄得這十丈長的原來相國寺裏有三件勝迹佛殿上一口井有三十丈深頭髮打成的索子黑漆吊桶硃紅寫著大相國寺公用忽一日斷了索子沒尋吊桶處以後有人泛海回來到相國寺説道我為客在東洋大海船上只見水面上浮著一個吊桶水手撈起來看時硃紅字寫著大相國寺公用正看之間風浪大作幾乎覆船隨即許了送還吊桶風浪即時平息因此來還吊桶願心方知那口井直通著東洋大海相國寺門前有條橋叫做延安橋在橋上看著那座寺如在井裏一般及至佛殿上看著那條橋比寺基又低十數丈並這條幡竿是銅鑄的截不得鋸不得共是三件勝迹只見那和尚在幡竿頂上將言語調戲著包太尹包太尹甚是焦燥沒奈何他處猛然思量一計叫去營中喚一百名弓弩手來聽差的即時叫到包太尹叫圍了幡竿射上去那弓弩手內中有射得好的射到和尚身邊和尚將褊衫袖子遮了包太尹正沒做理會處只看溫殿直手下做公的冉貴跑上稟道小人有一愚計獻上可捉妖僧包太尹道你有何道理冉貴道他是妖僧可將豬羊二血及馬尿大蒜蘸在箭頭上射去那妖僧的邪法便使不得了包太尹聽説大喜命取豬羊二血及馬尿大蒜手下人分頭取來包太尹教將來攪和了叫一百弓弩手蘸在箭頭上一聲梆子響衆弩齊發不射時萬事俱休一百箭齊射上去只見中寺寺外有一二千人發聲喊見這和尚從虛空裏連凳子跌將下來衆人都道這和尚不死也殘疾了那佛殿西邊卻有一個尿池這和尚不偏不側不歪不斜跌在尿池裏衆做公的即時拖扯起來就池子邊將一桶豬羊血望和尚光頭上便澆把條索子綁縛了包太尹便坐轎回府升聽叫押那和尚過來當面包太尹道叵耐你這妖僧取來帝輦之下使妖術擾害軍民今日被吾捉獲有何道理叫取第一等枷過來將和尚枷了叫押下右軍巡院堪問鄉貫姓氏恐有餘黨須要審究明白一併拿治太尹吩咐了自去歇息這和尚滿身都是尿血縛住了使不得法術被一行做公的押出府門到右軍巡院裏將太尹的話對推官説了推官道我奉太尹臺旨勘問你這妖僧蹤迹你必有寺院安息同行共有幾人卻也好問你不得叫獄卒施番拷打獄卒把和尚兩腳吊在枷梢上是掙扎不得著實打了三百棍子那和尚不則一聲也不叫痛推官低頭仔細看時只見和尚齁齁地睡著推官道卻不作怪叫獄卒且監在獄中少停再帶出來勘問一日三次拷打獄卒打得無氣力這和尚一如無物只是不則聲若打得時便睡著了推官勘問了十來日無可奈何只得來稟太尹道蒙臺旨勘問妖僧今經數日每日三次拷打但打時便睡著了這般妖僧實難勘問若久留獄中恐有後患謹取臺旨包太尹道似此妖僧停留則甚即時文書下來將妖僧擬定條法推出市曹處斬推官叫押那和尚出來徑奔市曹犯由牌上寫道不合故殺李二又不合於東京興妖作怪擾害軍民依律處斬犯人一名彈子和尚京城內外住的人聽得出妖僧經紀人不做買賣都來看看見犯由牌前引棍棒後隨劊子手押著妖僧離了右軍巡院看的人挨擠不開且説一行人押那和尚看著來到市心裏不遠和尚立住了腳劊子手道前頭去做好人如何不行和尚道衆位在上貧僧一時不合攪擾太尹有此果報告上下前面酒店裏有酒討一碗與貧僧吃了棄世也罷劊子手料得沒事可憐他是將死之人只得去酒店裏討了一碗酒把木杓盛了叫他吃和尚將口去木杓內吃了大半衆人擁著了行將次到法場上原來和尚噙著一口酒望空一噴只見青天白日風雨不知從何處而來一陳風起黑氣罩了法場瓦石從人頭上一打將來看的人都走了不多時風過黑氣散了獄卒劊子手并監斬官一行人看那和尚時迸斷了索子不見了便四下裏搜尋那有個影兒正是鰲魚脫卻金鉤去擺尾搖頭再不來有詩為證和尚生來忒怪異捉時煩難去時易縱使勺酒不容吞未必光頭便落地上至監斬官下至獄卒劊子手都煩惱走了和尚恐怕太尹見罪我們這一行人都要受苦免不得回開封府報知太尹龍圖聞報即時升廳監斬官便帶著一行人請罪此時龍圖明知道妖人出現朝廷要動刀兵不肯叫人胡亂吃官司發放一行人自去星夜寫表申奏朝廷叫就少時還好治理若日久妖人聚得多時恐難勦捕朝廷降下聖旨遍行諸路鄉村巡檢可用心緝訪勦捕文書行到河北貝州州衙前懸挂榜文那個去處甚是熱鬧有一個婦人戴著孝手內提個籃兒在州衙前走來走去五七遭這婦人若還生得不好時也沒人跟著看他不十分打扮大有顏色到處有這般間漢問道我見你走來走去有五七遭為著甚事婦人道實不相瞞哥哥説媳婦因歿了丈夫無可度日有一件本事要賣三五百錢把來做盤纏那人又問道姐姐你有甚本事得賣婦人道無甚空地賣不得若有個空地才好賣那人與他趕起了衆人吹的撲的道這裏好也曾有人在這裏打野火兒過在這裏做好那婦人盤膝在地上坐了看的人一來看見這婦人生得生二來見婦人打野火兒便有二三十人圍住著都道不知他賣什麼只見婦人去籃裏取出一隻碗來看著一夥人道衆位在上媳婦不是路歧也不會賣藥打卦只因歿了丈夫無計奈何只得自出來賺三二十文錢使那個哥哥替我將碗去討碗水來有個小廝道我替你去討不多時小廝討將一碗水來看的人道不知他賣什麼東西討水何用婦人揭起籃兒晃晃拿出一把刀來看的人多道莫不這婦人會行法只見婦人把刀尖去地上掘些土起來搜得鬆鬆的傾下半碗水在土內和成一塊籃內取幾條竹棒兒出來捏一塊泥把一條竹棒兒上捏成一枝蠟燭安在地上又捏一塊泥再把一條竹棒兒捏成一枝蠟燭霎時間做了十來枝都安在地上看的人相挨相擠冷笑道沒來由我們到吃這婦人家耍了引了這半日又沒甚花巧裂裂缺缺的捏這幾枝泥蠟燭要他何用有的人道你們且閉嘴看他必有個道理婦人將剩下的半碗水洗了手揩乾淨了看看一夥人道媳婦因無了丈夫無可度日不敢貪多只要賣三文錢一支這十枝要賣三十文足錢每一枝燭就上燈前點起直點到天明看的人都笑道這姐姐把我貝州人取笑泥做的蠟燭方才做的兀自未乾如何點得著分明是取笑人沒個人來買婦人見沒人來買又道你貝州人好不信事難道媳婦脫空騙你三文錢那個哥哥替我取些火來有一個沒安死尸處專一幫間的沈待詔替他去茶坊裏討些火種把與婦人那婦人去籃兒內取出一片硫磺發燭就在火上焠著去泥蠟燭上從頭點著一夥看的人都喝采道好妙劇術一枝溼的泥蠟燭便點得著又只要三文錢一枝那裏不使了三文錢有好事的取三文把與婦人婦人收了錢拿一枝過來吹滅了遞與霎時間十枝泥蠟燭都賣了婦人抬起身來收拾了刀和碗入籃內與衆人道個萬福便去了到明日婦人又到空地上來人都簇著了看婦人道昨日生受賣得三十文錢過得一日今日又來煩惱衆人道真個作怪昨日三文錢買了一枝泥蠟燭恰好點了一夜比點燈又明亮倒省了十文錢油婦人在場子上討些水掘些泥又做了十枝泥蠟燭衆人道不須點了都爭著了買去婦人又賣得三十文錢自收拾去了以後逐日來賣做不落手便有人買去了每日只賣十枝賣了半個月鬧動了貝州一州人都説道有一個婦人在州衙前賣泥蠟燭且是耐點又明亮當日這婦人正攤場做得一半州衙裏走出一個人來衆人看時卻是個有請有分的人姓王名則現做本衙排軍的人那人怎生模樣有西江月為證鳳眼濃眉如畫黃鬚白面高顴手垂過膝闊雙肩六尺身材壯健善會開弓發弩更兼使棒摔拳一生志氣在人前王則都排出現這王則的父親原是本州一個大富戶因信了風水先生説話看中了一塊陰地當出大貴之子孫這塊地就是近鄰人家葬過的王大戶欺他家貧掗放些債負故意好幾年不算纍積無償逼要了他的地掘起尸棺把自家爹娘靈柩葬在上面自葬過之後媽媽劉氏一連懷八遍胎只第一胎是個女其餘七胎都是男那王則是第五胎生的臨産這一夜王大戶夢見唐朝武則天娘娘特來他家借住説道你家合生有福之男興基立業昌大門閭醒來時恰好媽媽生下孩兒王大戶大喜取名王則小名叫做五福兒以紀夢中之兆從小伶俐五歲時便會讀書一日外祖劉太公到來看見大小挨肩的七個甥男甚是歡喜只有五福兒聰俊出一對道小孩兒五歲聰明冠世王則應聲道大丈夫一朝富貴驚人劉太公誇好又出一對道一母八胎生七子小者如虎大者如龍王則又對道單槍獨馬領三軍成則為王敗則為賊劉太公大驚道此兒雖然穎異必非安穩保家之人囑咐女壻道五福兒若長成休得教他拳棒恐怕他不守本分為家門之纍又一日王則在街上頑耍遇一個過往的相士立住腳定睛看了他一回説道此兒骨法非常將近三旬必然大有際遇只是刑剋太重須剋盡六親蕩盡祖業方才發福又看一看道只可惜有始無終奶子進去傳與王大戶聽了王大戶正走出來要細問時那相士已自去了果然王則到七歲時父親一病而亡以後六個弟兄接連患病死個乾淨母親劉媽媽不勝痛苦也病死了單單剩得一身有詩為證不料多男盡喪亡獨留五福敗門牆相家未應全無準陰地何如心地良此時劉太公也故了並無親戚尊長勸善到十五六歲長得身雄力大不去讀書專好鬥雞走馬使槍掄棒供養多少教師在家又喚巧手匠人在背上刺五個福字還有一件喜的是百般術法逢著就學只是小小戲耍法兒不曾遇著個名師傳授什麼大本領雖然如此這裏頭也不知費了多少錢鈔還有一件從小好的是女色若見了個標致婦人寧可使百來兩銀子一定要刮他上手其他娼家戶自不必説又有一班間漢幫他使錢這裏頭又不知費了多少錢鈔過了十年來把個家業費得罄盡房子田地也都賣來花費了單靠著一身本事在本州充做個排軍頭兒在州衙後巷賃下一所小小民房居住從幼娶得一房媳婦並未生育前二年也被他剋了依舊剩個單身他只在娼樓妓館及落腳人家走動不曾娶得老婆人家見他無賴也沒個肯把女兒與他偶爾有肯與他的他又偏嫌好道歉正是志高難滿意運晚未逢時説起來他也有一節好處為人慷慨結交沒錢時寧可束了肚皮過日一有錢鈔在手三兄四弟終日大酒大肉價同吃若是有些不如意時節拽出拳頭就打所以衆人又畏懼他又喜歡他間話休敘這一日王則五更入衙畫卯幹辦完了職事出來見州衙前一夥人圍著了看王則掂起腳來望一望見一個著孝的婦人坐在地上仔細看時但見身穿縞素腰繫麻裙不施脂粉自然體態妖嬈懶染翠珠生定天姿秀麗雲鬟半整如西子初病捧心星眸轉波若文君含愁聽曲恰似嫦娥離月殿渾如織女下瑤池王則就問跟隨的人道這婦人在此做甚的跟隨人道久聞得這婦人在此賣泥蠟燭王則道我日逐在官府衙內聽得説多日了道是一個婦人賣泥蠟燭我那一般當官執事的人説也曾買來點且是明亮我便是要問他怎的叫泥蠟燭跟隨人道説起來且是驚人那婦人在地上掘起泥來把水和了捏在竹棒似蠟燭一般焠著燈便著從上燈時點起直到天明王則聽了心裏思忖道卻也作怪我從來好些劇法術這一件卻又驚人乃挨身入人叢中看那婦人都做完了把水洗了手道我這蠟燭賣三文錢一枝人人都爭搶要買王則道且住你們都不要買人都認得王則是有請的人他叫聲不要買人都不敢買婦人抬起頭來看見王則起身來叫聲萬福王則還了禮道你把泥來做蠟燭如何點得著婦人道都排在上媳婦在此賣了半個多月了若點不著時人卻不來問我買每日做十枝只是沒得賣王則道不要耍我扯起衣襟在便袋內取出三十文錢都買了婦人將蠟燭遞與王則王則道且住買將去點不著時枉費了錢不是我不信事真個不曾見且點一枝叫我看看婦人道這個容易都排叫人去討火種來王則教跟隨的去討火種遞與婦人婦人炙著發燭兒將十枝泥蠟燭都點與王則看王則看了喝采道果然真個驚人這十枝蠟燭我又不要你們要的都將了去衆人都拿了去婦人起身收拾了刀碗安在籃裏向衆人道個萬福自去了王則打發了跟隨人先回自己信步隨著那婦人王則口裏不説心下思量這婦人不是我貝州人想是在草市裏住的且隨到他家用些錢學得這件法術也好只見那婦人出了西門過了草市只顧行去王則道既不在草市裏不知在那裏住又行了十來里不認得這個去處王則道這婦人是個蹺蹊作怪的人我且回去待明日看那婦人來賣時問他住處便了轉身卻待取路回來看時不是來時的舊路只見漫天峭壁峰巒高山擋住來路歸去不得又沒個人行走正慌之間只見那婦人在前頭高聲叫道王都排不容易得你到這裏如何便要回去嚇得王則戰戰兢兢向前道娘子你是誰婦人道都排聖姑姑使我來請你去論大事你不要疑忌我和你同去則個王則道卻不作怪欲要回去叵耐迷失了路只得且隨他去同行入松林裏良久轉過林子見一座莊院王則問道這裏是什麼去處婦人道這裏是聖姑姑所在等都排久矣王則到得莊前莊裏走出兩個青衣女童來叫道此位是王都排麼婦人道便是青衣女童道仙姑等你久矣引著王則徑到廳下稟道王都排請到了王則見一個婆婆頭戴星冠身穿鶴氅坐在廳上婦人道此乃聖姑何不施禮王則就廳下參拜了聖姑姑請王則上廳三位坐定叫點茶來罷聖姑姑教女童置酒管侍王都排王則心局志氣甚是歡喜將聖姑姑道王則有緣今日得遇仙姑有何見教聖姑姑道且一面飲酒與你商議如今氣數到了你應著天數合當發迹河北三十六州有分教你獨霸王則道仙姑莫出此言宮中耳目較近王則是貝州一個軍健豈敢為三十六州之主聖姑姑道你若無這福分時我須不著人來請你只恐你錯過了機會可惜了更有一事恐你隻身無人相助成事指著賣泥蠟燭的婦人道吾有此女小字永兒尚是女身與你是五百年煙眷今嫁此女與你為妻助你成事你意下如何王則心中不勝歡喜思忖道我今年二十八歲渾家去年死了尚不曾繼娶今日仙姑把這美婦人與我豈不是天緣奇遇王則道感謝仙姑厚意焉敢推阻王則幼小時曾遇著一個異人相我道年近三十必然發迹今日蒙仙姑抬舉果應其言只是一件叵耐貝州知州央及王則取辦一應金銀綵帛物件俱不肯還鋪行錢鈔害盡諸役百業那一個不怨恨唾罵近日本州兩營官軍過役三個月要關支一個月請受他也不肯欲待與他爭競他朝中勢大和他爭競不得與王則一般一輩的人不知吃他苦害了多少我們要袪除一個虐民官尚且無力量如何幹得大事聖姑姑笑道你獨自一個如何行得必須仗你的渾家他手下有十萬人馬相助你你須反得成王則笑道我聞行軍一日須費千金日歇不停江湖絶溜若有這許多軍馬須用若干糧食草料莊院能有多少大這十萬人馬安在那裏聖姑姑笑道我這裏人馬不用糧草亦不須屯劄處有急用便用不用便收了王則道恁地時卻好聖姑姑道我且教你看我的人馬則個聖姑姑叫永兒入去掇出兩隻小籠兒來一籠兒是豆一籠是剪的稻草永兒撮一把豆撮一把稻草把草一撒喝聲疾就變做二百來騎軍馬在廳前王則看了喝采道既有這剪草為馬撒豆成兵的本事何憂大事不成正説之間只聽得莊外有人高聲叫道你們在這裏好做作官司現今出榜拿捉妖人你們卻在此剪草為馬撒豆成兵待要舉事謀反嚇得王則大驚如分開八片頂陽骨傾下半桶冰雪來真所謂機謀未就怎知窗外人聽計策才施卻早蕭牆禍起正是會施天上無窮計難避隔窗人竊聽畢竟那裏來的是誰且聽下回分解
