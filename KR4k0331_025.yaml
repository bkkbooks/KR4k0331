body:
  text: 第二十五回偌大乾坤何事無壼中天地井中區有人從此翻筋斗便是人間大丈夫話說老院子和街坊人等將客人一條索子縛了直解到鄭州來正值太尹在廳上斷事地坊里甲人等解客人跪下備說本人在刁通判府中將不識姓名女子趕下八角井裏去了太尹將客人勘問客人招稱係本州人氏姓卜名吉因販皂角往東京貨賣回來行至板橋八角鎮五十里外大樹下遇見不識姓名女子言說腳痛行走不得欲賃車子前往鄭州東門十字街爹爹媽媽家去則箇情願出錢五百是吉載到本家即開門入去並不出來吉等已久只見老院子出來言說我家是刁通判廨宇無人居住空房不肯還銀一時間同老院子進去尋看不期女子見了自跳在井中並非相逼等情太尹教且將卜吉押下牢裏到來日押去刁通判宅裏井中打撈屍首次日太尹委官一員獄中取出卜吉同鄰里人等押到刁通判廨宇裏來街上看的人堆肩背人人都道刁通判府裏時常裏面聽得神歌鬼哭人都不敢在裏面住有的人道看今日打撈屍首何如委官坐在交椅上押卜吉在面前跪下委官問老院子並四鄰人等卜吉如何趕這女子落井卜吉告道女子自跳入井並不曾趕他下去委官叫打撈水手過來水手唱了喏著了水背心委官道奉本州臺旨委我押你下井你須仔細打撈水手道方纔小人去井中看驗約有三五十丈深淺若只恁地下去多不濟事須用爪扎轆轤有急事時叫得應委官道要用甚物件好叫一面即速辦來水手道要爪縛轆轤架上要用三十丈索子一個大竹籮一個大銅鈴人夫二十名若有急便搖動鈴響上面好拽起來不多時都取辦完備水手扎縛了轆轤銅鈴竹籮俱完備了便道請郎中臺旨教下井去打撈委官道你眾水手中著一個會水了得的下去四五個人扶著轆轤一個水手下竹籮坐了兩三人掇那竹籮下井欄裏去四個人便放轆轤約莫放下去有二十餘丈只聽得銅鈴響得緊委官叫眾人退後急把轆轤絞上籮來眾人見了一齊吶聲喊看那籮裏時亙古未聞於今罕見那水手當初下去紅紅白白的一個人如今絞上來看時一個臉便如蠟皮也似黃的手腳卻板僵死在籮裏了委官叫抬在一邊一面叫水手老小扛回家去殯殮不在話下委官道終不成只一個下去了不得公事便罷了再別差一個水手下去眾水手齊告道郎中在上眾人家中都有老小適纔見這樣子麼著甚來由把性命打水撇兒斷然不敢下去若是郎中定要小人等下去情願押到知州相公面前吃打也是岸上死實是下去不得委官道這也怪不得我們卻是如何得這婦人的屍首上來你一干人都在此押著卜吉等我去稟復知州相公商議則個委官上了轎說了一遍知州也沒做道理處委官道地方人等都說刁通判府中不乾淨不意今日又死了一個水手誰人再敢下去只是打撈不得那婦人的屍首起來如何斷得卜吉的公事依卑職愚見不若只做卜吉著教卜吉下去打撈便下井死了也可償命知州道也說得是你自去處分委官辭了知州再到井邊押過卜吉來委官道是你趕婦人下井你自下去打撈屍首起來我稟過知州相公出豁你的罪卜吉道小人情願下去只要一把短刀防身眾人道說得是隨即除下枷去了木杻與他一把短刀押那卜吉在籮裏坐了放下轆轤許多時不見到底眾人發起喊來道以前的水手下去時只二十來丈索子便鈴響這番索子在轆轤上看看放盡卻不作怪放許多長索兀自未能夠到底正說未了轆轤不動鈴也不響且不說井上眾人卻說卜吉到井底下抬起頭來看時見井口一點明亮外面打一摸時卻沒有水把腳來踏時是實落地一面摸一面行約莫行了一二里路見那明處摸時卻有兩扇洞門隨手推開閃身入去看時依然得見天日卜吉道井底下如何有這個所在提著刀正行走之間見一隻大蟲伏在當路卜吉道傷人的想是這隻大蟲譬如你吃了我我左右是死大踏步向前看著大蟲便殺喝聲著一聲響亮只見火光迸散震得一隻手麻木了半晌仔細看時卻是一隻石虎卜吉道裏面必然別有去處又行幾步只見兩旁松樹中間一條行路都是鵝卵石砌嵌的卜吉道既是有路前面必有個去處仗著刀入那松徑裏行了一二百步路程閃出一個去處嚇得卜吉又不敢近前定睛看時但見金釘朱戶碧瓦雕簷飛龍盤柱戲明珠雙鳳幃屏鳴曉日紅泥牆壁紛紛御柳間宮花翠靄樓臺淡淡祥光籠瑞影窗橫龜背香風冉冉透黃紗簾捲蝦鬚皓月團團懸紫綺若非天上神仙府定是人間帝王家卜吉道這是什麼去處卻關著門敢是神仙洞府欲推門又不敢欲待回去又無些表證終不成只說見隻石虎來知州如何肯信我正躊躇之間只見呀地門開走出一個青衣女童來女童叫道卜大郎聖姑姑等你多時了卜吉聽得說想道這個女童如何認得我卻是什麼姑姑姓聖我三黨之親都沒有這個姓他卻又等我做甚的卜吉只得隨女童到一個去處見一所殿宇殿上立著兩個仙童一個女童當中交椅上坐著一個婆婆卜吉偷眼看時但見那婆婆蒼形古貌鶴髮童顏眼昏似秋月籠煙眉白如曉霜映日繡衣玉帶依稀紫府元君鳳髻龍簪彷彿西池王母正大仙客描不就威嚴形像畫難成卜吉想道必是個神仙洞府我是必有緣到得這裏卜吉便拜道告真仙客人卜吉謹參拜拜了四拜婆婆道我這裏非凡你福緣有分得到得此間必是有功行之人請上階賜坐卜吉再三不肯坐婆婆道你是有緣之人請坐不妨卜吉方敢坐了婆婆叫點茶來女童獻茶已罷婆婆道你來此間非同容易因何至此卜吉道告姑姑小客販皂角去東京賣了推著空車子回來路上見一個婦人坐在樹下道我要去投奔爹媽腳痛了許我五百文錢載他到東門裏刁通判宅前婦人道這是我家了下車子推門走入去了不見出來見我尋進去他就跳下井裏因此地方捉了我解送官司差人下井打撈又死了一個水手知州只得令小人下來見井裏有路無水信步走到這裏婆婆道你下井來曾見甚的卜吉道見一隻石虎婆婆道此物成器多年壞人不少凡人到此見此虎必被他吃了你到剁了他一刀你後來必然發跡卜吉我且教你看個人看著青衣女童道叫他出來女童入去不多時只見走出那個跳在井裏的婦人來看著卜吉道個萬福道客長昨日甚是起動卜吉見那婦人怒從心上起惡向膽邊生便罵道打脊賊賤人卻不叵耐見你說腳痛走不得好意載你許多路腳錢又不與我自走入宅裏跳在井中教我被官司捉了頂上帶枷臂上帶杻牢獄中吃苦這冤枉如何分說只道永世不見你了你卻原來在這裏人相見分外眼睜且教你吃我一刀就身邊拔起刀來向前劈胸揪住便剁被胡永兒喝一聲禁住了手卜吉和身與腳都動不得了胡永兒道看你這個剪手一路上載我之面若不時把你剁做肉泥因見你純善穩重我待要度你你卻如此無禮敢把刀來剁我卻又剁我不得婆婆起身勸道不要壞他日後自有用他處還要他們來助你婆婆看著卜吉臉上只一吹腳便動得這卜吉看著婆婆道小娘子是個唫嗻的人婆婆道若不是我在這裏你的性命休了再後休得無禮卜吉道小人有緣遇得姑姑若救得卜吉牢獄之苦出得井去無事時回家每日焚香設位禮拜姑姑婆婆道你有緣到這裏且莫要去隨我來飲數杯酒送你回去卜吉隨到裏面吃了一驚就道我本是鄉村下人那曾見這般好處安排得甚是次第但見香焚寶鼎花插金瓶四壁張翠幙鮫綃獨桌排金銀器皿水晶壺內盡是紫府瓊漿琥珀杯中滿泛瑤池玉液玳瑁盤堆仙桃異果玻璃碗供熊掌駝峰鱗鱗膾切銀絲細細茶烹玉蕊婆婆請卜吉坐卜吉不敢坐婆婆道卜大郎坐定異日富貴俱各有分卜吉方纔坐了只見酒來又見飯來他幾時見這般施設兩個青衣女童在面前不住斟酒服侍杯杯斟滿盞盞飲乾酒至半酣卜吉思忖道我從井上來到這裏許多路見恁地一個去處遇著仙姑又見這個婦人知他是神仙是妖怪在此不是久長之計即便起身告姑姑和小娘子道我要去井上看車子錢物恐被人捉了婆婆道錢物值得什麼我教你帶一件物事上去富貴不可說不知你心下如何卜吉道感謝姑姑美意休道是值錢的物事便是不值錢的把去井上做表證也免得小人之罪婆婆叫永兒近前附耳低聲入去不多時只見一個青衣女童從裏面雙手掇一件物事出來把與卜吉卜吉接在手裏覺有些沉重思量這件是甚東西用黃羅包袱包著卜吉道告姑姑把與小人何用婆婆道你不可開將上井不要與他人但只言本州之神收此物已千年今當付與知州便可免你本身之罪又有一件事吩咐你你凡有急難之事可高叫聖姑姑我便來救你卜吉聽得說一一都記了婆婆叫青衣女童送卜吉出來復舊路入土穴行到竹籮邊走入竹籮裏坐了搖動索子那鈴便響上面聽得便把轆轤絞起眾人看時不見婦人的屍首只見卜吉掇抱著一個黃羅袱包來見委官卜吉道眾人不要動這件物事是本州之神交付與知州的直到知州面前開看委官上了轎一干人簇擁圍定著卜吉直入州衙裏來正值知州陞廳公吏人從擺開兩旁委官上前稟說卜吉下井去了半日續後聽得鈴響即時絞他上來只見卜吉抱著黃羅包袱包著一件東西口稱是本州之神付與州官卑職不敢擅動取臺旨知州叫押過卜吉來知州道黃袱中是何物件因何得來卜吉道告相公小人下井去到井底不見婦人的屍首卻沒有水有一條路徑約走二里許方見天日見隻虎幾乎被他傷了性命小人剁一刀去只見火光迸散仔細看時是石虎又有一條松徑路入去見一座宮殿外有青衣女童引小人至殿上見一仙人仙人言稱是本州之神與小人酒食吃了又將此物出來叫小人付與州官收受不許漏泄天機知州捧過黃包袱放在公案上覺得沉重知州想道一件寶物出世合當遇我叫手下人且退親手打開黃包袱看時道可知這般沉重卻是一個黃金三足兩耳鼎上面鑄著九字道遇此物者必有大富貴知州看罷再把黃袱來包了叫出家裏親隨人拿入去為守庫之寶該吏向前稟道卜吉候臺旨發落知州尋思道欲待放了卜吉那州人都知道趕一個婦人落井及至打撈又壞了一個水手性命若恁地放了州裏人須要議我我欲待把卜吉償那婦人的命怎奈屍又無尋處倒將金鼎來獻我卻如何是好驀然提起筆來斷道卜吉有分教知州登時死於非命鄭州一城人都不得安寧正是有興店中賒得酒災來撞著有情人畢竟後來如何且聽下回分解
