body:
  text: 第二十回九天祕冊好驚人但恐於中傳不真若得善傳並善用等閒疑鬼復疑神當夜胡永兒解開紫羅袋外邊纏的麻索抖出那本冊兒來走出披屋外仔細看時上面題道如意寶冊揭開第一板看時第一行就寫道變錢法將一條索子穿著一文銅錢打個胳放在地上用物掩蓋舀一碗水在手依咒語念七遍含口水望下一噴喝聲疾揭起蓋時就變成一貫銅錢永兒道原來如此方法就把解下來的這條麻索子將日間婆婆變的一文好銅錢解下裙帶來穿在索子上打了胳放在地下將面桶來蓋了去水缸內舀一碗水在手依咒語念了七遍含口水望下只一噴喝聲疾放下水碗揭起面桶打一看時青蛇也似一堆銅錢永兒到吃了一驚沒做理會處思量道若把去與爹爹媽媽必問是那裏來的如何回答永兒就心生一計輕輕的開了後門一撇撇在自家籬笆內雪地上只說別人暗地裏濟我貧戶的然後把後門關上入房裏來把冊兒藏了媽媽道女兒肚裏痛也不永兒道不痛了依然上床再睡到天曉三口兒起來燒湯洗了面媽媽開後門潑那殘湯忽見雪地上有一貫錢吃了一驚慌忙提起把與員外道不知誰人撇這貫錢在後面雪地上我拾得在此胡員外道媽媽寧可清貧不可濁富我的女兒長成恐有不三不四的後生來撩撥他把這銅錢來調戲我今又是沒運氣的時節一時間取用了引得後生們到家囉唣沒法擺布媽媽道你好沒見識東京城內有多少財主做好事濟貧拔苦見老大雪可憐這院子裏有許多沒飯吃的夜間撇在人家屋裏來捨貧也不見得員外只搖手道難說難說我也做過財主的幾曾有此事麼媽媽焦燥起來罵道老無知真個是人貧智短了自古道賢愚不等也有捨得的也有不捨得的那裏都要與你一樣你被天火燒了怎的別個財主天火又不燒他們行好事的到底好自家女兒你卻三心四意去疑他我女兒又不曾出去一遍兩遍認得什麼人來你卻這般胡說罵得員外頓口無言點頭道也說得是我昨日出去求人三二百錢兀自不能夠得如今有這一貫錢且糴五百錢米買三百錢柴把二百錢來買些鹽醬菜蔬下飯且不煩惱雪下三口兒歡歡喜喜過了一日到晚去睡到二更前後永兒自思昨夜變得一貫錢也好今夜再去安排看日裏便有這心預先尋得一條索子藏在身邊了永兒款款的起來著了衣服媽媽問道我兒做什麼永兒道肚裏又痛要去大解則個媽媽道苦呀我兒先前那幾日有一頓無一頓這兩日有些柴米不知飢餓只顧吃滯了明日叫爹爹出去贖帖藥吃永兒下床來到破披屋下一如昨夜安排如法用索穿錢將面桶蓋了念了咒噴一口水揭起桶來看時和夜來一般又有一貫錢永兒開後門把這錢又拋在雪地上關了後門入房裏睡到天曉媽媽起來燒湯洗面開後門潑湯又看見一貫錢好不歡喜拿了回來胡員外道好蹊蹺這錢來得不明媽媽說莫胡說我不怕這是當方神道不忍見我們三口兒受苦救濟我們又把這一貫錢安在我家員外見媽媽昨日焦燥今番再不敢說只得含糊答應道媽媽說得是安在家中慢慢用度過了三五日後雪卻消了天晴得好媽媽對員外道趁家中還有幾日糧食你出去外面走一遭倘撞見熟人賺得一二百錢也好員外聽得說只得走出去媽媽心寬無事便到鄰舍家吃茶閒話永兒見媽媽出去屋裏沒人關了前門取出冊兒揭開第二板看時上首寫著變米法永兒道謝天地既是變得成米憂他什麼沒飯吃媽媽床頭原有一隻米桶一隻米缸永兒去看時都盛得有米想了一回便把桶裏的米併在那缸內剩下的把被單鋪在地下都傾出了祇存十數粒米在空桶內提在披屋內來把件衣服蓋了念了咒噴一口水喝聲道疾只見米從桶裏湧將出來永兒心慌不曾念得解咒米突突地起來桶箍長久卻是爛的忽然一聲響斷了桶箍撒一地米後人聽說變錢變米之事因戲作詩云錢滿索時米滿屋何物咒語能神速有人肯把咒傳吾生願事他死當哭永兒見了失聲叫苦媽媽在隔壁聽見女兒叫苦慌忙走過來看米被生人一衝便不長了只見披屋內一地都是米媽媽吃了一驚道如何有這許多米永兒生一個急計喚做脫空計道好教媽媽得知一個大漢馱一布袋米把後門挨開來傾下在此便去了吃他一驚因此叫起來媽媽看見桶箍散了問道這米桶是我房裏的拿出來做甚這桶裏米那裏去了永兒道是我傾在房裏要用這空桶盛這披屋下的米不想箍桶年久斷了媽媽道那大漢卻是何人是何意故正在絮叨卻被隔壁張大嫂聽了不知高低敲著壁兒叫道胡媽媽你直恁地不曉得是那有錢的員外財主見雨雪下了多日情知院子裏有萬千沒飯吃的做這樣好事不叫人知道撇錢撇米在人家裏這是陰騭若明明的捨怕人囉唣這個何足為道媽媽因張大嫂聽見了便不言語叫女兒作急收拾自己也來相幫兩個兀自收拾未了員外恰好歸來見娘兒兩個在地下掃米便焦燥起來道那見你娘兒兩個的做作才有一兩頓飯米便要作塌了媽媽道我如何肯作塌叫你看甕裏缸裏桶裏盆裏都盛得滿了這裏還有許多兀自沒家伙盛得哩員外看了吃驚道這米卻從那裏得來媽媽道你出去了我在隔壁吃茶只聽得女兒叫起苦來我連忙趕將回來時只見披屋內一地上都是米員外道卻是作怪這米從何而來的媽媽道永兒說他見一個大漢馱著一袋米挨開後門傾下米在家裏便去了那胡員外是個曉事的人開了後門看時籬笆內外都沒有人來往的腳跡心下疑惑把後門關了入來尋條棒在手裏連叫永兒永兒見勢頭不好躲在自家房裏不敢出來員外把他扯將過來媽媽道沒甚事打孩兒做什麼員外道且閉了口這件事卻是利害前日兩貫錢來得蹊蹺今日米又來得不明叫這妮子實對我說我便不打他若一句不實我一頓打殺他我問他因何有這兩貫錢的雪地上因何有這米在屋裏這大漢的是何人便做道是財主家行好事的難道偏照顧我家其中必有緣故永兒初時抵賴後來吃打不過又逼他招稱那大漢的來歷這天大冤枉承當不起只得實說道不瞞爹爹媽媽說那一日初下雪時爹爹出去媽媽叫我出去買炊餅回來在路上撞見一個婆婆看著我說肚飢問我討炊餅吃是奴不忍把一個炊餅與那婆婆他道我不要吃你的試探你則個便還了我道是難得你慈悲孝順好心便把我一個紫羅袋兒內有個冊兒說道你若要錢和米照這冊兒上的咒語都變得出來我初時不信便一連兩夜依那冊兒上咒語都變得有錢今日媽媽在隔壁人家去了我把變米的法兒試用果然又變得米來胡員外聽得說跌腳叫苦道如今官司張掛榜文要捉妖人吃你連纍我我打殺這妮子也免我本身之罪拿起棒來便打永兒叫救人隔壁張大嫂聽得打永兒走過來勸時卻關著門大嫂在門外叫道員外饒了孩兒則個間常時不曾這般焦燥為甚事打他媽媽怎也不勸勸員外含著一口氣答道大嫂可奈這妮子藏著一本冊兒說了半句就住了口大嫂道冊兒上寫著些什麼員外道都是些閒言閒語大嫂認錯了只道是什麼私情本兒便叫道你女兒年紀小又不理會得須是街坊上浮蕩子弟們撩撥他論口辨舌若不中看的你只把這冊兒來燒了戒他下次便是何須動氣把孩兒恁般狠打員外倒被他提醒了應道大嫂說得是看著永兒道你把冊兒來我看永兒便向懷中取出冊兒來遞與爹爹員外接了道你記得上面的言語也不永兒道告爹爹記不得若看上看時便讀得出員外叫媽媽點點一把柴火來連紫羅袋兒一包的燒了看著永兒道今日看間壁乾娘面皮饒你這一遭後番苦再恁地活打殺你永兒道告爹爹再不敢了員外對媽媽道又是我夫妻福神重只是自家得知若還外人傳聞時卻是老大利害媽媽被員外亂了一場不知高低只索由他有詩為證昔年媽媽焚仙畫員外今將寶冊燒似此火攻能調慣爭教天火肯相饒說話的有一句來問你這書第十三回上說聖姑姑和蛋子和尚左黜三人鍊法三年方就何等煩難今日胡永兒變錢變米卻恁地容易可不前後相背了看官有所不知當初鍊神鍊鬼都是生手做事今日是聖姑姑設法來度他女兒在空中暗暗佐助若初次見得煩難時永兒又不肯學了你看這冊兒第一頁便是變錢法第二頁便是變米法也只揀永兒家中缺少的打動他心這都是聖姑姑引誘入門處閒話休題且說胡永兒被父親打了一頓逼取冊兒燒了好不氣悶自去流淚媽媽看見勸住了過了一夜到次日員外又出去了媽媽仍到間壁張大嫂家閒話永兒把前後門都閉了悶悶的坐在房中思量這本冊兒千金難換那婆婆一團美意把來與我就是變些錢米來度日也免得求人卻被爹爹燒了可惜後面都沒看得不知是什麼耍法那婆婆吩咐不省得時叫聖姑姑他便來教導我我今日雖沒了冊兒且喚一聲看他來也不來若肯來時或者他還存留得有再與他取討一本只怕那婆婆來時驚動了媽媽卻不穩便走到天井中去仰面看著天低低喚一聲聖姑姑只見那婆子手攜竹杖從屋簷而下徑入披屋悄然無聲永兒跟進屋去道了萬福便把父親火燒冊兒之事告訴過了婆子道冊子不曾燒原是我取得在此便在袖裏摸出冊兒依然紫羅袋兒包著毫無損傷永兒吃驚連忙下拜相求婆子扶起永兒道我兒我原是你前世的親娘今番憐你受苦特來度你你要這冊兒家中不能施展也是無用可依我言語日裏睡眠養息精神夜間莫脫衣服待黃昏人定後但聞鶴唳之聲便是我差來迎你的你便悄悄出房跨鶴而來我與你相會五鼓仍回這冊兒上的術法我一一傳授與你得道之日神通廣大逍遙快樂不可盡說也永兒道如此甚好只是怕爹媽夜間覺察尋覓起來不見了奴奴早晨回去如何抵賴婆子道這個容易把手中竹杖遞與永兒吩咐道我兒把這杖兒藏好如到夜間動身時放在臥處將被蓋著你爹媽若來時便如你睡著一般此乃仙家替身之法永兒接了竹杖在手那婆婆飛上屋簷忽地又不見了永兒方才歡喜把杖兒藏在席子底下依著婆婆言語不脫衣服到黃昏時候果然聽得一聲鶴唳永兒便在裏床席子下取出杖兒覆於被內悄悄步出庭中只見一隻仙鶴舒頸迎接永兒跨上鶴背望空飛去須臾到一個所在歇腳只見婆婆先在又不是先前打扮了頭戴星冠身披鶴氅甚是齊整那婆婆把手一招那鶴便鑽進他衣袖中去取出看時卻是一個紙剪的仙鶴慌得永兒又拜下去婆婆扶起道我兒休得驚恐永兒覺得站身之地甚是高峻問道此處是那裏婆婆道這是大相國寺中浮圖第一層人跡不到正好教導你先教你個藏形法可以穿窗入隙出入不用開門次教你個飛行法跨在個板上念個咒語這凳隨意變化騰空而起你每夜自來自去何等方便永兒會了這法自此暮去晨回把這如意寶冊次第領會一來永兒聰明靈性書符念咒一教便會二來多分是聖姑姑見鍊成就的法兒交付與他只須指點運用甚是省力不提永兒學法再說胡員外燒冊的時節米桶裏有米吃床頭邊有錢用古人原說坐吃山空立吃地陷一日三三日九那裏過得半月十日桶裏吃的漸漸淺了床頭錢漸漸短了再過幾時米盡錢空依然有一頓沒一頓求告人又沒求告處依先沒飯得吃媽媽重復思量起永兒變錢變米冷痛熱疼埋怨老公道你卻把永兒來打又燒了他的冊兒今日你合該餓死連纍我和女兒受苦你如何做這般人靠米缸餓死叫我娘兒兩個忍飢受餓員外道事到如今也沒奈何你只顧埋怨我怎的媽媽道才有些飯吃便生出許多事來你既然大膽打他須有用處置錢米如今窮性命尚在那冊兒卻把來燒了員外道是我一時沒思算千不合萬不合燒了早知留了那冊兒也好媽媽道你省得時卻遲了員外道沒奈何我陪些下情央我女兒想他還記得再變得些錢和米搭救我們則個你且去問他看媽媽道女兒自從吃你打了再不到爹媽身邊來日裏只在自房裏悶悶昏昏打瞌睡夜裏上床便如一塊木頭相似昏迷不醒我前晚半夜裏起來解手見後房門關得不緊被風刮開了我怕女兒傷了風打得燈火看時他緊緊擁著被兒睡倒隨你左搖右搖只是不醒好端端一個聰明孩兒被你一頓拳頭打呆了還記得什麼冊兒不冊兒要問他時你自進他房去問我沒這副嘴臉員外真個走進房裏陪著笑道我兒爹爹問你則個冊兒上變錢米的法你記得也不記得永兒道告爹爹不記得了員外道我兒救了爹娘又不搭救了別人休得使性是做爹的不是了永兒只不開口媽媽跨進房門把員外一手雙罵道死漢走開娘的向前道我兒莫看爹面看娘面好歹記得些法兒便救娘的性命則個員外道今後再不打你了永兒道前番因爹爹打了都忘記了暗暗記得些兒不知用得也不爹爹你去取凳子坐定我叫你看員外依了女兒在板凳上坐了只見女兒口中念念有詞喝聲疾那凳子從空便起嚇得媽媽呆了員外頭頂著屋梁叫救人下又下不來若沒這屋直起在半天裏去了正是不曾施展神通手先把親爹耍一場未知胡員外如何下來且聽下回分解
