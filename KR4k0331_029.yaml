body:
  text: 第二十九回九天玄女法多端要學之時事豁然戒得貪瞋淫欲事分明世上小神仙話說善王太尉那日在城外閒游回歸府中當日無事衆人都自散了次日官身私身閒漢都來唱喏太尉道昨日出城閒走了一日今日不出去了只在後花園安排飲酒教衆人都休散去且在園裏看戲文耍子原來這座花園不止一座亭子閒玩處甚多今日來到這座亭子謂之四望亭衆人去那亭子裏安排著太尉的飲食太尉獨自一個坐在亭子上上自官身私身下及跟隨服侍的各人去施逞本事正飲酒之間只聽得那四望亭子的亭柱上一聲響上至太尉下至手下的人都吃一驚看時不知是什人打這一個彈子來花園裏太尉道叵耐這廝早是打在亭柱上若打著我時卻不厲害叫衆人看是誰人打入來的衆人望亭外看時老大一座花園周圍牆垣又高如何打得入來正說之間只見那彈子滾在那亭子地上托托地跳了幾跳一似碾線兒也似團團地轉轉千百遭太尉道卻不作怪只見一聲響爆出一個小的人兒來初時小被凡風一吹遂漸漸長大變做一個六尺長的和尚身披烈火袈裟耳墜金環太尉並衆人見了都吃一驚只見那和尚走向前來看著太尉道拜揖太尉見了口中不說心下思量道好個僧家不可慢他抬起身來還禮問道聖僧因何至此和尚道貧僧是代州雁門縣五臺山文殊院行腳僧特來拜見太尉欲求一齊這太尉從來敬重佛法時常拜禮三寶見了這般的和尚來求齊又來得蹺蹊如何不喜歡太尉教請坐和尚對了太尉坐下道有妨太尉飲宴太尉命廚下一面辦齊向著和尚道吾師肯相伴先飲數杯酒麼和尚得多感面前鋪下一應玩器食饌等物盡是御賜金杯金盤和尚道有心齊這等小盞如何吃得貧僧快活太尉見說即時叫一個大金鍾來放在和尚面前太尉只是盞子吃和尚用大鍾子吃太尉只顧斟酒和尚也不推卻吃上三十來大金鍾太尉歡喜道不是聖僧如何吃得許多酒廚下稟道素食辦了太尉道齊食既完請吾師齊教搬將來放在和尚面前太尉面前些少相陪和尚見了素食拿起來吃不放下碗和太尉叫從人入去添來這和尚飯來羹來酒來盡數盡吃叫供給的做手腳不迭手下人都呆了太尉見他吃得也呆了道這個和尚必是聖僧吃酒吃食不知吃下向那裏去了只見他放下碗和手下人道慚愧也有吃了的日子和尚道總飽了收拾過齊器點將茶來茶罷和尚起身謝了太尉太尉喜歡道吾師粗齊不必致謝敢問吾師齊罷往什處去和尚道貧僧乃是五臺山文殊院化主長老法旨教貧僧來募緣文殊院山門崩損得用三千貫錢修蓋山門貧僧今日遭際太尉蒙賜一齊太尉若捨得三千貫錢成就這山門盛事願太尉增福延壽廣植福田太尉道這是小緣事不知吾師幾時來勾疏和尚道不必勾疏便得更好山門多幸太尉道吾師我把金銀與你如何和尚道把金銀與貧僧不便去買料物若得三千貫銅錢甚好太尉暗笑道吾師你獨自一個在這裏三千貫銅錢也須得許多人搬挑和尚道告太尉貧僧自有道理太尉即時叫主管開庫教官身私身虞候輪番去搬銅錢來堆在亭子外地上一百貫一堆共三十堆太尉道吾師三千貫銅錢在這裏路途遙遠要使許多人夫腳錢怎的能夠得到五臺山和尚道不妨起身下亭子謝了太尉喜捨不須太尉費力貧僧自有人夫挑去袖中取出一卷經來太尉口中不道心下思量且看他怎的和尚道僧家佛法甚大自把經卷自誦一遍叫一行人且開只見那和尚眨眼把那卷經去虛空中打一撒變成一條金橋那和尚空中招手叫道五臺山衆行者火工人夫我向善王太尉抄化得三千貫銅錢你衆人可來搬去則個無移時只見空中橋上衆行者並火工人夫滾滾攘攘下來都到四望亭下將這三千貫銅錢的挑的挑搬的搬交叉往復剎時間都運了去和尚向前道感謝太尉賜了齊又喜捨三千貫錢異日如到五臺山貧僧當會衆僧撞鐘敲鼓幢幡寶蓋接引太尉貧僧歸五臺山去也和尚與太尉相辭了也走上那金橋去漸漸的去得遠不見了空中起一陳風那金橋依舊化作一卷經典隨風吹入空中去了太尉甚是喜歡叫從人焚香禮拜道小官齊僧布施五十餘年今就遇得這一個聖僧羅漢那時衆人就來到就與太尉賀喜後人詩云布施空門種福田片言曾不吝三千長安多少饑寒者何不分些救命錢自此善王太尉一家人人都稱贊聖僧彈子和尚把彈子和尚一個名頭霎時傳播京師並不知有舊名蛋子二字當日無事次日是上值日期太尉早起梳洗廳下祇應人從跟隨直到內前下入來太尉當日卻來得早些個往外待班閣子前過遇著一官人相揖這官人正是開封府包待制這包待制自從治了開封府那一府百姓無不喜歡因見他平生正直稟性賢明常懷忠孝之心每存慈仁之念戶口增田野闢黎民頌德滿街衢詞訟減盜賊潛父老謳歌喧市井攀轅截革登名標青史播千年勒石鐫碑聲振黃堂傳萬古果然是慷慨文章欺李杜賢良方正勝龔黃當日包待制伺候早朝見了太尉請少坐太尉是個正直的人待制是個清廉的官彼此耳內各聞清德雖然太尉是個中貴人心裏喜歡這包待制包待制亦喜歡這王太尉兩個在閣子裏坐下太尉道凡為人在世善惡皆有報應包待制道包某受職亦如包某在開封府時斷了多少公事那犯事的人必待斷治方能改過遷善比如太尉平常好善不知有什報應王太尉道且不說別事如王某昨日在後花園亭子上賞玩從空打下一個彈彈子內爆出一個聖僧來口稱是五臺山文殊院化主問某求齊某齊了他又問某化三千貫銅錢不使一個人搬去把經一卷空中打一撒化成一座金橋叫下五臺山行者火工人夫無片時都搬了去和尚也上金橋去了凡間豈無諸佛羅漢王某一世齊僧供佛果然有此感應包待制道難得難得雖然是恁般順口答應口中不道心下思量這件事又作怪世上那有此理漸漸天已曉文武俱入內朝罷百官各自去了包待制回府不來打斷公事問當日聽差應捕人役是誰只見階下一人唱喏卻是緝捕使臣溫殿直包待制道今日早期間在待班閣子裏坐見善王太尉說昨日他在後花園亭子上飲酒外面打一個彈子入來彈子裏爆出一個和尚口稱是五臺山文殊院募緣僧抄化他三千貫銅錢去了那太尉道他是聖僧羅漢我想他既是聖僧羅漢要錢何用據我見識必是妖憎見今鄭州知州被妖人張鸞卜吉所殺出榜捉拿至今未獲怎麼京城禁地容得這般妖人指著溫殿直道你即今就要捉這妖僧赴廳見我溫殿直只得應諾領了臺旨出府門由甘泉坊徑入使臣房來於廳上坐下兩邊擺著做公的衆人見溫殿直眉頭不展面帶憂容低著頭不則聲內有一個做公的當時溫殿直最喜他其人姓冉名貴叫做冉士宿一隻眼常閉天下世間上人做不得的事他便做得與溫殿直捉了許多疑難公事因此溫殿直喜他當時冉貴向前道長官不知有什事恁地煩惱溫殿直道冉大說起來叫你也煩惱卻才太尹叫我上廳去說早朝時白鐵班善王太尉說道昨日在後花園亭子上飲酒見外面打一個彈子入來爆出一個和尚問善王太尉布施了三千貫銅錢去善王太尉說他是聖僧羅漢太尹道他既是聖僧羅漢如何要錢必然是個妖僧限我今日要捉這個和尚我想他既有恁般好本事定然有個藏身之所他覓了三千貫銅錢自往他州外府受用去了叫我那裏去捉他包太尹又不比別的官員且是難伏事只得應承了出來終不成和尚自家來出首沒計奈何因此煩惱冉貴道這件事何難如今吩咐許多做公的各自用心分路去繞京城二十八門去捉若是遲了只怕他分散去了溫殿直道說得有理你年紀大終是有見識看著做公的道你們分頭去幹辦各要用心衆人應允去了溫殿直自帶著冉貴和兩個了得的心腹人也出使臣房離了甘泉坊奔東京而來殿直用暖帽遮了臉冉貴扮做當值的模樣眼也不閉看那來往的人茶坊酒鋪內略有些可疑的人即使去捱查訊問溫殿直對冉貴說道他投東洋大海中去那裏去尋冉貴道觀察不要輸了志氣走到晚卻又理會兩個走到相國寺前只見靠牆邊簇擁著一夥人在那裏冉貴道觀察少待等我去看一看拈起腳來人叢裏見一二百人中圍著一個人頭上裹頂頭巾戴一朵羅帛做的牡丹花腦後盆大一對金環拽著半衣繫著繡裹肚著一雙多耳麻鞋露出一身錦片也似文字後面插一條銀槍豎幾面落旗兒放一對金漆竹籠卻是一個行法的引著這一叢人在那裏看原來這個人在京有名叫做杜七聖那杜七聖拱著手道我是東京人氏這裏是諸路軍州官員客旅往來去處有認得杜七聖的有認不得杜七聖的不識也聞名年年上朝東嶽與人賭賽只是奪頭籌有人問道杜七聖你有什本事他道兩輪日月一合乾坤天之上地之下除了我師父不曾撞見一個對手與我鬪這家法回頭叫聲壽壽我兒你出來那小廝剝脫了上截衣服玉碾也似白肉那夥人喝聲采道好個孩兒杜七聖道我在東京上上下下有幾個一年也有曾見的也有不曾見的我這家法術是祖師留下火燉油熱鍋煆碗喚做續頭法把我孩兒臥在凳上用刀割下頭來把這布袱來蓋了依先接上這孩兒的頭來衆位看官在此先叫我賣了這一百道符然後施逞自家法術我這符只要五個錢賣這一道打起鑼兒來那看的人時刻間擁擠不開約有二三百人只賣得四七道符杜七聖焦燥不賣得符看著一夥人道莫不衆位看官中有會事的敢下場來鬥法麼問了三聲又問三聲沒人下來杜七聖道我這家法術教孩兒臥在板凳上作了法念了咒語卻像睡著一般正要施逞法術解數卻恨人叢中一個和尚會得這家法術因見他出了大言被和尚先念了咒道聲疾把孩兒的魂魄先收了安在衣裳袖裏看見對門有一家麵店和尚道我正肚饑且去吃碗麵來卻還他兒子的魂魄未遲和尚走入麵店樓上靠著街窗看著杜七聖坐了過賣的來放下筷子鋪下小菜問了麵自下去了和尚把孩兒的魂魄取出來用碟兒蓋了安在桌子上一邊自等麵吃有詩為證莫向人前誇大口強中更有強中手續頭神術世間無誰料妖僧竊魂走小兒如玉得人憐魂去魂來不值錢話說兩頭卻說杜七聖念了咒拿起刀來剁那孩兒的頭落了看的人越多了杜七聖放下刀把臥單來蓋了提起符來去那小兒身上盤幾遭念了咒杜七聖道看官休怪我久占獨角案此舟過去想無舟趁了這家法寶賣這一百道符雙手揭起被單看時只見那孩兒的頭接不上衆人發聲喊道每常揭起臥單那孩兒便跳起來今日接不上決撒了杜七聖慌忙再把臥單來蓋定用言語瞞著那看的人道看官只道容易管取今番接上再叩頭作法念咒語揭起臥單來看時又接不上杜七聖慌了看著那看的人道衆位看官在上道路雖是各別養家總是一般只因家火相逼適間言語不到處望著官們恕罪則個這番教我接了頭下來吃杯酒四海之內皆相識也杜七聖認罪道是我不是了這番接上了只顧口中念咒揭起臥單看時又接不上杜七聖焦燥道你教我孩兒接不上頭我又求告你再三認自己的不是要你恕饒你卻直恁的無理便去後面籠兒內取出一個紙包兒來就打開搬出一顆葫蘆子去那地土把土來掘鬆了把那個葫蘆子埋在地下口中念念有詞噴上一口水喝聲疾可霎作怪只見地下生出一條藤兒來就漸漸的長大便生枝葉然後開花便見花謝結一個小葫蘆兒一夥人見了都喝采道好杜七聖把那葫蘆兒摘下來左手提葫蘆兒右手拿著刀道你先不成道理收了我孩兒的魂魄叫我接不上頭你也休想在世上活了看著葫蘆兒攔腰一刀剁下半個葫蘆兒來卻說那和尚在樓上拿起麵來卻待要吃只見那和尚的頭從腔子上骨碌碌滾將下來一樓上吃麵的人都吃一驚膽小的丟了麵跑下樓去了大膽的立住了腳看只見那和尚慌的放下碗起身去那樓板上摸一摸摸著了頭雙手捉住兩隻耳朵掇那頭安在腔子上安得端正又把手去摸一摸和尚道我只顧吃麵忘還了他的兒子魂魄伸手去揭起碟來這裏卻好揭得起碟兒那裏杜七聖的孩兒早跳起來看的人發聲喊杜七聖道我從行這家法術今日撞著師父了卻說麵店吃麵的人沸沸地說出來有多口的與杜七聖說道破你的法術卻是麵店樓上一個和尚內中有溫殿直和冉貴在那裏聽得這話冉貴道觀察這和尚莫不便是騙了善王太尉銅錢的麼溫殿直道我也有些疑惑冉貴道見兔不放鷹豈可空過冉貴把那頭巾只一掀招一行做公的大喊一聲都搶入麵店裏來見那和尚走下樓來衆人都去捉那和尚那和尚用手一指有分教鼎沸了東京城大鬧了開封府惱得做公的看了妖僧捉他不得惹出一個貪財的後生來死於非命正是是非只為多開口惱煩皆因強出頭畢竟不知當下捉得和尚且聽下回分解
