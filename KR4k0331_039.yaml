body:
  text: 第三十九回小齊長夏一爐燒窗几生涼竹樹交午睡起來無別事聽人鼓掌說平妖話說文招討三更時分寢不成寐起來離了寨房悄地巡行只聽得唱曲之聲上前窺看原來是個打更的軍士把那梆子按著板唱個曲兒唱道恨妖人粗心大膽不怕朝廷的法令從你據了這貝州城不知殺了幾千萬軍民的生命只為你一個人兒害我十萬大軍背井離鄉操戈帶甲受這般的危困更有俺巡更的軍士們擋著風冒著露整夜的行來步去步去行來喝號而提鈴恁般辛辛苦苦何曾有人來道個可憐的一聲想將來只是不公道的閻君一般樣生一般樣長如何偏派我做軍人若是有功的時節大將算大功小將算小功何曾派到我小軍只有陳上的槍刀營中的捆打是我們做軍的本分裏應受應承不合做了小軍呵你使有張良般智韓信般才有誰偢睬那裏去討個出身笑殺那文招討曹招討兩個有名的招討到如今招得幾人討得幾人眼盼盼看這手掌大的城兒裝妖作怪何日得太平酸辛俺做小軍的倒有三分主意兒只恨不在其位了有忠難進有志難伸酸辛若是有個築壇拜將的蕭何俺這副忠肝義膽情願報效了朝廷文招討聽得明白便回帳房喚身邊心腹之人道悄悄去喚那打更的軍士進來我有話說須臾喚到直至臥榻之前文招討問道方才說有張良般智韓信般才的就是你麼軍士跪著磕頭道小人信口胡謅不期招討聞知小人該死文招討道你休要慌張目今攻城無策正是用人之際你的三分主意兒是怎樣若說來可聽耍我築壇拜你亦有何難軍士道不是小人誇口小人能斬王則之首獻與招討文招討慌忙親手扶起問道你有何計策恁地方便軍士道不瞞招討說小人與王則同鄉自幼同堂上學結為兄弟原來軍士也是貝州人與王則相交最厚因跟隨一個房分叔叔到東京做客消折本錢叔叔死了他就落在東京占了軍籍文招討問道你姓甚名誰那軍士道小人姓馬名遂文招討聽了暗喜道想其人必應多目神之言這漢子去必能了事文招討道你且說如何用計馬遂直走到文招討身邊附耳低言語道小人如此去如此行事必斬王則文招討聽罷大喜道若事成之日必當一力舉薦管你出身不小不可漏泄於人馬遂應諾悄地出了帳房自去交更安息了到次日天明文招討升帳衆將官都到帳下聲諾道過罷立兩邊文招討發放軍事已畢叫左右喚昨夜打三更的軍士來不多時左右捱問是馬遂喚到帳前跪下文招討問道你便是昨夜打三更唱怨詞的麼馬遂說道告招討小人恐怕瞌睡誤了更次把個小曲兒唱著消遣其實不曾唱什麼怨詞文招討大怒道你說背井離鄉擋風冒露捆打有分功勞無分這不是怨詞麼這廝捏造謗語怠慢軍心即當斬首喝叫刀斧手推出轅門斬訖報來馬遂道告招討饒小人之罪小人情願去招降王則文招討教且押過來問道你這廝亂道有甚本事招降王則馬遂道小人與王則曾有一面相識今日賊兵連敗困於一城之中勢在危急小人用詞說之必使他不戰而降也文招討道我今寫一封密書與你你若送得此書招得王則來降必當記功重賞如其不然你的死自在後面文招討當時寫了書信封固了交與馬遂馬遂慌忙出帳徑到貝州城下隔著城河高聲叫道城上人我有機密大事來報你大王可開城門放我入城那守城軍聽說稟了守門官開了城門用小船過河來渡馬遂上岸少不得細細搜檢並無夾帶寸鐵衆人見有文招討書信只道下戰書的押來見王則王則認得馬遂是同鄉兄弟便道多時不見你原來在文彥博軍中今日有何事卻來見我馬遂道告大王馬遂不才失身在軍伍之中本不敢來見大王因前日夜間該馬遂巡三更恐怕打瞌睡不合唱個曲兒文招討道我攪亂軍心要斬我幸我轉口得快稟道我有本事招降大王文招討信了親筆寫下一封書信教不才來遞送不才僥幸得脫特來投順大王不才盡知文招討軍中虛實望大王收留在帳下做一走卒當以犬馬相報就把文招討書信遞與王則王則看了書中有許多大話即便扯碎便叫馬遂改換衣服請到便室同坐馬遂道大王是三十六州之主小人得蒙大王收留執鞭隨鐙足矣安敢如此王則道寡人與卿乃同鄉又是從小兄弟與別人不同馬遂只得坐下王則叫安排酒來一面請馬遂吃酒一面問文招討軍中虛實馬遂道文招討只有五萬人馬詐稱十萬前日又輸了幾陳折了一萬多人馬又傅家疃明鎬寨中存下一萬老弱中傷之人如今不上三萬實數昨日計點糧草聽得說只可開支十餘日今大王用心把守不過數日文招討之軍不戰而自退矣王則聽馬遂說了十分歡喜當日直飲到晚王則對馬遂道曾記得少時同鄉在書館中做對吟詩自從愛了槍棒便不攻文墨今日故人相見可各題詩一首以表衷曲馬遂道小人從幼愚魯趕大王腳跟不上何況今日大王請先吟小人效顰而已王則教取文房四寶帶醉寫出四句道脫卻軍裝換袞袍六千人內逞英豪他時破敵功成日敢為貧交吝節旄王則道我為散了六千軍士的錢米知州見怪因而起手第四句是不忘舊之意馬遂道大王佳作甚妙小人如何敢和王則道正欲觀卿賡和以占學問消長耳馬遂依前韻也寫四句道交情僅見說綈袍何幸今逢天挺豪佐命願隨諸將後敢言功績望旌旄王則看了大笑道卿立意甚美不獨辭章也兩個吃得盡醉而散次日馬遂來謝王則封為親軍指揮使之職就留他在僞府中與張琪一同值宿時時請他談論馬遂要殺王則又下不得手忽一夜與張琪同坐吃酒各談胸臆說到忘懷之際馬遂道聞大王部下人人都有道術不知老哥有甚神通張琪便把水火葫蘆來歷妙用都說出來馬遂見他醉了定要求來一觀張琪掀起衣服只見貼肉汗衫上繫著一條軟兒上掛著一個小小葫蘆提與馬遂看了不解下來馬遂看在眼裏是夜只推酒醉就與張琪同宿馬遂有心到半夜只推解手起來叫聲張大哥那張琪醉酒熟睡去了馬遂要去解他腰間的法物見縛得緊緊的恐怕驚醒他自己身邊皮袋內帶得有穢血蒜汁輕輕的將他葫蘆塞去了滴幾滴穢水在內照舊塞好天明起來張琪全不知覺正是高興事成沒興事無心人對有心人不在話下再說文招討見馬遂去了許多時沒些動靜傳下令來教衆將引兵四下攻城孫輔攻打西門董忠攻打東門柳春生攻打南門劉彥威攻打北門各各近城擂鼓訥喊勒戰王則急請衆人商議只有瘸子恰遇中酒叫喚不醒其餘都到齊上城巡看一面差人報聖姑姑胡永兒得知王則喚馬遂問道你說文招討軍中缺糧緣何又來攻城馬遂道他只趁得幾日糧草如何不併力來攻只道大王折過一陳決不敢出兵迎敵苦出其不意必然破之破得他一枝軍其他安身不牢必盡退矣馬遂的意見只要支開王則身邊一班妖人他好於中取事王則不解其意點頭道何人敢去衝陳張琪自恃水火葫蘆前番只他有功挺身出來應道孫輔是某手下敗將某識破他手段情願引一枝兵出西門迎敵說罷飛馬下城去了王則道再得一人接應方好看著吳旺吳旺吃過驚嚇本不願行出於無奈只得應承怏怏而去王則靠著懸空板凳按住木欄干在西門城上觀戰卻說先鋒孫輔正在率衆攻城忽見城門開處一彪軍飛奔出來孫輔慌忙約退軍士挺槍立馬等待廝殺張琪不持兵器手中擎著葫蘆約莫官軍相近念起神火咒把葫蘆去了塞口喝聲疾卻不見火光透出再念聖水咒連喝疾疾把葫蘆籤筒般搖了幾搖也沒見涓滴兒滴將出來把眼張那葫蘆口內只聞得一般血腥蒜臭之氣情知法破撥回馬頭便走孫輔飛馬來趕原來王則與胡永兒做了夫婦只學得兩個法兒一個是禁人法一個隱身法行起禁人法時隨你千軍萬馬追趕如飛能令登時禁住兩腳動移不得直後待一個時辰後方解王則在城上見張琪兵敗後軍來趕正要念禁人咒語馬遂立在身邊想道此時不下手更待何時但兩旁左右都執著刀斧器械馬遂欲奪刀來殺王則又怕被人知覺乃捏得拳頭沒縫說時遲那時快王則咒語尚未念完被馬遂狠狠的一拳打中嘴上打落當門兩個牙齒來綻了嘴唇跌倒在城樓上馬遂就奪左右的刀來砍被王則身邊一個心腹賊將喚做石慶腰裏早拔刀出來手起刀落把馬遂剁落一隻胳膊來衆人一齊向前捉馬遂救了王則王則大怒教左右斬訖報來馬遂大罵道我為無刀在手不能砍下妖賊之頭與萬民除害我死必為厲鬼殺你矣衆人推馬遂去斬了後人有詩贊之云葫蘆水火已成空又見妖人折齒凶卻笑荊卿名劍客祖龍繞柱竟何庸卻說張琪走到吊橋邊衆軍爭先逃命先把吊橋踏斷背後孫輔趕來張琪繞濠而走遇泥濘處馬前腳陷下被孫輔趕上一鎗搠下馬來跌入濠中溺死可憐張琪賣肉為生不安本分今日做了水中之鬼孫輔教軍士將撓鉤拖起尸首割了首級到中軍帳下獻功去了吳旺只推橋斷竟不來救應引兵而回再說王則被馬遂打綻了嘴唇聲也則不得恰好聖姑姑和胡永兒都到見王則恁般模樣又損折了張琪深恨馬遂之事忙教人將暖輿抬王則到僞府中一面叫醫人調治左黜酒醒來知道此事也來問安胡永兒埋怨瘸子吃酒誤事瘸子笑道我嘴唇又不綻如何禁我飲酒胡永兒道且莫說笑話則今攻城緊急必須從長計較斬得他正將一二員方才肯退聖姑姑道他既有破法之人別無甚計除非行烏龍斬將法此法急切難破但如意寶冊上寫道此乃至惡之術萬萬不可輕用用之必有陰禍如今也說不得了原來這法用五金之精裝於六甲壇下煉七七四十九日鑄成鬼頭刀一口名曰神刀自能嘯躍用石匣盛之藏於水底金水相得方不躍去如遇至危之際將純黑雄犬一隻硃書斬將符三道並開欲斬之人姓名一同焚化念斬將咒三遍吸西方金一口存想人頭落地光景將神刀猛力砍落犬頭所焚姓名人頭向前並落若把軍冊焚化雖千萬人亦皆落頭此所以為至惡之術也當初聖姑姑等三人煉法之時亦為此法利害只鑄得神刀一口藏於天柱山頂池中聖姑姑要去取來砍取文曹二招討及有名諸將之首左黜和胡永兒都喜歡道必須如此方保無虞聖姑姑飛身去了左黜自和吳旺巡城守禁胡永兒也回僞府中行樂王則疼得煩悶飲食不進無法消遣平日最喜歡一個扮副淨的樂人叫做李魚羹彈得好琵琶唱個好曲又會說平話嘲笑耍子王則叫喚他來解悶當日李魚羹來到王則面前也不彈也不唱閉著口只不則聲王則問道李魚羹你為何不則聲心下有甚煩惱李魚羹道大王尚且煩惱小人怎地不煩惱小人與大王都是做私的大王所靠者只幾個興妖作怪的人如今彈子國師去了張鸞丞相避了卜吉將軍走了左黜軍師輸了任遷捉了張琪死了聖姑姑尋事兒躲了今日在圍城之中城外軍馬越添得多了併力要打雙日不著單日著終久被他捉了如今煩惱也算遲了王則道你的意思如何李魚羹道不如及早受了招降反禍為福王則大怒道叵耐這廝不伏事我反把言語來傷觸我喝叫左右拿下手下人把李魚羹捉了王則叫把他縛了手腳吊在炮梢上就城上打出去跌做骨醬肉泥衆人縛了李魚羹吊在炮梢上拽動炮架一聲炮響把李魚羹打出城外正是酒逢知己千杯少話不投機半句多畢竟李魚羹性命如何且聽下回分解
