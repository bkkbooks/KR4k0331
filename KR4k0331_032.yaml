body:
  text: 第三十二回人言左道非真術只恐其中未得傳若是得傳心地正何須方外學神仙話説王則正在草廳上看著軍馬説話之間只聽得有人高叫道你們在此舉事謀反麼王則嚇得心慌膽落抬頭看時只見一個人生得清奇古怪頭戴鐵冠腳穿草履身上皂沿緋袍面如噀血目似怪星騎著一匹大蟲徑入莊來聖姑姑道張先生我與王都排在此議事你來便來何須大驚小怪先生跳下大蟲喝聲退那大蟲往門外去了先生與聖姑姑施禮王則向先生唱了喏先生還了禮坐定聖姑姑道張先生這個是貝州王都排後五日你們皆為他輔助先生對王則道貧道姓張名鸞常與聖姑姑説都排可以獨霸一方貧道幾次欲要與都排相見恐不領諾不敢拜問聖姑姑如何得王都排到此聖姑姑道我使永兒去貝州衙前用些小術引得都排到此方欲議事卻遇你來先生道不知都排幾時舉事聖姑姑道只在旦夕待軍心變動一時發作你們都來相助舉事道猶未了只見莊門外走一個異獸入來王則看時卻是一個獅子直至草廳上盤旋哮吼王則見了又驚又喜道此乃天獸如何凡間也有必定是我有緣得見方欲動問聖姑姑喝道這廝既來相助都排何必作怪可收了神通獅子將頭搖一搖不見了獅子卻是個人王則問聖姑姑道此人是誰聖姑姑道這人姓卜名吉叫卜吉與王則相見禮畢就在草廳上坐定聖姑姑道王都排你見張鸞卜吉的本事麼王則道二人如此奢遮不怕大事不成聖姑姑道須更得一人來教你成事王則道又有何人正説之間只見從空中飛下一隻仙鶴來到草廳立地了背上跳下一個人來張鸞卜吉和永兒都起身來與那人施禮王則看那人時瘸了一隻腿身材不過四尺戴一頂破頭巾著領粗布衫行纏破碎穿一雙斷耳麻鞋將些草帶繫著腰王則見了他這般模樣也不動身心裏道不知是甚人聖姑姑道王都排這是吾兒左黜得他來時你的大事濟矣如何不起身迎接王則聽得説慌忙起身施禮左黜上草廳來與聖姑姑唱個喏便坐在衆人肩下問聖姑姑道告娘娘王都排的事成也未聖姑姑道孩兒論事非早即晚專待你來這事便成左黜道既然商議停當難得都排到此便可屈留即今晚與妹子永兒完成親事就煩張先生為媒卻不好麼聖姑姑道正合吾意便吩咐女童引王都排到香水浴室洗澡王則洗了個淨浴女童將一身新衣與他通身換過了聖姑姑教捧出龍袍玉帶沖天冠無憂鞋請他穿著王則從不曾見這般行頭那裏敢接只見瘸師拐將過來叫道都排休懷謙遜你若疑慮時我引你到三生池上去照你今世的出身王則跟了瘸師走出莊院來到一個清水池邊瘸師教王則向清水中自家照看王則看了大驚只見本身影子照在水裏頭戴沖天冠身穿滾龍袍腰上白玉帶足下無憂履相貌堂堂儼然是一朝天子瘸師道都排你見麼天數已定謙遜不得王則方才信了當時就裝扮起來只見草廳上鼓樂喧天八個女童紗燈宮扇服侍永兒出來珠冠繡襖別是一般裝束就如皇宮妃子一般兩個在草廳上行了夫婦之禮怎麼樣但見名香滿爇異彩高懸百歲姻緣笑語撮成花燭一場歡喜笙歌擁入蘭房何處來風流帝子分明巫山夢裏襄王誰得似窈窕仙娘除非天寶宮中妃子恩山義海歡娛足錦地花天富貴多當晚洞房花燭鋪設得十分整齊王則想道莫非是夢麼不是夢難道是真又道便不是真也是個好夢我且落得受用只因王則和胡永兒兩個一個乃是武則天娘娘托生轉女為男一個是張昌宗托生轉男作女他先前在百花亭上發了真願願生生世世永為夫婦到今四百來年重諧舊約再結新歡夫婦恩情不須提起一連的住了三日真是個軟玉香溫迷晝夜花堆錦簇送時光這也不在話下到第四日聖姑姑請王都排議事説道氣運已至宜急相機而動休得貪戀新婚忘其大事瘸師道都排且回我明日和張先生等入貝州來替你舉事王則心上巴不得再住幾日一來被衆人催逼二來三日不曾到家中看得生怕州裏有事只得謝了聖姑姑別了胡永兒依舊來時打扮瘸師引他離了莊院出林子來指一條路叫他回去王則回頭看時不見了瘸師行不多幾步早到了貝州城門頭王則吃了一驚道卻不作怪前番行了半日到得仙姑莊上如今行不得數十步早到了城門頭原來這一班都是異人都會法術來扶助我我必是有分發迹王則當日進城尚是未牌時分先打從州前走一邊看其動靜只見兩三個做公的見了王則道王都排那裏去來好幾日知州相公喚你不到好不心躁哩王則聽了慌忙跑進州裏見了知州知州問道王則你這幾日在那裏王則道小人往鄉裏看個親戚原想一日轉回不意道路上受了些風寒睡倒了三日今早才起得身聞知相公呼喚小人特來參見還不曾到家裏知州道既是有病不計較了五日前差你到鋪中取來綵帛奶奶嫌顏色不鮮明尺頭又短用不著你可領去照數換來作速限你明日交割小姐吉期近了專等裁衣休得遲誤留下喚個心腹親隨到私衙裏討出綵帛來共是十三匹叫王則點清了數目收去王則答應了兩手抱出州衙一直到自家屋裏坐下想道我王則好晦氣才快活得三日回來沒討鍾茶吃這贓官又來歪纏了你自要嫁女兒干我貝州人甚事鋪家銀又不肯發還教人硬賒取著東西還要嫌好道歉弄得亂亂的又去倒換你做官府的直恁強橫一頭説一頭把綵帛展開待要重新摺好提起看時吃了一驚先前送進去是個整匹如今尺頭剪動了逐匹展看都是如此取尺來量著每匹短了五尺王則道少了匹把倒是小事可惜都剪殘了既不是原物鋪家如何肯換一定是手下人作弊官府那裏曉得少不得去稟明看他如何説連忙摺起重抱到州裏來知州已自退堂了王則道且拿回去明早來稟他未遲次日起個早伺候知州上廳王則捧著十三匹綵帛跪在下面知州見了喜道王則還是你會幹事昨日吩咐得你今早就換來了王則稟道還不曾換來昨日相公發出這些綵帛來不是原物了不知何人每匹剪去了五尺教小人如何好換乞相公臺旨知州道昨日當堂教你檢收既然剪動當時就該説了王則道小人當堂只點得匹數到家去仔細觀看方知短少連忙來稟知相公其時相公已散衙了天色已晚小人不敢傳報今早特來伺候知州大怒道胡説昨日驗收明白就該發還鋪家你又拿回家裏自不小心被家中什麼人剪動了今早反來我這裏胡稟若不念你平日效勞之勤就該打你一頓毒棒快去立等換來再休多口罵得王則頓口無言只得依舊抱回悶悶的坐在家中正在尋思無計只見三個人從外面入來王則看來不是別人正是左黜和張鸞卜吉四個敘體已畢三人見桌兒上堆著許多綵帛問道那裏來的王則道一言難盡便將知州剪壞了原物要他鋪中換取事情備細説了左黜道這個何難在貧道身上包換還你當下把十三匹綵帛做一堆兒堆在地下脫下粗布衫蓋了口中念念有詞喝聲道疾揭起布衫來看時變了十三匹鮮明綵帛王則大喜道有煩三位少坐待小可送去州裏再來陪話三人道我等正有話商議快去快來王則笑容可掬捧著綵帛到州衙去了有詩為證任所如何辦嫁妝剪殘綵帛要人償有官望使千年勢沒理天教一旦亡知州還坐衙見換到鮮色綵緞歡喜自不必説王則如數點明交付私衙收訖火速轉回家裏那三個人正在那裏相待王則道有失陪侍休得見罪又道三位到此合當拜茶奈王則家下乏人三位請到間壁酒肆中飲數杯張鸞笑道還不曾擾一杯喜酒指著瘸師道莫説這位大舅今日只當請媒麼左黜跳起來道休論親道故既然相見少不得監醉方休卜吉道還是瘸師説得爽利王則道今日是個下班日分那綵帛又交付過了正好久坐四個入酒店樓上靠窗坐定正飲酒熱鬧只見樓下官旗成群拽隊走過王則道今日不是開操日分如何兩營官軍盡數出左黜道王都排你下去問問看是何緣故王則下樓來出門前看時人人都認得王則齊來唱喏王則道你們去那裏去來管營的道都排知州苦殺我們有請的也我們役過了三個月如今一個月錢米也不肯關與我們我們今日到倉前管倉的吏只是趕打我們回去王則道若是恁地卻怎的好管營的道如明日再不肯關支衆人須要反也管營的和衆人自去王則上樓來把管營的説話對左黜説了一遍左黜起身來道你快去趕管營教他們回來請支一個月錢米與他們教這兩營軍心都歸順你王則道先生那裏有許多錢米左黜道你只教他們回來我自有措置王則當時來趕見管營叫他叫住許多人都轉來與你們一個月錢米管營聽得説叫轉許多人都回王則門首只見王則家裏山也似堆起米來王則肚內想道如何家裏桌凳都不見了這一屋米從何而至只見瘸子把手招道你們衆人如有氣力的搬一石兩石不打緊只是不要囉唣那有請的三三五五都來搬也有得一石的也有馱得兩石的儘著氣力搬運王則道這米只有百來石兩營共有六千人如何支散得遍左黜道你休管我包你教他都有米便了衆人自午牌時候搬起直搬至酉牌時候止搬有一萬餘石家中尚餘有四五石管營和若干人都來謝王則左黜道王都排一客不煩兩主有心賣個人情今夜有引亮的你和管營説教他去營裏告報衆人就今晚來請一個月錢省得到明日一件事兩截做管營見説不勝歡喜飛也似的去報衆人來領錢王則道先生散了許多的米了如今金在那裏左黜道我自有張鸞道貧道有一千貫寄在博平縣城隍處今早取得來了現在都排床下王則進去看時果然床下都塞得滿滿的不知如何運來正驚訝間只覺得腳底下踏著個錢索頭兒恰像埋在地下的一般王則曲身下去將手一扯那索子隨手而出索上密密的都穿得有上好官錢似紡車兒一般抽個不了王則倒慌了手腳卻待放手只聽得大笑一聲驀地錢索上鑽出一個和尚來耳帶金環身披烈火袈裟嚇得王則魂不附體拋了手望外便走只見和尚也隨身出來叫道貧僧今日來遲了都排休怪張左等見了都認得是彈子和尚二人對王則道此位是彈師也是我們一家來幫都排舉大事的王則道莫非在開封府惱了包龍圖相公的就是瘸師道然也王則方才心穩上前相見彈子和尚道貧僧向年化得善王太尉三千貫錢沒處化消早間聞得張先生往博平縣取錢與都排賞軍貧僧也把這三千貫運來相助瘸師道六千人每人與他一貫現有了四千貫還少二千貫張鸞道貧道包足三千貫卜吉道不勞吾師神力徒弟已辦下了五個人同入裏面馱將出來一千貫做一堆堆得滿屋裏都是錢堆尚未了只見行請的都在門前王則教他們入來搬去每人只許搬一貫這夥人出自望外也沒個敢多要的乘著月色約莫搬了兩個更次恰好兩營人都有了這六千人和老小那一個不稱道好個王都排誰人肯將自己的錢米任意教人搬去但有手腳快有氣力關支了三個月錢米安在家裏煩惱甚的當日左黜等四人散完了錢米別了王則自去約到明日又來王則次日正該上班日分五更三點時入州衙前伺候知州升廳這個知州姓張名德滿郡人罵道綺羅裹定真禽獸百味珍羞養畜生堪嘆地方都晦氣何時拔出眼中釘這知州每日不理正事只是要錢當日坐在廳上便喚軍健王則王則在廳下唱喏道請相公臺旨知州道王則我聞你直恁的豪富昨日替我散了六千人請受錢米似此要散與他們何不先來稟我待我發放王則不敢説是甚人變化出來的正待支吾答應尚未出口只見階下兩個人身穿紫襖腰繫勒帛唱個喏稟道告相公倉廩不動封鎖不見了十數廒米那知州吃了一驚正沒理會處只見管庫的出稟道告相公庫裏不動封鎖不見了二千貫錢原來瘸師的米卜吉的錢都是本州倉庫中運來的知州道是了是了王則我倉裏失米庫內又失去了錢你家又沒倉庫如何散得六千人錢米分明是你使個搬運妖法盜去了王則被他道著無言回答知州教獄卒取一面長枷來當廳把王則枷了教送下獄去教司理院勘問這張太尹只因把王則下獄有分教自己身首異處連纍一家死於非命貝州百姓不得安生畢竟知州惹出甚禍事來且聽下回分解
